<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M教育</title>
<style>
  :root {
    --color-bg: #f4f6f8;
    --color-card: #ffffff;
    --color-primary: #2c5f8a;
    --color-primary-dark: #1e4463;
    --color-text: #262b30;
    --color-muted: #6b7580;
    --color-border: #dde2e6;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Yu Gothic", "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
  }
  header {
    background: var(--color-primary);
    color: #fff;
    padding: 18px 24px;
  }
  header h1 {
    margin: 0 0 4px 0;
    font-size: 1.3rem;
  }
  header p {
    margin: 0;
    font-size: 0.8rem;
    opacity: 0.85;
  }

  /* 補助的な検索バー（小さめ・目立たせない） */
  .topbar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px 24px 0 24px;
    display: flex;
    justify-content: flex-end;
  }
  .search-mini {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    max-width: 320px;
  }
  .search-mini input[type="text"] {
    flex: 1;
    padding: 6px 10px;
    font-size: 0.8rem;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    outline: none;
    background: #fff;
  }
  .search-mini input[type="text"]:focus {
    border-color: var(--color-primary);
  }
  .search-mini button {
    padding: 6px 10px;
    font-size: 0.75rem;
    background: #fff;
    color: var(--color-muted);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    cursor: pointer;
  }
  .search-mini button:hover { color: var(--color-primary); border-color: var(--color-primary); }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px 48px 24px;
  }

  /* ===== ホーム：カテゴリカード ===== */
  .page-title {
    font-size: 1.05rem;
    font-weight: bold;
    margin: 4px 0 16px 0;
    color: var(--color-text);
  }
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .category-card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .category-card:hover {
    box-shadow: 0 6px 18px rgba(0,0,0,0.10);
    transform: translateY(-3px);
    border-color: var(--color-primary);
  }
  .category-card .icon-badge {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #eaf1f7;
    color: var(--color-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: bold;
  }
  .category-card .cat-name {
    font-size: 1.05rem;
    font-weight: bold;
    line-height: 1.4;
  }
  .category-card .cat-count {
    font-size: 0.78rem;
    color: var(--color-muted);
  }
  .category-card .cat-count .num {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--color-primary);
    margin-right: 2px;
  }

  /* ===== カテゴリ詳細／検索結果：資料グリッド ===== */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.82rem;
    color: var(--color-primary);
    text-decoration: none;
    cursor: pointer;
    margin-bottom: 10px;
    background: none;
    border: none;
    padding: 0;
  }
  .back-link:hover { text-decoration: underline; }

  .section-heading {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }
  .section-heading h2 {
    font-size: 1.15rem;
    margin: 0;
  }
  .section-heading .count {
    font-size: 0.8rem;
    color: var(--color-muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .card:hover {
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .thumb-wrap {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #eef1f3;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #fff;
  }
  .thumb-placeholder {
    color: var(--color-muted);
    font-size: 0.75rem;
    text-align: center;
    padding: 8px;
    white-space: pre-line;
  }
  .card-body {
    padding: 12px 14px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .card-category {
    font-size: 0.7rem;
    color: var(--color-primary);
    font-weight: bold;
  }
  .card-title {
    font-size: 0.92rem;
    font-weight: bold;
    line-height: 1.35;
    word-break: break-word;
  }
  .card-snippet {
    font-size: 0.75rem;
    color: var(--color-muted);
    line-height: 1.4;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-snippet mark {
    background: #fff1a8;
    padding: 0 1px;
  }
  .card-links {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .card-links a {
    font-size: 0.75rem;
    text-decoration: none;
    color: #fff;
    background: var(--color-primary);
    padding: 6px 10px;
    border-radius: 5px;
    flex: 1;
    text-align: center;
  }
  .card-links a.secondary {
    background: #fff;
    color: var(--color-primary);
    border: 1px solid var(--color-primary);
  }
  .card-links a:hover { opacity: 0.85; }

  .empty-state {
    margin: 40px auto;
    text-align: center;
    color: var(--color-muted);
    font-size: 0.9rem;
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.72rem;
    color: var(--color-muted);
  }

  /* ===== パスワード保護ゲート ===== */
  .auth-gate {
    position: fixed;
    inset: 0;
    background: var(--color-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .auth-box {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 36px 32px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  }
  .auth-box h1 {
    font-size: 1.1rem;
    margin: 0 0 6px 0;
    color: var(--color-text);
  }
  .auth-box p {
    font-size: 0.8rem;
    color: var(--color-muted);
    margin: 0 0 20px 0;
  }
  .auth-box form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .auth-box input[type="password"] {
    padding: 10px 12px;
    font-size: 0.95rem;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .auth-box input[type="password"]:focus {
    border-color: var(--color-primary);
  }
  .auth-box button {
    padding: 10px 12px;
    font-size: 0.9rem;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .auth-box button:hover { background: var(--color-primary-dark); }
  .auth-error {
    color: #c0392b;
    font-size: 0.78rem;
    margin: 10px 0 0 0;
  }
</style>
</head>
<body>

<div id="authGate" class="auth-gate">
  <div class="auth-box">
    <h1>M教育</h1>
    <p>閲覧にはパスワードが必要です</p>
    <form id="authForm" autocomplete="off">
      <input type="password" id="authPassword" placeholder="パスワードを入力" autocomplete="off" inputmode="numeric">
      <button type="submit">開く</button>
    </form>
    <p id="authError" class="auth-error" style="display:none;">パスワードが違います。もう一度お試しください。</p>
  </div>
</div>

<div id="siteContent" style="display:none;">

<header>
  <h1>M教育</h1>
  <p>透析室教育チーム作成資料 一覧・検索サイト</p>
</header>

<div class="topbar">
  <div class="search-mini">
    <input type="text" id="searchInput" placeholder="キーワード検索（補助機能）">
    <button id="clearBtn">クリア</button>
  </div>
</div>

<main id="app"></main>

<footer>教育チーム資料カタログ / build.py により自動生成</footer>

</div>

/2023CART説明スライド__pdf.png", "fulltext": "CART\nCARTについて\n（旭化成HP）\n端的に表現するならば、\n「腹⽔を濾過して液体成分だけを濃縮し\nてから⾎中へ」という治療。\n（濾して⾎球成分は取り除かれます）\nAlbなんかを再度⾎中に戻せる事が売りです\n当院では左記のHPで挙げるような⼀般的な\n⽅法ではなく、濾過のみ実施してから⾎中\nへ戻す⽅法を選択しています\n・濾過：専⽤の機械を使⽤\n・濃縮：透析の機械を代⽤\nその他、不明な点があればMEさんへ"}, {"title": "ナファモスタット　溶解　説明スライド", "filename": "ナファモスタット　溶解　説明スライド.pptx", "category": "薬剤", "pdf": "pdf/薬剤/ナファモスタット　溶解　説明スライド__pptx.pdf", "thumbnail": "thumbnails/薬剤/ナファモスタット　溶解　説明スライド__pptx.png", "fulltext": "ナファモスタット\n1\n\n2\nはじめに\n医師からは、\n「ヘパリン初回〇〇単位、持続〇〇単位、カット無し」\n「ナファモスタット〇〇mg/hr」という指示が出る。\nしかし、コンソールでは〇〇ml/hrという設定。\n \n医師も〇〇ml/hrで指示出してくれたら\n楽やのに…と最初は思った。\n※IP：infusion pump→薬液注入ポンプ\n\n3\nみたきのヘパリン　青:250単位/1ml\n→初回1000単位の指示であれば4ml入れればよい。\n　ヘパリンは元々液体のため、\n　そのままコンソールのIPにシリンジをセットできる。\n対して、ナファモスタットは粉末。\n→自分で溶かして液体にしなければ\n　コンソールにセットできない。\n　\n　溶かす液体の量を決めておかないと\n　濃度が毎回変わってしまう。\n\n4\nみたきでは\n1mlに10mg溶解する。\nとルールで決めている。\n \nつまり20mlのブドウ糖液なら\nナファモスタットを200mg溶解する必要がある。\n \nナファモスタットは1Vに50mgなので4V必要。\nナファモは\n5％ブドウ糖液で\n溶解すること！！\n\n5\n医師指示は「ナファモスタット40mg/hr」が多い。\n \nみたきでは1mlに10mg溶解する。\n1時間に4ml投与する設定にすれば\n40mg入っていることになり、指示通り。\n \n透析時間が4時間であれば\n40×4=合計160mg必要。\n4V（200mg）用意する。\n3時間であれば\n40×3=合計120mg必要。\n3V（150mg）あれば足りる。\n\n6\nただし、1mlに10mg溶解する。というルール上、\n3V（150mg）を溶解する場合、15mlで溶解する！\nいつも4Vを20mlで溶解しているため、\nその流れで3Vを20mlで\n溶解してしまったスタッフがいた。\n\n7\n万が一、溶解する量を間違えた場合の対応。\nIP速度をその日のみ調整すればＯＫ。\nイメージ\n　本当は15mlのところ、20mlで溶解してしまった。\n　　→いつもより薄まっている。\n　　　→いつもより多く入れなければならない。\n \n　ポイント！！！\n　　まず1mlあたり何mgなのか？を計算。\n　　　　　　　　　↓\n　　医師指示の〇〇mgを入れるためには\n　　何ml/hrでIP設定すればよいか？を計算すればよい。\n\n8\n最後に\nml/hrで指示受けすると、\n緑ヘパリン（500単位/ml）と青ヘパリン（青250単位/ml）\nどっちを使うかによって体内に入る量が変わってしまったり\nナファモスタットだと溶解する液量によって濃度が変わる。\n→やっぱりミスの少ない指示は、単位もしくはmgである！と。\nコンソールを操作するのは看護師とME。\n医師の指示通りにIP設定を行わなければならない。"}, {"title": "ナファモスタット改変", "filename": "ナファモスタット改変.pptx", "category": "薬剤", "pdf": "pdf/薬剤/ナファモスタット改変__pptx.pdf", "thumbnail": "thumbnails/薬剤/ナファモスタット改変__pptx.png", "fulltext": "ナファモスタット\n1\n\n2\n医師からは、\n「ヘパリン初回〇〇単位、持続〇〇単位、カット無し」\n「ナファモスタット〇〇mg/hr」という指示が出る。\nしかし、コンソールでは〇〇ml/hrという設定。\nIP\n※\n：infusion pump→薬液注入ポンプ\n\n3\nみたきのヘパリン　青:250単位/1ml\n→初回1000単位の指示であれば4ml入れればよい。\n　ヘパリンは液体のため、\n　そのままコンソールのIPにシリンジをセットできる。\n対して、ナファモスタットは粉末。\n→自分で溶かして液体にしなければ\n　コンソールにセットできない。\n　\n　溶かすバイアル数により濃度が変わる。\n\n4\nみたきでは\nナファモスタットの\nバイアル数に関わらず\n20mlブドウ糖液で溶解する。\n\n5\n透析時間に応じたバイアル数の準備が必要\n１バイアルは50mg\n例　医師指示「ナファモスタット40mg/hr」\n3時間透析→3×40=120mg　→３V(150mg)\n4時間透析→4×40=160mg　→４V(200mg)\n\n計算\n４V(200mg)を20mlで溶解\n200mg÷20ml=10mg/ml\n1mlあたり10mg溶解\n医師指示\n「ナファモスタット40mg/hr」\n一時間に4ml投与の設定にすればよい\n6\n\n7\n　ポイント！！！\n　　まず1mlあたり何mgなのか？を計算。\n　　　　　　　　　↓\n　　医師指示の〇〇mgを入れるためには\n　　何ml/hrでIP設定すればよいか？を計算。\n\n単位の計算で考える\n3V(150mg)を20mlで溶解\n150mg÷20ml=7.5mg/ml　1mlあたり7.5mg溶解\n40mg/hr÷7.5mg/ml=5.333333≒5.3ml/hr\n8\n\n比で考える\n150(mg)：20(ml)＝X(mg)：1(ml)\n20X＝150\nX＝7.5\n1mlに7.5mg！\nX(ml)：40(mg)＝１(ml)：7.5(mg)\n7.5X＝40\nX＝5.3\n5.3mlに40mg！\n9\n内×内=外×外\n\n150mg　→　20ml\n？mg　  →　 1ml\n÷20\n÷20\n1mlあたり7.5mg\n7.5mg　→　1ml\n40mg　 →　？ml\n×5.3\n÷5.3\n×5.3\n40mgあたり5.3ml\n絵(比の図示)で考える\n\n11\nml/hrで指示受けすると、\n緑ヘパリン（500単位/ml）と青ヘパリン（青250単位/ml）\nどちらを使うかによって体内に入る量が変わったり\nナファモスタットであれば溶解する液量によって濃度が変わる。\n→ミスの少ない指示は、単位もしくはmg。\nコンソールを操作するのは看護師とME。\n医師の指示通りにIP設定を行わなければならない。"}, {"title": "ナファモスタット溶解　問題　解答　答え", "filename": "ナファモスタット溶解　問題　解答　答え.docx", "category": "薬剤", "pdf": "pdf/薬剤/ナファモスタット溶解　問題　解答　答え__docx.pdf", "thumbnail": "thumbnails/薬剤/ナファモスタット溶解　問題　解答　答え__docx.png", "fulltext": "ナファモスタット　溶解　計算\n1V（バイアル）=50mg のナファモスタットを使用。\n3V→15ml　4V→20ml の5％ブドウ糖液（TZ）で溶解。\n「　　　」内は医師指示とし、ワンショット無しカット無しとする。\n問１「ナファモスタット40mg/hr」\nIP\n  速度（持続速度）の設定は？\n \n \n問2「ナファモスタット50mg/hr」\nIP\n  速度（持続速度）の設定は？\n \n \n問３「ナファモスタット40mg/hr」\n毎回4 時間透析の人が次回のみ3.5 時間透析と医師指示。\n　　次回のナファモスタットは何\n  V  用意すればよい？理由も述べよ。\n \n \nただし必要最低限のバイアルを使用すること。\n\n問４「ナファモスタット40mg/hr」\n間違えて3V を20ml で溶解してしまった。\n　　どう対処すればよい？\n（キーワード “IP 速度” を使用し、具体的な数値も解答すること。）\n問５「ナファモスタット40mg/hr」\n　　3 時間透析の人が透析開始後、その日のみ1 時間延長でECUM と医師指示。\n　　3V で溶解していた場合、ナファモスタットは足りる？足りない？\n　　足りない場合、どれだけ足りないか、\nもし追加が必要であれば、何\n  V  を何\n \n m\n  l の５％\n \n TZ\n \n で追加溶解すればよいか\n \n 。\nただし必要最低限のバイアルを使用すること。\n氏名　　　　　　　　　　　　　\n\n問１\nml/hr\n問２\nml/hr\n問３\n         　　　     　 V\n理由\n問４　　（キーワード     “IP 速度”）\n\n問５\n足る　　・　　足らない\n足らないを選んだ場合\n●どれだけ足らないか　●何V を何ml の５％TZ で追加溶解すればよいか\n問１\n\n4.0 ml/hr \n4V（200mg）を20ml で溶解しているため、1ml あたり10mg 溶解している。\n「ナファモスタット40mg/hr」→4ml/hr で投与すれば医師指示通り。\n問２\n5.0 ml/hr\n4V（200mg）を20ml で溶解しているため、1ml あたり10mg 溶解している。\n「ナファモスタット50mg/hr」→5ml/hr で投与すれば医師指示通り。\n問３\n  　３V\n理由\n合計140mg 必要だから。\n4 時間透析であれば4V 必要。\n（40mg×4 時間=計160mg 必要であり、1V は50mg なので4V〔200mg〕必要。）\n3.5 時間透析の場合、40mg×3.5 時間=140mg 必要。\n1V は50mg なので3V（150mg）で足りる。\n問４\n今日のみIP 速度を5.3ml/hr に設定して治療を行う。\n3V（150mg）を20ml で溶解した。まずは1ml あたりの溶解量を求める。\n150mg ： 20ml  =  Xmg ： 1ml\n\n20X=150\nX=7.5\n→1ml あたり7.5mg 溶解していることになる。医師指示は40mg/hr\n1ml ： 7.5mg  =  Yml ： 40mg\n7.5Y=40\nY=5.3\n問５\n足る　　・　　足らない\n合計160mg 必要なので10mg 足らない。1V を5ml で追加溶解。\n3 時間透析の場合、40mg×3 時間=120mg 必要なので３V（150mg）で溶解。\n1 時間延長した場合、追加で40mg 必要。120mg+40mg=160mg なので10mg 足りない。\n1V（50mg）を5％TZ 5ml で追加溶解して、延長時につなぎかえる。"}, {"title": "ナファモ溶解", "filename": "ナファモ溶解.pptx", "category": "薬剤", "pdf": "pdf/薬剤/ナファモ溶解__pptx.pdf", "thumbnail": "thumbnails/薬剤/ナファモ溶解__pptx.png", "fulltext": "ナファモスタット溶解\nみたきでは・・・\nナファモ４V（５０mg×４=２００ｍｇ）→５％TZ　２０ｍｌで溶解\nナファモ３V（５０mg×３=１５０ｍｇ）→５％TZ　１５ｍｌで溶解\n２００ｍｇ：２０ｍｌ=１０ｍｇ：１ｍｌ\n１５０ｍｇ：１５ｍｌ=１０ｍｇ：１ｍｌ\n「１時間に４０ｍｇ投与」という医師指示=１時間で４ｍｌ投与すれば同じこと！\n間違いを防ぐため\nどちらも１ｍｌあたり１０ｍｇに\nなるようにそろえて溶解\n\n150mg　→　20ml\n？mg　  →　 1ml\n÷20\n÷20\n1mlあたり7.5mg\n7.5mg　→　1ml\n40mg　 →　？ml\n×5.3\n÷5.3\n×5.3\n40mgあたり5.3ml\n間違えて３V(150mg)を20mlで溶いてしまった場合\n(40mg/hrの医師指示)"}, {"title": "抗凝固剤", "filename": "抗凝固剤.pptx", "category": "薬剤", "pdf": "pdf/薬剤/抗凝固剤__pptx.pdf", "thumbnail": "thumbnails/薬剤/抗凝固剤__pptx.png", "fulltext": "抗凝固剤\n1\n\nみたきで使用している抗凝固剤\nヘパリン（ニプ\nロ）\n低分子テパリン（ダルテパリン ニ\nプロ）\nナファモスタット(AY)\n2\n\nヘパリン\n一般的に抗凝固剤はヘパリンが用いられる\n半減期：１時間\n3\n\n作用機序\nトロンビン（Ⅱa)とXa因子を阻害\n　　　　　　　　　　　　　\na\nⅡ因子を阻害→生体内における凝固時間の延長\n Xa因子を阻害→体外循環（回路）における凝固時間の延長\n　　　　\n4\n\nヘパリン　5000単位　20ｍｌ\n　（青）\nヘパリン　10000単位　20ｍｌ　\n（緑）\n２０ｍｌ→５００\n０単位\n１ｍｌ→２５０単\n位\n２０ｍｌ→１００００単\n位\n１ｍｌ→５００単位\n濃いか薄いかの違い\n5000単位で足らない人\nは\n10000単位ヘパリンを使\nう\n5\n\n投与量とコンソールでの設定\n医師指示の例　「初回１０００単位 持続５００単位 カット無し」\n５０００単位ヘパリン（１ｍｌあたり２５０単位）の場合\n初回１０００単位 → 透析開始時ワンショットで１０００単位（４\nml）注入\n持続５００単位 　→ １時間当たり５００単位（２ｍｌ）注入\nカット=ヘパリン投与を中止する時間\nカット無し　　 　　→ 最後まで（透析が終わるまで）入れ続ける\n～分前カット 　　→ 透析終了の～分前にヘパリン持続注入を中止\n6\n\nACT\n止血不良・ダイアライザーやチャンバー内\nに\n残血がある場合、ACT測定を行うことがあ\nる\nヘパリン投与前のACT測定値に対して\n投与後に1.3～1.5倍の値となっていれば\n適正と判断\n7\n\n低分子ヘパリン（ダルテパリン）\nヘパリンより抗凝固作用が弱い\n→比較的軽症の出血性病変がある場合\n　 止血不良が続く場合\n　 内視鏡生検のあとや抜歯後のあと\nヘパリンより半減期が長く、体内で抗凝固作用が長持ちするため\nワンショットのみを行い、持続注入なしでも透析ができる\n半減期：２～３時間\n8\n\n作用機序\nXa因子のみを阻害\nXa因子を阻害→体外循環（回路）における凝固時間の延長\n凝固カスケードにおいて\nヘパリンは２つの因子を阻害するのに対し\nて\n低分子ヘパリンは１つの因子を阻害する\nこのためヘパリンの方が抗凝固作用が強い\n9\n\nダルテパリン　5000単位　20ｍｌ　\n（黄）\n１２\nｍｌ\n１ｍｌあたり２５\n０単位\n10\n\nメシル酸ナファモスタット\n出血性病変やHIT（ヘパリン起因性血小板減少症）の患者に\n用いられる\n抗凝固作用はほぼ循環回路内のみ (半減期が短いため)\n初回投与・・・なし\n持続投与量（１時間当たり）・・・３０ｍｇ～５０ｍｇ\n商品名のフサンと呼ばれることも\n半減期：５～８分\n11\n\n使用時の注意点\n・粉末状のため、５％ブドウ糖２０ｍｌで溶解\n　　→生理食塩液で溶解すると結晶析出や白濁するため禁忌\n・積層型ダイアライザー（H12-4000）の患者では併用禁忌\n　　→積層膜は陰性（－）荷電、ナファモスタットは陽性（＋）荷電\nなので\n        膜に吸着される\n・アレルギー反応を起こす場合がある\n　　→投与量に関わらずアレルギーを起こす場合があるので使用患者に\n　　　 対しては要観察\n12\n\n注意喚起\n13\n\nその他\n回路内残血が起こりやすいため、\nヘパリンライン + Vチャンバー（シリンジポンプ）で\n分割投与することも可能\n14\n\nナファモスタットの溶解\nみたきでは・・・\nナファモスタットはバイアル数に関わらず\n５％TZ　２０ｍｌで溶解すると決めている\n溶解するバイアル数（３V=150mgや４V=200mgなど）に\nよって、\n溶解濃度が変わるため抗凝固剤の持続速度の変更が必要\n別紙「ナファモスタット」参照\n15\n\n抗凝固剤の検討\n患者や治療状態によって投与量の増減や変更を医師に相談\n• 投与量を増やす時→回路内残血が見られる\n• 投与量を減らす時→止血が長時間かかる\n16\n\n※参考　凝固カスケード\n17\n\n※参考　薬価\nヘパリン\n255円\nダルテパリン\n566円\nナファモスタット\n650円×4=2600円\n18"}, {"title": "看護師さんにお願い　HIF-PH阻害薬.pages", "filename": "看護師さんにお願い　HIF-PH阻害薬.pages.pdf", "category": "薬剤", "pdf": "pdf/薬剤/看護師さんにお願い　HIF-PH阻害薬.pages__pdf.pdf", "thumbnail": "thumbnails/薬剤/看護師さんにお願い　HIF-PH阻害薬.pages__pdf.png", "fulltext": "【院内処方と院外処方】 \n平時より透析センター業務でお世話になっています。処方checkでいつも助けてもらっています。\nあらためて約束事の確認をお願いしたく下記お目通しを。 \n【原則】 \n・「外来院外処方」と「外来院内処方」は同日入力不可 \n・下記院内処方は例外扱いとして同日入力OK \n＃　インスリン及び自己血糖測定関連材料 \n \n・マイクロファインプラス、ランセット、センサー \n＃　HIF-PH阻害薬（腎性貧血のおくすり） \n \n・エベレンゾ、ダーブロック、バフセオ、エナロイ \n【おまけ：HIF-PH阻害薬の使い分け（私見です）】 \n長所\n短所\nこれから使用方針\nエベレンゾ\n週３だけの内服 \n一番強力にHbを改善\n副作用多い \n（中枢性甲状腺機能低下症） \n（血栓/塞栓症） \n透析室業務負担↑\n処方機会減ります \n（重症症例だけに絞ります）\nダーブロック\nのみあわせ自由 \n（併用禁忌なし）\n特になし\n相対的に減ります\nバフセオ\nよく効くという前評判\nあまり効かない \nその割に高価\n絶滅に向かいます\nエナロイ\n意外と良く効く\n眠前内服縛り\n眠前薬内服患者に使用開始"}, {"title": "積層", "filename": "積層.pptx", "category": "薬剤", "pdf": "pdf/薬剤/積層__pptx.pdf", "thumbnail": "thumbnails/薬剤/積層__pptx.png", "fulltext": "積層型の膜は陰性荷電（⊖になっている）\n積層型（AN69膜）の図\nサイトカインなどの\n不要物質は⊕のため\n膜(⊖)が吸着してくれる\nAlbは体内に必要な物質\nAlbは⊖のため、\n膜(⊖)と反発\n→Albが血液から\n　抜けにくいため\n　Alb低値の患者に\n　積層型を使用する\nリンやカリウムは\n問題なく膜を通過し\n除去される\n膜\n\n積層型と禁忌（ナファモスタットとACE阻害薬）\nナファモスタットは⊕！！！\n積層型の患者に使うと\n膜(⊖)に吸着され\nダイアライザー内に\nナファモスタットが残り\n膜がつまる\n→いずれダイアライザー内が\n　凝固し透析継続不能\n積層を使用すると\nブラジキニンが産生\n→本来体内で分解\n降圧剤のACE阻害薬には\n（エースコール等）\nブラジキニン分解を抑制効果あり\n積層+ACE阻害薬だと\nブラジキニンが分解されない\n→ブラジキニンの\n　血管拡張効果により血圧低下"}, {"title": "透析室における薬剤について", "filename": "透析室における薬剤について.docx", "category": "薬剤", "pdf": "pdf/薬剤/透析室における薬剤について__docx.pdf", "thumbnail": "thumbnails/薬剤/透析室における薬剤について__docx.png", "fulltext": "＜みたき透析室で使用する薬剤（静注・内服）について＞\n静注薬\n●抗凝固薬\n・ヘパリン\n半減期：1.0～1.5 時間\n・ダルテパリン（低分子ヘパリン）\n半減期：2.0～3.0 時間\n適応：軽度出血性病変、止血不良\n・ナファモスタット\n半減期：5～8 分\n適応：出血性病変\n注意点：積層型ダイアライザーとの併用は禁忌\n　　　　ワンショットを行うとショックが起こることがあるため禁忌\n●二次性副甲状腺機能亢進症　治療製剤\n◇活性型ビタミンD3 製剤\n・カルシトリオール\n\n　　　　腎不全ではビタミンD3 の活性化ができず低Ca 血症になるため薬で補う。\n　　　　小腸からのCa 吸収を促進し血中Ca を増やす。\n　　　　注意点：開始後高Ca が起こりやすい。\n◇カルシウム受容体作動薬\n・パーサビブ\n・ウパシタ\nPTH を低下させる薬。\n血中のCa 濃度が低下するとCa 受容体が感知して、PTH の分泌を促進させる。\n→Ca 受容体作動薬がCa 受容体を刺激しPTH の分泌を抑制。\n簡単にいうと、Ca の濃度が低下していてもCa がいっぱいある、と勘違いさせてPTH を抑制する薬。\n注意点：開始後低Ca が起こりやすい。\n●腎性貧血改善薬\n◇エリスロポエチン製剤\n・エポエチンアルファ\n・ダルベポエチンアルファ\n・ミルセラ\n　　　　半減期：エポエチンアルファ…7 時間（週１～３回投与）\n　　　　　　　　ダルべポエチンアルファ…25 時間（週1 回投与）\n　　　　　　　　ミルセラ…200 時間（月１～２回投与）\n\n◇鉄製剤\n・フェジン\n　　　　注意点：５％ブドウ糖液で希釈し投与。\n　　　　　　　　生食で希釈すると沈殿が生じるため禁忌。\n●その他\n・生理食塩液（0.9％）\n・ブドウ糖液（5％）\n血漿浸透圧とほぼ等しい等張液\n・強力ミノファーゲンシー\n抗アレルギー効果（皮膚搔痒症）\n・グリセオール\n　　　主に透析導入期に不均衡症候群を防ぐために使用。\n　　　浸透圧物質。\n・ノルアドレナリン\n　　　昇圧剤（作用は後述）\n・ニカルジピン(ペルジピン)\n\n　　　降圧剤（Ca 拮抗薬）\n血管にあるCa チャネルに結合し細胞内へのCa イオンの流入を減らす。\n→末梢血管が弛緩（拡張）し降圧効果。\n　・コルスバ\n　　　皮膚搔痒症に使用\n　・アミノレバン\n　　　慢性肝障害 改善薬\n・セファゾリン\n　　　抗生剤\n\n内服薬\n●昇圧薬\nα1 刺激作用→血管収縮力増加\nβ1 刺激作用→心収縮増加\n・リズミック（アメジニウム）\n作用：α1 とβ1\nノルアドレナリンを増やせって命令をだす。\n血中濃度が最高になるのは内服2～3 時間後。\n・ドプス\n作用：α1 とβ1\nノルアドレナリンの進化前。\n血中濃度が最高になるのは内服5 時間後。\n・メトリジン（ミドドリン）\n作用：α1 のみ\n血中濃度が最高になるのは1～2 時間後。\n●その他\n\n・エベレンゾ\n貧血改善薬。\n血中に酸素があっても低酸素状態と勘違いさせる薬。低酸素状態と勘違いし赤血球を産生する。\n注意点：内服開始後、副作用で胃部不快感が起こりやすい。\n・芍薬甘草湯（68）\n　　　透析中の筋けいれん対策に使用。内服後5 分ほどで効果発現。効果は4～6 時間持続。\n・カリメート\n　　　カリウム抑制薬。\n災害時に患者に飲んでもらうよう指導。カリウムと結合し糞便中にカリウムを排泄。"}, {"title": "10患者指導➀（水分塩分）", "filename": "10患者指導➀（水分塩分）.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/10患者指導➀（水分塩分）__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/10患者指導➀（水分塩分）__docx.png", "fulltext": "患者指導➀（水分・塩分）\n体重増加が多いと循環血漿量が増えるため心負荷、血圧の上昇の原因となり、透析時の除水困難を招く\n透析間の体重コントロール\n中2 日→DW の5％まで　中１日→DW の3％まで\n腎臓の残存機能を長期に維持するためには除水量をできるだけ抑えるとよい\n食事摂取ガイドライン\n塩分\n6g/day 未満\n水分\nできるだけ少なく\n水分\n１.透析間の体重コントロールは水分調整が大事\n２.医師から言われている1 日の水分制限を守る（まずは1 ℓ/day）\n　　→１日の尿量+DW×15ml/day という目安もある\n３.飲水量を量る（使っているコップの容量を量る）\n４.自宅で体重測定を行う\n\n体に入る水分には薬を飲む水・ラーメンや味噌汁の汁、おかゆの水分、お酒やアルコールも含まれる\n水分を減らす工夫\n・氷で口をうるおす（1 個15cc）\n・冷たい飲み物はストローを使う\n・一気に飲む量を減らすため、温かい飲み物にする\n調理方法\n茹でる・煮るよりも焼く、炒める、揚げるほうが水分は減る\n麺類や鍋物、雑炊やシチューなどは水分が多い\n塩分\n味付けが濃いもの、塩分摂取量が多いと体が水分を要求する（8g の食塩摂取で体重は1kg 増える）\n\n塩分を減らす工夫\n・香辛料（しょうが、こしょう、カレー粉）\n香味野菜（しそ、にんにく、みつば）\n酸味（酢、レモン）などを使う\n・しょうゆやソースはかけるよりもつける\n・減塩調味料を使う\n・味にメリハリをつける（濃い味のおかず+薄味のおかず）\nハム、ウインナー、練り物、チーズ、小魚、干物、など加工品や佃煮、漬物など塩蔵品には塩分が多い\n中食（惣菜や弁当を購入して食べる場合）\n・買い物をするときに塩分含有量の表示を確認する\n　（2020 年以降、食塩相当量に換算したものの表示が義務化されている）\n外食\n・塩分の多いメニューを知る\n・味がしみ込んだ丼物ではなく定食物を頼み、塩分の多い副菜（汁物や漬物など）を残す\n\n・麺類は汁を残す\n・減塩料理を依頼する\nアセスメント　例\n・外食、中食の利用頻度を確認する\n・水分管理の状況を探る\n・水分管理やのどの渇きのタイミングを聞き食塩摂取量過多の可能性を探る\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "11患者指導➁（カリウム）", "filename": "11患者指導➁（カリウム）.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/11患者指導➁（カリウム）__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/11患者指導➁（カリウム）__docx.png", "fulltext": "患者指導➁（カリウム）\nカリウム\n食事から摂取した90％は尿と一緒に排出される\n透析患者は腎機能が低下しており尿からのカリウム排泄がされにくい\n採血（透析前）基準値：3.5～5.5(mEq/L)\n（みたき導入期患者指導パンフレットには4.5～6.0mEq/L　参考書や医師の考え方により基準値は多少前\n後）\n食事摂取ガイドライン\nカリウム\n2000mg/day 未満\n高カリウム血症の症状　\n・四肢、口唇のしびれ\n・筋脱力感\n・悪心、嘔吐などの胃腸症状\n高カリウム血症では不正脈が起こり重篤な場合、心停止\nカリウムが上昇する原因\n\n・食事からのカリウム過剰摂取\n・便秘が続いたとき\nカリウムの多い食材\nいも類　豆類・種実類　果実類　野菜類　海藻類　肉・魚類\n日本人のカリウム摂取量に影響するものは野菜類が最も多く、次いで果実類\n→摂取量が多いため高カリウムになりやすい食材\n食材当たりのカリウム含有量が多い、いも類、豆類・種実類、海藻類\n→摂取量は少ないがカリウムの割合が多い食材\n肉・魚類にもカリウムは含まれているが制限するとタンパク質の低下につながるため、\n他の食品での調整が望ましい\n海藻類\n\nカリウムを減らす工夫\nカリウムは水に溶けやすい性質がある\n➀細かく切る→水にさらす（30 分以上）\n➁ゆでこぼす→ゆでたお湯は捨てる（カリウムが溶け出しているため）\n※電子レンジや蒸し料理ではカリウムはほとんど減らない\n大変な場合は冷凍野菜や水煮保存の食材、缶詰の食材を活用\n（果物の缶詰のシロップはカリウムが多く含まれているため捨てる）\n野菜ジュースやドライフルーツは特にカリウムが濃縮されて含有されているため注意\nアセスメント　例\n・カリウムが多い食品を好んで食べていないかの確認\n\n・食事摂取量が多くなっていないか、バランスよく食べているか\n・食事以外の原因（消化管出血や透析量不足）による高カリウムになってないかを探る\n災害時には透析ができず高カリウム血症になる！\nカリメート経口液20％は災害用持ち出し袋に入れておく\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "12患者指導③（リン）", "filename": "12患者指導③（リン）.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/12患者指導③（リン）__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/12患者指導③（リン）__docx.png", "fulltext": "患者指導➂（リン）\nリン\n腎臓の働きが悪くなると腎臓からのリン排泄ができなくなり血中のリン値が上昇する\nリンが上昇すると、血中のカルシウムと結合し体のいろいろなところに沈着する\n・血管に沈着すると血管石灰化がおき、心筋梗塞や脳梗塞などの合併症を引き起こす\n・皮膚の痒みや関節の腫脹や変形、痛みなど運動障害が起こる\nリンが上昇すると、リンを下げようと骨からカルシウムが溶け出し骨折しやすくなる\n採血（透析前）基準値＝3.5～6.0mg/dl\n（みたき導入期患者指導パンフレットには　3.5～5.5mg/dl 参考書や医師の考え方により基準値は多少前\n後）\n　食事摂取ガイドライン\nリン\nたんぱく質（0.9～1.2g×DW）×15mg/day 以下\n\n骨折すると寝たきりになることもあり予防が大切\n透析治療だけでは十分にリンを取り除けないこともある\n食事の管理が大切\nリンの薬もきちんと飲むように指導\n・リンはタンパク質に多く含まれる（タンパク質と結合しているため）\n・無機リンは有機リンに比べて、体内に吸収されやすいためリンの濃度が上昇しやすい\nリンの種類\n含有食品\n体内への吸収率\n\n無機リン\n食品添加物\n加工食品\n嗜好飲料\n90％以上\n有機リン\n動物性\n肉・魚類\n乳製品\n卵\n40～60％\n植物性\n豆類\n20～40％\nリンを多く含む食品\n無機リンはコーラ、炭酸飲料水、清涼飲料水、缶コーヒー、ビール、発泡酒にも多く含まれる\n食品添加物入りの加工食品はなるべく控えるように指導\n内臓系は特にリンが多いため、レバーやしらす・ししゃも等の丸ごと食べる魚には注意\n動物性の有機リンの中で肉や魚は栄養価が高く不足すると低栄養の原因となるため、過度な減量は避ける\n\nアセスメント　例\n・インスタントラーメン、カップ麺、お菓子、コンビニ弁当、菓子パン、ハム・ソーセージなどの加工食品\nを\n多く食べていませんか？\n・ビールや清涼飲料水、炭酸水、コーラなどの飲料水を飲んでいませんか？\n・たんぱく質(肉・魚・卵・豆腐・乳製品など)を多くとりすぎていませんか？\n・リンの薬を正しく服用していますか？ 飲む時間、飲む量！！\n・リンの薬を飲まない時間帯にお菓子や洋菓子など間食は多くありませんか？\n・便秘していませんか？\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "ダイアライザー特徴", "filename": "ダイアライザー特徴.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/ダイアライザー特徴__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/ダイアライザー特徴__docx.png", "fulltext": "うちで使っているダイアライザー\nAPS→PS 膜。基本これ、とりあえずAPS から使ってみる。\nPN→PS 膜。PN220X は毒素の抜けがいい目的で使用。あと安いから残してあるみた\nい…。\nPES→PES 膜。PS 系とほぼ特徴変わらず。転院前の病院でPES 使ってたりするから\n一緒の使いたい患者とか用に一応残してあるけど…的な感じ。\nFB→セルロース膜。PVP(水通しやすくするための添加物)無し。PS 系使って血圧低\n下ある場合、おそらくPVP のせいなのでFB に変更(多少毒素の抜けは悪いけど)\nNF→PMMA 膜。サイトカインとか色々吸着効果あり。血圧高い人を先生よくNF に変\nえてますね…(なんかの吸着？目的らしい)\nH12→PAN 膜。アルブミン抜けにくいから低アルブミンの人によく使う。\nうちで使ってるヘモダイアフィルター\nABH→PS 膜\nGDF→PEPA 膜\nFIX→セルロース膜\n増田先生が、体に合う合わんあるから何種類か欲しいって言って3 種類用意してあり\nます。\nFIX はヘモダイアフィルターの中でアルブミンが抜けにくいタイプです。"}, {"title": "プラズマリフィリング", "filename": "プラズマリフィリング.pptx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/プラズマリフィリング__pptx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/プラズマリフィリング__pptx.png", "fulltext": "透析とアルブミン（Alb）\n透析では除水する\n血液は体重の8％（1/13）→DW50㎏の人は4.0ℓ\nこの人が4時間透析で3.0ℓ除水したら\n透析後には血液が1.0ℓになるのでは？\n→そんなことはない\n　Albとプラズマリフィリングのおかげ！\nAlbが低いとPRが追い付かず一時的な血管内脱水\n→血圧が下がってしまい除水ができない！！\nプラズマリフィリング（PR）とは？\n血管外から血管内に水分が移動する現象\n血管内から除水をしても血管外の水分が\n血管内に戻ってくるので血液量は減らない\n透析患者のAlbはめっちゃ大事！！！\n（という意味を込めて問題にしてみました）\nAlbによって生じる膠質浸透圧の力で、\n水分を血管内に引きつけてくれている\n間質液"}, {"title": "プリセプターへの説明書(2)", "filename": "プリセプターへの説明書(2).docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/プリセプターへの説明書(2)__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/プリセプターへの説明書(2)__docx.png", "fulltext": "新入職員の指導について\n教育チームより以下の資料を配布します。\n・透析基礎知識資料５種類\n・フローチャート\n・マニュアル（プライミング、穿刺、返血）\n・業務チェックリスト(共通、職種別、その他、計3 種類)\n・コンソールの取り扱い\n透析基礎知識資料について\n5 種類配布します。プリセプターより資料も用いて解説を行ってください。解説が難しい箇所は教育チームま\nでご相談ください。透析経験があるスタッフに関しては資料の配布のみでも可能です。\nマニュアルについて\n3 種類のみ配布します。その他のマニュアルは指導時期に合わせてファイルから各自印刷して使用してくださ\nい。（ファイルの保管場所が不明であれば教育チームまで）\n業務チェックリストについて\n新スタッフ入職日より“期間”の時期を経過後、説明を始めてください。（上長からの指示がある場合はこの\n限りではありません）説明時期は新スタッフの業務進行具合により遅らせることも可能です。“見学”は“期間”\nの前より開始してもかまいません。チェックリストに行った日付を記入してください。\nコンソールの取り扱いの資料について\n\n　資料を参考に指導を行ってください。不明点は教育チーム臨床工学技士の伊藤・本多までお尋ねください。\n教育チームのテストについて\n　教育チームより資料配布とテストを行います。（開始時期目安：透析経験者→入職後２週間経過後から　未経\n験者→入職１ヶ月経過後から）\nその他\n　指導に使用したい勉強資料が必要な場合は教育チームまでご相談ください。"}, {"title": "不均衡症候群とグリセオール", "filename": "不均衡症候群とグリセオール.pptx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/不均衡症候群とグリセオール__pptx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/不均衡症候群とグリセオール__pptx.png", "fulltext": "不均衡症候群とグリセオール\n導入初期の患者様にグリセオールをなぜ入れるか説明できますか？\n答えは不均衡症候群が起こるからです。\nでは、不均衡症候群を説明できますか？\nこれは脳で起こり頭蓋内圧が亢進することです。\n症状として頭痛・吐き気・嘔吐\n重症の場合には意識状態に影響をみとめます。\n\n透析で老廃物を除去\n血液が薄くなる\n濃い方(間質・細胞)から\n薄い方(血液)へ\n老廃物が移動し\n濃さを一定にしようとする\nやがて同じ濃さになる\n①通常ver　（脳以外）\n血管\n細胞\n間質\n\n透析で老廃物を除去\n血液の方が薄くなる\n濃い方(間質・細胞)から\n薄い方(血液)へ\n老廃物は移動したいが\n脳関門のせいでできない\n脳関門は水なら移動できる\n→濃い方（間質・細胞）を\n　薄めようとして水だけが移動\n　→頭蓋内圧亢進\n脳には血液脳関門と\n呼ばれる壁がある\n②脳ver　（不均衡症候群）\n血管\n間質\n細胞\n水\n\n薄まったので\n濃いグリセオールを投与し\n血管内の濃さを戻す\n両方同じ濃さなので\n水は移動しない\n→不均衡症候群は起こらない！\n③脳ver　（不均衡症候群対策 グリセオール投与）\n\nなぜグリセオールは最初の数回だけ？\n透析導入後は老廃物が多く体にたまった状態のため\n透析で除去される量が多いです。\nそのため血液が一気に薄まって\nより血液と細胞内との濃度差が大きくなるからです。\n透析の回数が増えると\n老廃物は体から除去されていくため\n不均衡症候群は起こりにくくなります。\n\n確認\n・不均衡症候群を説明してください\n・グリセオールを入れる意味を説明してください\n患者様に聞かれても答えれるようにしてください！！！！"}, {"title": "体重増加時の観察ポイント", "filename": "体重増加時の観察ポイント.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/体重増加時の観察ポイント__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/体重増加時の観察ポイント__docx.png", "fulltext": "体重増加時の観察ポイント\n　身体の水分負荷に対する症状、心不全の兆候について観察する\n　バイタルサインのチェック\n☐血圧（血圧ノート）\n☐脈拍・心拍数（モニター）\n☐SPO2\n☐呼吸（数・リズム）\n身体症状の観察\n☐浮腫（下腿脛骨前面・足背・顔面・眼瞼）\n☐喘鳴・起坐呼吸\n☐頸動脈の怒張\n☐肺音（捻髪音）\n☐血糖値\n自覚症状\n☐　咳\n☐労作時の息切れ・呼吸困難感\n☐食欲不振・腹部膨満感\n☐身体の重だるさ\n生活背景の振り返り\n☐塩分摂取（濃い味付け、外食、加工食品、汁物、鍋）\n☐飲水量（口渇の有無、活動量、高温多湿の環境）\n☐体調不良（発熱や下痢、便秘）\n☐非透析の日数（中1 日：３％以内　中２日：５％以内）"}, {"title": "新人レグパラとか説明", "filename": "新人レグパラとか説明.pptx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/新人レグパラとか説明__pptx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/新人レグパラとか説明__pptx.png", "fulltext": "腎不全\nPTH↑\n（副甲状腺ホルモン）\nリン↑\nカルシウム↓\n透析患者の血液\nビタミンD活性化↓\n・食事指導\n・リン吸着薬（内服）\n・透析\n・ビタミンD製剤投与\n　（カルシトリオール）\n・透析\n・PTH低下薬投与\n　（パーサビブ・ウパシタ）\nCKD-MBD（の省略版）\nPTHは骨を溶かして\nカルシウムを血中に補うホルモン\n・骨がスカスカに→骨折\n・血中のリンとカルシウムが結合し\n　血管に沈着→血管石灰化\n治療優先順位\nリン>カルシウム>PTH\n活性化ビタミンDは腸から血中に\nカルシウムを吸収してくれる役割\n対応\n\nパーサビブ\nウパシタ\n(オルケディア)\n\nエポエチン750～9000/週 < ダルべポエチン60/週  < ミルセラ100～200/月"}, {"title": "透析とは", "filename": "透析とは.pptx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/透析とは__pptx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/透析とは__pptx.png", "fulltext": "透析とは？\n透析とは、腎臓が悪くなった患者様の治療\n腎臓の代わりに人工の腎臓で治療を行う\n1\n\n人が食べて飲んだら\n食べたものや飲んだものは腸の血管で吸収され\n血液となり体内の様々なところで作用する\n食べて飲むといずれ、血液の中の水分が増えて血管が膨らみ\nさらに作用後の物質は不要物となり血中にたまっていく\n2\n\n人の体　食べたもののゆく\nえ\n③小腸\n血\n管\n➃大腸\n栄養\n水分\n水分\n血管へ吸収\n3\n\n腎臓の役割\n腎臓はお腹の背中側にあり、血液が流れている\n腎臓はフィルターみたいなもので、\n血液中の余分な水分や不要物をこしだして\n尿として体外に排出する\n4\n\n血液中の余分な水分や不要物\n腎臓\n尿\n余分な水分や\n尿毒素を含む血\n液\n腎臓のイメージ\n余分な水分や\n尿毒素を除去した血液\n腎\n臓\n血\n管\n血管の途中に\n腎臓がある\n5\n\n腎臓が悪くなると\n食べたものや飲んだものが\n血中にどんどんたまっていくので体の調子が悪くなる\nそのため・・・\n血液を一度体外に出して、\n水分や不要物を除去してから体内に返せばよい\nこれが透析治療\n食べて飲む以上、一生治療は続く（週３回通院　１日４時間の治療が一般的）\n6\n\n血液中の余分な水分や不要物\nダイアライザー\n破棄\n余分な水分や\n不要物を含む血\n液\n透析のイメージ\n余分な水分や\n不要物を除去した血液\nダイアライ\nザー\n人工の腎臓\n7\n\nダイアライザーで\n余分な水分や不要物を除去\n針を血管に２本刺す\n・血液を体外に出す用\n・血液を体内に返す用\n体内へ\n体外へ\nきれいな透析\n液\n不要物を含んだ透析\n液\n実際の透析のイメージ\nこのポンプが回転することで、\n血液を体外にひっぱり、体内に返して\nいる\n8"}, {"title": "透析とは？？助手", "filename": "透析とは？？助手.pptx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/透析とは？？助手__pptx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/透析とは？？助手__pptx.png", "fulltext": "透析とは？？\n透析とは、腎臓が悪くなった患者様の治療です\n腎臓の代わりに人工の腎臓で治療します\n\n人が食べて飲んだら\n人は食べます　飲みます\n食べたものや飲んだものは腸の血管で吸収され\n血液となり体内のいろんなところで作用します\n食べて飲むといずれ、血液の中が水分でパンパンになり、\n作用後の物質は不要物となり血中にたまっていきます\n\n人の体　食べたもののゆく\nえ\n③小腸\n血\n管\n➃大腸\n栄養\n水分\n水分\n血管へ吸収\n\n腎臓の役割\n腎臓はお腹の背中側にあり、血液が流れています\n腎臓はフィルターみたいなもので、\n血液中の余分な水分や不要物をこしだして\n尿として体外に排出します\n\n血液中の余分な水分や不要物\n腎臓\n尿\n余分な水分や\n不要物を含む血\n液\n腎臓のイメージ\n余分な水分や\n不要物を除去した血液\n腎\n臓\n血\n管\n血管の途中に\n腎臓がありま\nす\n\nその腎臓が悪くなると\n食べたものや飲んだものが\n血中にどんどんたまっていくので体の調子が悪くなります\nなので・・・\n血液を一度体外に出して、\n水分や不要物を除去してから体内に返せばいい！！！\nこれが透析治療です\n食べて飲む以上、一生治療は続きます（週３回通院　１日４時間の治療）\n\n血液中の余分な水分や不要物\nダイアライザー\n破棄\n余分な水分や\n不要物を含む血\n液\n透析のイメージ\n余分な水分や\n不要物を除去した血液\nダイアライ\nザー\n人工の腎臓\n\nダイアライザーで\n余分な水分や不要物を除去\n針を血管に２本刺します\n・血液を体外に出す用\n・血液を体内に返す用\n体内へ\n体外へ\nきれいな透析\n液\n不要物を含んだ透析\n液\n実際の透析のイメージ\nこのポンプが回転することで、\n血液を体外にひっぱり、体内に返してい\nます\n\n※参考　ダイアライザーの構造\n※覚える必要はありませ\nん\n\n物品名\n説明\nダイアライザー\n人工腎臓のことです\n抗凝固剤\n（ヘパリン・ナファモス\nタット）\n血液を体外に出すため固まりやすくなります\n→血液が固まらないように使う薬です\n消毒薬\n針を刺す前の皮膚消毒用です\n穿刺針（せんしし\nん）\n血液を出す用と返す用で２本必要です\n処置セット\n透析時に手の下に敷くシーツや\n手に回路を固定するテープが入ってます\n回路\n治療法により補助回路が必要な場合があります\n鉗子（かんし）\nチューブをはさむために使ったり、いろいろ使\nいます\n患者様に合った物品を医師の指示で準備します\n間違った物品の準備は医療事故です！！\n準備物品\n\n体重測定\n透析患者様は毎回透析前に体重を測定し\n余分な水分がどれだけたまっているか計算して\nその日の治療を行います\n体重測定は治療に直結するため\n重要な業務のひとつです！！\n\n最後に\n透析患者様の介助、透析室での使用物品の管理、\n環境整備などたくさんの業務があります\n透析治療は患者様にとって命をつなぐ大事な治療です\n患者様の治療に直接関わる機会はありませんが、\n看護師、臨床工学技士と連携し全員で\nより安心で安全な透析治療を目指しましょう！！"}, {"title": "１腎臓透析", "filename": "１腎臓透析.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/１腎臓透析__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/１腎臓透析__docx.png", "fulltext": "＜腎臓　透析　基礎＞\n・腎臓の解剖\n腎臓は腰より上の背中側に位置しており、左右両側に位置する一対の後腹膜臓器。 ソラマメ状で握りこぶし大。\n・慢性腎不全とは（※参考）\n定義「腎臓障害の所見・腎機能低下のいずれかもしくは両者が3 か月以上にわたりみられる状態」\n腎臓障害…タンパク尿などの尿異常　画像診断や血液検査　病理所見で腎障害が明らかな状態\n腎機能低下…糸球体濾過量（eGFR）が60ml/min/1.73㎡未満\n・慢性腎不全の病態\n水分貯留、毒素貯留、リン貯留、カリウム貯留、代謝性アシドーシス、腎性貧血、腎性副甲状腺機能亢進症な\nど\n・尿毒症の代表的な症状\n倦怠感　むくみ　息苦しさ　不眠　頭痛　食欲低下　吐き気　かゆみ　など\n・腎臓の働き７つ　及び　腎不全の患者においてどのように補うか\n①体の水分の調整\n②老廃物の除去 \n③電解質の調整\n\n④血圧の調整（レニン産生）\n⑤血液pH の調整 \n⑥エリスロポエチン（造血ホルモン）の産生\n⑦活性型ビタミンD の産生\n　　　　　　　\n透析で補うもの\n①…限外濾過　②…拡散（BUN、Cr、UA などを除去）\n③…拡散（透析液に含まれるNa、K など、含まれないP などで補正を行う）\n⑤…拡散（透析液に含まれるHCO3 が体内に補充され、アシドーシスの補正を行う）\n薬で補うもの\n➀…利尿薬（自尿が出る患者のみ）\n③…Ｐ吸着薬【カルタン(沈降炭酸カルシウム)、リオナ、ホスレノール（炭酸ランタン）】\nＫ吸着薬（アーガメイト、カリメート、ロケルマ）\n④…降圧薬\n⑥…エリスロポエチン製剤【エリスロポエチン製剤・静注（エポエチンアルファ、ダルべポエチン、ミルセ\nラ）・内服（エベレンゾ）】\n⑦…活性型ビタミンD 薬・静注（カルシトリオール）・内服（アルファロール）\nビタミンD が活性化されずPTH 上昇時に使用する薬剤…副甲状腺ホルモン抑制薬・静注\n（パーサビブ・ウパシタ）・内服（オルケディア）\n※アシドーシスとは\n\n腎不全により血中のH イオンが排泄できず、血中で増加してpH が低下した状態。\n・透析患者について（2021 年現在）\n透析導入原疾患トップ3\n糖尿病性腎症40％　慢性糸球体腎炎25％　腎硬化症13％　\n透析患者数\n　　　約35 万人\n　　透析平均年齢\n　　　約70 歳\n　　死亡原因トップ３\n　　　心不全24％　感染症22％　悪性腫瘍8％\n・透析治療とは\n腎不全の患者に対して血液を体外に取り出し、老廃物や余分な水分機械で代わりに治療を行うこと。\n・透析（HD）の原理\n拡散　半透膜を通して溶質（物質）の移動　　→老廃物の除去　必要物質の補充\n限外濾過　半透膜を通して溶媒（水）の移動　→水分の除去\n※半透膜=ダイアライザー\n拡散　　　　　　　　　　　　　　　　 　限外濾過\n\n　\n・浸透（浸透圧）\n濃度の異なる水を半透膜で隔てると、溶媒が溶質濃度の低い部分から高い部分に移動する。これを浸透という。\nこの浸透を抑えるために必要な圧力を浸透圧という。\n体内においての浸透圧とは血管内に水を保つ力のこと。血漿浸透圧と膠質（こうしつ）浸透圧の二種類があり、\n血漿浸透圧は電解質、膠質浸透圧はアルブミンによって維持されている。\n浸透\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "２透析の種類", "filename": "２透析の種類.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/２透析の種類__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/２透析の種類__docx.png", "fulltext": "＜透析のモード＞\n・HD\n・HDF（オンライン）\n・I-HDF\n・ECUM\n血液透析（HD）と血液透析濾過（HDF）について\nHD…小分子物質の除去に優れる\nHDF…大分子物質の除去に優れる\nHD→ダイアライザー（APS・FB・NF・H12）を使用。\nHDF→ヘモダイアフィルター（FIX・ABH・GDF・PMF・MFX）を使用。\n　　 　 大量に除水を行うのでダイアライザーよりも透水性がよい。\n　\n\nオンライン\n \n HDF\n \n \n原理\n透析液を清浄化しA チャンバーから12L/h の速度で補液し、その分をヘモダイアフィルターで除水する。\n補液した分を除水する際、HD よりも圧をかけるため、そのときにHD では抜けない大分子物質も抜ける。\n◇HDF のメリット\n・かゆみの減少\n→原因とされる大分子の老廃物「α １-MG」の除去による\n・合併症の予防\n→「α １-MG」「β ２-MG」など大分子物質の除去\n・食欲改善\n\n→食欲抑制物質レプチンの除去\n・血圧の安定化\n・貧血の改善\n◇HDF のデメリット\n・大分子物質を除去するため、体内に必要な大分子のアルブミンが漏出してしまう。\n前希釈と後希釈について\n・前希釈（A チャンバーから補液）\n大量に補液してから除水を行う。\nみたきは前希釈。全国で約90％。\nみたきでは補液量12L/hr。\n・後希釈（V チャンバーから補液）\n大量に除水をしてから補液を行う。\nI-HDF\n間歇的に補液を計画的に繰り返すことで、末梢循環改善効果や血圧低下予防が期待される治療法。\nHDF では4 時間補液し続けるのに対して、I-HDF では30 分に一度150ml だけを補液する。\nその後、30 分かけて補液した分の除水を行う。\n\n効果\n・末梢循環障害の改善\n間歇的に補液をすると、細くなった血管が開いて末梢循環の改善につながる。\n・血圧低下予防\n定期的な補液で一時的に体内の循環血液量を増加させ血圧を維持させる。\nECUM\n透析液を流さず、透析液側から陰圧をかけ除水のみを行うモード。\n特徴\n透析液が流れてないため拡散が起こらず、尿毒素（血漿浸透圧物質）の除去はしない。\nつまり、浸透圧が変わらない（浸透圧を保てる）→血圧低下が起こりにくい。\n\n適応\n・HD 時間内に除水しきれず延長で除水を行う場合\n・透析後半の血圧低下\n・増加量が多いが採血データがよく、4 時間HD が不要な場合\n・心不全患者の除水\nECUM 時の血流量（QB）設定について\nHD（拡散）を行わないため血液回路が固まらなければよい。\nみたきではQB140ml/min に統一している。\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします\n \n 。"}, {"title": "３VA", "filename": "３VA.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/３VA__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/３VA__docx.png", "fulltext": "＜バスキュラーアクセス＞\nバスキュラーアクセス（VA）\n透析を行うために血液を出し入れする仕組みのこと\n☆バスキュラーアクセスの種類\n・自己血管（AVF）　・人工血管（AVG）\n・カテーテル　　　　・動脈表在化→みたきではいない\nシャントとは？\n→AVF とAVG をシャントと呼ぶ。動脈と静脈を吻合（短絡）したもの。\nなぜシャントを作成する必要がある？\n→透析を行うために血液を体外に出すため。（血流量100～300ml/min を脱血するため。）\n静脈は流れがほぼ０のため脱血不可。動脈は深い位置にあり穿刺や止血が困難。\nシャントに流れているのは動脈血？静脈血？\n→静脈に動脈血が流れ込んでいる。\n\n自己血管（\n \n AVF\n \n ）\n  \n第一選択。自分の動脈と静脈を吻合しシャント血管を作成。\n特徴はAVG に比べて開存期間が長いことと感染リスクが少ないこと。\n側端吻合の図（吻合方法は他にもありま\nす）\n\nシャント作成部位\n通常は非利き手、手首付近（末梢）で吻合する場合が多い。\n理由：穿刺可能部位が増える。\nシャント閉塞時、閉塞部より中枢側に作り直し（吻合し直し）が可能。→ジャンプアップと呼ぶ。\n人工血管（\n \n AVG\n \n ）\n  \n第二選択。グラフトとも呼ぶ。人工血管を動脈と静脈に吻合する方法。\nAVF を作成不可の場合検討される。\n（自己血管が細い・血管の荒廃・AVF を作成しても穿刺困難が想定される\n場合など）\n人工血管の素材　・ポリウレタン→みたきで手術する場合は最も多い\n\n　　　　　　　　　・ePTFE\n☆シャントの確認ポイント\n◇みる　　➀皮膚の色調　②シャント肢の腫脹\n◇きく　　➀狭窄音（高音）・閉塞音（断続音）\n◇さわる　➀血管の走行　②血管の拡張　③スリル・拍動\n動脈表在化\n筋肉の間の深いところにある動脈を皮下の浅いところまで移動させ、直接穿刺しやすくする方法。主に上腕\n動脈が選択される。\nカテーテル\n　2023 年7 月に勉強会で配布した別紙参照。\n☆シャントの合併症\n➀狭窄・閉塞\nPTA\n\n狭窄→脱血不良があり透析困難な場合。\n（シャント直径2.0mm 以下で発生しやすい。）\n対応としてシャントPTA を行う。\n閉塞→血栓除去が可能であれば行う。\n不可能であればシャント再建。\nシャントPTA（VAIVT）とは\n血管内にバルーンカテーテルを挿入して\n狭窄した箇所でバルーンを拡張し、\nバルーンの圧力で内側から血管を拡張させる治療法。\n②感染\n発赤、腫脹、疼痛がみられ、悪化すると発熱。自己血管では抗生物質で治癒することが多いが、\n人工血管や留置カテーテルでは抜去が必要なことも。手洗いの実施、正しい消毒で対策。人工血管は異\n物であり感染を起こしやすいため、穿刺前はエタノール+ヒビテンで消毒。\n\n③瘤形成\n吻合部や穿刺部に瘤形成されることがある。急速な増大や発赤、腫脹が見られた場合は破裂の危険があ\nり手術が必要。瘤形成を起こしにくくするため、穿刺部をずらすことが重要。\n④静脈高血圧症\nシャントの狭窄により、狭窄部から末梢の\n静脈圧が上昇しシャント肢が腫脹すること。\n狭窄部位によりシャント肢全体（鎖骨下の\n狭窄）や前腕より下（肘部の狭窄）が腫脹する。\nシャント再建術やPTA で対応。\n⑤スチール症候群\nシャント作成により動脈血がシャントに流れ込み、\n吻合部より末梢側の四肢手指の血流が低下する状態。\n\nしびれ、冷感、疼痛が起こる。重症化するとバンディング\n（シャント血管を締めて細くする治療）やシャント閉鎖術を検討。\n⑥過剰血流\nシャント血流の増加。心負荷がかかる。バンディングやシャント閉鎖術を検討。\n⑦血液再循環\n浄化された血液が返血側穿刺針から体内に戻された直後に脱血側に吸い込まれる現象。\n血液濃縮（除水し濃縮した血液を再度吸い込み除水するため）や透析効率の低下が起こる。\n再循環が起こる原因は静脈側穿刺部（返血側）より中枢側の狭窄、シャント血流量が少ない、\n穿刺部位が近い（脱血側と返血側は5cm 以上離すことが望ましい）等。\n　　\n　　\n　\n\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします\n \n 。\n  \nテストは勉強会で配布した別紙「カテーテル概要」からも出題します！！！"}, {"title": "４DW", "filename": "４DW.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/４DW__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/４DW__docx.png", "fulltext": "＜DW（ドライウェイト）＞\nDW とは透析治療のために使用される言葉=透析後の目標体重のこと\n※参考　DW の定義\n「体液量が適正で、透析中に過度の血圧低下を生ずることなく、かつ長期的にも心血管系への負担が少ない体\n重」\n透析間の体重増加の目安\n中1 日→DW の3%　中２日→DW の5~6%　に抑える。\n　例：DW50.0kg の患者であれば、中１日で1.5kg 中2 日で2.5～3.0kg\n透析時の最大の除水速度の目安\nDW×15→ ～ ml/hr\n\n例：DW50.0kg の患者であれば、750ml（0.75 ℓ）/hr\nDW の決め方\nＤＷは１つの項目で決まるものではなく、いくつかの項目から総合的に判断\nみたきで主に使われているものを紹介\n①浮腫\n透析前　すねや足背部を押して、皮膚の沈みが強く戻りが遅かったら浮腫が強い。\n浮腫が強い場合は、DW を下げる？\n②血圧\n\n血圧が常に高い→DW を下げる？　血圧が常に低い→DW を上げる？\n生命予後が最も良いのは、透析後の収縮期血圧が120~160mmHg\n血圧は患者の状態、透析前後の体液量による影響、季節的な影響、降圧剤の内服の有無など\n様々で患者によって違う。\n家庭血圧も毎透析ごとに確認することが重要！！\n③心胸郭比（CTR）\n胸郭の横幅に対し、心臓の横幅がどれだけあるかという比率のこと。\nこれによって心臓が大きくなっているか(水が溜まっているかどうか)がわかる。\nCTR の基準値（透析後）\n男性50％以下　女性55％以下　\nみたきでは透析前の測定のためこれに当てはまらない。\n透析前のCTR 測定→溢水ではないかの判断（1kg で1.5％）\n透析後のCTR 測定→DW が合っているかどうかの判断\n④HANP（ヒト心房性ナトリウム利尿ペプチド）\n基準値25～100(pg/dL)　透析後に採血\n心房圧による心房筋の伸展によって刺激されて出るホルモン\n\n⑤MLT=体組成計\n細胞外液比、脂肪量などを測定する方法（測定記録の見方はME まで）\n細胞外液比とは\n細胞外液比=細胞外水分量÷体水分量×100　→　一般的な基準値　35～40％\nつまり体全体の水分量に対して細胞外水分（≒血管内水分）がどれだけあるかということ。\n前より細胞外液比が増えた→血管内水分が増えた→DW を下げる？\n　　　　　　　　　　　　減った→血管内水分が減った→DW を上げる？\n　\n脂肪量　毎月記録することでふとったかやせたかを確認しDW の増減に利用\n　　　　　　ふとった→DW を上げる？　やせた→DW を下げる？\n\n⑥BV（ブラッドボリューム）計\n透析棟のすべてのコンソールでBV を確認することが可能。確認方法はME まで。\n全てのDW を決める方法において患者ごとに基準値が違う場合が多い。\n重要なことは前回や前月と比較し経時的変化を確認すること！！\n\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "５血圧", "filename": "５血圧.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/５血圧__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/５血圧__docx.png", "fulltext": "＜血圧＞\n低血圧\n透析中の血圧低下\n原因\n対応\nその他\nDW がきつい\nDW を上げる\n家庭血圧・CTR・HANP・MLT・BV 等を確認し、医師に報告\n除水量が多い\n除水量を減らす\n除水速度はDW×15（ml/hr）以下を目標\n低アルブミン血症\n積層型への変更\nアルブミン点滴\n目標値：3.5g/dl 以上　2.5g/dl 以下で低アルブミン\n積層型ダイアライザーはアルブミンが抜けにくいメリット\n低栄養ではないか患者に食生活の聞き取りを行う\n貧血\n貧血改善薬投与\n基準値：Hb10～12g/dl\n降圧薬が多い\n降圧剤の確認\nどのタイミングで降圧薬を飲んでいるかを確認\n例：透析開始時の血圧が低い→前日の夕の降圧剤の量はどうか？\n 透析後半の血圧が低い→当日の朝の降圧剤の量はどうか？\n透析中の血圧低下時の症状\nあくび・冷や汗・吐き気・嘔吐・腹痛・便意・シャント肢の痛み・声がれ 等\n透析中の血圧低下時の対応（みたきマニュアルより一部改変）\n\n※気分不快時・意識消失時にはまず補液！！\n➀血圧再検（マンシェットが緩い場合は巻き直す）\n➁除水停止\n➂液温を下げ血流量を150ml/min におとす\n➃下肢挙上\n➄昇圧剤の検討・投与\n透析開始直後（30 分以内）の急激な血圧低下\n原因\n対応\nその他\nダイアライザーの\n不適合\nダイアライザー変更\nダイアライザーの材質や添加物と血液が接触しアレルギー反応\n起こして血圧低下\n抗凝固剤の不適合\n抗凝固剤の変更\nヘパリン使用時はHIT、ナファモスタット使用時はアナフィラ\nキシーショックによる血圧低下\n酢酸不耐症\n酢酸フリーの透析液\nを使用\n酢酸が血中に入ることにより血圧低下\nみたきの透析液は酢酸入り→酢酸が入っていない透析液を取り\n寄せる\n※HIT…ヘパリン起因性血小板減少症\n\n高血圧\n高血圧\n原因\n対応\nその他\nDW がゆるい\nＤＷを下げる\n浮腫・家庭血圧・CTR・HANP・MLT・BV 等を確認し、医師に報\n告\n透析間の増加量が\n多い\n塩分・水分の指導\n目標：食塩→6g/day 未満（体格によって多少前後）\n水分→できるだけ少なく\n水分制限よりも食塩制限の方が重要\n人間の体は8g の食塩を摂取すると1 ℓの水分を摂取してしまう\n一日水分摂取量の目安；ＤＷ(kg)×15(ml)+尿量(ml)\nレニン・アンジオ\nテンシン系の亢進\n降圧剤の検討\nレニン・アンジオテンシン系（RA 系）とは？\n→腎臓への血流が減ると血圧が下がったかも？と体が反応\n血圧をあげるホルモンのレニンが産生されて血圧が上昇する\n　健常人であれば血圧低下に伴いRA 系が亢進\n動脈の石灰化\nリンが高値になら\nないよう指導\n透析患者はリンが腎から排泄できず体にたまりやすい\n→血中のリンとカルシウムが結合し血管内に沈着し石灰化が進む\n基準値：リン3.5～6.0mg/dl\n※透析中の血圧上昇の原因\nＲＡ系が原因の可能性が高い\n\n除水で体液量減少→腎臓への血流量が減る→ＲＡ系が亢進し血圧上昇\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "６抗凝固薬", "filename": "６抗凝固薬.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/６抗凝固薬__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/６抗凝固薬__docx.png", "fulltext": "＜抗凝固剤＞\nみたきで使用している抗凝固剤\nヘパリン　低分子ヘパリン（ダルテパリン）　ナファモスタット\nヘパリン\n基本はヘパリンを使用する。\n半減期：30 分～1 時間\n作用機序（※参考）\nトロンビン（Ⅱa)とXa 因子を阻害\nⅡa 因子を阻害→生体内における凝固時間の延長\nXa 因子を阻害→体外循環（回路）における凝固時間の延長\n\n低分子ヘパリン（ダルテパリン）\n半減期：２～３時間\n作用機序（※参考）\nXa 因子のみを阻害\nXa 因子を阻害→体外循環（回路）における凝固時間の延長\nヘパリンは抗凝固阻害作用が二つあるのに対して、低分子ヘパリンは一つ。\n→そのためヘパリンより抗凝固作用が弱い。\n・比較的軽症の出血性病変がある場合\n・止血不良が続く場合\n 　・内視鏡生検のあとや抜歯後のあと などに使用\nヘパリンより半減期が長く、体内で抗凝固作用が長持ちするためワンショット（初回投与）のみを行い、持続\n注入なしでも透析ができる。\nナファモスタット\n\n出血性病変やHIT（ヘパリン起因性血小板減少症）の患者に用いる。\n半減期：５～８分\n注意点\n・粉末状のため、５％ブドウ糖２０ｍｌで溶解\n　　　→生理食塩液で溶解すると結晶析出や白濁するため禁忌。\n・積層型ダイアライザー（H12-4000）の患者では併用禁忌\n　　　→積層膜は陰性（－）荷電、ナファモスタットは陽性（＋）荷電なので膜に吸着される。\n・アレルギー反応を起こす場合がある\n　　　→投与量に関わらずアレルギーを起こす場合があるので使用患者に対しては要観察。\n　　　　ワンショットを行うとリスクが上昇するため、みたきではワンショットは行わない。\n半減期が５～８分と短いため、みたきではカット無し（透析最後まで投与）で行う。\n\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "７警報", "filename": "７警報.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/７警報__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/７警報__docx.png", "fulltext": "＜警報＞\n・静脈圧　・透析液圧　・気泡\n静脈圧\n➀静脈圧上限\n原因\n対応\nV 針先の凝血付着\n針先洗浄\nV 針・V 側回路の折れ曲がり\n・患者が腕を曲げたとき\n・回路固定での回路のねじれ\n原因の解除\nV 針が血管壁に当たっている・挿入不足\nエコーで針先の確認・針先修正\nV チャンバーの凝血\n抗凝固薬の注入忘れ・持続量の不足\nV チャンバーの濃縮\n再循環の所見がないか確認\n\n➁静脈圧下限\n原因\n対応\nA 針先の凝血付着\n針先洗浄\n脱血不良\n・穿刺場所のフローが少ない\n・A 針が血管壁に当たっている \n・A 針が血管まで到達していない\n・血圧低下\n・脱血針の折れ曲がり\nQB を下げる・再穿刺・駆血\nエコーで確認・針先調整\nエコーで確認・押し込んで血管を切る・再穿刺\n除水停止・補液\n針固定の調整\nA 側回路（V チャンバーまで）の折れ曲がり\n・患者が腕を曲げたとき\n・回路固定での回路のねじれ\n原因の解除\nダイアライザー・A チャンバーの凝血\n凝血確認・ダイアライザー及び回路交換（ME 対応）\nA 針の抜針\n再穿刺・V 針でシングルニードルモードへの切り替え\nV 針の抜針\n再穿刺・A 針でシングルニードルモードへの切り替え\n透析液圧\nダイアライザー内で静脈圧（血液側の圧力）を\n押し返す力が透析液圧\n\n厳密には違うが、\n静脈圧≒透析液圧（値は異なる）というイメージでOK\n③透析圧上限\n原因\n対応\n静脈圧上限に伴うもの\n静脈圧上限と同じ対応を行う\nダイアライザー出口～Ｖチャンバーまでの回路の折\nれ曲がり\n折れ曲がりを解除\n④透析圧下限\n原因\n対応\n静脈圧下限に伴うもの\n静脈圧下限と同じ対応を行う\nダイアライザーの目詰まり\nダイアライザー交換（ME 対応）\nオンラインHDF の場合\n補液速度を下げる（ME 対応）\n気泡\n⑤動脈側気泡\n原因\n対応\n\n脱血不良（回路内に陰圧がかかり気泡発生）\n静脈圧下限 脱血不良 参照\nA 側針の抜針\n再穿刺・V 針でシングルニードルモードへ切り換え\n→A チャンバーまで気泡を送り透析を再開\n⑥静脈側気泡\n原因\n対応\n脱血不良（回路内に陰圧がかかり気泡発生）\n静脈圧下限 脱血不良 参照\nV チャンバーが空になった\nV チャンバーの液面をためる（ME 対応）\n→V チャンバーまで気泡を送り透析再開\nその他の警報対応はME からのコンソール取り扱い配布資料参照\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "８採血　前半", "filename": "８採血　前半.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/８採血　前半__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/８採血　前半__docx.png", "fulltext": "採血　＜前編＞\n透析患者は乏尿・無尿のため本来腎臓から排出される老廃物が体内（血中）に蓄積していく。\n透析患者の体内は特殊状態。\n週3 回の透析で老廃物は除去されるため血中濃度は大きく変化。\n検査値を評価する場合はどのタイミング（透析前、透析後）で採血したかが重要。\nみたきでは月一回の定期採血を行っている。\n●採血項目（※基準値はみたき透析室における目安）\n☆Hb（ヘモグロビン）\n基準値：10～12（g/dL）\n貧血の指標。\n主に腎性貧血（エリスロポエチン産生低下）の影響でHb は低値になる。\n→透析中の血圧低下や日常生活において動悸・息切れにつながる。\n腎性貧血以外のHb 低下の原因\n\n・出血による貧血（急激な\n \n Hb\n \n の減少は消化管出血を疑う\n \n ）\n・鉄欠乏性貧血（フェリチン、TSAT を確認）\n・その他（白血病など骨髄性の貧血、ビタミンＢ12 欠乏、葉酸欠乏など）\n☆WBC（白血球）\n基準値：9000（個/μL）以下\n主に感染症や炎症で上昇。\n☆Plt（血小板）\n基準値：15～40(万個/μL) \nHIT（ヘパリン起因性血小板減少症）では急激に低下するため注意。\n\n☆フェリチン\n基準値：100～300（ng/mL）\n体内の貯蔵鉄の指標。\n☆TSAT（ティーサット）\n基準値：20（%）以上\n貯蔵鉄がどの程度、体内に運ばれているかを示す指標。\nESA 投与下で目標Hb 値が維持できない患者において、 \n推奨：血清フェリチン値が100ng/mL 未満かつTSAT が20%未満の場合、フェジン投与を検討。\n\n☆hanp（ハンプ）\n基準値：25～100(pg/dL)\nDW の指標。\n詳細は「DW」資料参考。\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "９採血　後半", "filename": "９採血　後半.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/９採血　後半__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/９採血　後半__docx.png", "fulltext": "採血　＜後編＞\n☆Alb（アルブミン）\n基準値：3.5 以上(g/dL)\n血液中に含まれるたんぱく質。栄養状態の指標として使う。\n☆P（リン）\n基準値：3.5～6.0(mg/dL)\n腎不全ではP が尿中に排泄されないため高値になる。\n高P 血症が続くと、\n・骨折\n・異所性石灰化（動脈硬化）\n　　　　の原因となる。\n☆Ca（カルシウム）\n基準値：補正Ca 8.4～10.0(mg/dL)\n補正Ca＝Ca＋（4.0－Alb）\nCa はAlb と結合しており、Alb 低値の場合Ca が低値となるため補正Ca を用いる。\n腎不全ではビタミンD が活性化されず、低Ca 血症になる。\n→ビタミンD 製剤：カルシトリオール\n\n☆intact-PTH（インタクトPTH）\n基準値：60～300(pg/mL)\nPTH→パラソルモン=副甲状腺ホルモン\n高P 血症と低Ca 血症によりPTH が上昇する。\nPTH は骨から血中にCa を放出するため、骨がスカスカになってしまう（骨折の原因）。\n→PTH を下げる薬：パーサビブ・ウパシタ\n☆K（カリウム）\n基準値：3.5～5.5(mEq/L)\n果物・生野菜・豆類に多く含まれる。\n高K 血症の症状　\n・四肢、口唇のしびれ\n・筋脱力感\n・悪心、嘔吐などの胃腸症状\n高Ｋ血症では不正脈が起こり重篤な場合、心停止。\n　　　モニター心電図ではP 波消失、徐脈をみとめ、重篤な場合T 波増高。\n\n☆β2-MG（ベータ２-ミクログロブリン）\n基準値：30（ｍg/dL）以下\n高値では透析アミロイドーシスの原因となる。\nオンラインHDF に切り替えることにより大分子のβ2-MG が除去される。\n☆血糖値（透析前血糖値≒食後約2 時間後血糖値）\n基準値：180～200（mg/dl ）\n☆GA（グリコアルブミン）\n基準値：24.0（%）未満\nAlb と結合した糖。\n過去２～４週間の平均血糖状態を表す。\n※透析患者は血糖管理に血糖値とGA を用いる。HbA1c は参考程度。\n理由\nHbA1c はHb と結合している糖。\n・赤血球寿命の短絡（60 日） → 通常は120 日\n・透析による失血や出血（回路内残血など）\n・エリスロポエチン製剤による幼弱赤血球の増加\nこれらの要因によってHbA1c が見かけ上低値に出るため、過小評価につながる。\n\n内容に関する質問や意見等は\n \n ME\n \n 伊藤までお願いします。"}, {"title": "2023下肢挙上", "filename": "2023下肢挙上.pdf", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/2023下肢挙上__pdf.pdf", "thumbnail": "thumbnails/体重管理・患者指導/2023下肢挙上__pdf.png", "fulltext": "下肢挙上は⾎圧低下に対して\nどこまで意味があるのか\n\nPassive leg raising does not produce \na significant or sustained autotransfusion effect\n受動的な脚上げは有意なまたは持続的な⾃⼰輸⾎効果をもたらさない\nJ Trauma. 1982 Mar;22(3):190-3.\n3min\n7min\n⼼拍数\n⾎圧\n⼼拍出量\n25-35 歳\n健康なボランティア\n10 名\n１回拍出量と⼼拍出量が⼀時的に増加\n（８から１０％）\n７分後には左記の増加は消失\n平均⾎圧の有意な上昇は認めない\n健常者対象のデータにて末梢⾎管抵抗や⼼拍数が代償されて⾎圧が上がらない\n健常な⼈に対して下肢挙上\nその１\n(Passive Leg Raising:PLR)\n\n健常な⼈に対して下肢挙上\nその２\n(Passive Leg Raising:PLR)\n国⼠舘⼤学⼤学院救急システム研究科(Graduate School of Emergency Medical Systems, Kokushikan University) \n国⼠舘⼤学⼤学院スポーツシステム研究科(Graduate School of Sport Systems, Kokushikan University)\n被験者\n健常な男性8名(平均年齢32±4.6 歳・平均⾝⻑173.5±6.1cm・平均体重76.8±13.9kg) \n事実\n・１回拍出量（Stroke volume:SV）はしっかり増加（前負荷増加によるところと推察）\n・PLRの⾓度はSV増加の程度に影響はなし（20°30°40°で検討）\n・平均⾎圧の有意な上昇は認めない\n私⾒\n・その他の因⼦はFeedback機構に応じて恒常性を保つよう動いているように⾒える\n\n健常な⼈に対して下肢挙上\nその２\n(Passive Leg Raising:PLR)\n国⼠舘⼤学⼤学院救急システム研究科(Graduate School of Emergency Medical Systems, Kokushikan University) \n国⼠舘⼤学⼤学院スポーツシステム研究科(Graduate School of Sport Systems, Kokushikan University)\n被験者\n健常な男性8名(平均年齢32±4.6 歳・平均⾝⻑173.5±6.1cm・平均体重76.8±13.9kg) \n⼼拍数\n平均⾎圧\n\n健常な⼈に対して下肢挙上\nその２\n(Passive Leg Raising:PLR)\n国⼠舘⼤学⼤学院救急システム研究科(Graduate School of Emergency Medical Systems, Kokushikan University) \n国⼠舘⼤学⼤学院スポーツシステム研究科(Graduate School of Sport Systems, Kokushikan University)\n被験者\n健常な男性8名(平均年齢32±4.6 歳・平均⾝⻑173.5±6.1cm・平均体重76.8±13.9kg) \n⼼拍出量\nCardiac output\n１回拍出量\nStroke volume\n\nAnaesthesia. 2018 Mar;73(3):313-322\nVolume responsiveness assessed by passive leg raising and a fluid challenge: \na critical review focused on mean systemic filling pressure\n受動的な脚上げと⽔分補給によって評価される容積反応性: 平均全⾝充満圧に焦点を当てた批判的レビュー\nResponder\n下肢挙上で⾎圧が上がるグループ\nNon-Responder\n下肢挙上で⾎圧が上がらないグループ\n中⼼静脈圧・平均動脈圧・⼼拍出量を評価しても\nこの２群を事前に⾒分けることは⾮常に難しい\n↓\n集中治療室のモニタリングを持ってしても事前に予想する事はできない\n健常ではない⼈に対して下肢挙上\n(Passive Leg Raising:PLR)\n\nみたき総合病院透析室にて\n下肢挙上は⾎圧低下に対して\nどこまで意味があるのか\n\n透析中に⾎圧低下\n背景\n・透析患者は除⽔をしている（前負荷↓ 「輸液する」の逆）\n・よって前負荷↑は効果的であることが多い\nはず\n・よって下肢挙上にて⾎圧upする症例が多い\nはず\n前負荷↑の⽅法\n効果\n⽅法\nコメント\n⼩\n下肢挙上５分で効果が切れる（次の⼿をうつまでの時間稼ぎ）\n緊急補液まず200mLで挑戦\n⼤\n緊急返⾎約300mLのRBC輸⾎に相当（2単位強）\n\n下肢挙上で⾎圧が上がらない時\n病態\n前負荷↑\n#1\nすごく\n⾎管内脱⽔\n⾮常に有効\n#2\n⼼原性ショック\n（不整脈・⼼筋梗塞）有害な時もある\n＃\n⾎圧の戻りがいまいち\n＃\n⾎圧戻ったのに愁訴が遷延\nこのような時にはモニター観察必須です\n\n結語\nみたき総合病院透析室にて\n下肢挙上は⾎圧低下に対して「ある程度」意味はあります\n下肢挙上はあくまで応急処置\n⾎圧低下に対する次の処置につなぐための\n時間稼ぎと捉えましょう\nいつか下肢挙上を解除するかはCase by caseです"}, {"title": "CKD-MBD", "filename": "CKD-MBD.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/CKD-MBD__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/CKD-MBD__pptx.png", "fulltext": "腎不全\nPTH↑\n（副甲状腺ホルモン）\nリン↑\nカルシウム↓\n透析患者の血液\nビタミンD活性化↓\n・食事指導\n・リン吸着薬（内服）\n・透析\n・ビタミンD製剤投与\n　（カルシトリオール）\n・透析\n・PTH低下薬投与\n　（パーサビブ・ウパシタ）\nCKD-MBD（の省略版）\nPTHは骨を溶かして\nカルシウムを血中に補うホルモン\n・骨がスカスカに→骨折\n・血中のリンとカルシウムが結合し\n　血管に沈着→血管石灰化\n治療優先順位\nリン>カルシウム>PTH\n活性化ビタミンDは腸から血中に\nカルシウムを吸収してくれる役割"}, {"title": "DW（ドライウエイト）", "filename": "DW（ドライウエイト）.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/DW（ドライウエイト）__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/DW（ドライウエイト）__pptx.png", "fulltext": "DW（ドライウェイト）\n1\n\nDWとは？と聞かれたら\n透析患者の体重、というイメージ\n基礎体重、適正体重、\n透析後の余分な水が体に残っていない体重、\nなど、DWの表現は複数ある\n2\n\n腎臓が正常のひと\n　➀飲食後、一日も経てば尿、便、汗などで体外に出る\n　　→飲食後は一時的に体重が増えるが、出れば体重は元に戻る\n　➁毎日食べ続けたら→数か月後にはふとっている\n　　毎日筋トレし続けたら→数か月後には筋肉がついている\n　　　　　　　　　　▽\n　　どちらも数か月後には体重は増えている\n3\n\n透析（腎不全）のひと\n➀腎臓が悪いので尿が作られない\n　　　　尿（主に水分）が体外に出ないので、体に入った水分は増え続ける\n　例：お茶1L飲んだら体重が+1L(1kg)、次の日1L飲んだらさらに+１L(1kg)\n体内に入る水分は腸から吸収され血液となるため、\n血液がどんどん増えていく\n　\n・心臓に返る血液が増える（溢水・心不全）\n・肺にいく血液が増える（肺水腫）\n増えた分だけ血液から水を引いてしまえばよい\nこれが透析による除水\n4\n\n透析（腎不全）のひと\n➁医師からあなたの体重は何ｋｇです！\n　と、決められる（これがDW）\n　毎日食べ続けても筋トレし続けても\n　医師が決めた体重がそのひとの体重なので、\n　医師が変えない限り体重は一定\n　　　それってなにかおかしくないでしょうか\n　　　ふつうの人ならふとったり筋肉ついたりして\n　　　どんどん体重が増えていくはず\n5\n\nそもそも、なぜDWを決める必要があるのか？\n6\n\n透析においては、増えた分だけ水を引けば良い\nDW（体重の基準値）を決めないと\nどれだけ増えたか判断できない\n体重を測定すれば、DWから増えた分がわかる\n例：DW50kg　体重計乗ったら51kg\n　　→透析で1kg除水を行えば透析後には50kgに戻ったためOK\n　　透析で除水をする▷自宅で飲み食いして増える▷除水▷飲み食い\n　　の、無限ループ\n7\n\n不変\n短期間で容易に変化\nひとの体重とは\n8\n\n体の体重のバランスは常に一定に保つ必要がある\n水分を1kg増やす\n（体の中に水分を残す）\nDWを上げる\n新DW12kg\nDＷ10kg\n水分を1kg減らす\n（体の中から水分を抜く）\nDWを下げる\n水分\n5kg\n脂肪\n5kg\n脂肪\n6kg\n水分\n5kg\n新DW8kg\n脂肪\n4㎏\n水分\n4㎏\n脂肪\n6kg\n水分\n6kg\n脂肪\n4㎏\n水分\n5kg\n例：水分が5kg、脂肪が5kgで\n　　DWが10kgの人\n9\nふとった\nやせた\n\n透析患者がふとって脂肪が増えた場合\nDW 50kg                           DW 50kg\nDWを変えないと\n水分の割合が減っているため\n血管内が脱水状態\nDW 50kg                           DW 51kg\nDWを上げて正常DWに\n10\n脂肪の割合がup\n正常DW\n正常DW\n\n透析前\n　どれだけ除水するかが決まる\n　測り間違えると、その日の除水量が変わってしまう\n透析後\n　除水が予定通りに問題なく行えたかを確認している\n※必ず体重測定は事前に重さを登録した服装で行う\n体重の測定間違いは重大なインシデント\n体重測定の重要性\n※体重測定用紙の見方は別紙参照\n11\n\nDWはぴたりと決めることができない\n様々な情報を元に医師が決定\n患者から聞き取った情報と、検査データ等を確認し\nそれらを踏まえたうえでDWを常に適正に保つことができるよう\n医師に相談・報告をするのが私たちの役目！！\n※DWの詳細については教育チーム別紙参照\n12"}, {"title": "体重増加時の観察ポイント", "filename": "体重増加時の観察ポイント.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/体重増加時の観察ポイント__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/体重増加時の観察ポイント__docx.png", "fulltext": "体重増加時の観察ポイント\n　身体の水分負荷に対する症状、心不全の兆候について観察する\n　バイタルサインのチェック\n☐血圧（血圧ノート）\n☐脈拍・心拍数（モニター）\n☐SPO2\n☐呼吸（数・リズム）\n身体症状の観察\n☐浮腫（下腿脛骨前面・足背・顔面・眼瞼）\n☐喘鳴・起坐呼吸\n☐頸動脈の怒張\n☐肺音（捻髪音）\n☐血糖値\n自覚症状\n☐　咳\n☐労作時の息切れ・呼吸困難感\n☐食欲不振・腹部膨満感\n☐身体の重だるさ\n生活背景の振り返り\n☐塩分摂取（濃い味付け、外食、加工食品、汁物、鍋）\n☐飲水量（口渇の有無、活動量、高温多湿の環境）\n☐体調不良（発熱や下痢、便秘）\n☐非透析の日数（中1 日：３％以内　中２日：５％以内）"}, {"title": "体重測定用紙の見方", "filename": "体重測定用紙の見方.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/体重測定用紙の見方__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/体重測定用紙の見方__pptx.png", "fulltext": "体重測定用紙\nDWと【前】体重は裸の体重\n（風袋分は予め登録してあり自動で引かれる）\n体重計の表示：73.5kg\n服装（風袋）：1.0kg\n除水目標値=除水量設定\n2.70\n73.5\n\n除水量制限\n一回の透析にて血圧低下を防ぐため除水量制限（当日除水量の最大\n値）を設定している\n除水量制限は医師指示で患者によって異なる\n除水量制限＜今日の除水量 の場合、引き残しとして表示される\nリンス\nリンスとは透析中に体に入る余分な水のこと\nリンス=0.2kg（200ml）\n同時脱血はA側・V側両方合わせて約100mlの除水（脱血）を行う\n返血はA側・V側両方合わせて約300ml体内に入る\n　→返血時のほうが200ml多い（=体内へ200ml入る）\nそのため200ml余分にリンス分として除水を行う\nみたきのルール\n\n【前】体重＜DW のため除水目標値0.0kg\nリンス(0.2kg)は加算されていない\n測定用紙の一例\nコンソールの設定上の注意点\n増加量にリンス分(0.2kg)を足した除水目標値が\n0.1㎏以上の場合は0.2kgが自動で加算\n除水目標値が0.0kg以下の場合は0.2kg加算されない\nDWからの増加量＋リンス=除水目標値＋引き残し\n　　　　【前】体重－DW\n全て除水量制限3.2kg\n72.5kg－70.0kg＝2.5kg\n2.5kg＋0.2kg＝2.7kg＋0.0kg\n【前】体重\nDW\nDWからの増加量\nDWからの増加量\nリンス\n除水目標値\n引き残し\n読み方\n除水量制限＞除水目標値 のため引き残し0.0kg\n73.3kg－70.0kg＝3.3kg\n3.3kg＋0.2kg＝3.2kg＋0.3kg\n【前】体重\nDW\nDWからの増加量\nDWからの増加量\nリンス\n除水目標値\n引き残し\n除水量制限＜除水目標値 のため引き残し0.3kg\n※この患者は3.5kg除水すればDWまで達する\n69.5kg－70.0kg＝−0.5kg\n【前】体重\nDW\nDWからの増加量"}, {"title": "体重測定用紙解答", "filename": "体重測定用紙解答.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/体重測定用紙解答__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/体重測定用紙解答__pptx.png", "fulltext": "➀医師「今日からDW0.5kg上げます（70.5kg）」\n➁コンソール医師指示\n　「DW可能なら下げてください（下限69.5kg）」\n　血圧良さそうなので今日は余分に除水できそう\n③透析開始後、\n　患者「今日いつもの服に加えて余分に一枚着てきたん\n　やけど言うの忘れてた！！余分な服の重さ200gなんやわ」\n　※後体重測定時は余分な服を着て測定するものとする\n④トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑤トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑥DWよりマイナスでの入室\n　医師「今日は除水なしでリンス分も引かなく\n　ていいよ」\n除水目標値と引き残しを\n正しく書き換えてください\n3.0\n0.5\n3.2\n-0.5\n2.5\n0.2\n-0.3\n3.2\n0.3\n2.5\n0.2\n\n⑦医師「今日からDW69.0㎏にしたいので\n　そのように除水してください」\n⑧トイレ離脱後、車いすごと(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.5kg\n　看護助手「間に合わんくてズボンとおむつ変えました！\n　ズボンが200g→100gへ、おむつの重さはかわりないです」\n除水目標値と引き残しを\n正しく書き換えてください\n➈医師「前体重より－1.0kgで終わるように除水設定し\n　てください」\n0.7\n-1.0\n2.3\n0.1\n1.2\n68.5"}, {"title": "最新版除水量書き換え", "filename": "最新版除水量書き換え.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/最新版除水量書き換え__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/最新版除水量書き換え__pptx.png", "fulltext": "除水量制限\n一回の透析にて血圧低下を防ぐため\n除水量制限（当日除水量の最大値）を設定してい\nる\n除水量制限は医師指示で患者によって異なる\n除水量制限＜今日の除水量 の場合、引き残しとし\nて\n表示される\nリンス\n透析中に体に入る余分な水のこと\nリンス=0.2kg（200ml）\n同時脱血はA側・V側両方合わせて約100mlの除水（脱血）を\n行う\n返血はA側・V側両方合わせて約300ml体内に入る\n　→返血時のほうが200ml多い（=体内へ約200ml入る）\nそのため０.２㎏余分にリンス分として除水を行う\nリンス分を足し除水量が０.１㎏以上になる場合は\n「除水計算の疑問解決！書き換え事例\n集」\n透析室教育チー\nム\n\n➀医師「今日からDW0.5kg上げます\n（70.5kg）」\n➁コンソール医師指示\n　「DW可能なら下げてください（下限69.5kg）」\n　血圧良さそうなので今日は余分に除水できそう\n③透析開始後、\n　患者「今日いつもの服に加えて余分に一枚着てきたん\n　やけど言うの忘れてた！！余分な服の重さ200gなんや\nわ」\n除水目標値と引き残しを正しく書き換えてく\nださい\n\n④トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑤トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑥DWよりマイナスでの入室\n　医師「今日は除水なしでリンス分も引かなく\n　ていいよ」\n除水目標値と引き残しを正しく書き換えてく\nださい\n\n⑦医師「今日からDW69.0にしたいので\n　そのように除水してください」\n⑧トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.5kg\n　看護助手「間に合わんくてトイレ中にズボンとお\nむつを\n　変えました！ズボンが200g→100gへ、おむつの重\nさは\n　同じです」\n➈医師「前体重より－1.0kgで終わるように除水設\n定し\n　てください」\n除水目標値と引き残しを正しく書き換えてく\nださい"}, {"title": "風袋について", "filename": "風袋について.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/風袋について__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/風袋について__docx.png", "fulltext": "風袋について\n体重測って透析が始まった後、実は今日の服、登録してある服より重かったんやわ、\nもしくは軽かったんやわ、って言われた時の考え方の一例。\n登録より重い服を着てきた（＝重く測った）パターン\n服が重い→本来より重たく測ってしまった\n→重く測ったのでその分除水量が多く表示される\n→除水量が多くなってしまったため減らす必要あり\n→除水量を重い分だけ減らす(引き残す)\n登録より軽い服を着てきた（＝軽く測った）パターン\n服が軽い→本来より軽く測ってしまった\n→軽く測ったのでその分除水量が少なく表示される\n→除水量が少なくなってしまったため増やす必要あり\n→除水量を軽い分だけ増やす（加算する）\n例\n衣服400 ｇで登録してあり、500 ｇの服を着て測った（いつもの服より100 ｇ重いんやわこの服）って\n言われた場合、その日の除水量が2.4kg だとすると2.3kg に変更すればよい。\n軽かったときのパターンはその逆。\n重く測ったパターンでよくあるケース\n・上着を着ていた\n・車イス測定時にクッションが乗っていた\n・携帯や財布を持ったままだった\n軽く測ったパターンでよくあるケース\n・脱がなくていい上着を脱いでしまった\n・車イス測定時に乗せるべきクッションが乗っていなかった\n・車イス測定時につけるべきフットレストがついていなかった\n・スケールベッド測定でバスタオルが敷かれていなかった\nまとめ\n登録風袋より重く測ったパターン→除水量を減らす（重い分残す）\n登録風袋より軽く測ったパターン→除水量を増やす（軽い分加算する）\n余談：語呂で覚えてみたり…　「風袋って思い残す（重いと→残す）ことあるよね…」\n表示される除水量\nDW（登録済）\n透析前体重\n通常\n風袋（登録済）"}, {"title": "エコー座学", "filename": "エコー座学.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/エコー座学__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/エコー座学__pptx.png", "fulltext": "エコー下穿刺\n\n準備物品\n\n　\n・エコー本体\n・スマートフォン\n・滅菌ゼリー\n・プローブカバー（感染症患者）\n・患者に適した消毒薬\n・アルコール綿\n手順\n　①消毒薬で穿刺部とその周囲全体を消毒する\n　②アルコール綿でエコーのプローブ部を消毒する\n　③滅菌ゼリーを塗布し穿刺を行う\n\nエコーの使い方\n\niViz(アイビズ)\n　①プローブの電源を入れる（3秒長押し）\n　①右上のメニュー　\n②FWU-1アプリを起動\n②プローブ切り替え\n　③000M2GO295を選択\n本体とアプリの接続\nプローブとアプリの起動\n④接続\n\n・ゲインと深度の変更\n・画面の拡大縮小\n　　画像部分をピンチアウト、ピンチイン\nボタンをタップ\n右：ゲイン調整\n左：深度調整\n・プローブ左右の確認\nプローブの突起と\nFマークの向きを揃える\n\nVscan（ブイスキャン）\n　①プローブの電源を入れる（長押し）\n　　LEDが交互に白く点滅する\n　①ゲスト→初期画面\n②Vscanアプリを起動\n（スマホpass 000000）\n②接続\n本体とアプリの接続\nプローブとアプリの起動\n③LEDが青く点灯している\n　プローブ側を使用\n\n・深度の変更\n　　上下にスワイプ\n　　　上：浅くなる\n　　　下：深くなる\n・ゲインの変更\n　　左右にスワイプ\n　　　右：明るくなる\n　　　左：暗くなる\n・プローブ左右の確認\n　　　　\nプローブの突起と\nVマークの向きを揃える\n\nエコー下穿刺に\n関する知識\n\n\n初期設定は4cm\n初期設定でも穿刺可能\n\nカバー\n\n消毒方法\nエコーが触れる範囲\nを全て消毒する\n\n１\n２\n３\n１～３の手順を繰り返し、針が血管内に入ったら外套を進める\nエコー下穿刺　短軸\n法\n針先が血管の中心部にうつったら\n3㎜を目\n安\n\n最後に長軸で針を上下に動かし、\n血管壁に引っ掛かりがないかを確認してもよい\n注意点　補足事\n項\n陰影が\n見えると注意\n\n練習手順\n\n \nSTEP１（エコーの練習）\n ➀エコーを非利き手で正しい持ち方で持つ\n ②エコーを非利き手で持ち、指導者の静脈、上腕動脈を抽出（短軸と長軸両方）\n ③左右の向きがあっているかを確認\n ④静脈は押してつぶれる、上腕動脈は押してつぶれないことを確認する\n \nSTEP２（模擬血管実践）\n ➀模擬血管を短軸で抽出し穿刺部位より中枢側の血管径や深さを確認する\n ②エコーの中心に血管を抽出する\n ③プローブ先端のマークに合わせて穿刺を行う→穿刺方法は別紙参照\n \nSTEP３（その他手技）\n ➀ゲインやデプスを変更する\n ②プローブカバーをつけ、模擬血管に穿刺を行う\n \nSTEP４（実践）\n ➀患者へ穿刺を行う\n \nアドバイス\n・穿刺部だけではなく血管走行を確認してから穿刺を行う\n　（穿刺針の外筒の長さの範囲は確認する）\n・プローブと針を９０度にすればきれいに画像がうつる\n・プローブの左右確認は少しプローブを触って確認する\n・滅菌ゼリーは粘性があまりないため切り口は少しの方が良い\n・穿刺時、エコーを持っている手の薬指や小指で皮膚を引っ張る\n・エコージェルが穿刺時に血管内に入らないようエコーが触れる部分のみジェル\nを\n　つける\n・短軸法で穿刺する場合、針を引かずに押し続けるほうがよい\n・穿刺部を見るのは刺入時のみ、あとは画面のみを見る"}, {"title": "カテーテル", "filename": "カテーテル.pptm", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/カテーテル__pptm.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/カテーテル__pptm.png", "fulltext": "透析カテーテル\n1\n\n透析におけるカテーテルとは？\nシャント血のため\n透析回路は赤っぽい\n色\n静脈血のため\n透析回路は黒っぽい色\n2\n\n仕組み\n一本のカテーテルで脱血と返血が可能。\nメーカーごとに異なるものの、カテーテル内で\n脱血側ルートと返血側ルートに分かれている\n（トリプルルーメンならさらに薬液ルートあり）\n断面図\n3\n\n種類\n• 長期使用（3週間以上）を想定した長期カテーテル\n• 短期使用（1週間～3週間）を想定した短期カテーテル\n4\n\n適応\n長期カテーテル\n　 ・シャントが造設不可能な時\n　　（シャントを作れる血管がない、作ってもすぐに使用不可になる等）\n　・ 高度の心不全 →シャントを造設すると心臓の仕事量が増え、心負荷が増大するた\nめ\n　・ 四肢拘縮や認知症があり、穿刺困難や抜針のリスクがある時\n短期カテーテル\n　・ 緊急透析の導入時\n　・ シャントが使用不可になったときの緊急用のVA（シャント再建までのつなぎ)\n5\n\n挿入部位\n優先順位\n　➀右内頸静脈（右心房にたどり着くまでに屈曲が\n　　ない）\n　②大腿静脈（感染のリスクあり）\n　③左内頸静脈（右心房にたどり着くまでに屈曲2回\n　　あり）\n　④右・左鎖骨下静脈（狭窄による静脈高血圧症や\n　　誤穿刺による気胸のリスクあり）\n　内頸の場合、先端は右心房または中心静脈へ留置\n6\n\n短期と長期の違い\n血管内\n皮下トンネル内\n7\n\n短期と長期の違い\n短期（非カフ型）\n長期（カフ型）\n8\n\n長期カテーテル\n9\nカフ付き\n\nカフの役割\n・感染を防ぐ\n・組織に癒着しカテーテルを\n　抜けにくくする\n10\n\n実際の長期カテーテル\n皮下トンネル\n皮下トンネルでカテーテルと\n組織が癒着していて\n簡単には抜けないため\n縫合は必須ではない\n(縫合する場合もあり)\n11\n\n長期カテーテル　レントゲン画像\n右内頚静脈\n左内頚静脈\n12\n\n短期カテーテル\n13\n\n短期カテーテル　レントゲン写真\n右内頚静脈\n左大腿静脈\n14\n\n返血後のカテーテル充填\n長期カテーテル　　　　　　　　　　　　　　　　　　　　　　\n　ヘパリンNa注5000単位　　　　　　　　　　　　　　　　　　\n　　　　　　　　　　　　　　　　　　　　　　※カテーテル内に血栓ができやすい場合\n　　　　　　　　　　　　　　　　　　　　　　　　ウロナーゼを充填するケースもある。\n短期カテーテル\n　生理食塩水\n15\n\n短期と長期の違い　まとめ\nカテ室or透析室\nOPE室\n16\n\n注意点\n感染を起こしやすい\n　理由\n　　・人工物であるから\n　　・体内と体外を交通しているから\n　感染リスク\n　　　短期（シャントの25倍）＞長期（シャントの15倍）\n17\n\nキャップ\n• セーフタッチプラグ　透析用\n• 長期・短期どちらもカテーテルに取り付けて透析回路と接続する\nために使用\n　→感染予防（クローズドシステムを形成）\n18\n\n略語・表記\nTLC（Triple-Lumen Catheter）\nトリプル ルーメン カテーテル\nDLC（Double-Lumen Catheter ）\nダブル ルーメン カテーテル\nTCC（Tunneled Cuffed Catheter）\n(トンネル) カフ付き カテーテル\n一般的に短期留置カテーテルのこと\n一般的に長期留置カテーテルのこと\nNCC（Non Cuffed Catheter）\n19\n\n透析用留置カテーテルを　　\n挿入する患者の看護\n\n挿入前\n短期留置カテーテル\n　緊急透析に対する受容が難しい\n長期留置カテーテル\n　自己管理に対する困難感を抱く\n傾聴・説明と同意\n\n挿入中\n・留置部位の皮膚の状態\n・局所麻酔薬による急性中毒\n・意識状態とバイタルサイン　\n観察・処置\n\n挿入直後\n・挿入部位の出血・皮下血種\n・呼吸音の左右差\n・留置カテーテル挿入側肢の浮腫　\n異常の早期発見\n\n挿入後①カテーテル関連血流感染症（CRBSI）\n・挿入部の発赤・腫脹・疼痛\n・浸出液\n・採血データ\n\n挿入後①カテーテル関連血流感染症（CRBSI）\n・カテーテル外部と内部から\n・二次的な血流感染\n予防対策\nHP;３Mより抜粋\n\nCRBSI予防対策\n種類\nルーメン数を最小限にする\n挿入部位\n感染リスクは鎖骨下＜内頚＜大腿\n挿入時の処置\n手指衛生\nマキシマルバリアプリコーション\n皮膚消毒はクロルヘキシジンを用いる\n剃毛は行わない\n管理\nドレッシング材の適切な時期での交換\n輸液\n操作はサージカルマスクを着用\n手指衛生後に非滅菌手袋を着用\n指導\n医療従事者にCRBSI予防対策を指導する　\nマニュアルの作成\n\n挿入後②脱血不良\n【原因】\nカテーテル先端が血管壁に吸い付く一過性のもの\n・血流量を落とす\n・VとAの接続をかえる\n・体位変換を試みる\n医師に報告\n処置・指示の変更\n\n挿入後③再循環\n【原因】\n脱血側と送血側の距離が近いため\n・採血データ\n医師に報告\n処置・指示の変更\n\nまとめ\n長期と短期のカテーテルの仕組みと特徴を知る\n適応を理解したうえで患者に説明を行う\n異常の早期発見と医師への報告を行う\n感染を起こさないための清潔操作と患者教育が\n大切である\nひとりで対応せず\nみんなに相談しましょう"}, {"title": "グラフト穿刺", "filename": "グラフト穿刺.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/グラフト穿刺__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/グラフト穿刺__pptx.png", "fulltext": "シャント同一部位穿刺に注意！\n当院の患者のシャント(グラフト)の造影画像です\nこれを見てどう感じますか？？\nグラフトは人工物であるため\n穿刺でぼろぼろになった血管壁は修復されません\n2019年に作成し2023年に壁の破綻により再手術となりました\nとはいっても穿刺に自信がない…や\nどこに変えたらいいかわからない…という場合は\nMEに相談もしくはエコー下穿刺で行ってください\n患者様に同一部位穿刺のリスクを説明し\n穿刺部を少しずつ変えるという\n理解をしてもらうことが必要です！！！\n2020年8月\n2021年1月\n2022年4月\n2022年8月\n2023年11月\n2019年12月\n穿刺場所をずらしていればさらに長持ちした可能性が高いです"}, {"title": "シャント", "filename": "シャント.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/シャント__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/シャント__pptx.png", "fulltext": "シャント\n1\n\n2\n\n3\n\n血管の解剖(右手)\n4\n静脈\n動脈\n親指側→橈側（とうそ\nく）\n小指側→尺側（しゃく\nそく）\n自己血管シャントの第一選\n択\n橈骨動脈と橈側皮静脈を吻\n合\n\n簡単にシャント\n図\n透析においては\n脱血側→A側\n返血側→V側と呼\nぶ\n5\n\nシャントの必要性\n• なぜシャントを作成する必要がある？\n　　→透析をする際、血液を体外に出すため\n　　　（血流量100～300ml/minを脱血するため）\n　　　静脈は流れがほぼ０のため脱血不可\n　　　動脈は深い位置にあり穿刺や止血が困難\n \n• シャントに流れているのは動脈血？静脈血？\n　　→静脈に動脈血が流れ込んでいる\nシャントがなくなれば透析が継続不可\nシャントは命綱！！！！\n6\n\n自己血管（AVF）\n特徴\n• 第一選択（VAの中で約90％）\n• 開存成績が良好\n• 感染のリスクが少ない\n7\n\n自己血管（AVF）\n初回穿刺はAVF作成2週間後以降が望ましい\n→シャントが発達するまで穿刺不可のデメ\nリット\n8\n\nシャント作成部位\n作り直すことをジャンプアップと\n呼ぶ\n通常は利き手とは逆の手に作成して、手首付近(末梢)で作成をする場合が一番多い\n9\n\nジャンプアップ\n10\n\nPTA（経皮的血管形成術）\nみたきでは毎週火・金の13:30～　シャント造影・PTAを行っ\nている\nバルーンカテーテルを血管内に挿入し、狭窄部位を拡張させる\n治療\nシャント狭窄を未然に防ぐ\n11\n\n人工血管（AVG）\n特徴\n• 第二選択（VAの中で約7%）\n• 表在する静脈が細かったり、閉塞している場合\n• 血管が荒廃している場合\n• AVFを作成しても穿刺が困難と想定される場合\nAVFが作成不可の場合、やむを得ずAVGを作成するイメージ\n12\n\nコンソールか\nら\nコンソールへ\nグラフ\nト\n人工血管（AVG）\nシャントの流れ\n動脈吻合部→静脈吻合部\n人工血管の素材\n　・ePTFE\n　・ポリウレタン\n 　　みたきではポリウレタンを\n使用\n　　 術後から穿刺が可能\n13\n\nだいじなこと\n14\n\nみる\n・瘤の状態はどうか（テカテカしていないか、以前より大きくなっていないか）\n・内出血はないか\n・浮腫んでいないか \n・感染はないか\n・皮膚の赤みや掻き傷がないか\n・シャント肢指先のチアノーゼがないか\n感染予防のため、\n透析前のシャント手洗いorスキナは必須　\n15\n\nきく\n聴診器を用いてシャント音を聞く（吻合部から中枢に向かって音を聞\nく）\n　　・正常音　「ゴーゴーorザーザー」 　 連続した強い音と弱い音が交互に繰り\n返す\n　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　   吻合部が一番音が大き\nく、中枢側にいくほど\n　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　音が小さくなる\n　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　\n　　・狭窄音　「ヒューヒュー」　（高音）   窓の隙間風のイメージ\n      ・無音　　　　　　　　　　　　　　　　　　シャント血が流れていない16\n\nさわる\n　　・正常　スリル　「ザーザー」　　血液が流れていること\n　　・異常　拍動　　「ドクッドクッ」　流れが停滞しているイ\nメージ\n　　　　　　　　　　　　　　　　　　　　　　　　（動脈みたいな）\n17\n\nシャント　自己血管　パターン\n※旧シャントがあるこ\nとも\n18\n\nシャント　人工血管　パターン\n※旧シャントがあるこ\nとも\n19\n\nシャントチェック\nシャントチェック時には血管全体像が見にくい\n個人板や穿刺前にシャントを見せてもらうことが大事\n穿刺をはじめたら自然に覚えていく\n・針の抜けかけ　テープ固定の不十分\n　　血流量200ml/minでV側が抜けた場合、10秒で30mlの失血\n　　→透析患者は腎性貧血を合併しているため大きなリスク\n20\n\n穿刺の向き　回路接続\n基本的にAは脱血を少しでも良くするため末梢向きに穿刺\n→再循環していない　脱血不良がなければ中枢向き穿刺でも可\nループグラフトの場合　特に接続に注意\nシャント上流にＡ　下流にＶが接続してあることを確認！！\n21\n\nA\nV\nV\nA\nA\nV\nA\nV\nA\nV\n理想\nよくみ\nる\n分岐血管はAV\nどちらでも接続\n可\n理想\nたまにみる\n22\n\n逆接続\n正しい接\n続\n返血（V）側\n血液回路へ接続\n脱血（A）側\n血液回路へ接続\n脱血（A）側\n血液回路へ接続\n返血（V）側\n血液回路へ接続\n逆接続\n23\n\n逆接続による再循環\n正しい接\n続\n逆接続\n24\n\n再循環によるデメリット\n• 透析効率の低下\n　　→再循環では、きれいになった血液を再度きれいにしている\nため、\n　　　 透析効率が低下\n• 濃縮による回路凝固\n　　→再循環では、除水して濃くなった血液をまた脱血して\n　　　 除水しているため、血液が濃縮され回路内が凝血\n　　　\n25"}, {"title": "シャントイメージ", "filename": "シャントイメージ.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/シャントイメージ__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/シャントイメージ__pptx.png", "fulltext": "一番多いシャント\n\nタバチ吻合\n\n二股に分かれるシャント\nこの二か所に穿刺する場合\nA、V接続はどちらでも可\n（別血管であり再循環の\n　恐れがないため）\n\n\n\n閉塞\nこの部分に穿刺すると\n脱血も返血も\n不可の可能性が高い\n\n閉塞\n\n細い血管のため\nV側として\n使うことは可\n\n\n血管内にステントがあり\nこの部分は穿刺不可\n\n一部分だけ細い\nこの部分に針先が\n来ると脱血不良を\n起こすため注意\n\nシャントではなく\n普通の自己血管\n太さがあるため\nV側として使用可\nシャントに穿刺し\nA側として使用\n\n\n\n旧グラフト\n閉塞済みのため\n穿刺禁止\n\n\n\n旧グラフト\n外側に旧グラフトが\nあるため穿刺注意\n内側が\n現在のグラフト\n\n\n\n旧シャント（自己血管）\n閉塞済みのため\n穿刺禁止\n旧吻合部\n現在の吻合部\n\n\n触るとシャントかな？と\n思う血管が肘部にあるが\n実は動脈（穿刺禁止）"}, {"title": "シャント病棟資料 ", "filename": "シャント病棟資料 .pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/シャント病棟資料 __pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/シャント病棟資料 __pptx.png", "fulltext": "病棟勉強会\n～透析のシャントについて知ろう～\n透析室教育チーム\n透析とは腎不全になった患者の治療で\n人工腎臓を用いて血液中の余分な水分や\n老廃物を除去しています\n\n血液を体外循環させるために\n一分間で200ml～300mlの血液を\n確保し体外循環をしますが\n静脈は血流量が少なく、\n動脈は穿刺や止血が困難です\n動脈と静脈を吻合し\n動脈血を流れ込ませた静脈を作成します\n→シャントと呼びます\n脱血用の針と返血用の針の\n二か所の穿刺が必要です\n1\nシャントなし\n自己血管シャント\n人工血管シャント\n\nみる\n　シャント肢全体の観察をしてください\n　\n　具体的には\n　・感染はないか（発赤、疼痛、熱感）\n　・瘤の状態はどうか\n　・傷や内出血はないか\n　・浮腫んでいないか 　など\nシャント管理の合言葉\nみる・きく・さわる\n\n2\nきく\n　シャントに聴診器を当てると「ザーザー」といった音が聞こえます\n　穿刺部（局所麻酔剤を貼る位置）の音を聞いてください\n　無音の場合、シャント閉塞の可能性があります\n　※注意点\n　　・吻合部（上流）が最も大きな音で中枢（下流）に向かうほど音が小さく\n　　　なります\n      ・穿刺部が無音の場合、吻合部から中枢に向かって順に音を聞いてください\nさわる\n　シャント肢の熱感→感染の可能性があります\n　“スリル(振動)”を確認→スリルが無い場合、閉塞の可能性があります\n\n・AVF（Arteriovenous fistula）\n　　動脈・静脈の瘻　→　自己血管シャント\n・AVG（Arteriovenous graft ）\n　　動脈・静脈のグラフト　→　人工血管シャント\n3\nシャントに関するカルテの略語の意味は？\n\n4\nシャント肢から血管内に細菌が入ると全身感染を起こします\n穿刺前に消毒を行っていますが、消毒薬は皮膚に皮脂や汚れが\n付着していると十分な消毒効果が得られません\n透析直前に穿刺部を手洗いする理由は？\n\n5\n止血バンドと絆創膏を外すタイミングは？\nAM透析\nPM透析\n止血バンド\n夕食後\n眠前\n絆創膏\n眠前\n翌朝\n抜針後、出血しやすい患者さまは\nややきつめに止血バンドを\n巻いておくこともあります。\nシャント肢にチアノーゼが出たら\nすぐにバンドを緩め、\n再度軽めに巻き直してください。\n\nリストバンド・腕時計\n血圧測定\n腕枕、荷物をかける\n採血\n6\nシャント肢での禁止事項は？\nシャント肢の圧迫\n　シャント閉塞リスクの増加\nシャント肢の採血\n　穿刺による血管損傷・止血困難\n　感染リスクの増加など\n\n局所麻酔剤\n・リドカインテープ\n・ペンレス\n・エムラクリーム\n透析時の穿刺による痛みを軽減します\n必ずシャントの穿刺部に貼付して下さい\n（透析入室時間の1～2時間前）\nシャント確認方法\n　・自己血管\n　　　軽く駆血を行うとシャントが浮き出してわかりやすいです\n　・人工血管\n　　　シャント肢を触れば位置がわかります\n　　　閉塞している旧人工血管がある場合もあるので注意が必要です\n貼付箇所が不明の場合透析室に連絡してください\nマーキングを行います\n参考：針のサイズ\n透析用16G　採血用22G　\n7\nなぜ局所麻酔剤を貼るの？いつ、どこに貼ればいいの？\n\n＜対応＞\n　①滅菌ガーゼを出血部に当てて、用手圧迫を行う（5～10分）\n　②止血バンドを巻く（強め）\n　③止血完了後、絆創膏（インジェクションパッド or ブラッドバン）を貼る\n　④止血バンドを巻き（弱め）、1～2時間経過後止血バンドを外す\n＜お願い＞\n　上記の対応①～④を行った患者については\n　次回の透析前までに透析室に連絡してください\n※参考＜出血の原因として考えられる可能性＞\n　　　　　①シャントの狭窄によって、再出血しやすくなっている\n　　　　　②肘を曲げたことにより、止血バンドに緩みが生じた\n　　　　　③穿刺部に触れたことにより、かさぶたが剥がれた\n　　　　　④抗凝固剤の過剰投与\n8\n透析後、穿刺部から出血してきた場合の対応は？\n参考：狭窄による出血のイメージ\nシャントの流れ\n(出血しやすい)\n\n止血バンド 実践練習\n用手止血後の強さ（強め）\n　バンドを巻いた後、シャント下流側のスリルを感じることができる程度\n止血完了後の強さ（弱め）\n　圧迫痕が出ない程度\n　手を動かしてもバンドがずり落ちてこない程度\n9"}, {"title": "シャント穿刺で気をつけること", "filename": "シャント穿刺で気をつけること.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/シャント穿刺で気をつけること__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/シャント穿刺で気をつけること__pptx.png", "fulltext": "シャント穿刺で\n気にしてほしいこと\n教育チーム\n\nだいじなこと\nみて\nきいて\nさわって\n\n瘤に注意\n真性瘤→シャント内圧上昇\n仮性瘤→頻回穿刺\n\n血腫への穿刺に注意\n\n穿刺部をずらす\n• 瘤にならないようおおきくずらす\n• 針穴が裂けないようすこしずらす\n\n再循環の原因\n・V側の先が狭窄\n・吻合部の狭窄で\n　流れるスピードが遅い\nV\nA\nV\nA\n\n再循環すると\nV\nA\nコ\nン\nソ\nー\nル\n透析開始直後\nAが薄まると\n再循環\nV\nA\nコ\nン\nソ\nー\nル\n開始直後の再循環\n開始直後は回路内のプライミング液が少し体内に入るので\nV側回路が少し薄まります\n正常\n再循環\n\n逆接続（再循環）\n正しい接\n続\n逆接続\n\n再循環しない穿刺\nA側とV側の針先は５ｃｍ開けるのが望ましい\n（指三本or指の第二関節）\n同じ穿刺部であっても上向き上向きより\n上向き下向きのほうが距離が稼げる\nA\nV\nV\nA\n\n造影画像やエコーを活用しよう\n・穿刺ミスの後、血管の走行確認のために造影画像を見る\n・次回穿刺時にエコーを用いて血管の走行を確認する\n\n吻合部が近い\n吻合部直上（〇部分）に逆刺しすると\n針先が吻合部（動脈）に\n触れてしまうかもしれない\n動脈を穿刺してしまうと\n内出血を起こし止血が困難\n刺すのであれば中枢向き穿刺の方がよい\n\n動脈あり➀\n触ってシャントかな？と思ったら\n実は動脈そのもののパターン\n拍動が強いが触っただけでは\nシャントと見分けがつかないことも\nシャント造影やエコーで確認する\n\n動脈あり➁\n穿刺部の下に動脈が並走しているパターン\n深く刺すと動脈に達する\n\nLDQbを活用しよう\nLDQb→レーザードップラー血流量\n実際の血流量\n≒\n→LDQb不足率警報…脱血不良の対応を\n脱血不良かも？と思ったらLDQbを確認してみる\n\n旧シャントに注意：AVF\nジャンプアップ後\n音が聞こえない\n（新しい吻合部が近いと\n　聞こえてしまうこともある）\nさわってかたい！\n（直後は微妙）\n旧\nシ\nャ\nン\nト\n\n旧シャントとエコー\n流れているシャント\n閉塞しているシャント\n流体は黒く映り、非流体は白く映る\n\n旧シャントに注意：AVG\n旧グラフトへ穿刺は注意！！\n音が聞こえない\nエコーが通らないため音で判断するしかない\n\nA穿刺の上向きと下向き\nデータでは逆の方のほうが約　％とれがよい（ME調べ）\n可能であればA側は逆刺しが良い！！\nとはいえ無理して刺すこともない\n\n同一穿刺部は注意！！\n• こんなにグラフトぼろぼろに\n• （３～５年くらいで）\n\n作りたてのシャント\n• 血管がやわらかく（ほぼ静脈）腫れやすいため穿刺に注意\n• 血管をつぶす可能性あり、適度な圧で手抑え\n　（ゆで卵がつぶれない圧）\n• 手抑えをしてスリルを感じる程度\n\n腫れた時のフォロー\n• 血腫ができてしまった場合、上から抑え、皮膚内に分散させる\n　→血腫のままかたまってしまうと偽血管になってしまい\n       次回穿刺が困難になることも\n• 次回の穿刺場所の相談（リドカインテープ貼付場所）までは\n  してほしいです（余分に一枚はってもらう等）"}, {"title": "同一部位穿刺_啓発スライド", "filename": "同一部位穿刺_啓発スライド.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/同一部位穿刺_啓発スライド__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/同一部位穿刺_啓発スライド__pptx.png", "fulltext": "STOP！\n同一部位穿刺\n教育チーム\n患者さまの大切な血管（命綱）を、みんなで守る\n動画はこちら（約8\n分）\n\n01 ｜ 基礎知識\n「同一部位穿刺」とは？\nこういう刺し方です\n他に穿刺できる血管があるのに、前回・\n前々回と同じ部位に刺し続けること。\nただし例外もあります\nその部位にしか穿刺できない患者さまも\nいます。\n？\nトラブルのリスクを承知で刺し続けても良いですか？\n\n02 ｜ 背景\nなぜ起きてしまうのか？\n患者さま側の事情だけでなく、私たちの要因も見直してみましょう。\n血管・患者さま側の要因\n皮下脂肪が厚く、浅い血管が少ない\nシャント血管が短い・蛇行・狭窄が\nあり、穿刺できる範囲が狭い\n患者さまから「そこなら痛くない」\nと部位を指定される\n私たちの要因\n忙しさや失敗への不安から、つい刺\nしやすい場所を選んでしまう\n穿刺部位を記録・共有できておらず、\n結果的に前回と同じ場所になる\n\n03 ｜ 患者さまの視点\n患者さまは、こう見ているかもしれません\n「また前回と同じところに刺された？」\n「今日の透析のことしか考えていないん\nじゃない？」\n「忙しいから、刺しやすいところに刺さ\nれただけでは？」\n——その一刺し、患者さまはちゃんと見ています。\n\n04 ｜ リスク\nなぜ同一部位穿刺は良くないのか\n皮膚は体を守るバリア。穿刺はそれを壊し、抜針後は\nかさぶたが代わりを務めます。\n完全に修復するまで約2週間。同じ場所に刺し続けると…\n修復までに\n約2週間\n①\n感染しやすくなる\n敗血症など重大な全身感染\nにつながることも\n②\n瘤ができやすい\n血管壁が傷つき、真性瘤・\n仮性瘤を形成\n③\n止血困難がおこる\n止血しにくく、再出血も\n起こしやすい\n\n05 ｜ 行動\n私たちにできること\n✓\n毎回少しずつ穿刺部位をずらす\n✓\n曜日ごとに違う部位を患者個人板に記載し、スタッフ間で共有する\n✓\n患者さまの希望でも、リスクを説明し可能な範囲でずらす\n✓\n迷ったら一人で判断せず、他のスタッフに相談する\n✓\nシャントの瘤・発赤などがないか、日々観察する\n\n!\n注意\n穿刺部位を変えるときに気をつけること\n① 「ずらす」＝“お試し”ではない\n●　ずらすことは必要。ただし、難しい場所\n　　に「とりあえずお試し」で挑戦する意味\n　　ではありません。\n●　失敗すると血腫形成などでシャントを潰\n　　すリスクがあります。\n→ 推奨\nブラインド穿刺に自信がない場合は、\nエコー下穿刺を強く推奨\n② 部位を変えるときの注意\n○\n局所麻酔剤を貼っている範囲内での部位変更は\nOK\n麻酔の効いている範囲を有効に使い、少しずつずらし\nましょう。\n×\nいきなりとんでもない場所には刺さない\n大きく離れた部位は、患者さまの不信感につながりま\nす。\n💬\n瘤化した部位に「毎回ここへ」と言われたら\nずらす必要性を説明し、「次回からずらしましょう」\nと適切に声かけを。\n\nまとめ\nもう一度、考えてみてください\n「安全に、失敗しない “同じところ” へ刺せばいい」と思っていませんか？\n患者さまのことを考えた穿刺か、もう一度考えてみてください。\nシャントの寿命を縮めているのは、あなたではありませんか？\nスタッフ一人ひとりの “一刺し” が、\n患者さまの大切な血管（命綱）を守ります。"}, {"title": "教育チーム穿刺", "filename": "教育チーム穿刺.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/教育チーム穿刺__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/教育チーム穿刺__pptx.png", "fulltext": "シャント穿刺について\n教育チーム\n血管をよく知ろう・エコーを活用しよう\n\nとうこつ\nしゃっこつ\nとうそく\nしゃくそく\n動脈と静脈（シャント）の解剖\n医師への報告は解剖学的な言い方での報告が必須\n（医師とスタッフの情報伝達の差異がないように）\n\n大事なこと\nみて\n　　　　きいて\n　　　　　　　　　さわって\n\nみて\n\nきいて\n聴診器を用いてシャント音を聞く\n　●正常音「ゴーゴーorザーザー」\n　　　　　連続した強い音と弱い音が交互に繰り返す\n　　　　　吻合部が一番音が大きく上腕にいくほど小さく\n　　　　　吻合部から順に聞く\n　●注意すべき音\n　　　・狭窄音「ヒューヒュー」（高音）  →窓の隙間風のイメージ\n　　　・断続音「ザッザッ」→拍動音（もしかして閉塞しかけ？）\n　　　・無音　→シャント血が流れていない\n5\n\nさわって\n●スリル\n　→日本語での意味は振動\n　　透析患者のシャントに手を触れるとザーザーと血液が流れる\n　　振動を触れる。手で触れてスリル確認or聴診器で音をスリル音\n　　を聞いてからの穿刺が必須\n　　\n●拍動\n　→流れている感覚が少なく拍動している感覚\n　   シャントに張りがあることが多い\n　\n\n瘤？血腫（偽腔）？\n穿刺ミスの次の透析日は\n血腫によって偽腔（偽の血管）が\n出現することがある\n前回の穿刺ミスによる血腫（偽腔）\nシャント瘤\n内出血があったり最近の\n穿刺ミス情報がある場合要注意…\n\n血腫への穿刺に注意\n\n拡大ver\n\n穿刺ミスのあとは\n造影画像やエコーを活用しよう\n●血管の走行確認のために造影画像を見る\n   　放射線画像参照→XA\n●次回穿刺時にエコーを用いて血管の走行を確認する\n\n吻合部が近い\n吻合部直上（〇部分）に逆刺しすると\n針先が吻合部（動脈）に\n触れてしまうかもしれない\n動脈を穿刺してしまうと\n内出血を起こし止血が困難\n刺すのであれば中枢向き穿刺の方がよい\n\nこういうことです\n\n動脈あり➀\n触ってシャントかな？と思ったら\n実は動脈そのもののパターン\n拍動が強いが触っただけでは\nシャントと見分けがつかないことも\nシャント造影画像やエコーで確認する\n肘部にあることが多い\n\n動脈　エコーでの確認\n●末梢側（吻合部）に向かってエコーで追いかける\n　前腕で吻合しているところを探す\n●中枢側に向かって伴走静脈がないかを探す\n●吻合部が閉塞している場合、シャント全体の流れがないため\n　カラーが見えるのは動脈である可能性が高い\n●エコーで押してつぶれるのはシャント　つぶれないのは動脈\n　（表在にある動脈はつぶれてしまうこともある）\n\n伴走静脈とは\n\nシャントは押すと潰れます\nシャント\n動脈\n穿刺部の下に動脈が並走している深く刺すと\n動脈に達するため、針の進めすぎに注意\n動脈あり➁\n\n旧シャントに注意：自己血管\nジャンプアップ後\n旧シャントは音が聞こえない\n（新しい吻合部が近いと\n　聞こえてしまうこともある）\n閉塞しているため\nさわるとかたい！\n旧\nシ\nャ\nン\nト\n\n血栓閉塞\nシャントOPE（ジャンプアップ）\n\n旧シャント\n流れているシャント\n閉塞している旧シャント\n流体は黒く映り、非流体は白く映る\n\n旧シャントに注意：人工血管\n旧グラフトへ穿刺は注意！！\n音が聞こえない\nエコーが通らないため音で判断するしかない…\n\n穿刺ミスで腫れた時のフォロー\n• 血腫ができてしまった場合、上から抑え、皮膚内に分散させる\n　→血腫のままかたまってしまうと偽血管になってしまい\n       次回穿刺が困難になることも\n• 次回の穿刺場所の相談（リドカインテープ貼付場所）までは\n  してほしいです（余分に一枚はってもらう等）\n\nおまけ\n血管はいろいろありますが\nエコーで見ると新たな発見があることも…\nときどき失敗が起こる血管をエコーで見たら原因がわかりました\n穿刺ミスを減らすためには血管をよく知ることが大事だと思います\n\n？？？\nOK！"}, {"title": "穿刺セミナー切り抜き", "filename": "穿刺セミナー切り抜き.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/穿刺セミナー切り抜き__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/穿刺セミナー切り抜き__pptx.png", "fulltext": "穿刺セミナー　切り抜き\n【穿刺ビギナーとエキスパートの統計】\n針の持つときの力の入れ方\nExpert\nExpert\nBeginnerに多い\nExpertに多い\n早すぎると\n刺してからの\n針移動距離が長いと\n後壁穿刺の恐れ"}, {"title": "穿刺前の知識", "filename": "穿刺前の知識.pptx", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/穿刺前の知識__pptx.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/穿刺前の知識__pptx.png", "fulltext": "シャント穿刺について\n1\n\nシャントで使用される血管の解剖\n医師への報告は解剖学的な言い方での報告が必須\n（医師とスタッフの情報伝達の差異がないように）\n2\n左手\n左手\n親指側\n小指側\n\nシャント穿刺の流れ\n①準備\n↓\n②血管の診察\n↓\n③穿刺前の環境づくり\n↓\n④駆血\n↓\n⑤消毒\n↓\n⑥穿刺\n3\n\n血管の診察\nみる、きく、さわる\n　教育チーム別紙参照\n4\n\n穿刺前の環境づくり\n・患者の体制\n　　仰臥位　半座位\n・穿刺者の体制\n　　前かがみ　しゃがむ\n・腕の向き\n　　内転　外転　回内　回外\n・血管の固定\n5\n\n消毒\n消毒薬\n　エタノール綿\n　CHG綿（クロルヘキシジン）\n　ヒビテン（クロルヘキシジン）\n穿刺には細菌感染のリスクが伴う\nシャント感染は患者にとって大きな問題\n感染リスクはAVFに比べてAVGの方が五倍高い\n患者の手洗い(もしくはスキナによる洗浄)+穿刺前の消毒\n6\n\n消毒方法\n穿刺部を中心に\nシャント肢を\n広範囲に消毒する\nAVF\nAVG\n①エタノール\n②ヒビテン(一本目) ③ヒビテン(ニ本目)\n①エタノール\n7\n\n駆血\n駆血帯を用いた駆血もしくは用手駆血を行う\n(作りたてのシャントや内出血で駆血帯が用いにくい場合などは用手駆血)\n駆血時間が長いとシャント閉塞のリスクが高まるためできるだけ手早く行う\n強いと\n　動脈まで遮断してしまい、シャントの張りが出ない\n　皮下出血を起こす\n弱いと\n　シャントに張りが出ない\n※AVGの駆血は不要\n不適切な駆血は穿刺時に血管が押しつぶされ後壁を貫く\n8\n\n穿刺針\n内針と外筒の二層構造\n9\n\n穿刺の手技\n模擬キットを用いて指導者より実践指導\n10\n\n穿刺を行うときに注意したいこと\n11\n\n再循環しない穿刺\nA側とV側の針先は５ｃｍ開けるのが望ましい\n（指三本or指の第二関節）\n同じ穿刺部であってもAV側ともに中枢向き穿刺より\nA側を末梢向き穿刺のほうが距離があく\nA\nV\nV\nA\n12\n\n穿刺部をずらす\n・瘤にならないようおおきく(1cm)ずらす\n・針穴が裂けないよう前回の穿刺部を避けてすこしずらす\n13\n\n同一穿刺部に注意\nAVG、３～５年経過\n曜日によって穿刺部を固定し\n穿刺部をずらしている患者もいる\n14\n\n瘤？血腫（偽腔）？\n穿刺ミスの次の透析日は\n血腫によって偽腔（偽の血管）が\n出現することがある\n前回の穿刺ミスによる血腫（偽腔）\nシャント瘤\n内出血がある場合や\n直近で穿刺ミスの情報がある場合要注意\n15\n\n血腫への穿刺に注意\n血腫\n16\n\n穿刺ミスのあとは\n造影画像やエコーを活用しよう\n・血管の走行確認のために造影画像を確認する\n   　電子カルテ→放射線画像参照\n・次回穿刺時にエコーを用いて血管の走行を確認する\n17\n\n吻合部付近への穿刺は危\n険\n吻合部直上（〇部分）に逆刺しすると\n針先が吻合部（動脈）に\n触れてしまう可能性がある\n動脈を穿刺してしまうと\n内出血を起こし止血が困難\n穿刺は中枢向き穿刺の方がよい\n18\n\n19\n\n動脈あり\n触ってシャントのように感じる場合もあるが\n実際は動脈\n拍動が強いが触っただけでは\nシャントと見分けがつかないことも\nシャント造影画像やエコーで確認する\n肘部にあることが多い\n20\n\n旧シャントに注意：AVF\nジャンプアップ後\n旧シャントは音が聞こえない\n（新しい吻合部が近いと\n　聞こえてしまうこともある）\n閉塞しているためさわるとかたく\nスリルが感じられない\n旧\nシ\nャ\nン\nト\n21\n\n22\n\n旧シャント\n流れているシャント\n閉塞している旧シャント\nエコーで流体は黒く映り、非流体は白く映る\nカラーモードでは流体は色が映るが、非流体は映らない\n23\n\n旧シャントに注意：AVG\n旧シャントのAVGが残存している場合もある\nエコーが通らないためシャント音の有無で判断する\n24\n\n作りたてのシャント\n• 血管がやわらかく（ほぼ静脈）腫れやすいため穿刺に注意\n• 止血時は血管をつぶす可能性があるため適度な圧で用手止血\n　（温泉卵がつぶれない圧・スリルを感じる程度の圧）\n25\n\n穿刺ミスで血腫ができた場合のフォロー\n• 血腫ができてしまった場合、上から抑え皮膚内に分散させる\n　→血腫のままかたまってしまうと偽血管になってしまい\n       次回穿刺が困難になることも\n• 次回の穿刺場所の相談（リドカインテープ貼付場所）まで行う\n  （余分に一枚貼付してもらう等）\n26"}, {"title": "透析カテーテル", "filename": "透析カテーテル.pptm", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/透析カテーテル__pptm.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/透析カテーテル__pptm.png", "fulltext": "透析カテーテル\nみたき総合病院　透析室　教育チーム\n\nスケジュール\n ・カテーテルの概要について　ME伊藤\n ・カテーテルと看護について　Ns小野・中野\n\nカテーテル概要\n\n\n透析におけるカテーテルとは？\nシャント血のため\n透析回路は赤っぽい\n色\n静脈血のため\n透析回路は黒っぽい色\n\n仕組み\n一本のカテーテルで脱血と返血が可能。\nメーカーごとに異なるものの、カテーテル内で\n脱血側ルートと返血側ルートに分かれている\n（トリプルルーメンならさらに薬液ルートあ\nり）\n断面図\n\n種類\n ☆長期使用（3週間以上）を想定した長期カテーテル\n ☆短期使用（1週間～3週間）を想定した短期カテーテル\n\n適応\n 長期カテーテル\n 　・ シャントが造設不可能な時\n 　　（シャントを作れる血管がない、作ってもすぐに使用不可になる等）\n 　・ 高度の心不全 →シャントを造設すると心臓の仕事量が増え、心負荷が増大するため\n 　・ 四肢拘縮や認知症があり、穿刺困難や抜針のリスクがある時\n 短期カテーテル\n 　・ 緊急透析の導入時\n 　・ シャントが使用不可になったときの緊急用のVA（シャント再建までのつなぎ)\n\n挿入部位\n優先順位\n　➀右内頸静脈（右心房にたどり着くまでに屈曲がない）\n　②大腿静脈（感染のリスクあり）\n　③左内頸静脈（右心房にたどり着くまでに屈曲2回あ\nり）\n　④右・左鎖骨下静脈（狭窄による静脈高血圧症や\n　　　　　　　　　　　　　     誤穿刺による気胸のリス\nクあり）\n　　内頸の場合、先端は右心房または中心静脈へ留置\n\n短期と長期の違い\n血管内\n皮下トンネル内\n\n短期と長期の違い\n短期（非カフ\n型）\n長期（カフ\n型）\n\n長期カテーテル\n\nカフの役割\n・感染を防ぐ\n・組織に癒着しカテーテルを抜けにく\nくする\n\n実際の長期カテーテル\n皮下トンネ\nル\n皮下トンネルでカテーテ\nルと\n組織が癒着していて\n簡単には抜けないため\n縫合は必須ではない\n(縫合する場合もあり)\n\n長期カテーテル　レントゲン画像\n右内頚静脈\n左内頚静脈\n\n短期カテーテル\n\n実際の短期カテーテル\n\n短期カテーテル　レントゲン写真\n右内頚静脈\n左大腿静脈\n\n返血後のカテーテル充填\n長期カテーテル　　　　　　　　　　　　　　　　　　　　　　※カテーテル内に血栓ができ\nやすい場合\n　ヘパリンNa注5000単位　　　　　　　　　　　　　　　　　　ウロナーゼを充填するケース\nもある。\n短期カテーテル\n　生理食塩水\n\n短期と長期の違い　まとめ\nカテ室or透析\n室\nOPE室\n\n注意点\n感染を起こしやすい\n　理由\n　　・人工物であるから\n　　・体内と体外を交通しているから\n　感染リスク\n　　　短期（シャントの25倍）＞長期（シャントの15倍）\n\nキャップ\n セーフタッチプラグ　透析用\n 長期・短期どちらもカテーテルに取り付けて透析回路と接続するために使用\n →感染予防（クローズドシステムを形成）\n\n略語・表記\nTLC（Triple-Lumen Catheter）\n　　  トリプル ルーメン カテーテル\nDLC（Double-Lumen Catheter ）\n　　　　ダブル ルーメン カテーテル\nTCC（Tunneled Cuffed Catheter）\n　　　(トンネル) カフ付き カテーテル\n　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　ダブルルーメンをWルーメン\nと書く人もいるみたいですが\n　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　和製英語らしいので望ましく\nないかも？（伊藤調べ）\n一般的に短期留置カテーテルのこ\nと\n一般的に長期留置カテーテルのこと\nNCC（Non Cuffed Catheter）\n\n透析用留置カテーテルを　　\n挿入する患者の看護\n\n挿入前\n 短期留置カテーテル\n　緊急透析に対する受容が難しい\n 長期留置カテーテル\n　自己管理に対する困難感を抱く\n傾聴・説明と同\n意\n\n挿入中\n ・留置部位の皮膚の状態\n ・局所麻酔薬による急性中毒\n ・意識状態とバイタルサイン　\n観察・処置\n\n挿入直後\n ・挿入部位の出血・皮下血種\n ・呼吸音の左右差\n ・留置カテーテル挿入側肢の浮腫　\n異常の早期発見\n\n挿入後①カテーテル関連血流感染症（CRBSI）\n ・挿入部の発赤・腫脹・疼痛\n ・浸出液\n ・採血データ\n\n挿入後①カテーテル関連血流感染症（CRBSI）\n ・カテーテル外部と内部から\n ・二次的な血流感染\n予防対策\nHP;３Mより抜粋\n\nCRBSI予防対策\n種類\nルーメン数を最小限にする\n挿入部位\n感染リスクは鎖骨下＜内頚＜大腿\n挿入時の処置\n手指衛生\nマキシマルバリアプリコーション\n皮膚消毒はクロルヘキシジンを用いる\n剃毛は行わない\n管理\nドレッシング材の適切な時期での交換\n輸液\n操作はサージカルマスクを着用\n手指衛生後に非滅菌手袋を着用\n指導\n医療従事者にCRBSI予防対策を指導する　\nマニュアルの作成\n\n挿入後②脱血不良\n【原因】\nカテーテル先端が血管壁に吸い付く一過性のもの\n ・血流量を落とす\n ・VとAの接続をかえる\n ・体位変換を試みる\n医師に報告\n処置・指示の変\n更\n\n挿入後③再循環\n 【原因】\n 脱血側と送血側の距離が近いため\n・採血データ\n医師に報告\n処置・指示の変\n更\n\nまとめ\n・長期と短期のカテーテルの仕組みと特徴を知る\n・適応を理解したうえで患者に説明を行う\n・異常の早期発見と医師への報告を行う\n・感染を起こさないための清潔操作と患者教育が\n　大切である\nひとりで対応せず\nみんなに相談しま\nしょう\n\n参考文献\nExpert Nurse：2018.8　p68－72\nINFECTION CONTROL : 2016.5 p23－28\nバスキュラーアクセスマスターガイド：p240－266：赤松眞：メディカ出版"}, {"title": "静的静脈圧とＬＤＱｂ説明", "filename": "静的静脈圧とＬＤＱｂ説明.pdf", "category": "穿刺技術・シャント関係", "pdf": "pdf/穿刺技術・シャント関係/静的静脈圧とＬＤＱｂ説明__pdf.pdf", "thumbnail": "thumbnails/穿刺技術・シャント関係/静的静脈圧とＬＤＱｂ説明__pdf.png", "fulltext": "静的静脈圧とは？\n\n\n静的静脈圧の確認方法\n①「設定」→「スイッチ」\n②「その他」→\n「静的静脈圧」\n③静的静脈圧が\n表示される\n\n静的静脈圧の設定\n静的静脈圧の基準値は患者ごとに設定可能。\n基準値を超えた場合、インフォメーションに表示され報知音が鳴る。\n警報のリセットは臨床工学技士が\n行うため、声をかける\n基準値を超えた場合は\n赤字で表示される\nインフォメーションをタッチ\n\n脱血時のみV側を接続\nシャントの流れ\n狭窄部\nA穿刺部\nV穿刺部\n逆接続での静的静脈圧測定\n使用例：医師指示時、A側止血不良時、\nA側瘤の拡大時などA-V間の\n狭窄が疑われる場合\n静的静脈圧確認時のA側穿刺\n狭窄部より吻合部側から、\n狭窄部に向かって穿刺を行う\n\n静的静脈圧逆接続測定手順\n➀A側とV側を逆に接続し、「脱血」→「開始」を押す。\n②脱血開始後、「開始」を再度押す。（「開始」の文字が緑色から灰色に変わり、\n  脱血が停止する）\n③回路と穿刺針をクランプして正しい接続に戻し、「d-fas」→「開始」を押す。\n （脱血が再開される）\n\nLDQbとは？\nLD（レーザードップラー）で計測したQb（血流量）\n≒実際に回路内を流れている血流量\n設定した血流量に対して実際にどのくらい\n流れているか確認する際に使用する。\n→脱血不良があればLDQbが低下する。\n原理\n\nLDQb確認方法\n「メニュー」→「モニタ」→「モニタ」→2ページ目\n\nLDQb不足率警報\n血流量よりＬＤＱｂが下回る（血流量不足率30％以下）場合に警報発生。\n原因\nシャント狭窄やA側穿刺針が血管内に挿入できていない可能性あり。\n対応\n設定血流量に対し、LDQｂが著しく低い場合はA側の針先の確認、針先洗浄、\nA側穿刺部より末梢側シャント狭窄の有無を確認。"}, {"title": "医療ガス", "filename": "医療ガス.pptx", "category": "設備・環境管理業務", "pdf": "pdf/設備・環境管理業務/医療ガス__pptx.pdf", "thumbnail": "thumbnails/設備・環境管理業務/医療ガス__pptx.png", "fulltext": "医療ガス\n臨床工学技士\n1\n\n医療ガスとは\n2\n\n医療ガス供給システム\n3\n\nアウトレット\n4\n\nピン方式\n医療ガスアウトレット側の穴と\nアダプター側のピンが合うことで\n接続でき、異なる種類のガスは\n接続できないようになっています。\n5\n\n使用前の確認\n・ガス名と配管の色は一致しているか\n・ピンの破損や抜けはないか\n・ホースに破損がないか\n・接続後、確実にロックされているか\n・ガス漏れの音がしないか\n×ピンの抜け\n×ピンの破損\n確実なロック\n6\n\n注意点\n　アウトレットに医療機器を接続したままにすると機器内に高圧がかかり続けます。\n　機器内のガスの弁が破損し、治療時に濃度異常を起こす事故が報告されています。\n　そのため治療時以外は必ず機器をアウトレットから外してください。\n使用後の取り外し\n押して外す\nねじって外す\n7\n\n酸素は支燃性です。\n火気を近づけると発火します。\nアウトレットの中にはフィルタがあり、\nほこり等のゴミが入るとガス漏れの原因になります。\n使用していないときは必ずカバーをしてください。\n注意点\n8\n\nシャットオフバルブ\n病院の各病棟など診療エリアごとに医療ガスの供給を止めることができ\nる区域遮断弁です。\n災害時には閉める必要があるため、前には棚など障害物を設置しないこ\nとと、誰が閉めるかを事前に確認しておいてください。\n酸素使用者がいる場合は供給が停止されてしまうため注意してください。\n医療ガス\n各病棟・手術室\n9\n\n酸素ボンベ\n10\n\nボンベの持ち方\n11\n\n圧力調整器\n12\n酸素ボンベ交換の目安\n　圧力計のメモリ\n　　緑ゾーンは安全域です。\n　　黄ゾーンでボンベの交換を推奨します。\n　　赤ゾーンは交換を行ってください。\n\n注意点\n・接続時にハンドクリームなど油脂類のついて手で行うと酸素と接触して発火するこ\n　とがあります。\n・急にバルブを開けるとショックで熱が生じ発火や圧力計のガラスが破損する可能性\n　があります。\n・使用中、流量と残圧を頻繁に確認してください。\n酸素ボンベの接続と使用方法　手順\n①ボンベに圧力調整器を接続する。\n②ボンベのバルブをゆっくり左回りに開ける。\n③バルブを全開にする。\n④接続部から漏れがないことと、圧力計で残量を確認する。\n⑤酸素流量を設定、投与する。\n13\n\n酸素残量の計算方法\n酸素残量\n　酸素ボンベの内容積( )×\nℓ\n圧力計表示値(MPaの場合×10)＝酸素残量( )\nℓ\n残り使用時間\n　残量( )÷\nℓ\n酸素投与流量( /\nℓ分)＝残り使用時間(分)\n14\n\n酸素ボンベ早見表\n酸素ボンベ(3.4ℓボンベ)には約500ℓが高圧充填されています。\n酸素があとどのくらい使用できるか、\n圧力計の圧の数値と現在の酸素流量を確認し、早見表に当てはめてください。\n15\n\n流量計の読み方\nダイアル式\nフロート式\n水平にメモリを見ます。\nボール型はボールの\n中心をあわせてください。\n16\n\n流量設定時の注意点\nフロート式\n流量計が斜めの場合、設定量通りの流量が流れないため\n必ず立てて設定してください。\n×流量計を斜めにして流量設定しない\n17\n\n流量設定の注意点\nダイアル式\n数値の真ん中で設定してしまうと流量は０になります。\n必ず数値が窓から見えるよう設定してください。\n×数値の真ん中に設定しない\n18\n\n酸素使用後手順　\n①流量計を閉じる（酸素チューブを取り外す）\n②酸素ボンベのバルブを閉じる\n③流量計を開ける\n④流量計を閉じる\n必ず最後に流量計のバルブを開閉し圧力計内の圧を解放してください。\n圧がかかったまま放置すると圧力計が破損する場合があります。\nまた、次に使用する人が圧力計に数値が表示されているのを見て、\n「バルブが開いている」と誤解し、酸素が供給されずに事故に\nつながった事例も報告されています。\n19\n\n酸素ボンベの保管方法、注意点\n・風通しが良い\n・直射日光が当たらない\n・暖房器具が近くにない\n・周囲２ｍに火気、引火性のものを置かない\n・ラックに入れたり、チェーンで固定して倒れないようにする\n20\n\n酸素ボンベの医療事故\n・ボンベが倒れた\n・接続部で漏れを生じた\n・使用中、空になった\n・圧力計が故障した\n・圧力調整器の取り付けを間違えた\n・他のボンベと間違えた\n・発火、爆発を起こした\n多数報告されているため正しい取り扱いが必要です。\n21\n\n22\n酸素残量の確認不足　事例\n\n23\n酸素ボンベの開栓の未確認　事例"}, {"title": "配管洗浄剤について", "filename": "配管洗浄剤について.pptx", "category": "設備・環境管理業務", "pdf": "pdf/設備・環境管理業務/配管洗浄剤について__pptx.pdf", "thumbnail": "thumbnails/設備・環境管理業務/配管洗浄剤について__pptx.png", "fulltext": "配管洗浄剤について\nみたき透析室\n臨床工学技士\n1\n\n配管洗浄の必要性\n透析液の配管の洗浄不足で菌や有機物で汚染された透析液が\n体内に入ると、生体反応が起こる\n2\n\n塩素系除菌洗浄剤（ECO200）\nみたき透析室では\n次亜と呼んでいる\n除菌→生菌、エンドトキシン\n洗浄→タンパク質、脂質、\n　　　バイオフィルムなどの有機物\n3\n\n炭酸カルシウム溶解剤（サンフリーSN）\nみたき透析室では\n酢酸と呼んでいる\n4\n\n炭酸カルシウム\n炭酸カルシウムは水に溶けにくく結晶化し透析液の配管に蓄積する\nバイオフィルムの生成につながったり、コンソールの故障につながる\n5\n\n次亜塩素酸ナトリウム、酢酸との違い\n過去、 “次亜塩素酸ナトリウム” や“酢酸”を使用していた\n現在は“塩素系洗浄剤”や “炭酸カルシウム溶解剤”\n次亜塩素酸ナトリウム\n　→配管の金属腐食、有機物残存下で洗浄効果減少\n酢酸\n　→排液時の環境負荷あり、刺激臭あり\nこれらのデメリットを改善した薬剤を現在は使用している\n6\n\n塩素ガス\nアルカリ性＋酸性の液体を混ぜると塩素ガスが発生する\n※次亜のpHが5～7付近以下になると塩素が分離する\n例　次亜と酢酸を混ぜた時の化学反応式\n　　2NaOCl+2CH3COOH→2CH3COONa+2OH-+ Cl2 \n7\n\n参考画像\n8\n\n事例１\n2024/9\n9\n\n事例２\n2025/3\n10\n\n誤混合時の危険性\n実験にてECO200 10ml とサンフリーL 10mlを混合したとき、\n瞬時に激しく発泡し噴出、液の発熱が起こり塩素ガスが90ppm発生\n混合後のｐHは1.90\nECO200、サンフリーは\nボトルひとつ約10L（10000ml）\nタンクには常に10L以上の洗浄剤\n混合してしまったら…\n11\n\nマニュアルの確認\n別紙参照\nPoint\n　★薬剤補充の正しい手順と注意点\n　★万が一混合してしまったときの対応\n12"}, {"title": "院内案内", "filename": "院内案内.pptx", "category": "設備・環境管理業務", "pdf": "pdf/設備・環境管理業務/院内案内__pptx.pdf", "thumbnail": "thumbnails/設備・環境管理業務/院内案内__pptx.png", "fulltext": "院内案内\n\n本館二階\n本館一階\n外来棟一階"}, {"title": "DCS-200Siの取り扱い", "filename": "DCS-200Siの取り扱い.pptx", "category": "機器操作", "pdf": "pdf/機器操作/DCS-200Siの取り扱い__pptx.pdf", "thumbnail": "thumbnails/機器操作/DCS-200Siの取り扱い__pptx.png", "fulltext": "透析用コンソール（DCS-200Si）\n操作方法\n～コンソールの機能・警報対応について\n～\n1\n\n各部の名称\n血液ポンプ\n補液ポンプ\n排液ポー\nト\n排液カップ\nチャン\nバーホル\nダー\n静脈圧ポート\n電源ON・OFFボタ\nン\n気泡検知器\n透析液吐出口\nBVPlus\nカプラ\n\nコンソール基本画\n面\n運転　透析液が流れてい\nる\n停止　透析液が流れていない\n※停止の時はコンソールから報知音が鳴\nる\n3\n\n選択できる治療モー\nド\n①HD：血液透析\n②ECUM:体外式限外濾過法→透析液は流れず、限外濾過のみで水分を除去\n③OHDF：オンライン血液透析濾過\nI-HDF\n➃\n：間欠補充型血液透析濾過\nOHF\n➄\n：オンライン血液濾過→当院では使用しない\n4\n\n各種治療モードからECUMへの切り替え\nHDとOHDF\n　そのままECUMへ\n除水プログラム入の場合\n　除水プログラムをOFFにしECUMへ\nIHDF\n　停止→IHDF長押し→HD→ECUMへ\n5\nMEに声をかけてくださ\nい\n\n脱血方法の切替え\n同時脱血、片側脱血（除水あり）、非脱血（片側脱血除水なし）の3種類\n穿刺後に回路を接続し\n「脱血」を押す\n初期設定は「同時脱血」のため\n問題なければ、「開始」を押す\n切替えたいモードがある場合は\n選択し「開始」を押す\n同時脱血　　　　     ：脱血側と返血側から同時に脱血を行い、除水ポンプで合計100mlを廃棄後に透析モードへ切\n替わる\n片側脱血除水あり：脱血側より除水ポンプで100mlを廃棄後に透析モードへ切替わる\n片側脱血除水なし：脱血側より血液を100ml脱血し、返血側より100mlを体内へ投与後に透析モードに切替わる\n6\n同時脱血時\n　脱血側と返血側両方から\n　脱血が出来ているか目視で確\n認！！\n\n除水速度の変更方法（HD）\n➀青枠の「計算」を\n　  押す\n➁透析時間を設定値\n    に▲▼で変更する\n③赤枠の「計算」を\n    長押しする\n➃透析残り時間と透\n析経過時間が目標の\n時間であることを確\n認する。\n※時間の確認は緑枠\nを押していくと表示\nされる\n\n透析液温度の変更\n➀青枠の透析液温度を押す\n　　※初期設定値36.0℃\n➁温度の▲▼で温度を設定する\n上昇\n低下\n上昇\n低下\n\nコンソールに体温・血圧の入力方法\n体温\n血圧\n➀青枠の血圧を選択\n➁赤枠の体温を選択\n③▲▼キーで値を入力する\n➃送信を長押しする\n③緑枠の血圧を選択する\n➃最高血圧・最低血圧・\n脈拍を▲▼キーで入力す\nる\n➄送信を長押しする\n※自動測定間隔がONに\nなっていると手動での入力\nができない為、OFFにする。\n\n血圧計の設定変更方法\n➀青枠の血圧を選択する\n➁赤枠の設定を選択する\n③6.1～6.4で変更項目を\n選\n　択する\n血圧自動測定間隔の変更\n➃6.1　赤枠の「〇分」を選択\nする　\n➄変更する値を入力しSETを押\nす\n最高血圧　上限\n➅6.3　黄枠の「〇mmHg」を選択\nする\n➆➄同様に値を入力する\n➇緑枠の上限・下限を選択す\nる\n➈➄同様に値を入力する\n脈の上限・下限\n\nタイマー設定\n➀青枠のタイマーを\n　　押す\n➁赤枠の空白バーを\n　　押す\n③タイマ選択の内容\nを\n　 選択する\n➃タイマの時間を\n　▲▼で設定し開始\nを\n　押す\n※時間は残り時間・\n　 完了時刻ど

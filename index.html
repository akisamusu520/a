ちらで\nも\n　 設定可能\n➄タイマが正しく動\nき、\n　時間が正しいこと\nを\n　確認する\n\nVチャンバーの液面のレベル調整\n➀左下の「メ\nニュー」\n　\n➁「レベル調\n整」\n　\n③液面を上げる時は「▲」を長押し\n     液面を下げる時は「▼」を長押し\n　\n12\n\nコンソールへの患者情報取り込み・解除\n➀青枠を押す\n➁赤枠の確認を押す\n③透析条件が表示される\nか確認する\n➀緑枠の通信設定を押す\n➁黄枠の確認を長押しす\nる\n③「確認」がグレーに\nなったこと確認する\n患\n者\n情\n報\n取\nり\n込\nみ\n患\n者\n情\n報\n解\n除\n\nオンラインHDF\n \n原理\n清浄された透析液をAチャンバーから12L/hの速度で補液し、その分をヘモダイアフィルターで除水する。\n補液した分を除水する際、HDよりも圧をかけるため、そのときにHDでは抜けない大分子物質も抜ける。\n \n◇HDFのメリット\n・かゆみの減少\n→原因とされる大分子の老廃物「α１-MG」の除去による\n・合併症の予防\n→「α１-MG」「β２-MG」など大分子物質の除去\n・食欲改善\n→食欲抑制物質レプチンの除去\n・血圧の安定化\n・貧血の改善\n・レストレスレッグス症候群の改善\n◇HDFのデメリット\n・大分子物質を除去するため、体内に必要な大分子のアルブミンが漏出してしまう。\n \n前希釈について\n・前希釈（Aチャンバーから補液）\n大量に補液してから除水を行う。\nみたきは前希釈。全国で約90％。\nみたきでは補液量12L/hr。\n教育チーム資料＜透析のモードより引用\n＞\n14\n\nオンラインHDFの画面説明\n透析時間で入る補液量の合\n計\n１時間あたりの補液速\n度\n（医師指示）\n現在の補液量\n15\n\nオンラインHDFの除水速度変更（時間短縮\n時）\n例）透析時間が4時\n間から3時間への変\n更\n➀透析時間を3時間\nへ変更し計算をする\nと「補液速度の計算\n結果が最高補液速度\nをこえています」と\n表示され、除水量変\n更不可\n➁「補液量設定」を\n補液速度×透析時間の\n値に変更する\n例）4時間から3時間\n　　補液速度12L\n　　×透析時間3h＝36L\n③除水速度と補液速\n度・補液量設定を再\n度確認する\n16\n注意点\nHDFの除水変更時、補液速度も変更されてしまう\n→除水速度変更後、正しい補液速度であるか確認す\nる\n\nI-HDF\n \n間歇的に補液を計画的に繰り返すことで、末梢循環改善効果や血圧低下予防が期待される治療法。\nHDFでは4時間補液し続けるのに対して、I-HDFでは30分に一度100ml～150mlだけを補液する。\nその後、30分かけて補液した分の除水を行う。みたきではDW40㎏以上は150ml、以下は100mlを\n目安。\n \n効果\n・末梢循環障害の改善\n間歇的に補液をすると、細くなった血管が開いて末梢循環の改善につながる。\n \n・血圧低下予防\n定期的な補液で一時的に体内の循環血液量を増加させ血圧を維持させる。\n教育チーム資料＜透析のモードより引用\n＞\n17\n\nI-HDFの画面説明\n補液分を含んだ目標除水量\n体重測定時の目標除水量\n補液速度（この例は150ml/minで補液）\n右下の時間は次に補液するまでの時間\n次の補液までに除水を行う量（残りの補液\n量）\n一回当たりの補液量の見\n方\n「補液速度」→「補液\n量」\n18\n\nBV計の機能（BVｐlus ）\n19\n\nΔBV測定\n「メニュー」→「グラフ・\n表」\n→「BV計」\n20\n\nV側より中枢の狭窄部疑いや、A側よ\nり末梢の狭窄でシャント血流が少な\nい疑いのときなどに再循環測定を行\nう\n→再循環率は15％以内を目標\n「メニュー」→「グラフ・表」→「BV計」→ 「再循環率測定」 →「再循\n環率測定開始」\n21\n\n22\n\nLDQb不足率警報\n目標血流量よりＬＤＱｂが下回る（血流量不足率30％以下）場合に警報発生\n原因\n　シャント狭窄のリスクやA側穿刺針が血管内に挿入できていない可能性あり\n対応\n　「メニュー」→「モニタ」→「モニタ」→2ページ目の推定血流量・LDQbを確認\n　設定血流量に対し、LDQｂが著しく低い場合は、Ａ側の針先の確認、針先洗浄、A側穿刺部より末梢\n側シャント\n　狭窄の有無を確認\n23\n\n24\n\nHtの確認方法\n急激なＨｔ値の低下は出血のリス\nクがあり、消化管出血、骨折等を\n疑う\n血液回路凝固に伴う、血液損失時\nの評価にも利用可能\n「メニュー」→「モ\nニタ」\n→4ページ目のHt\n25\n\n静的静脈圧の確認方法\n➀「設定」→「ス\nイッチ」\n➁「その他」→\n「静的静脈圧」\n③静的静脈圧が表示\nされる\n静的静脈圧は毎回脱血時に自動測定\n静脈圧に比べて針の太さや回路やQbの影響を受けないため本来の静脈圧が測定可能\n26\n\n静的静脈圧の基準値\n項目\nAVF\nAVG\nN数（人）\n62\n9\n静的静脈圧（mmHg）\n0.85\n32.1\nAVF\nAVG\nVAIVT歴\nVAIVT無\nVAIVT有\nVAIVT無\nVAIVT有\nN数（人）\n62\n4\n9\n6\n平均値（mmHg）\n0.85\n34.5\n32.1\n56\n明確な基準値はない\n患者によっても様々なため患者ごとの推移を追う\nみたき患者での平均値を算出した結果、AVFは0.85　AVGは\n32.1\n　基準値の目安：AVF→0mmHg付近？　AVG→30mmHg前後？\n27\n\n除水プログラムについて\n3hHD\n1hECUM\n28\n30分に一度\n除水速度や\nモードの変更が入る\n段階除水プログラ\nム\n3hHD+1hECUM除水プログラ\nム\n\n29\nここを押して\nプログラムをOFFにする\nプログラム入の患者\n除水速度を0.0L/hrにしたときの注意点\nプログラムが自動変更される時間がくると\n除水が再開される→プログラムをOFFにする\nプログラムをOFFにすると透析中はONにできない\n3時間透析+1時間ECUMなどのECUMが入る\n除水プログラムはECUM切り替えタイマーを入れて\n手動でECUM切り替えを\n\n30\n一度押してみ\nる\nプライミングが開始できない場合の対処\n法\n\n透析量モニタについて\n新しくDCS-200Siに搭載された機能で透析量モニタを確認するだけで再循環の有無を確認するこ\nとができます。確認方法は以下の手順になります\n青枠をタッチし「グラフ・\n表」から透析量モニタを選択\n正常の波形\n再循環の可能性\nありの波形\nギザギザの波形は再循環を疑う\n\n32\n原因\n対応\nA針先の凝血付着\n針先洗浄\n脱血不良\n・穿刺場所のフローが少ない\n・A針が血管壁に当たっている \n・A針が血管まで到達していない\n・血圧低下\n・脱血針の折れ曲がり\n \nQBを下げる・再穿刺・駆血\nエコーで確認・針先調整\nエコーで確認・押し込んで血管を切る・再穿刺\n除水停止・補液\n針固定の調整\nA側回路（Vチャンバーまで）の折れ曲がり\n・患者が腕を曲げたとき\n・回路固定での回路のねじれ\n \n \n原因の解除\nダイアライザー・Aチャンバーの凝血\n凝血確認・ダイアライザー及び回路交換（ME対\n応）\nA針の抜針\n再穿刺・V針でシングルニードルモードへの切\nり替え\nV針の抜針\n再穿刺・A針でシングルニードルモードへの切\n原因\n対応\nV針先の凝血付着\n針先洗浄\nV針・V側回路の折れ曲がり\n・患者が腕を曲げたとき\n・回路固定での回路のねじれ\n \n原因の解除\nV針が血管壁に当たっている・挿入不足\nエコーで針先の確認・針先修正\nVチャンバーの凝血\n抗凝固薬の注入忘れ・持続量の不足\nVチャンバーの濃縮\n再循環の所見がないか確認\nV側穿刺部より下流の閉塞・狭窄\n穿刺部の変更　VAIVTを行う\n➀静脈圧上限警報\n➁静脈圧下限警報\n\n③透析液圧上限警報\n33\n原因\n対応\n静脈圧上限に伴うもの\n静脈圧上限と同じ対応を行う\nダイアライザー出口～Ｖチャンバーまでの回路\nの折れ曲がり\n折れ曲がりを解除\n原因\n対応\n静脈圧下限に伴うもの\n静脈圧下限と同じ対応を行う\nダイアライザーの目詰まり\nダイアライザー交換（ME対応）\nオンラインHDFの場合\n補液速度を下げる（ME対応）\n➃透析液圧下限警報\nオンラインHDFにおける透析液圧下限\n　　除水速度が速い場合、透析後半に膜の目詰まりが起こり\n　　陰圧が強くかかるため透析液圧が低下\n　　ヘモダイアフィルターによって透析開始直後から陰圧の場合\nもある\n　　→TMP（静脈圧－透析液圧）が200以内であればよい\n\n➄気泡警報\n34\n原因\n対応\n脱血不良（回路内に陰圧がかかり気泡発生）\n静脈圧下限 脱血不良 参照\nA側針の抜針\n再穿刺・V針でシングルニードルモードへ切り\n換え\n原因\n対応\n脱血不良（回路内に陰圧がかかり気泡発生）\n静脈圧下限 脱血不良 参照\nVチャンバーが空になった\nVチャンバーの液面をためる（ME対応）\n→Aチャンバーまで気泡を送り再\n開\n→Vチャンバーまで気泡を送り再\n開\n・動脈側気\n泡\n・静脈側気\n泡\n\n➅ΔBV低下警報1\n　　原因\n　　　ΔBVが-20％（一部例外あり）を下回ると警報が発生\n　　対応\n　　　患者の様態を確認し血圧低下、気分不快が無いか確認\n　　　警報をリセットし臨床工学技士に声をかける\n35\n\n➆血圧警報\n　　血圧計警報（E09-51）\n　原因\n　　血圧計のカフに異常な圧がかかる時に発生\n　　コンソールが異常な圧を検知し血圧測定を停止\n　\n　対応\n　　原因を解決し、警報リセット後血圧再測定\n　　血圧測定間隔（自動測定タイマー）がオフになるため、\n　　血圧再測定後に自動測定タイマーをオンにする\n36\n\n➇血圧警報\n　　[血圧測定警報]再測定（体動・不整脈・測定時間オーバーなど）\n原因\n　・不整脈及び体動\n　・カフホースの折れ曲り\n　・患者が腕を曲げている\n対応\n　原因を解決し、警報リセット後血圧再測定\n37\n\n➈IP閉塞警報\n　原因\n　　ヘパリンラインがクランプされている\n　対応\n　　クランプを開放後、予定量のヘパリンが注入されているか確認\n38\n\n⑩その他（報知）\n　BVplus補正 正常に終了していません\n　　原因\n　　　回路セッティング時にBV計に回路をセットした時に稀に起こる\n　　対応\n　　　再度、BVplus補正を押す\n　\nその他、見慣れない警報は臨床工学技士対応　\n　・推定血流量モニタ校正警報\n　・漏血警報\n　・透析液温度・濃度異常警報\n　・SV41警報\n　・複式ポンプ締め切り警報　など\n39"}, {"title": "コンソール名称説明", "filename": "コンソール名称説明.pptx", "category": "機器操作", "pdf": "pdf/機器操作/コンソール名称説明__pptx.pdf", "thumbnail": "thumbnails/機器操作/コンソール名称説明__pptx.png", "fulltext": "血液ポンプ\nカプラー\n補液ポンプ\nポール\n \n動・静脈側\n気泡検出器\nチャンバー\nホルダー\nオーバーフロー\nライン\n薬剤注入ライン\n \n \n薬液注入ライン\nBV計（BVplus）\n静脈圧ポート\n \n排液ポート\n \n排液ロート\n \n \n透析液ポート\n透析液\nクランプ\nDCS-200Si\n \n補液ライン\n補液ライン"}, {"title": "コンソール画面", "filename": "コンソール画面.pptx", "category": "機器操作", "pdf": "pdf/機器操作/コンソール画面__pptx.pdf", "thumbnail": "thumbnails/機器操作/コンソール画面__pptx.png", "fulltext": "DCS-200Si"}, {"title": "ダイアライザー一覧表", "filename": "ダイアライザー一覧表.xlsx", "category": "機器操作", "pdf": null, "thumbnail": null, "fulltext": ""}, {"title": "補液量", "filename": "補液量.docx", "category": "機器操作", "pdf": "pdf/機器操作/補液量__docx.pdf", "thumbnail": "thumbnails/機器操作/補液量__docx.png", "fulltext": "伊藤メモ　オンラインHDF　最高補液速度をこえています　について\n医師指示で補液量12 Ｌ/hr の指示\n設定(４時間透析）\n除水量1.2 Ｌ(→0.3L/hr)\n補液量48 Ｌ(→12L/hr)\n→4 時間から3 時間にする場合\n除水量再計算を押すと、同時に補液量も再計算が入る\n設定（3 時間透析）\n除水量1.2L(→0.4L/hr)\n補液量48L(→16L/hr)\nと、なるが医師指示は12L/hr なので16L/hr では超えてしまっていてだめ\n→このミスを防ぐために、12L/hr を超えないようにコンソールで設定してある\n→最高補液速度を超えています　の表示\n　\nなので、3 時間透析の場合、補液量を48L→36L に変更してもらえば\n36L(→12L/hr(12×３))となり設定可能\n\n10 分短縮とかだとややこしい\n3 時間50 分にしたい場合、12+12+12+(12×5/6)=46 Ｌ\n3 時間45 分→45 Ｌ\n3 時間30 分→42 Ｌ\n3 時間　　 →36 Ｌ\n2 時間　　 →24L\n1 時間（60 分）で12 Ｌ補液の指示の場合\n10 分短縮ごとに２Ｌ減らす　って考えもあり\nもっとめんどくさいことに\n１時間で補液量７Ｌとかいう指示も出る　考え方わかってれば計算可能だが、、、\nそんなんに時間かけてる暇ないと思うのでＭＥよんでもろてＯＫ"}, {"title": "静的静脈圧とＬＤＱｂ説明", "filename": "静的静脈圧とＬＤＱｂ説明.pptx", "category": "機器操作", "pdf": "pdf/機器操作/静的静脈圧とＬＤＱｂ説明__pptx.pdf", "thumbnail": "thumbnails/機器操作/静的静脈圧とＬＤＱｂ説明__pptx.png", "fulltext": "静的静脈圧とは？\nスマホ閲覧用リン\nク\n\n\n静的静脈圧の確認方法\n①「設定」→「ス\nイッチ」\n②「その他」→\n「静的静脈圧」\n③静的静脈圧が\n　　表示される\n\n静的静脈圧の設定\n静的静脈圧の基準値は患者ごとに設定可能。\n基準値を超えた場合、インフォメーションに表示され報知音が鳴\nる。\n警報のリセットは臨床工学技士\nが\n行うため、声をかける\n基準値を超えた場合\nは\n赤字で表示される\nインフォメーションを\nタッチ\n\n脱血時のみV側を接\n続\nシャントの流れ\n狭窄部\nA穿刺部\nV穿刺部\n逆接続での静的静脈圧測定\n使用例：医師指示時、A側止血不良時、\n　　　　　A側瘤の拡大時などA-V間\nの\n狭窄が疑われる場合\n静的静脈圧確認時のA側穿刺\n狭窄部より吻合部側から、\n狭窄部に向かって穿刺を行う\n\n静的静脈圧　逆接続　測定手順\n➀A側とV側を逆に接続し、「脱血」→「開始」を押す。\n②脱血開始後、「開始」を再度押す。（「開始」の文字が緑色から灰色に変わ\nり、\n　  脱血が停止する）\n③回路と穿刺針をクランプして正しい接続に戻し、「d-fas」→「開始」を押す。\n 　（脱血が再開される）\n\nLDQbとは？\nLD（レーザードップラー）で計測したQb（血流量）\n実際に回路内を流れている血流量\n≒\n設定した血流量に対して実際にどのくらい\n流れているか確認する際に使用する。\n→脱血不良があればLDQbが低下する。\n原理\n\nLDQb確認方法\n「メニュー」→「モニタ」→「モニタ」→2ペー\nジ目\n\nLDQb不足率警報\n血流量よりＬＤＱｂが下回る（血流量不足率30％以下）場合に警報発生。\n原因\n　　シャント狭窄やA側穿刺針が血管内に挿入できていない可能性あり。\n対応\n　　設定血流量に対し、LDQｂが著しく低い場合はA側の針先の確認、針先\n洗浄、\n側穿刺部より末梢側シ\nト狭窄\n有無を確認"}, {"title": "積層型ダイアライザー", "filename": "積層型ダイアライザー.docx", "category": "医療材料", "pdf": "pdf/医療材料/積層型ダイアライザー__docx.pdf", "thumbnail": "thumbnails/医療材料/積層型ダイアライザー__docx.png", "fulltext": "積層型ダイアライザー（H12-3400・4000）の特徴と禁忌"}, {"title": "E09-51", "filename": "E09-51.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/E09-51__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/E09-51__pptx.png", "fulltext": "みたき透析室\n重要指名手配\nこの警報にピンときたら対応！\n特徴\n・体動などにより血圧が測定できなかった時、\n　自動測定タイマーが勝手にOFFになります\n・高頻度でインシデントを起こす原因に\n　なっている凶悪犯です\n警報を見つけた方\nは\n血圧を再測定後、\n自動測定タイマー\nを\nいれてください\n留意事項\n　忙しい時の警報はすぐその場を離れたくなりますが\n　警報を止めた場合必ず、自分で最後まで対応するか\n　他スタッフに依頼してから離れてください\n　タイマーOFFにより血圧測定されず\n　血圧低下に気づかなかった場合、最悪の事態を招き\nます\n皆さんの協力が必要で\nす！！！！\n【血圧計警報】E09-\n51"}, {"title": "インシデント", "filename": "インシデント.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/インシデント__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/インシデント__pptx.png", "fulltext": "透析室で起きやすい\nインシデント\n～改めて意識しよう～\n教育チーム\n1\n\nCase1　逆接続\n正しい接\n続\n返血（V）側\n血液回路へ接続\n脱血（A）側\n血液回路へ接続\n脱血（A）側\n血液回路へ接続\n返血（V）側\n血液回路へ接続\n逆接続\n2\n\n逆接続による再循環\n正しい接続\n逆接続\n3\n\n再循環がなぜだめ？\n• 透析効率の低下\n　　→きれいになった同じ血液を再度きれいにしているため\n　　　透析効率の低下\n• 濃縮による回路凝固\n　　→除水して濃くなった血液を再度脱血して\n　　　除水しているので、血液が濃縮され回路内凝固\n4\n\n透析効率の低下\n同じ血液を何度もきれいにしている\n　→透析しているのに透析できていない！！\n　　・カリウムが抜けなかったら心停止が起こりうる\n　　・毒素が抜けなかったら尿毒症が起こりうる\n　　\n意味のない治療になってしまいます\n5\n\n濃縮で回路内凝固に伴う回路破棄\n血液回路内は約200ml\n透析患者で瀉血300mlでHb0.9g/dlの低下があったとの報告あり\n腎性貧血が進行している透析患者の回路破棄は大きな問題\n6\n\n濃縮\n普段注意するポイント！！！\nVチャンバーが黒くなっていないか（カテーテルの人は除く）\n再循環を疑った場合、再循環測定を推奨します\n7\n\nルールを順守しましょう\n　☆声だし指さしで接続確認を行う\n　☆シャントチェックのリストを用いて行う\n独り立ちして慣れたとき、無意識で接続したとき、\n焦って接続したとき、など起きやすい状況が多いです\n8\n\nCase２　除水プログラムの切り忘れ\n除水プログラムについて\n3hHD\n1hECUM\n9\n\n30分に一度\n除水速度や\nモードの変更が入る\n10\n\nプログラム入\nプログラム切\n11\n\n除水速度を0.0L/hrにしたときの注意点\n除水速度を0.0L/hrにする（除水をとめる）タイミング\n　→血圧低下や体調不良時が多い\n　プログラムが自動変更される時間がきてしまうと\n　除水が再開されてしまう\n　　\n　除水をとめるべき状況のときに除水が再開されると大事故\n　　→プログラムをOFFにする\nプログラム入の患者\n12\n\n除水プログラムをOFFにする\nコンソールのプログラム→「入/切」でOFFにしてください\nOFFにすると除水が再開してしまうので\n再度、除水速度を0.0L/hrにしてください\nプログラムを一度OFFにすると\nその透析中はONにすることができません！\n３時間透析+１時間ECUMなどのECUMが入る除水プログラムは\nECUM切り替えタイマーを入れて手動でECUM切り替え、\nその他プログラムの場合は医師に相談をしてください\n13\n\nここを押して\nプログラムをOFFに\nしてください\n14\n\n除水をとめたときは\n・愁訴処置入力\n・終了タイマーをかける\n・次の血圧測定タイマーかける\n・医師報告\n・コンソール画面を確認する！！\nやることが多く、焦るタイミングではありますが、\n一連の流れの中に除水プログラムを確認する、\nというのを忘れないでほしいです\n15\n\nCase３　自己抜針\n自己抜針を見つけたら\n・応援スタッフを呼ぶ\n・抜針部を探しておさえる（止血をする）\n・血液ポンプをとめA側とV側の回路のクランプをする\n・患者バイタル確認（意識・血圧）\n・医師報告\nその間にMEが機械側につき体外循環を行います\nその後は医師の指示に従います\n16\n\n自己抜針を起こさないために\n針先の挿入\n・２分の１以上外筒挿入\nテープ固定\n・Ω固定\n・一度はがしたテープは使わない\nテープ\nチューブ\n△\n◎\n17\n\nCase４　ナファモスタットの禁忌\nナファモスタットは陽性（⊕）荷電\n積層型ダイアライザー（H12-4000）の膜は陰性（⊖）荷電\nナファモスタットが\nダイアライザー内に吸着され\nダイアライザーが凝固する\n透析膜\n18\n\nナファモスタットに変えて！と医師指示\n必ずその患者さんが\n積層型ダイアライザーではないことを\n確認してください！！！！\n19\n\nナファモスタット注意書き\n20\n\n積層型ダイアライザー禁忌に関連して\n積層型ダイアライザーとACE阻害薬も禁忌です\n（血圧が低下してしまう恐れがあるため）\n処方箋を患者さんに渡すときに確認してもらうと良いと思います\n21\n\nCase５　血圧計警報　E09-51\n血圧測定中に手が動いた、などの体動があったときに\n血圧測定がストップし、自動測定タイマーがOFFになります\nこの警報が鳴った時は必ずスタッフが\n警報を解除する必要があります\n血圧を再測定し\n自動タイマーをいれてください\n22\n\n最後に\n忙しい環境ではありますが\nひとりひとりが事故を起こさない意識を持ち\n協力し合って業務を行っていきましょう！！！\n23\n\n間隔おいて続編やりたいです\nぜひみんなに意識してもらいたいことを\n教育チームまでご意見ください！！\n次回以降の内容に組み込むことを検討します！\n24"}, {"title": "オンライン折れ曲がり", "filename": "オンライン折れ曲がり.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/オンライン折れ曲がり__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/オンライン折れ曲がり__pptx.png", "fulltext": "回路折れ曲がりで返血不良が発生しました！\nO\nK\n折れ曲が\nり\nN\nG\nオンラインHDFの\nプライミング時注意してください\n不明な点はME伊藤まで\n左回りでプライミングポートに\n接続してください！！！\n右回りだと\n折れ曲がりが発生します"}, {"title": "オンライン漏れ", "filename": "オンライン漏れ.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/オンライン漏れ__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/オンライン漏れ__pptx.png", "fulltext": "回路から透析液が漏れ\n過除水が発生しました！\nしっかり押しねじこむ！\nしっかり締める！！\nインシデント　\nオンラインHDFの患者\n補液回路の接続部から透析液が少しずつ漏れていた\nロックは締まっていたが押し込みが弱かったためと考えられる\n漏れた分が過除水となった\n回路からの漏れは\n過除水や失血の\n大きなリスクです"}, {"title": "スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました", "filename": "スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました.docx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました__docx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました__docx.png", "fulltext": "スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました。\n使用しない場合は〇のように設置しておきましょう。\n使用中もチューブが床につかないよう、ベッドの柱やレールに引っ掛けてください。\n　　　　　　　　　　　　\n✕\n〇"}, {"title": "スタッフアンケート回答", "filename": "スタッフアンケート回答.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/スタッフアンケート回答__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/スタッフアンケート回答__pptx.png", "fulltext": "透\n析　　　　　　　　　　\n　　　　医療機器安全管\n理研修\n透析スタッフ向け\n\nダイアライザ（HD）の選択基準\nは？\n• 当院では現在、ＡＰＳ・ＦＢ・ＮＦ・Ｈ１２の4種類のダイア\nライザを使用しており、APS・FBは特に特徴はありません。\n　※APSに含まれるPVPが溶出し血圧低下する場合があります\n• NF（PMMA膜）：透析掻痒感の改善効果、免疫能の回復、栄養\n状態の改善、抗炎症作用、酸化ストレス軽減、動脈硬化進展抑\n制への期待、貧血改善\n• H12（積層型）：緩徐な溶質除去による血圧低下予防、高齢者、\n栄養状態の改善\n\nHD・OHDF・I-HDF・ECUM時にダイアライザを変更する理由\n・HDとOHDF、I-HDFは診療報酬が違い、治療条件にあったダイアライザを使用する必要\n　があります。\n・HDは当院ではAPS・FB・NF・積層型が適応になります。\n　OHDF・I-HDFではヘモダイアフィルタが保険適応（MFX・FIX・ABF・GDF・PMF）になり、それ\n　以外のダイアライザは保険適応外のため、治療条件が変更になるとダイアライザを変更\n　する必要があります。\nECUM\n※\nではヘモダイアフィルタは保険適応外であり、透析液はダイアライザに流\n れないことや医療材料費の観点から価格の安いAPSやFBを使用します。\n因みに償還価格は　人工腎臓用特定保険医療材料（回路を含む）で決まっており、\n• APS・FB1,440円 \n• NF2,220円 \n• 特定積層型 5,590円\n• ヘモダイアフィルター 2,630円\n\n透析の診療報酬と\nは？\n血液透析の場合\n　4時間透析未満：1876点\n　4時間以上5時間未満：2036点\n　5時間以上：2171点\nオンラインHDF・I-HDFの場合\n　4時間透析未満：1926点\n　4時間以上5時間未満：2086点\n　5時間以上：2221点\n4\n※ 時間透析未満と4時間以上5時間未満で\n　は1回あたり160点差があり年間では26800\n点\n　の差です。\n　HDからHDFに切替えると１患者当たり年\n間\n　8400点の加算が得られます。\n1点=10円\n透析を行うと一回あたり左記の報酬が病院\nに\n入ります。\nその報酬から物品代（ヘパリンや針など）\nを\n差し引き残った額が病院の収益です\n\nヘモダイアフィルター（HDF）の選択基\n準は？\n当院での使い分け（指標）\n・透析困難症：MFX-MW\n・掻痒感：FIX-E\n・骨関節痛：ABH-PA\n・RLS：GDF\n・掻痒感：PMF\nヘモダイアフィルターごとに穴のサイ\nズが\n違い、Albやα1MGの除去率の違いがあ\nり\n効果が変わるため、患者さんの症状や\n目\n的で使い分けます。上記は指標であり、\nAlbなどの栄養状況も考慮し検討します。\nGDF\nABH-PA\nFIX-E\nMFX-M\n\n当院PMF膜のVAS評価\n3 ヶ月\n6 ヶ月\n12 ヶ月\n0\n2\n4\n6\n8\n10\n搔痒感の改善評価\n改善\n普遍\nジフェリケファリン酢酸塩注射液併用\nN:\n9\n[\n人\n]\nV\nA\nS\n値\n改善：VAS値が2以上の低下\n普遍：VAS値が0・1の低下\n開始前\n3 ヶ月\n6 ヶ月\n12 ヶ月\n0.0 \n1.0 \n2.0 \n3.0 \n4.0 \n3.0 \n1.7 \n1.7 \n1.3 \n日中のVAS 推移\nN:\n9\nPMF膜では痒みの原因となる物質の吸着による痒\nみが軽減できるデータになりました（JSDT2025年\n発表）\n\nI-HDFからECUM変更時のタイミング\nは？\nタイミングはどのタイミングでも可能です。\n工程はECUM切替時に先に補液した量を除水しその後、除水量設\n定\n値まで除水を実施します。ECUM切替時にコンソールで残り時間\nと補\n液した量と残りの除水量から自動で再計算が実施されるため、治\n療\n時間通りに除水が完了します。\n\nコンソール状態\n色\n返血中\n緑 + 青 点滅\n返血不良\n青 高速点滅\n除水完了\n緑 ＋ 黄 点灯\nナースコール\n青 点滅\n報知(報知音あり)→ME対応\n緑 点滅\n・BV計のカバーが開いています\n・持続速度が設定されていません\n (ダルテパリン使用時ワンショットのみ)  \n・BV補正正常に終了していません\n停止(報知音あり)\n緑 点滅\nIHDF補液中\n緑 高速点滅\n再循環率測定中\n緑 点滅\nECUM \n青 点灯\n警報\n赤 点滅\nコンソールの表示灯（ポール）　警報色\n一覧\n\n穿刺トラブル時になぜ残血が発生しやす\nい？\n　穿刺ミスによりシャント側に血腫が生じ脱血不良の原因になり、ダイアライ\nザのヘッド部分に気泡が溜まると気泡部分に血液が流れにくくなり、残血の\n原因に繋がります。\nよく、MEがダイアライザを逆にしたり、振ったりするのは空気を取り除くため\nにしています。\n　透析開始時の穿刺トラブルによりポンプを停止すると回路内に血液が貯\n留し血液は回路やダイアライザの異物と接触すると凝固しやすくなるため、\n残血の原因になります。\n注意：透析中の穿刺トラブル時にポンプを停止する場合は「運転」から「停\n止」にしてください。「運転」では透析液が流れており、ダイアライザから除水\nがかかるため、残血の原因になります。\n\n回路が凝固しそうになった時の対処方法\nは？\n凝固しそうな時の状態としては、静脈圧が開始時より上昇、回路\nの血\n液の色が濃くなってきたなどが認められます。\n対処方法としては、凝固か濃縮か判断し凝固の場合は医師へ報告\nし\n継続か返血などを相談します\n凝固か濃縮の確認方法としては透析液を100ml程度補液し回路内\nに\n血液の塊があるときは凝固、ない時は濃縮になります。濃縮の場\n合\nはシャントに原因があるか、シングルニードル透析などで発生し\n\n治療中に腫れた時の対応は？\n原因：\n穿刺時に後壁や側壁を貫いた、血管内への針の留置が浅かった、体動\nによる抜去など\n対応：\n①これ以上腫れないように血液ポンプを停止し「運転」から「停止」\nへ\n②可能ならシングルニードル透析へ切り替え、不可能なら体外循環\n③腫れている側の針を抜き止血を実施\n④コンソールの止血確認タイマーで10から30分セットする\n※止血後でも血液ポンプを回すことで腫れる可能性があるため\n\n静脈圧フルレンジ警報と\nは？\n1.脱血開始時のフルレンジ警報\n　コンソールの除水ポンプが作動し脱血側と返血側で合計100ml除水\nします。フルレンジの原因は脱血か返血側から血液が引けない（脱血\n不良）が考えられます。その他にも回路の折れ曲りやクランプの開放\n忘れもあります。\n2.対応\n　脱血側か返血側のどちらかまたは両方（シャント狭窄や閉塞）なの\nか判断し原因を解除します。解除後は過剰な圧が回路内にかかってい\nるため、取り除く必要かありますので、静脈圧ラインを開放し圧を逃\nがします。\n注意：静脈圧ラインの開放を何度も繰り返しますとダイアライザから\nの除水がかかりますのでライン開放と同時にダイアライザ側に水が引\nかれるため、静脈チャンバーが空になることにつながります。警報が\n何度も発生するからと言って同じ操作を何度も繰り返さないでくださ\nい。\n\n静脈圧と透析液圧の違\nい\n静脈圧: 血液回路の圧力を指します\n透析液圧: 透析液回路の圧力を指します\n項目\n静脈圧\n透析液圧\n測定部位\n血液回路圧\nダイアライザ側の透析液圧\n対象\n血液\n透析液\n役割\n血液循環の監視と安全性の確\n保。血液の脱血・返血、回路\nの異常（閉塞や離脱）がない\nかをチェックする。\n限外濾過（除水）の制御と安\n全性確保。透析膜を介した水\n分移動の駆動力（膜間圧）の\n監視\n異常時の警報\n回路の屈曲、血栓詰まり、血\n管壁への針先当たりなどで警\n報が発生\n圧力異常や膜間圧 (TMP) の異\n常で警報が発生\n\n静脈圧上昇の原因\n• 静脈圧上昇の原因は返血側になります。穿刺針が血管内に入っていない、\n　血管壁にあたっていることが多いです。\n• 治療中に静脈圧の上限警報が発生する時は、\n1.体動による上昇（特に肘部での穿刺では発生しやすい）\n2.血管壁に針があたっている\n3.返血側より中枢に狭窄・閉塞がある\n4.血管外に血液が漏れて腫れた場合\n5.回路の折れ曲り、血液の濃縮など\n警報時の対応手順\nブザー停止を押しシャント肢を曲げていないか、穿刺部が腫れていないか\n確認し問題がなければ、警報を解除し透析治療を再開する。\nすぐにコンソールから離れるのではなく、静脈圧が急激に上昇しないこと\nを\n確認し離れる。\n\n注意！！止血不良を見落としていません\nか？\n以前は5分で止血ができていたのに、最近は１０分で止まらない\nヘパリン量が多いのかな？　シャント瘤に穿刺しているから？\n見落としがちですが、穿刺部位よりも中枢側（肩側）の狭窄・閉塞\nが原因\nの可能性があります\n確認方法：以前より静脈圧（or静的静脈圧）が上昇していないか・\nシャント\n　　　　　　   エコーでRIが上昇していないかなども必ず確認してく\nださい\n\nトイレ離脱のため返血、その後の透析再開手\n順\n1.青枠の「工程」をタッチし赤\n枠の\n　　「運転」をタッチ\n2.緑枠の血液ポンプの電源をON\nに\n　して予定血流量に設定する\n\nVチャンバーの液面低下時の対\n応\n①左下の「メ\nニュー」\n　\n②「レベル調\n整」\n　\n③液面を上げる時は「▲」を長押し\n     液面を下げる時は「▼」を長押し\n　\n17\n\n透析量モニタについ\nて\n新しくDCS-200Siに搭載された機能で透析量モニタを確認するだけで再循環の有無を確認するこ\nとができます。確認方法は以下の手順になります\n青枠をタッチし「グラフ・\n表」から透析量モニタを選択\n正常の波形\n再循環の可能性\nありの波形\nギザギザの波形は再循環を疑う\n実際に測定すると再循環が発生\n\nV側より中枢の狭窄部疑いや、A側よ\nり末梢の狭窄でシャント血流が少な\nい疑いのときなどに再循環測定を行\nう\n→再循環率は15％以内を目標\n「メニュー」→「グラフ・表」→「BV計」→ 「再循環率測定」 →「再循\n環率測定開始」\n19\n\nBV計とは\n透析で使用されるBV計（循環血液量モニタリングシステム）は、透析中の循環血\n液量の変化率（ΔBV[%]）を連続的かつ非侵襲的に測定する装置です。透析中の急激\nな血圧低下やショック状態を回避するために重要な役割を果たします。\n目的・役割\n透析は体内の余分な水分を除去する治療ですが、急激な除水は循環血液量の減少を\n引き起こし、血圧低下やショック、頭痛、吐き気などの症状（透析困難症）を引き\n起こす可能性があります。\n•血圧低下の予測と防止: 循環血液量の急激な減少を示す波形（ΔBV波形）を監視\nし、異常が予測される場合にアラーム（初期設定は-20％以下で警報発生）を発す\nるなどして、スタッフが早期に対応できるようにします。\n•適切なドライウェイト (DW) の設定支援: ΔBVの変化と患者の自覚症状、血圧など\nを総合的に評価することで、その患者さんにとって最適なDW（透析後の目標体\n重）を決定する際の指標の一つとします。\n•溢水状態の発見: 透析前の溢水（水分過多）状態の評価にも役立ちます。 \n日機装のコンソールには「リファレンスエリア」という機能があり、BV計の波形\nを評価する際に「この範囲内に収まるのが望ましい」とされる基準となる領域が表\n示されます\n\nBV計のリファレンスエリア\nBV計の機能にリファレンスエリア\n（緑色のライン）があり、DWの指\n標や除水速度の目安となるΔBV波形\nの 予想曲線になります\nあくまで、装置内の計算になりま\nすので、過度の評価は危険です。\nΔBVは上方に傾い\nており、DWが緩\nい可能性が考え\nられます\nリファレンスエリ\nアを超える可能性\nがあるため、DWが\n厳しいか、除水速\n度が速い可能性が\nあります\nこの時にPRRを併用\nすると・・\n\nBV計を使用する上での注意\n点\n除水速度2.2L　最終ΔBV-16％\n同じ患者でも除水速度が変われば、ΔBVの推移は変化します。\n決まった目安はありませんが、ある病院の発表ではDWより+1％の増加ではΔBVは-1.5～-.375％（4時\n間透析）の変化であれば、適切とあります。\n例）DW50㎏で増加2㎏では4％の増加率のため、ΔBVは-6～-15％の範囲で低下します\n　　増加3㎏では6％の増加率のため、ΔBVは-9～-22.5％の範囲で低下します\n除水速度2.8L　ΔBV-22％まで低下\n\nPRR(プラズマリフィリングレート)\nとは？\nPRRとは透析中に血管から抜けた水分を補うた\nめに、血管外の組織液が血管内へ移動する割合\nを指します。\n確認方法：青枠とタッチしグラフからBVを選択\nする\n使用する場面とは？\n・除水を停止し除水を再開するとき\n・血圧低下時に除水量が適切か\n・DWをダウンするときに、どこまで加算でき\nるか\n　など\n※指標のひとつですので参考程度になります\n例）\n今回ですと除水量0.8l/hに対しPRRが0.48l/hのため除水速度が速いため、血\n圧が低下する危険性に注意となります\n\n　　各種警報時の原因と対応\n\n25\n原因\n対応\nA針先の凝血付着\n針先洗浄\n脱血不良\n・穿刺場所のフローが少ない\n・A針が血管壁に当たっている \n・A針が血管まで到達していない\n・血圧低下\n・脱血針の折れ曲がり\n \nQBを下げる・再穿刺・駆血\nエコーで確認・針先調整\nエコーで確認・押し込んで血管を切る・再穿刺\n除水停止・補液\n針固定の調整\nA側回路（Vチャンバーまで）の折れ曲がり\n・患者が腕を曲げたとき\n・回路固定での回路のねじれ\n \n \n原因の解除\nダイアライザー・Aチャンバーの凝血\n凝血確認・ダイアライザー及び回路交換（ME対\n応）\nA針の抜針\n再穿刺・V針でシングルニードルモードへの切\nり替え\nV針の抜針\n再穿刺・A針でシングルニードルモードへの切\n原因\n対応\nV針先の凝血付着\n針先洗浄\nV針・V側回路の折れ曲がり\n・患者が腕を曲げたとき\n・回路固定での回路のねじれ\n \n原因の解除\nV針が血管壁に当たっている・挿入不足\nエコーで針先の確認・針先修正\nVチャンバーの凝血\n抗凝固薬の注入忘れ・持続量の不足\nVチャンバーの濃縮\n再循環の所見がないか確認\nV側穿刺部より下流の閉塞・狭窄\n穿刺部の変更　VAIVTを行う\n①静脈圧上限警報\n②静脈圧下限警報\n\n③透析液圧上限警報\n26\n原因\n対応\n静脈圧上限に伴うもの\n静脈圧上限と同じ対応を行う\nダイアライザー出口～Ｖチャンバーまでの回路\nの折れ曲がり\n折れ曲がりを解除\n原因\n対応\n静脈圧下限に伴うもの\n静脈圧下限と同じ対応を行う\nダイアライザーの目詰まり\nダイアライザー交換（ME対応）\nオンラインHDFの場合\n補液速度を下げる（ME対応）\n④透析液圧下限警報\n\n透析終了前に頻回に透析液圧下限アラームが\n発生するときの対応\n透析液圧下限アラームが治療後半に発生する原因で一番多いのが、\nオンラインHDFでTMPが上昇するため、警報が発生することが考\nえられます。\nTMPは、ダイアライザの血液側と透析液側の圧力の差を示しオンライン\nHDF は、通常の血液透析 (HD) に加えて「濾過」の影響で大量の透析液を\n補充液として利用するため高い濾過量（置換液量）を設定することが可能\nになり、TMPが上昇する原因になります。\n一般的に、TMPが200〜300 mmHgを超えるとアルブミン漏出のリスクが高ま\nり、透析経過と共にTMPが上昇し透析液圧下限警報が頻回に発生します。\nTMPの計算方法は\n　TMP＝静脈圧―透析液圧になります。\nつまり、透析液圧が下限に傾くほど、TMPが上昇します。\nTMPが200を超すようでしたら、臨床工学技士に報告をお願いします。\n\n⑤気泡警報\n28\n原因\n対応\n脱血不良（回路内に陰圧がかかり気泡発生）\n静脈圧下限 脱血不良 参照\nA側針の抜針\n再穿刺・V針でシングルニードルモードへ切り\n換え\n原因\n対応\n脱血不良（回路内に陰圧がかかり気泡発生）\n静脈圧下限 脱血不良 参照\nAチャンバーが空になった\nAチャンバー側のクランプ忘れ\nAチャンバーの液面をためる（ME対応）\n→Aチャンバーまでポンプを手回し気泡を送り再\n開\n→Vチャンバーまで気泡を送り再\n開\n・動脈側気\n泡\n・静脈側気\n泡\n\n⑥血圧警報\n　　血圧計警報（E09-51）\n　原因\n　　血圧計のカフに異常な圧がかかる時に発生\n　　コンソールが異常な圧を検知し血圧測定を停止\n　\n　対応\n　　原因を解決し、警報リセット後血圧再測定\n　　血圧測定間隔（自動測定タイマー）がオフになるため、\n　　血圧再測定後に自動測定タイマーをオンにする\n29\n\n⑦血圧警報\n　　[血圧測定警報]再測定（体動・不整脈・測定時間オーバーなど）\n原因\n　・不整脈及び体動\n　・カフホースの折れ曲り\n　・患者が腕を曲げている\n対応\n　原因を解決し、警報リセット後血圧再測定\n30\n\n⑧IP閉塞警報\n　原因\n　　ヘパリンラインがクランプされている\n　　ヘパリンラインや根本の凝固による閉塞（ナファモスタットに発生しやす\nい）\n　対応\n　　クランプを開放後、予定量のヘパリンが注入されているか確認\n　　ヘパリンラインや根本が閉塞していないか確認する\n　　閉塞の場合は医師へ報告し対応を検討する\n31\n\n⑨血流量不足率警報\n設定血流量（ml/min）より30％低下すると警報が発生します\n原因\n　脱血側より末梢の狭窄、複数の枝分かれ\n　穿刺針が血管の壁にあたっている\n　穿刺針に血栓が付着している\n　穿刺ミスにより腫れている\n対応\n　①血管に針がしっかり挿入されており挿入部が腫れていないか確認する\n　②針先洗浄を実施する\n　③脱血側より末梢側に狭窄、複数の枝分かれがないか確認する\n　④回路、ダイアライザが固まっていないか確認する\n　\n\nその他の警報\n下記の警報発生時は臨床工学技士が対応しますので、声をかけて\n下さい\n• 漏血警報\n• 除水ポンプ締切警報\n• 複式ポンプ締切警報\n• シングルニードル返血時間警報\n• ΔBV低下警報2\n• etc\n\n過去のインシデント事例と対策\n事例\n事象に対する結果\n操作上の対策\n排液後に回路のクランプ忘れに\nよる血液の逆流\nクランプ忘れにより回路側に\nシャントから血液が逆流\n・返血後は回路側のクランプが\nさ\n　れていることを確認し抜針す\nる\n・抜針前に回路側に血液の逆流\nが\n　ないか確認する\nオンラインHDFで補液回路の逆\n取付\n血液回路に気泡が混入し警報が\n頻回に発生\n血液回路、補液回路の接続に誤\nりがないか、確認する\nワンタッチクランプが閉まって\nいた\n補液されず、HDFがHDの状態\n血液回路、補液回路の接続に誤\nりがないか、確認する\n装置と補液回路の接続不良によ\nる液漏れ\n液漏れによる過除水\n・回路の接続時にしっかり押し\n込む\n・透析開始時に緩みがないか確\n認\n\n自己抜針・自然抜去\n自己抜針を見つけたら\n・応援スタッフを呼ぶ\n・抜針部を探しておさえる（止血をする）\n・血液ポンプをとめA側とV側の回路のクランプをする\n・患者バイタル確認（意識・血圧）\n・医師報告\nその間にMEが機械側につき体外循環を行います\nその後は医師の指示に従います\n35\n\n\n透析治療終了後の回路片付け時の注意点\n　透析液の排液ラインから回路を外すときに先端が折れてポート\nに\n　残ってしまうことがありました。\n　今回はスタッフで引き抜けましたが、コンソール内に入り込ん\nだ場合、\n　修理になりますので、各自取り外し時は真っすぐ引き抜くよう\nに\n　注意をお願いします。\n\n回路折れ曲がりで返血不良が発生しました！\nO\nK\n折れ曲が\nり\nN\nG\nオンラインHDFの\nプライミング時注意してくだ\nさい\n左回りでプライミングポート\nに\n接続してください！！！\n右回りだと\n折れ曲がりが発生しま\nす\n\nインシデント多発中\n体動で血圧が測れないことが時々ありますが、\nもし、心停止・ショックバイタル・不整脈\nなどで、\n血圧が測れていなかった場合、\n再測定を忘れてその場を離れても良いと思います\nか？\n注意\n血圧計警報（E09-51）\nカフホース点検\n測定時間オーバー\n脈検出不能\n必ず立ち止まって\n手順\n血圧の再測定忘れ‼\n血圧が再測定できるまで\nその場を離れないようにしてください\n警報確認\n患者状態確認\n►\n►\n警報解除\n警報に対する対\n►\n応\n再測定（体動・不整脈）\n上記以外もあ\nり\n\n回路から透析液が漏れ\n過除水が発生しました！\nしっかり押しねじこむ！\nしっかり締める！！\nインシデント　\nオンラインHDFの患者\n補液回路の接続部から透析液が少しずつ漏れていた\nロックは締まっていたが押し込みが弱かったためと考えられる\n漏れた分が過除水となった\n回路からの漏れは\n過除水や失血の\n大きなリスクです"}, {"title": "モニタの安全管理について（医療機器安全管理）", "filename": "モニタの安全管理について（医療機器安全管理）.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/モニタの安全管理について（医療機器安全管理）__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/モニタの安全管理について（医療機器安全管理）__pptx.png", "fulltext": "モニタの安全管理について\n医療機器安全管理研修\n透析センター　臨床工学技士　\n\n目次\n• 正しい電極装着位置\n• 正常な心電図波形\n• ペースメーカーがある場合の電極位置\n• 当院のモニタ基本画面について\n• アラームの設定基準値と変更方法について\n• ノイズの少ない心電図計測(電極装着)のポイント\n• アーチファクト（ノイズ）の種類と除去\n• SpO2プローブの装着ポイント\n• 使用前・後点検について\n\n目次\n• 正しい電極装着位置\n• 正常な心電図波形\n• ペースメーカーがある場合の電極位置\n• 当院のモニタ基本画面について\n• アラームの設定基準値と変更方法について\n• ノイズの少ない心電図計測(電極装着)のポイント\n• アーチファクト（ノイズ）の種類と除去\n• SpO2プローブの装着ポイント\n• 使用前・後点検について\n\n正しい電極装着位置（3点誘導）\n\n正常な心電図波形\n\n各波形の意味・特徴\n\nペースメーカーがある場合の電極位置\n• ペースメーカーを避けて貼\n付すれば問題ない。\n• 例えば、左鎖骨下にペース\nメーカーがある場合、ペー\nスメーカーより1cm以上離\nして左前胸部に黄色電極の\n貼付を行う\n1ｃｍ\n以上\n\n目次\n• 正しい電極装着位置\n• 正常な心電図波形\n• ペースメーカーがある場合の電極位置\n• 当院のモニタ基本画面について\n• アラームの設定基準値と変更方法について\n• ノイズの少ない心電図計測(電極装着)のポイント\n• アーチファクト（ノイズ）の種類と除去\n• SpO2プローブの装着ポイント\n• 使用前・後点検について\n\nベッドサイドモニタ（DS-8005F）基本画面について\n※当院でメインで使用している基本画面で説明していま\nす。病棟で使用する機種によって表示される場所やレイ\nアウトが異なります。\n心電図波形が\n表示される\n心拍数\n動脈血酸素飽和度\n血圧\n\n目次\n• 正しい電極装着位置\n• 正常な心電図波形\n• ペースメーカーがある場合の電極位置\n• 当院のモニタ基本画面について\n• アラームの設定基準値と変更方法について\n• ノイズの少ない心電図計測(電極装着)のポイント\n• アーチファクト（ノイズ）の種類と除去\n• SpO2プローブの装着ポイント\n• 使用前・後点検について\n\nアラームの設定基準値と変更方法について\n設定したアラームを一覧で確認する\n事もできます。\nアラーム変更方法\n　　　　　メニュー⇒アラームもしくは　パラメータをタッチし、閾値を設定。　　\nスクロールバー\nアラーム一\n覧\n不整脈\nHR\n100/50 \nSpO2\n90%以下\n　\nRR\n30/5\nアラーム設定基準値\nDS-8005Fの場合、下記を行\nうと設定基準値に戻ります。\n➀退床ボタンを押す。\n②電源を切る。\n\n目次\n• 正しい電極装着位置\n• 正常な心電図波形\n• ペースメーカーがある場合の電極位置\n• 当院のモニタ基本画面について\n• アラームの設定基準値と変更方法について\n• ノイズの少ない心電図計測(電極装着)のポイント\n• アーチファクト（ノイズ）の種類と除去\n• SpO2プローブの装着ポイント\n• 使用前・後点検について\n\nノイズの少ない心電図計測(電極装着)のポイント\n１. 電極装着前に皮膚の前処理\n２. 電極の乾き確\n認\n３. QRS振幅を１ｍV以\n上\n\n１．皮膚の前処理\n装着部位の清拭\n• 汚れ、皮脂分をアルコール綿で拭き取る\n皮膚前処理剤(ご参考)\n• 皮膚前処理剤で前処理を行なうと波形の安定度が\n向上\n（ただし、同一箇所での連続使用は避ける）\n水分の除去\n• 清拭、前処理後に残った汗、水分、皮\n膚前処理剤等は十分に拭き取る\n\nディスポ電極に関するワンポイントアドバイス\n１．傷口、炎症部位、しわの多い箇所、凸凹のある箇所は避\nける\n２．動きが少ないところを選ぶ\n３．仰向けに寝た状態で貼り付ける\n４．電極は全ての電極を同時交換す\nる。\n※理想は１日に１回の交\n換\nテープの上から数回なぞ\nる\n\n２．電極ゲル部の乾燥を確認\n電極は袋から取り出すと徐々に乾燥\n• 目または指で乾燥していないか確認後装着する\n乾い\nた電\n極\n使用不可\n＊電極にも使用期限があります\n電極の袋は必ず閉じて保\n管！！\n\n前処理なし•乾燥した電極は\n「V\nTACHY」のアラームを発\n生\n歩いている状態を想\n定上下運動をする\n前処理（あり・なし）・電極（新品・乾燥）の実\n験\n前処理なし•乾燥した電極\n前処理あり•新品電極\n\n３．QRS振幅を１ｍV以上\n（目安）\nR\nT\n×\nP\n×\nQRS\n理想は1mV以上\n（1cm以上/感度\n×1）\nT波\nQRSの1/3以下\nP波\n0.2mV未満\n（0.2cm未満/感度\n×1）\nQ\nS\n感度✕1 で 1cm以上\n\n目次\n• 正しい電極装着位置\n• 正常な心電図波形\n• ペースメーカーがある場合の電極位置\n• 当院のモニタ基本画面について\n• アラームの設定基準値と変更方法について\n• ノイズの少ない心電図計測(電極装着)のポイント\n• アーチファクト（ノイズ）の種類と除去\n• SpO2プローブの装着ポイント\n• 使用前・後点検について\n\nアーチファクト(ノイズ)の種類と除去\n基線の揺れ\n交流障害\n(基線の幅はほぼ一定)\n筋電図\n(基線の幅は不規則)\nアーチファクト：目的とする信号以外の\nもの\n\nノイズが多いと心電図の計測は？\nQRS波らし\nい波形の検\n出\nQRS波\n形・タイミ\nング\n心拍数計測\n不整脈検出他\nQRS波の正しい分類が出来な\nい\nノイズ\n正しく計測(測定)できない事が\nある\n\n交流障害\n電極の乾燥、粘着力が低下\n• 新しい電極(定期的に)に交換する\n電気毛布など一般の電気機器を使用\n• 可能なら使用を控える\nアースの未接続\n• 3Pの電源コードを壁のコンセントに接続\nする\n\n筋電図\n骨の上に電極貼り付け\n• R電極を鎖骨上に上方移動\n• R電極を胸骨寄りに移動\n• NASA誘導（V2に似た波\n形）\n誘導を変\n更\nNASA誘導\n胸骨上縁\n胸骨下縁\nQRSが小さくなっていないか確認\nする\n\n目次\n• 正しい電極装着位置\n• 正常な心電図波形\n• ペースメーカーがある場合の電極位置\n• 当院のモニタ基本画面について\n• アラームの設定基準値と変更方法について\n• ノイズの少ない心電図計測(電極装着)のポイント\n• アーチファクト（ノイズ）の種類と除去\n• SpO2プローブの装着ポイント\n• 使用前・後点検について\n\nSpO2の測定原理\nパルスオキシメータは非常に小さな光の信号を見てい\nます\n10cmの水の\n数mmのさざ\n波が脈動成分\n透過光強度\nモニタ上の脈波\nプローブ（センサ）の取り付け方法が重要\nです\n\nSpO2プローブの装着ポイント\n発光部と受光部は互いに対\n面\nSpO2パルスオキシメータは、光で微小な脈波を検出する\nためプローブの適切な装着が、正しい測定の基本です\nプローブは定期的に装着位置を変え\nる\n正しい装着は、患者の安全にもつながります\n安全性\nプローブ装着は緩すぎず、キツすぎ\nず\n正確性\n適切な厚みの装着部位を選択 6～\n18mm\nPoint 1\nPoint 2\nPoint 3\nPoint 4\n\nPoint\n1：適切な厚みの装着部位を選択\nプローブを正しく装着しないと、測定精度に影響します\nSpO2のプローブは通常「6～18mm」の厚みがある部位に\n装着して下さい\n足の指\n\nPoint\n2：発光部と受光部は互いに対面\n◎プローブの発光部は爪側に装着します\n◎プローブは発光部と受光部を互いに対面させます\n＜リユーザブルの場合＞\n爪マークとケーブルを爪側に\n爪マーク\n＜ディスポの場合＞\n光マークを爪側に\n光マーク\n指は奥ま\nでしっか\nり\n挿入！\n\nPoint\n3：プローブ装着は緩すぎず、キツすぎず\n緩すぎる装着では\n・体動による脱落がお\nこりやすい\n・体動によるノイズを\n引き起こす\nキツすぎる装着では\n・低温熱傷や圧迫壊死な\nどの皮膚障害が発生\n・脈動が小さくなり、\n安定した測定ができ\n装着テープは「巻きつける」のではなく\n「皮膚に沿わせるように貼り付ける」というイ\nメージで装着\n\n◎プローブ装着部位はLEDの発光により体温プラス約2℃温度が上昇します\n◎循環状態の悪い部位では血液による放熱が行われにくくなります\n◎テープによる圧迫した固定によって血流の循環が悪くなります\nPoint　4：プローブは定期的に装着部位を変\nえる\n定期的に装着部位を替える\n＜目安＞\nリユーザプルタイプ・・・4時\n間ごと\nディスポタイプ・・・・・8時間\nごと\n局所の温度が上昇し稀に\n低温熱傷や皮膚障害を起こします\n特に以下の方は要注意！\n・高熱を伴っている\n・末梢循環不全がある\n・意識がない\n・炎症や傷がある\n・高齢者\n・新生児\n・（超）低出生体重児\n\n目次\n• 正しい電極装着位置\n• 正常な心電図波形\n• ペースメーカーがある場合の電極位置\n• 当院のモニタ基本画面について\n• アラームの設定基準値と変更方法について\n• ノイズの少ない心電図計測(電極装着)のポイント\n• アーチファクト（ノイズ）の種類と除去\n• SpO2プローブの装着ポイント\n• 使用前・後点検について\n\n使用前・後点検について\n点検は各部署に配布してあるチェックリスト\nを活用してください。\n（ベッドサイドモニタチェックリスト表は次ペー\nジ参照）\n使用前には必ず点検を行って患者に使用して\nください。\n波形が出ない等のトラブルが起きた場合はME\n（PHS6781）までご連絡ください。\n\nレポートを提出して研修完了となり\nます。\nよろしくお願い致します。"}, {"title": "医療安全　お知らせ　鉗子操作", "filename": "医療安全　お知らせ　鉗子操作.docx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/医療安全　お知らせ　鉗子操作__docx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/医療安全　お知らせ　鉗子操作__docx.png", "fulltext": "血液回路をベッドに掛ける際、誤った箇所で鉗子を咬んでしまい、血液回路に亀裂が生じ\nて血液が漏れた事例が発生しました。\n鉗子の操作についての説明と注意喚起させていただきます。\n当センターで使用している鉗子は最大3 段階はさみ\n幅を調節できるようになっています。チューブを鉗\n子で咬む場合は、2 段階にするようにお願いします。\n鉗子でチューブを咬む際は、咬む場所の真ん中で咬\nむようにしてください。"}, {"title": "医療安全復習用", "filename": "医療安全復習用.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/医療安全復習用__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/医療安全復習用__pptx.png", "fulltext": "令和７年度\n医療機器安全研修\n☆もう一度確認しよう！安全透析のための再　\n　チェック\n☆コンソールQ＆A ～よくある疑問を解決～\n\nみたき透析室\n重要指名手配\nこの警報にピンときたら対応！\n特徴\n・体動などにより血圧が測定できなかった時、\n　自動測定タイマーが勝手にOFFになります\n・高頻度でインシデントを起こす原因に\n　なっている凶悪犯です\n警報を見つけた方\nは\n血圧を再測定後、\n自動測定タイマー\nを\nいれてください\n留意事項\n　忙しい時の警報はすぐその場を離れたくなりますが\n　警報を止めた場合必ず、自分で最後まで対応するか\n　他スタッフに依頼してから離れてください\n　タイマーOFFにより血圧測定されず\n　血圧低下に気づかなかった場合、最悪の事態を招き\nます\n皆さんの協力が必要で\nす！！！！\n【血圧計警報】E09-\n51\n\nインシデント多発中\n体動で血圧が測れないことが時々ありますが、\nもし、心停止・ショックバイタル・不整脈な\nどで、\n血圧が測れていなかった場合、\n再測定を忘れてその場を離れても良いと思います\nか？\n注意\n血圧計警報（E09-51）\nカフホース点検\n測定時間オーバー\n脈検出不能\n必ず立ち止まって\n手順\n血圧の再測定忘れ‼\n血圧が再測定できるまで\nその場を離れないようにしてください\n警報確認\n患者状態確認\n►\n►\n警報解除\n警報に対する対\n►\n応\n再測定（体動・不整脈）\n上記以外もあ\nり\n\n回路折れ曲がりで返血不良が発生しました！\nO\nK\n折れ曲が\nり\nN\nG\nオンラインHDFの\nプライミング時注意してください\n不明な点はME伊藤まで\n左回りでプライミングポートに\n接続してください！！！\n右回りだと\n折れ曲がりが発生します\n\n回路から透析液が漏れ\n過除水が発生しました！\nしっかり押しねじこむ！\nしっかり締める！！\nインシデント　\nオンラインHDFの患者\n補液回路の接続部から透析液が少しずつ漏れていた\nロックは締まっていたが押し込みが弱かったためと考えられる\n漏れた分が過除水となった\n回路からの漏れは\n過除水や失血の\n大きなリスクです\n\n\n\n \n血液回路をベッドに掛ける際、誤った箇所で鉗子を咬んでしまい、血液回路に亀裂が生じ\nて血液が漏れた事例が発生しました。 \n鉗子の操作についての説明と注意喚起させていただきます。 \n \n \n \n当センターで使用している鉗子は最大3 段階はさみ\n幅を調節できるようになっています。チューブを鉗\n子で咬む場合は、2 段階にするようにお願いしま\nす。 \n \n \n \n \n \n \n \n鉗子でチューブを咬む際は、咬む場所の真ん中で咬\nむようにしてください。"}, {"title": "医療機器安全管理 令和2年", "filename": "医療機器安全管理 令和2年.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/医療機器安全管理 令和2年__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/医療機器安全管理 令和2年__pptx.png", "fulltext": "医療機器安全管理委員会\n～医療機器安全管理ってそもそも何のこと？なにをすればいいの？～\n1\n透析センター　臨床工学技士（ME）　奥村 直\n政\n\n何のために医療機器安全管理 をするのか？\n・保健所から医療法第25条に基づく\n  立入検査がされるから。\n・病院機能評価をとっているから。\n医療機器の安全・医療従事者の安心に繋がるような\n医療機器安全管理を\n2\n\n医療機器安全管理って何！？\n 医療機器を常に安全に使用できるよう、\n 日頃から点検を行い管理することです。\n3\n\n医療法では・・（医療法第6条の\n12）\n病院等の管理者の責務\n 病院、診療所または助産所の管理者は\n ※医療の安全を確保するための指針を策定\n ※従事者に対する研修の実施\n ※その他の当該病院、診療所または助産所における医\n療の安全を確保するための措置\n を講じなければならない\n4\n\n医療法施行規則　第1章の3　医療の安全確保　第1条の11\n病院等の管理者が確保すべき安全管理の体制\n 病院の管理者は、次に掲げる措置を講じなければならない。\n ①院内感染対策のための体制の確保に係る措置\n ②医薬品に係る安全管理のための体制の確保に係る措置\n ③医療機器に係る安全管理のための体制の確保に係る措置\n ④高難度新規医療技術を用いた医療の提供に必要となる措置\n5\n\n  ①責任者の配置→医療機器安全管理責任者\n ②研修の実施\n ③保守点検計画表の策定と実施\n ④情報の収集、改善のための方策実施\n医療機器安全管理において重要な4本柱\n6\n\n医療事故の発生を未然に防ぎ、\n患者さんが安心・安全な医療を受けられ\nる、\n環境を整えるために行います！！！\n7\n\n ①責任者の配置\n医療機器安全管理責任者がしなければならないこと\n・医療機器安全管理指針作成\n・医療機器安全管理委員会の設置\n①医療機器の保守点検の計画策定と保守点検の適切な実施\n②医療機器の安全使用のための情報収集と改善策の実施\n③医療機器の安全使用についての研修を従業者に実施\n8\n\n ①責任者の配置\n医療機器安全管理責任者の元、\n当院は分散管理のため、\n各部署に担当者を配置しています。\n医療機器安全管理を怠り\n医療事故が起こった際は、\n担当者が責任を負うこともあります。\n9\n\n②研修の実施\n・MEによる医療機器の研修会\n・新規購入機器のメーカーによる研修会\n・新人看護師に向けて行っている研修会\nなど、特に安全使用に際して技術の習得が必要と\n考えられる医療機器の研修を行っています。\n10\n\n③保守点検計画表の策定と実施\n（1）医療機器管理台帳を作成する\n（2）定期点検計画表を作成する\n（3）点検表を作成する\n（4）点検を実施する\n11\n\n医療機器の管理方法\n各部署で行う「分散管理」と、\nMEがME室にて一括して管理を\n行う「中央管理」があります。\n12\n\n【分散管理】\n〇 ・機器が分散化されているため管理台数が少なく把握が容\n易\n　　・医療機器を占有して使用可能\n× ・部門ごとの責任者管理の為知識が乏しい場合がある\n　　・部署ごとに保守点検の計画などが必要\n【中央管理】\n〇 ・医療機器の情報が一部門に集約され把握が容易\n　   ・専門知識を有したものによる管理が可能\n× ・管理台数が増加すると、選任管理者の人数確保が必要\n　　・管理システム費用の増大\n13\n\n当院は分散管理です。\n除細動器、呼吸器、麻酔器など一部\n他部署使用の機器で\nMEが点検や管理のみを行っているものもありますが、\n基本的には部署ごとに管理をお願いしています。\n14\n\n③保守点検計画表の策定と実施\n（1）医療機器管理台帳を作成する\n（2）定期点検計画表を作成する\n（3）点検表を作成する\n（4）点検を実施する\n15\n\n医療機器管理台帳ってなに？\n医療機器のカルテみたいなものです。\n部署ごとに、使用している医療機器について\n必要な項目を記載してもらい、管理してもらいます。\n　台帳の項目\n・医療機器名 　　　　　　　　　　 ・購入年月日　　\n・型式（型番・型名）　　　　　　　・耐用期間\n・製造番号 　　　　　　　　　+　　・保守点検記録\n・製造販売業者 　　　　　　　　　・修理記録\n・クラス分類　　　　　　　　　　　　・廃棄日\n16\n\n何のために台帳を作るのか？\n医療機器1台1台の購入から廃棄までの\n情報を管理するため。\n(点検の履歴・修理の履歴の 把握等)\n17\n\n現状\n医療機器管理台帳に記載する項目がバラバラであったり、\nそもそも医療機器について台帳に記載することすら知らな\nかったり、\n　　　　　　　　↓\nこの現状を変えるべき！\nより安心安全な医療を提供しなくては！と考えました。\n18\n\nまずは医療機器台帳の形式を院内統一し\nます\nコメディックスに６月３０日までに入れますので切替をお願いします。\n2020年度の各部署の医療機器台帳を８月30までに透析センターMEに提出\nをお願いします。\n19\n\n重要なお願い①\n部署ごとに医療機器を買った場合の新規納入登録書、\n医療機器を廃棄した場合の廃棄処分届は\n必ず用度課に提出してください。\n用度課が把握してはじめて院内の医療機器として\n認められます。\n20\n\n21\n①廃棄処理する機器の情報を\n廃棄処分届に記載する\n②廃棄対象の機器は所定の手\n順で処理を行う→廃棄物処理\n法に基づく処理\n③廃棄処分届を管理部門（用\n度課）へ提出する\n注意点\n①廃棄対象機器の保守点検履\n歴は所定の期間保存する\n\n重要なお願い②\n 医療機器を廃棄した際、最低1年間は\n 台帳から消さずに残しておいてください。\n いつ廃棄した、ということを台帳の備考欄に記載し、\n 1年経過後、台帳から削除していただいて大丈夫です。\n22\n\n重要なお願い③\nメーカーによる医療機器に関する\n点検や修理をした際にもらえる\n作業報告書を透析センターMEまで提出をお願いします。\n23\n\n必ず保守管理が必要な（台帳に記載必須の）機器\n①人工心肺装置及び補助循環装置　　　　　 →　当院採用なし\n②人工呼吸器\n③血液浄化装置 　　　　　　　　　　　　　　　　　→　ME管理\n④除細動装置(AEDを除く) \n⑤閉鎖式保育器 　　　　　　　　　　　　　　　　　→　産婦人科病棟管理\n⑥診療用高エネルギー放射線発生装置)\n⑦診療用粒子線照射装置 \n⑧診療用放射線照射装置(ガンマナイフ等)　→　放射線科管理\n⑨CTエックス線装置（医療X線CT装置） \n⑩ 磁気共鳴画像診断装置（MRI装置）\n24\n\n注意点\n 医療機器で同じ種類のものが複数台ある場合は\n 一台ずつ管理番号を割り振り、テプラ等で機器に貼ってくだ\nさい。\n 同じ種類の機器だから台帳に載せるのはひとつでいい、\n ということはありません。\n 一台ごとに点検時期が違ったり、\n 故障や修理するタイミングが違うために1台ごとに\n 医療機器台帳を作成する必要があります。\n25\n\nどの医療機器の管理をしたらいい\nの？\n 本当は全ての医療機器を管理してほしいです。\n しかしそこまではなかなか難しいと思います。\n そのため、\n ・人体に対するリスクが高い医療機器\n ・使用頻度が高い医療機器\n を、優先して台帳に載せて管理してください。\n26\n\nここで豆知識\n 医療機器にはクラス分類（管理区分）というのが\n あることを知っていますか？？\n これは不具合が起きた時の人体への影響の分類のことです。\n （医薬品医療機器等法（旧薬事法）に即して分類されたもの）\n また、クラス別分類とは別に、特定保守管理医療機器、という区分もあり\nます。\n これは、保守点検や修理、その他の管理に専門的な知識及び技術を\n 必要とする医療機器、のことです。\n27\n\n28\n\n医療機器の後ろに貼ってあります\nどの医療機器から管理をすればいいの？と考える際に\nクラス別分類を確認して、レベルが高いものから優先管理、\nもしくは特別保守管理医療機器かどうかを確認し優先管理、というのが良いと思います。\n29\n\n③保守点検計画表の策定と実施\n（1）医療機器管理台帳を作成する\n（2）定期点検計画表を作成する\n（3）点検表を作成する\n（4）点検を実施する\n30\n\n（2）定期点検計画表を作成する\n①定期点検を行う機器を決める\n②定期点検の年間スケジュールを立てる\n31\n\n透析室での定期点検計画表です\n定期点検の間隔は、添付文書や取扱説明書を参考に！\nメーカーとメンテナンス契約を結んでいる機器もスケジュールに入れてください。\n32\n\n③保守点検計画表の策定と実施\n（1）医療機器管理台帳を作成する\n（2）定期点検計画表を作成する\n（3）点検表を作成する\n（4）点検を実施する\n33\n\n定期点検計画表の作成\n 点検の種類\n日常点検　□使用前点検\n　　　　　　　□使用後点検\n定期点検　□使用者点検\n　　　　　　　□メーカー点検\n保守点検　□常務委託基準に適合する\n　　　　　　　　修理業許可業者への委託が可能\n34\n各部署が行う定期点検\nメーカー等メンテナン\nス契約を結んでいる\n\n（3）点検表を作成する  日常点検\n一例として、昨年度、輸液ポンプとシリンジポンプの点検表を\n院内統一し、毎月提出していただいています。\nその他、部署別に使用する医療機器は部署ごとに\n点検を行っていただいています。\n新規に導入した医療機器の点検表を作成する際、項目や方法は、\n添付文書や取扱説明書を参考にしてください。\nもしくはメーカーに相談してください。\n35\n\n③保守点検計画表の策定と実施\n（1）医療機器管理台帳を作成する\n（2）定期点検計画表を作成する\n（3）点検表を作成する\n（4）点検を実施する\n36\n\n（4）点検を実施する　日常点検\n毎日もしくは毎月、日常点検表の項目に沿って機器を\n点検してください。\n「誰も見ていないから適当に点検してもいいだろう、\n　毎日使っているから今日も大丈夫だろう。」\n　　　　　　　　　　　　　↓\nその考えのスタッフが点検を怠り、医療事故を起こし\nます。\n37\n\n38\n透析センターでの日常点検表\n毎日数値を確認し機器に異常がないかを\n確認してます。\n\n定期点検を実施する\n 　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　定期点検\nの項目や方法は、添付文書　　　　　　　　　　　\n 　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　文書や取\n扱説明書を参考に作成\n 　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　メーカー\nが点検した機器の点検結果\n 　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　も医療機\n器台帳にファイルする\n39\n\n40\n\n再度、部署ごとに\n医療機器の日常点検がしっかりされている\nか\n見直しをよろしくお願いします。\n41\n\n④情報の収集、改善のための方策実\n施\n（１）添付文書と取扱説明書は必ずファイル等にいれ保存してくださ\nい。\n（２）医療機器を使用して起こしたインシデントはみんなで情報共有\nして\n　　 同じインシデントを起こさないようにしましょう。\n　　→インシデントの院内報告研修をしっかり聞いてください。\n（３）PMDA等のサイトにおいて最新の医療機器安全情報（医療機器の\n　　 不具合情報等）が載っていますので確認してください。\n（４）医療機器の使用や点検に関するマニュアルを作成し、\nミスが起こらないようにしてください\n42\n\n取り扱い説明書と添付文書について\n ・添付文書の管理\n 　紙媒体でも問題ないが院内のネットシステムを利用する施設も増加傾向。\n 　1台の医療機器に必ず添付文書や取扱説明書が付属されているため、各部署で保管を\n 　お願いします。\n 取り扱い説明書と添付文書がない場合には\n・PMDAのサイトからダウンロード\n・メーカーに問い合わせて届けてもらう\n43\n\nまとめ\n医療機器の管理について、各部署ごとに\n部署長と医療機器安全管理委員の方を中心に、見直しをお願いします！！\n以下をひとつの箇所にまとめて管理してください。\n・医療機器台帳\n・定期点検表\n・修理・点検・作業報告書\n・日常点検表\n・添付文書、取り扱い説明書\n44"}, {"title": "医療機器安全管理研修：新人看護師向け", "filename": "医療機器安全管理研修：新人看護師向け.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/医療機器安全管理研修：新人看護師向け__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/医療機器安全管理研修：新人看護師向け__pptx.png", "fulltext": "その操作、大丈夫？\n医療機器安全管理\nオリエンテーション\n\n自己紹介\n臨床工学技士 上野 です\n 病院内のエンジニア\n 医療機器の専門家\nME(Medical Engineer)と\n呼ばれています\n\n幅広い機器管理\n輸液・シリンジポンプ\n透析機器・保育器・麻酔器\n除細動器など\n様々な機器を点検しています\nトラブル対応\n「動かない！」\n 「鳴り止まない！」\n 現場へ駆けつけます\nMEって何してる人？\n\nなぜ医療機器管理を行うのか？\n患者さんが安心できる\n 環境を整えるため！！\n事故を未然に防ぐ\n安全な医療の提供\n患者さんの安心感\n\n医療機器管理台帳ってなに？\nなにが書いてあるの？\n患者さんにカルテがあるように、\n 病院の医療機器にも1台ずつ記録があります\n購入から廃棄までのすべてを管理します\n機器名・型式\n製造番号\n製造販売業者\nクラス分類\n購入年月日\n設置場所\n点検・修理記録\n管理番号\nなんで台帳を作るの？\n医療機器の点検・修理の履歴を1台ごとに把握して、\n いつでも安全に治療を提供できるようにするためです\n医療機器のカルテです\nこれらの項目を管理して\n「今その機器がどんな状態か」を\n見える化します\n\n安全点検コンプリートガイド\n３つの日常点検と定期点検\n使用前点検 [看護師・MEの役割]\n「準備はいいかな？」\n部品・バッテリー・外観をチェック\n使用中点検 [看護師の役割]\n「順調に動いてる？」\n数値・アラーム・接続をモニタリング\n使用後点検 [看護師・MEの役割]\n「お疲れ様でした！」\n清掃・補充・フル充電して片付け\n定期点検 [ME・メーカーの役割]\n「中身までしっかり！」\n精密検査や部品交換 プロにお任せ！\n\n点検を実施する：日常点検\nそんな人が医療事故をおこします\n毎日もしくは毎月\n 点検表に沿って確認\n「誰も見ていないから適当でいいや…」\n「毎日使っているから今日も大丈夫だろう」\n\nTHE QUESTION\n“医療機器は正しいことをする”と思いますか？\nTHE TRUTH\n機器はめちゃくちゃ正直です\n入力した通りにしか動きません\nTHE RISK\nスタッフが入力を間違えたら\nそのまま患者さんに影響が出ます\n「機械の正直さ」と向き合う\n\n医療機器クエスト　 〜管理の達人への道〜\nⅠ.機器の入職と卒業\n新しく機器を購入した時や、壊\nれて廃棄する時の手続きです\nⅡ. 健康診断の報告\nメーカーによる修理・点検が終\nわった後の報告書は提出です\nⅢ. ３年間の記録保管\n点検記録はすぐ捨ててはいけません\n安全を守るタイムカプセルです\n🛠️\n３年間\nKEEP FOR SAFETY\n🐣\n\u0001🛠\n⏳\n◎新規納入登録書\n◎廃棄処分届\n◎すべての点検報告書\n◎修理完了報告書\n提出先：用度課\n定期・日常点検表を保管\n提出先：ME\n\nSection 1\n輸液ポンプ・\n シリンジポンプ\n\n輸液ポンプ：１桁の設定ミス\n１桁の入力ミスで投与量は10倍に！\n正しい指示\n10\nmL/h\n誤入力\n100\nmL/h\n10mL/h の指示を 100mL/h と入力してしまう\n機械は疑いもせず入力された通りに正直に動きます\n\nシリンジポンプ：サイフォニング現象の恐怖\n機器が止まっていても\n薬は流れる\n押し子が外れていると\n重力で薬液が落下\n全量投与の致命的事故に\n押し子がはまっているか確認！\nクランプの開閉タイミングを厳守！\n押し子が外れている\n重力で薬液が落下\n\n現場で起きること\n慌てて開けると大惨事！\n「クランプ開け忘れ」の落とし穴 😱\nアラームに焦ってパッと開けるのが\n一番NG\n回路内の薬液が一気に患者さんへ！\nポンプ開始！…でも三方活栓(クラ\nンプ)が閉まったまま！\n数分後、装置が「パンパンの内\n圧」を検知\n「閉塞アラーム」が発生します\nボーラス注入(過剰投与)\n\nまずは落ち着いて「遮断」する \n　三方活栓を患者側「OFF」にする、もしくはクランプをして患者側に薬液が\n　流れないようにします\n溜まった「圧」を逃がす \n　三方活栓からシリンジでルート内に溜まった薬液を吸引・破棄します\n　もしくはポンプを開放してルート上方に圧を逃がします\nゆっくり「再開」する \n　内圧が抜けたことを確認してから、クランプを開けて再開します\n事故を防ぐ！閉塞アラーム後の正しい「3ステップ」\n\n薬剤名：指示書とボトルを確認（ヨシ！）\n流量設定：数値と単位を確認（ヨシ！）\nルート確認：屈曲なし、クランプ開放（ヨシ！）\n開始：点滴筒の滴下を確認（ヨシ！）\nポンプ開始！指差し呼称！4つの「ヨシ！」\n\nSection 2\n心電図モニター\n\n心電図モニターアラームの真実\nアラーム ＝ 患者のSOS\n消音放置は「監視放棄」と同じです\n\nモニターも大事ですが、まず...\n波形が正常でも、顔色が悪ければ緊急事態！\n患者を見る！！\n\nノイズのない心電図計測のために\n装着のポイント\nアーチファクトの種類\n1. 皮膚の前処理（皮脂・角質の除去）\n2. 電極の乾き確認\n3. QRS振幅を1mV以上に設定\n基線の揺れ：呼吸や体動が原因\n交流障害：電気器具の干渉\n筋電図：緊張や震え\n\nSection 3\n医療ガス・酸素ボンベ\n\n搬送中の事故\n酸素切れの恐怖\nエレベーターの中、\n廊下の真ん中...\n誰にも助けを呼べない場所で\n酸素ボンベが空になったら？\n\n酸素ボンベ\n\n出発前に必ずチェック！\n残量と流量\n\nボンベの魔法の数字：3.4\n例：10MPa 残っているなら 約340L。2L/min で使うなら、あと約170分（3時間弱）\n残量早見表がボンベについているので活用してください\n圧力(MPa) × 3.4\n＝ 残りのリットル数\nあと何分持つか？の計算術\n\n実は「あるある」なケアレスミスが原因か\nも！\nコンセント\n奥まで刺さってい\nますか？ AC接続ラ\nンプは点いていま\nすか？\n主電源\n本体裏などの主電\n源スイッチが\n「OFF」になってい\nませんか？\nバッテリー\n十分充電されてい\nますか？ コンセン\nトを抜いてすぐ切\nれませんか？\n「故障かな？」と思ったらまず確認！\n\n患者さんを守るのは、\nあなたです\n機械を信じすぎない\n 自分の違和感を信じてください\n正しい知識をつけてから機器を触りましょう\n困ったときはいつでもMEまで\n 内線：6781"}, {"title": "医療機器研修2024伊藤", "filename": "医療機器研修2024伊藤.ppt", "category": "医療安全・インシデント", "pdf": null, "thumbnail": null, "fulltext": ""}, {"title": "指差呼称、ダブルチェック注意喚起", "filename": "指差呼称、ダブルチェック注意喚起.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/指差呼称、ダブルチェック注意喚起__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/指差呼称、ダブルチェック注意喚起__pptx.png", "fulltext": "「指差し呼称で守る！！いのちと信頼」\n☆指差し呼称は自分の確認のためだけではない\n　　もちろん思い込みや見間違いを防ぐという目的が第一です\n☆患者さんにも安心を届ける行為\n　　「しっかり確認してくれている」という安心につながります\n　　安全な治療を形で示すことができます\n☆仲間にも安全文化を広げる行動\n　　声に出すことで「自分もしっかりやらなきゃ」という意識が広がります\n逆接続で治療を開始し、シャントチェックの一回目を行った\nスタッフも見落とすインシデントが発生しました\n\n今回のインシデントの患者さんご本人からお声をいただきました。\n「声出しをしっかりしているスタッフもいるけど、していないスタッフもいるよ」\nみんなで改めて指差呼称、ダブルチェックの大切さを考え、安心安全な\n治療を提供していきましょう！！\n☆相手を信じすぎない\n　　「間違っているかもしれない」と思って確認しましょう\n☆独立して確認する　　\n　　相手と一緒に見るのではなく自分の目で確かめましょう\n☆責任を相手任せにしない\n　　ダブルチェックの人も責任者です\n「相手のミスを探す目が患者さんを守る！！」"}, {"title": "接続チェック", "filename": "接続チェック.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/接続チェック__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/接続チェック__pptx.png", "fulltext": "接続意識付け（接続チェック）\n接続の押し込みがゆるいor締めが弱いと\n治療中に留置針と回路が抜けてしまい\n大出血となる（過去抜けた事例あり）\n接続がゆるみなく行えるよう\n毎朝意識付けのためのチェックを必ず行う\n手順\n➀２種類接続を行ったらその場で\n　他スタッフに声かけし、ゆるみ\n　がないか確認してもらう\n➁自分の名前にチェックを入れる\n実際の患者接続部\nシャントとは\n穿刺後、留置針に回路を\n接続し透析治療を行う\nかご（メインステーション）\n（鉗子は接続が\n　硬く外れない\n　場合に使用）\n２種類（左から）\n・穿刺針+三方活栓+回路\n・穿刺針+回路\n（三方活栓はシングルニードルモード時使用）"}, {"title": "警報注意喚起", "filename": "警報注意喚起.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/警報注意喚起__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/警報注意喚起__pptx.png", "fulltext": "インシデント多発中\n体動で血圧が測れないことが時々ありますが、\nもし、心停止・ショックバイタル・不整脈な\nどで、\n血圧が測れていなかった場合、\n再測定を忘れてその場を離れても良いと思います\nか？\n注意\n血圧計警報（E09-51）\nカフホース点検\n測定時間オーバー\n脈検出不能\n必ず立ち止まって\n手順\n血圧の再測定忘れ‼\n血圧が再測定できるまで\nその場を離れないようにしてください\n警報確認\n患者状態確認\n►\n►\n警報解除\n警報に対する対\n►\n応\n再測定（体動・不整脈）\n上記以外もあ\nり"}, {"title": "スマホとPCで解決！看護業務のミカタAI超入門", "filename": "スマホとPCで解決！看護業務のミカタAI超入門.pptx", "category": "その他", "pdf": "pdf/その他/スマホとPCで解決！看護業務のミカタAI超入門__pptx.pdf", "thumbnail": "thumbnails/その他/スマホとPCで解決！看護業務のミカタAI超入門__pptx.png", "fulltext": "スマホとPCで解決！\n業務のミカタAI超入門\n\nAIは「24時間文句なしで手伝ってくれる優秀な助手」です！\n 代表的なアプリを目的で使い分けましょう。\n ChatGPT\n日常のちょっとした相談や、\n アイデア出しの壁打ち相手に！\n Gemini\n資料作成、マニュアル、文字起こしなど\n業務に絡めるなら断然オススメ！\n生成AIって何？どっちを使えばいい？\n\nカルテと同じ！患者情報は絶対に入力しない\n以下の情報は、絶対にAIに入力しないでください。\n※質問するときは「個人情報のみ消す」や「架空の名前」に置き換えて！\n患者さんの名前、IDなどの個人を特定できるもの\n詳細な病歴や、個人のプライバシーに関わる情報\n患者さんが少しでも写り込んでいる写真\n使用前の鉄則①：個人情報は絶対NG！\n\n医療情報の調べ物には要注意！\nAIは、わからないことでも「もっともらしいウソ」をつきます。\n これを専門用語で「ハルシネーション」と呼びます。\n出てきた情報は鵜呑みにせず、必ず元の文献で「調べ直す」！\n古いガイドラインを最新の事実として出してしまう\n存在しない架空の論文や文献をでっち上げる\n使用前の鉄則②：AIはウソをつく！\n\nAI特有の言い回しに注意\nAIが作った文章は、不自然に丁寧で「優等生すぎる構成」になりがち。\nAIを使っている人（後輩や同僚など）には一発でバレます！\nAIはあくまで「叩き台（下書き）」。\n 最後に必ず「自分の言葉で手直し」を加えましょう！\n【使い所には十分注意してね】\n提出物や院外向け文書にそのままコピペして出すのは避けましょう。\n使用前の鉄則③：丸写しはバレる！\n\n手軽な「入力」はスマホが最強！\n カメラで丸投げ：\n📸\n 手書きメモを撮って「文字起こしして」、備品棚\nを撮って「これなんとかならない？」と改善相\n談。\n 音声で丸投げ：\n\u0001🎙️\n キーボード不要。口頭で吹き込んだ悩みや、録音\nした音声を「箇条書きで要約して」とお願いする\nだけ。\n \n📝相談相手：\n 「今仕事でこんな状況なんだけどどうすればい\nい？」これだけでも案をたくさん出してくれます。\n スマホ活用法（スキマ時間に）\n📱\n\nスマホの下書きをPCで清書！\nGemini でGoogleアカウントを連携しておけば、ス\nマホでパパッと作った下書きをパソコンで綺麗に\n仕上げられます。\n※院内掲示用のちょっとしたイラスト作成も得意です！\n勉強会用パワポの「構成案」作成\nマニュアルの文章作り\nExcelの表・Googleフォーム自動作成\n パソコン活用法（仕上げや仕組み作り）\n💻\n\nプログラミング知識ゼロでOK\n「こんな計算を自動化したい」とAIに日本語でお\n願いするだけで、実際に動くプログラムを作って\nくれます。\n現場のアイデア例\n透析や毎回計算が面倒な「除水・引き残し計算」や「トイレ\n離脱時計算」を一発で自動処理する「自分たち専用の計算ア\nプリ」も実現可能です！\n 実は「アプリ開発」もできる！\n🚀\n\n「0から1を生み出す一番しんどい作業」をAIに任せるのが最大のコツ！\n【0】提案・指示\n （人間）\n「こんなアプリ作りたい」「勉強会資\n料のベースを作って」と、最初のアイ\nデアやテーマを投げます。\n【1〜8】しんどい作業\n （AI）\n文章の組み立て、計算式の作成、デー\nタ整理など、時間がかかる面倒な実作\n業を一気に終わらせます。\n【9〜10】仕上げ\n （人間）\nウソ（ハルシネーション等）がないか\n専門知識で確認し、AIっぽさを削って\n自分の言葉で完成させます！\nまとめ：AIとの「役割分担」\n\n「自分でさわってみたい！」はもちろん、\n 「こんな面倒な作業もAIで楽になるかな？」と\n　思ったら、ぜひお気軽にお声がけください！ \n　一緒に考えましょう！！\nAIを使う最大の目的\n面倒な作業はAIに任せて楽をして、空いた時間は「患者さ\nんのケア」「自分自身のスキルアップ」などにあててくだ\nさい！\nお気軽にME伊藤までお声がけください！"}, {"title": "心電図1", "filename": "心電図1.pptx", "category": "その他", "pdf": "pdf/その他/心電図1__pptx.pdf", "thumbnail": "thumbnails/その他/心電図1__pptx.png", "fulltext": "心電図\n正常な心電図の判読を目標に\n\n正常な心電図はどれでしょう\n①\n②\n③\n④\n\n心臓の生理\n• 興奮性\n心筋は外部から電気的または機械的な刺激を受けると興奮します\n• 自動性\n心臓の刺激伝導系には、自分でリズムを作れるところが3か所あります。\n①洞（房）結節　S\n　洞調律　　：　　60（50）　～　100　回/分\n②房室接合部　J\n　房室接合部調律　：　40　～　60　回/分\n③心室（脚・プルキンエ線維）　V\n心室調律　　：　　～　40回/分　\n\n波形の成り立ち\n①P波：心房筋に興奮が伝わる時に表れる波です。\n②QRS波：心室筋に興奮が伝わる時に表れる波です。\n③T波：心室筋の興奮が回復していく時に表れる波です。\n④ST部分：QRS波の終わりからT波の始まりまでの時間で、心筋\n虚血の判定はこの部分の基線から偏位の度合いを指標にします。\n⑤PQ間隔：P波の始まりからQRS波の始まりまでの時間で、心房\nから心室へ興奮が伝わる時間を表す。\n\n波形の正常値及び計測法\n講義では便利上\n0.2秒のマスを1コ\nマといいます\n\n波形の計測法\n　300  150  100  75　60　50   43\n　\n\n正常洞調律（NSRとは）\n• NSR（Normal　Sinus　Rhythm）の定義\n①P波、QRS波、T波の順でワンセットで認められる。\n②心拍数（HR）　60（50）回/分　≦　HR　≦　100回/分\n　RR間隔　整　　15mm（0.6秒）　≦　RR　≦　25（30）mm\n（1.0秒）\n③QRS幅　≦　2.5mm（0.1秒）\n④PQ（PR）間隔　≦　5mm（0.2秒）\n⑤その他異常な波形はみとめられないか\n\n判読手順\nリズムも一定\n半コマ\n1コマ\nNSRの基本\n洞房結節から出した刺激が心房に伝わり興\n奮します。同時に、刺激伝導系を伝って心\n室に刺激が伝えられ心室が興奮します。こ\nの状態を記録した心電図が洞調律と呼ばれ\nる心電図です。\n洞調律を正しく把握するには、洞房結節が\n出した刺激によって心房が興奮したP波を\nきちんと鑑別しなければ、なりません。\n\n回答\nP波の次の波形\nはなし\n半コマ\n1コマ以\n内\nA.P、QRS、T波がワンセットでないため正常な心電図ではな\nい\nP、QRS、T波\nはワンセット\n半コマ\n1コマ以\n内\nHRは60　\n異常な波形\nA.その他異常な波形があるため、正常な心電図ではない\n①\n②\n\n回答\nHR100以上　リズムは一\n定\nP、QRS、T波\nはワンセット\n1コマ以内\n半コマ以内\n異常な波形はなし\nA.Hrが100を超えているため正常ではな\nい　　　　　　　　　\n　洞頻脈（sinus tachycardia）\nHR50台　リズムは一定\n半コマ以内\n1コマ\nP、QRS、T波\nはワンセット\n異常な波形はなし\nA.NSRの基準を全て満たしており、正解は④\n③\n④\n\n不整脈の判読　レベルアップへ！！\n• 不整脈とは「NSR」ではないものです。つまりは、不整脈の判\n読とはNSRがどうかのチェック作業であること。\n\n正常な心電図はどれでしょうか？\nA\nB\nC\nD\n\nA・Bの心電図\nB\nA\n\nC・Dの心電図\nC\nD\n\nA・Bの心電図\nB\nA\nHR75前後　リズムも一\n定\n半コマ\n以内\nP、QRS、T波\nがワンセッ\nト\nPQ波は1コマ以内\nA.NSRの心電図\nHR50以下のため徐脈　リズムは一\n定\nA.洞徐脈（sinus bradycardia）の心電図\nP、QRS、T波\nがワンセッ\nト\n半コマ以内\n異常な波形もなし\n異常な波形もなし\n\nC・Dの心電図\nC\nD\nHR60　リズムは一\n定\nP、QRS、T波\nはワンセット\nPQは1コ\nマ以上\nA.PQ延長あり　一度房室ブロック\nHR50～60台で間隔がバラバラ　\nP、QRS、T波はワンセッ\nト\nPQは1コマ以内\n異常な波形もなし\n異常な波形もなし\nA.洞不整脈"}, {"title": "心電図1案内", "filename": "心電図1案内.pptm", "category": "その他", "pdf": "pdf/その他/心電図1案内__pptm.pdf", "thumbnail": "thumbnails/その他/心電図1案内__pptm.png", "fulltext": "心電図モニター\n内容：心電図モニターについて➀\n　　　～正常な心電図の判読を目標に～\n　　　（続編を今後作成予定です）\nスライド作成・声：ME奥村\nモニターをつける患者様が増えています\n波形印刷してDr報告で終わるのではなく\nこれはこういう波形かなー？って\n近くのスタッフと喋れるようになれば\nモニターを読むことに\n少し興味がわいてくるかなーと思います\n動画を作成しましたので\nぜひご覧ください！！！"}, {"title": "病棟シャント講義動画", "filename": "病棟シャント講義動画.pptx", "category": "その他", "pdf": "pdf/その他/病棟シャント講義動画__pptx.pdf", "thumbnail": "thumbnails/その他/病棟シャント講義動画__pptx.png", "fulltext": "透析室　教育チーム"}, {"title": "血糖勉強会動画", "filename": "血糖勉強会動画.pptx", "category": "その他", "pdf": "pdf/その他/血糖勉強会動画__pptx.pdf", "thumbnail": "thumbnails/その他/血糖勉強会動画__pptx.png", "fulltext": "教育チーム　 勉強会\n教育チームよりご案内です。\n \n業務が多忙を極めているため、時間が拘束される対面式での勉強会ではなく、\n動画配信にしました。視聴して頂けると幸甚です。\n不慣れなため、お聞き苦しい点もあるかと思いますが御了承ください。\n尚、個人情報が含まれるため拡散は禁止の旨、お約束ください。\n透析室で使用する\n糖尿病治療注射薬・血糖測定について\n 　　　　　　　　　　担当：中野\nQRコードを読み取りご視聴ください"}]}</script>

<script>
(function () {
  // ===== パスワード保護ゲート =====
  // 簡易的な保護（URLを知らない人の誤アクセス防止が目的で、強固な認証は想定していない）
  var AUTH_STORAGE_KEY = "eduCatalogAuthOk";
  var AUTH_PASSWORD = "26002600";

  var authGate = document.getElementById("authGate");
  var siteContent = document.getElementById("siteContent");
  var authForm = document.getElementById("authForm");
  var authPassword = document.getElementById("authPassword");
  var authError = document.getElementById("authError");

  function isAuthed() {
    try {
      return localStorage.getItem(AUTH_STORAGE_KEY) === "1";
    } catch (e) {
      return false;
    }
  }

  function unlock() {
    try {
      localStorage.setItem(AUTH_STORAGE_KEY, "1");
    } catch (e) {
      // localStorage が使えない環境（プライベートモード等）でも、
      // 今回のセッション中は表示だけは継続させる
    }
    authGate.style.display = "none";
    siteContent.style.display = "";
  }

  if (isAuthed()) {
    unlock();
  }

  authForm.addEventListener("submit", function (e) {
    e.preventDefault();
    if (authPassword.value === AUTH_PASSWORD) {
      authError.style.display = "none";
      unlock();
    } else {
      authError.style.display = "block";
      authPassword.value = "";
      authPassword.focus();
    }
  });
  // ===== ここまでパスワード保護ゲート =====

  var state = {
    items: [],
    categories: [],
    route: { view: "home" },   // {view:"home"} | {view:"category", name:"..."}
    keyword: "",
  };

  var appEl = document.getElementById("app");
  var searchInput = document.getElementById("searchInput");
  var clearBtn = document.getElementById("clearBtn");

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function encodePath(p) {
    // 相対パスの各セグメントを個別にエンコードする（日本語ファイル名対応）
    return p.split("/").map(encodeURIComponent).join("/");
  }

  function countByCategory(category) {
    return state.items.filter(function (i) { return i.category === category; }).length;
  }

  function buildSnippet(item, keyword) {
    var text = item.fulltext || "";
    if (!keyword) {
      return escapeHtml(text.slice(0, 70)) + (text.length > 70 ? "…" : "");
    }
    var idx = text.toLowerCase().indexOf(keyword.toLowerCase());
    if (idx === -1) {
      return escapeHtml(text.slice(0, 70)) + (text.length > 70 ? "…" : "");
    }
    var start = Math.max(0, idx - 25);
    var end = Math.min(text.length, idx + keyword.length + 45);
    var snippet = text.slice(start, end);
    var escaped = escapeHtml(snippet);
    var re = new RegExp(escapeHtml(keyword).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
    escaped = escaped.replace(re, function (m) { return "<mark>" + m + "</mark>"; });
    return (start > 0 ? "…" : "") + escaped + (end < text.length ? "…" : "");
  }

  function matchesKeyword(item, keyword) {
    if (!keyword) return true;
    var k = keyword.toLowerCase();
    var title = (item.title || "").toLowerCase();
    var text = (item.fulltext || "").toLowerCase();
    return title.indexOf(k) !== -1 || text.indexOf(k) !== -1;
  }

  function makeCard(item, keyword, opts) {
    opts = opts || {};
    var card = document.createElement("div");
    card.className = "card";

    var thumbWrap = document.createElement("div");
    thumbWrap.className = "thumb-wrap";
    if (item.thumbnail) {
      var img = document.createElement("img");
      img.src = encodePath(item.thumbnail);
      img.alt = item.title;
      img.loading = "lazy";
      thumbWrap.appendChild(img);
    } else {
      var ph = document.createElement("div");
      ph.className = "thumb-placeholder";
      ph.textContent = "プレビューなし\n(" + item.filename + ")";
      thumbWrap.appendChild(ph);
    }
    card.appendChild(thumbWrap);

    var body = document.createElement("div");
    body.className = "card-body";

    if (opts.showCategory) {
      var catEl = document.createElement("div");
      catEl.className = "card-category";
      catEl.textContent = item.category;
      body.appendChild(catEl);
    }

    var titleEl = document.createElement("div");
    titleEl.className = "card-title";
    titleEl.textContent = item.title;
    body.appendChild(titleEl);

    var snippetEl = document.createElement("div");
    snippetEl.className = "card-snippet";
    snippetEl.innerHTML = buildSnippet(item, keyword);
    body.appendChild(snippetEl);

    var linksEl = document.createElement("div");
    linksEl.className = "card-links";
    if (item.pdf) {
      var pdfA = document.createElement("a");
      pdfA.href = encodePath(item.pdf);
      pdfA.target = "_blank";
      pdfA.rel = "noopener";
      pdfA.textContent = "PDFを見る";
      linksEl.appendChild(pdfA);
    }
    body.appendChild(linksEl);

    card.appendChild(body);
    return card;
  }

  function renderItemGrid(items, keyword, opts) {
    var wrap = document.createElement("div");
    if (items.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "該当する資料が見つかりませんでした。";
      wrap.appendChild(empty);
      return wrap;
    }
    var grid = document.createElement("div");
    grid.className = "grid";
    items.forEach(function (item) {
      grid.appendChild(makeCard(item, keyword, opts));
    });
    wrap.appendChild(grid);
    return wrap;
  }

  function renderHome() {
    appEl.innerHTML = "";
    var title = document.createElement("div");
    title.className = "page-title";
    title.textContent = "カテゴリから資料をさがす";
    appEl.appendChild(title);

    var grid = document.createElement("div");
    grid.className = "category-grid";
    state.categories.forEach(function (cat) {
      var count = countByCategory(cat);
      var card = document.createElement("div");
      card.className = "category-card";
      card.tabIndex = 0;
      card.setAttribute("role", "button");

      var badge = document.createElement("div");
      badge.className = "icon-badge";
      badge.textContent = cat.charAt(0);
      card.appendChild(badge);

      var nameEl = document.createElement("div");
      nameEl.className = "cat-name";
      nameEl.textContent = cat;
      card.appendChild(nameEl);

      var countEl = document.createElement("div");
      countEl.className = "cat-count";
      countEl.innerHTML = '<span class="num">' + count + '</span>件の資料';
      card.appendChild(countEl);

      function go() { navigateTo({ view: "category", name: cat }); }
      card.addEventListener("click", go);
      card.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); }
      });

      grid.appendChild(card);
    });
    appEl.appendChild(grid);
  }

  function renderCategory(catName) {
    appEl.innerHTML = "";

    var back = document.createElement("button");
    back.className = "back-link";
    back.textContent = "← カテゴリ一覧に戻る";
    back.addEventListener("click", function () { navigateTo({ view: "home" }); });
    appEl.appendChild(back);

    var items = state.items.filter(function (i) { return i.category === catName; });

    var heading = document.createElement("div");
    heading.className = "section-heading";
    var h2 = document.createElement("h2");
    h2.textContent = catName;
    var countSpan = document.createElement("span");
    countSpan.className = "count";
    countSpan.textContent = items.length + " 件";
    heading.appendChild(h2);
    heading.appendChild(countSpan);
    appEl.appendChild(heading);

    appEl.appendChild(renderItemGrid(items, "", { showCategory: false }));
  }

  function renderSearchResults(keyword) {
    appEl.innerHTML = "";

    var back = document.createElement("button");
    back.className = "back-link";
    back.textContent = "← カテゴリ一覧に戻る";
    back.addEventListener("click", function () {
      searchInput.value = "";
      state.keyword = "";
      navigateTo({ view: "home" });
    });
    appEl.appendChild(back);

    var items = state.items.filter(function (i) { return matchesKeyword(i, keyword); });

    var heading = document.createElement("div");
    heading.className = "section-heading";
    var h2 = document.createElement("h2");
    h2.textContent = "検索結果: 「" + keyword + "」";
    var countSpan = document.createElement("span");
    countSpan.className = "count";
    countSpan.textContent = items.length + " 件";
    heading.appendChild(h2);
    heading.appendChild(countSpan);
    appEl.appendChild(heading);

    appEl.appendChild(renderItemGrid(items, keyword, { showCategory: true }));
  }

  function render() {
    var keyword = state.keyword.trim();
    if (keyword) {
      renderSearchResults(keyword);
      return;
    }
    if (state.route.view === "category") {
      renderCategory(state.route.name);
    } else {
      renderHome();
    }
  }

  function navigateTo(route) {
    state.route = route;
    if (route.view === "category") {
      location.hash = "#category/" + encodeURIComponent(route.name);
    } else {
      location.hash = "#home";
    }
    render();
    window.scrollTo(0, 0);
  }

  function routeFromHash() {
    var hash = location.hash.replace(/^#/, "");
    if (hash.indexOf("category/") === 0) {
      var name = decodeURIComponent(hash.slice("category/".length));
      if (state.categories.indexOf(name) !== -1) {
        return { view: "category", name: name };
      }
    }
    return { view: "home" };
  }

  window.addEventListener("hashchange", function () {
    state.route = routeFromHash();
    render();
  });

  searchInput.addEventListener("input", function () {
    state.keyword = searchInput.value;
    render();
  });
  clearBtn.addEventListener("click", function () {
    searchInput.value = "";
    state.keyword = "";
    render();
  });

  function boot(data) {
    state.items = data.items || [];
    state.categories = data.categories || [];
    state.route = routeFromHash();
    render();
  }

  // data.json を fetch せず、ビルド時に埋め込まれた JSON をそのまま読む。
  // （file:// で直接開いた場合に fetch が CORS で失敗し、一覧・検索が
  //   常に 0 件になる問題を避けるため）
  var dataEl = document.getElementById("catalog-data");
  var raw = dataEl ? dataEl.textContent.trim() : "";
  // ビルド時に埋め込まれていれば先頭は必ず "{" になる（プレースホルダー未置換の場合は "_" で始まる）
  if (raw && raw.charAt(0) === "{") {
    try {
      boot(JSON.parse(raw));
    } catch (e) {
      appEl.textContent = "カタログデータの読み込みに失敗しました: " + e;
    }
  } else {
    // 埋め込みデータが無い場合（build.py 未実行のテンプレートを直接開いた場合など）は
    // 従来どおり data.json を fetch する形にフォールバックする。
    fetch("data.json")
      .then(function (res) {
        if (!res.ok) { throw new Error("HTTPステータス " + res.status); }
        return res.json();
      })
      .then(boot)
      .catch(function (err) {
        appEl.textContent =
          "カタログデータの読み込みに失敗しました。" +
          "build.py 未実行の index.html を直接開いていないか、" +
          "catalog/index.html を開いているかご確認ください。（詳細: " + err + "）";
      });
  }
})();
</script>

</body>
</html>

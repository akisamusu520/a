<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M教育</title>
<style>
  :root {
    --color-bg: #f4f6f8;
    --color-card: #ffffff;
    --color-primary: #2c5f8a;
    --color-primary-dark: #1e4463;
    --color-text: #262b30;
    --color-muted: #6b7580;
    --color-border: #dde2e6;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Yu Gothic", "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
  }
  header {
    background: var(--color-primary);
    color: #fff;
    padding: 18px 24px;
  }
  header h1 {
    margin: 0 0 4px 0;
    font-size: 1.3rem;
  }
  header p {
    margin: 0;
    font-size: 0.8rem;
    opacity: 0.85;
  }

  /* 補助的な検索バー（小さめ・目立たせない） */
  .topbar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px 24px 0 24px;
    display: flex;
    justify-content: flex-end;
  }
  .search-mini {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    max-width: 320px;
  }
  .search-mini input[type="text"] {
    flex: 1;
    padding: 6px 10px;
    font-size: 0.8rem;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    outline: none;
    background: #fff;
  }
  .search-mini input[type="text"]:focus {
    border-color: var(--color-primary);
  }
  .search-mini button {
    padding: 6px 10px;
    font-size: 0.75rem;
    background: #fff;
    color: var(--color-muted);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    cursor: pointer;
  }
  .search-mini button:hover { color: var(--color-primary); border-color: var(--color-primary); }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px 48px 24px;
  }

  /* ===== ホーム：カテゴリカード ===== */
  .page-title {
    font-size: 1.05rem;
    font-weight: bold;
    margin: 4px 0 16px 0;
    color: var(--color-text);
  }
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .category-card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .category-card:hover {
    box-shadow: 0 6px 18px rgba(0,0,0,0.10);
    transform: translateY(-3px);
    border-color: var(--color-primary);
  }
  .category-card .icon-badge {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #eaf1f7;
    color: var(--color-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: bold;
  }
  .category-card .cat-name {
    font-size: 1.05rem;
    font-weight: bold;
    line-height: 1.4;
  }
  .category-card .cat-count {
    font-size: 0.78rem;
    color: var(--color-muted);
  }
  .category-card .cat-count .num {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--color-primary);
    margin-right: 2px;
  }

  /* ===== カテゴリ詳細／検索結果：資料グリッド ===== */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.82rem;
    color: var(--color-primary);
    text-decoration: none;
    cursor: pointer;
    margin-bottom: 10px;
    background: none;
    border: none;
    padding: 0;
  }
  .back-link:hover { text-decoration: underline; }

  .section-heading {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }
  .section-heading h2 {
    font-size: 1.15rem;
    margin: 0;
  }
  .section-heading .count {
    font-size: 0.8rem;
    color: var(--color-muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .card:hover {
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .thumb-wrap {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #eef1f3;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #fff;
  }
  .thumb-placeholder {
    color: var(--color-muted);
    font-size: 0.75rem;
    text-align: center;
    padding: 8px;
    white-space: pre-line;
  }
  .card-body {
    padding: 12px 14px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .card-category {
    font-size: 0.7rem;
    color: var(--color-primary);
    font-weight: bold;
  }
  .card-title {
    font-size: 0.92rem;
    font-weight: bold;
    line-height: 1.35;
    word-break: break-word;
  }
  .card-snippet {
    font-size: 0.75rem;
    color: var(--color-muted);
    line-height: 1.4;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-snippet mark {
    background: #fff1a8;
    padding: 0 1px;
  }
  .card-links {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .card-links a {
    font-size: 0.75rem;
    text-decoration: none;
    color: #fff;
    background: var(--color-primary);
    padding: 6px 10px;
    border-radius: 5px;
    flex: 1;
    text-align: center;
  }
  .card-links a.secondary {
    background: #fff;
    color: var(--color-primary);
    border: 1px solid var(--color-primary);
  }
  .card-links a:hover { opacity: 0.85; }

  .empty-state {
    margin: 40px auto;
    text-align: center;
    color: var(--color-muted);
    font-size: 0.9rem;
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.72rem;
    color: var(--color-muted);
  }

  /* ===== パスワード保護ゲート ===== */
  .auth-gate {
    position: fixed;
    inset: 0;
    background: var(--color-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .auth-box {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 36px 32px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  }
  .auth-box h1 {
    font-size: 1.1rem;
    margin: 0 0 6px 0;
    color: var(--color-text);
  }
  .auth-box p {
    font-size: 0.8rem;
    color: var(--color-muted);
    margin: 0 0 20px 0;
  }
  .auth-box form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .auth-box input[type="password"] {
    padding: 10px 12px;
    font-size: 0.95rem;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .auth-box input[type="password"]:focus {
    border-color: var(--color-primary);
  }
  .auth-box button {
    padding: 10px 12px;
    font-size: 0.9rem;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .auth-box button:hover { background: var(--color-primary-dark); }
  .auth-error {
    color: #c0392b;
    font-size: 0.78rem;
    margin: 10px 0 0 0;
  }
</style>
</head>
<body>

<div id="authGate" class="auth-gate">
  <div class="auth-box">
    <h1>M教育</h1>
    <p>閲覧にはパスワードが必要です</p>
    <form id="authForm" autocomplete="off">
      <input type="password" id="authPassword" placeholder="パスワードを入力" autocomplete="off" inputmode="numeric">
      <button type="submit">開く</button>
    </form>
    <p id="authError" class="auth-error" style="display:none;">パスワードが違います。もう一度お試しください。</p>
  </div>
</div>

<div id="siteContent" style="display:none;">

<header>
  <h1>M教育</h1>
  <p>透析室教育チーム作成資料 一覧・検索サイト</p>
</header>

<div class="topbar">
  <div class="search-mini">
    <input type="text" id="searchInput" placeholder="キーワード検索（補助機能）">
    <button id="clearBtn">クリア</button>
  </div>
</div>

<main id="app"></main>

<footer>教育チーム資料カタログ / build.py により自動生成</footer>

</div>

成部位\n作り直すことをジャンプアップと呼ぶ\n通常は利き手とは逆の手に作成して、手首付近(末梢)で作成をする場合が一番多い\n9\n\nジャンプアップ\n10\n\nPTA（経皮的血管形成術）\nみたきでは毎週火・金の13:30～シャント造影・PTAを行っている\nバルーンカテーテルを血管内に挿入し、狭窄部位を拡張させる治療\nシャント狭窄を未然に防ぐ\n11\n\n人工血管（AVG）\n特徴\n• 第二選択（VAの中で約7%）\n• 表在する静脈が細かったり、閉塞している場合\n• 血管が荒廃している場合\n• AVFを作成しても穿刺が困難と想定される場合\nAVFが作成不可の場合、やむを得ずAVGを作成するイメージ\n12\n\nコンソールから\nコンソールへ\nグラフト\n人工血管（AVG）\nシャントの流れ\n動脈吻合部→静脈吻合部\n人工血管の素材\n・ePTFE\n・ポリウレタン\nみたきではポリウレタンを使用\n術後から穿刺が可能\n13\n\nだいじなこと\n14\n\nみる\n・瘤の状態はどうか（テカテカしていないか、以前より大きくなっていないか）\n・内出血はないか\n・浮腫んでいないか\n・感染はないか\n・皮膚の赤みや掻き傷がないか\n・シャント肢指先のチアノーゼがないか\n感染予防のため、\n透析前のシャント手洗いorスキナは必須\n15\n\nきく\n聴診器を用いてシャント音を聞く（吻合部から中枢に向かって音を聞く）\n・正常音「ゴーゴーorザーザー」\n連続した強い音と弱い音が交互に繰り返す\n吻合部が一番音が大きく、中枢側にいくほど\n音が小さくなる\n・狭窄音「ヒューヒュー」（高音）\n窓の隙間風のイメージ\n・無音\nシャント血が流れていない\n16\n\nさわる\n・正常スリル「ザーザー」\n血液が流れていること\n・異常拍動\n「ドクッドクッ」流れが停滞しているイメージ\n（動脈みたいな）\n17\n\nシャント自己血管パターン\n※旧シャントがあることも\n18\n\nシャント人工血管パターン\n※旧シャントがあることも\n19\n\nシャントチェック\nシャントチェック時には血管全体像が見にくい\n個人板や穿刺前にシャントを見せてもらうことが大事\n穿刺をはじめたら自然に覚えていく\n・針の抜けかけテープ固定の不十分\n血流量200ml/minでV側が抜けた場合、10秒で30mlの失血\n→透析患者は腎性貧血を合併しているため大きなリスク\n20\n\n穿刺の向き回路接続\n基本的にAは脱血を少しでも良くするため末梢向きに穿刺\n→再循環していない脱血不良がなければ中枢向き穿刺でも可\nループグラフトの場合特に接続に注意\nシャント上流にＡ下流にＶが接続してあることを確認！！\n21\n\nA\nV\nV\nA\nA\nV\nA\nV\nA\nV\n理想\nよくみる\n分岐血管はAV\nどちらでも接続可\n理想\nたまにみる\n22\n\n逆接続\n正しい接続\n返血（V）側\n血液回路へ接続\n脱血（A）側\n血液回路へ接続\n脱血（A）側\n血液回路へ接続\n返血（V）側\n血液回路へ接続\n逆接続\n23\n\n逆接続による再循環\n正しい接続\n逆接続\n24\n\n再循環によるデメリット\n• 透析効率の低下\n→再循環では、きれいになった血液を再度きれいにしているため、\n透析効率が低下\n• 濃縮による回路凝固\n→再循環では、除水して濃くなった血液をまた脱血して\n除水しているため、血液が濃縮され回路内が凝血\n25"}, {"title": "シャント", "filename": "シャント.pptx", "category": "血管アクセス・穿刺技術", "pdf": "pdf/血管アクセス・穿刺技術/シャント__pptx.pdf", "thumbnail": "thumbnails/血管アクセス・穿刺技術/シャント__pptx.png", "fulltext": "シャント\n1\n\n2\n\n3\n\n血管の解剖(右手)\n4\n静脈\n動脈\n親指側→橈側（とうそ\nく）\n小指側→尺側（しゃく\nそく）\n自己血管シャントの第一選\n択\n橈骨動脈と橈側皮静脈を吻\n合\n\n簡単にシャント\n図\n透析においては\n脱血側→A側\n返血側→V側と呼\nぶ\n5\n\nシャントの必要性\n• なぜシャントを作成する必要がある？\n　　→透析をする際、血液を体外に出すため\n　　　（血流量100～300ml/minを脱血するため）\n　　　静脈は流れがほぼ０のため脱血不可\n　　　動脈は深い位置にあり穿刺や止血が困難\n \n• シャントに流れているの 病棟 .pdf", "category": "血管アクセス・穿刺技術", "pdf": "pdf/血管アクセス・穿刺技術/シャント病棟 __pdf.pdf", "thumbnail": "thumbnails/血管アクセス・穿刺技術/シャント病棟 __pdf.png", "fulltext": "病棟勉強会\n～透析のシャントについて知ろう～\n透析室教育チーム\n透析とは腎不全になった患者の治療で\n人工腎臓を用いて血液中の余分な水分や\n老廃物を除去しています\n\n血液を体外循環させるために\n一分間で200ml～300mlの血液を\n確保し体外循環をしますが\n静脈は血流量が少なく、\n動脈は穿刺や止血が困難です\n動脈と静脈を吻合し\n動脈血を流れ込ませた静脈を作成します\n→シャントと呼びます\n脱血用の針と返血用の針の\n二か所の穿刺が必要です\n1\nシャントなし\n自己血管シャント\n人工血管シャント\n\nみる\nシャント肢全体の観察をしてください\n具体的には\n・感染はないか（発赤、疼痛、熱感）\n・瘤の状態はどうか\n・傷や内出血はないか\n・浮腫んでいないか\nなど\nシャント管理の合言葉\nみる・きく・さわる\n\n2\nきく\nシャントに聴診器を当てると「ザーザー」といった音が聞こえます\n穿刺部（局所麻酔剤を貼る位置）の音を聞いてください\n無音の場合、シャント閉塞の可能性があります\n※注意点\n・吻合部（上流）が最も大きな音で中枢（下流）に向かうほど音が小さく\nなります\n・穿刺部が無音の場合、吻合部から中枢に向かって順に音を聞いてください\nさわる\nシャント肢の熱感→感染の可能性があります\n“スリル(振動)”を確認→スリルが無い場合、閉塞の可能性があります\n\n・AVF（Arteriovenous fistula）\n動脈・静脈の瘻\n→\n自己血管シャント\n・AVG（Arteriovenous graft ）\n動脈・静脈のグラフト\n→\n人工血管シャント\n3\nシャントに関するカルテの略語の意味は？\n\n4\nシャント肢から血管内に細菌が入ると全身感染を起こします\n穿刺前に消毒を行っていますが、消毒薬は皮膚に皮脂や汚れが\n付着していると十分な消毒効果が得られません\n透析直前に穿刺部を手洗いする理由は？\n\n5\n止血バンドと絆創膏を外すタイミングは？\nAM透析\nPM透析\n止血バンド\n夕食後\n眠前\n絆創膏\n眠前\n翌朝\n抜針後、出血しやすい患者さまは\nややきつめに止血バンドを\n巻いておくこともあります。\nシャント肢にチアノーゼが出たら\nすぐにバンドを緩め、\n再度軽めに巻き直してください。\n\nリストバンド・腕時計\n血圧測定\n腕枕、荷物をかける\n採血\n6\nシャント肢での禁止事項は？\nシャント肢の圧迫\nシャント閉塞リスクの増加\nシャント肢の採血\n穿刺による血管損傷・止血困難\n感染リスクの増加など\n\n局所麻酔剤\n・リドカインテープ\n・ペンレス\n・エムラクリーム\n透析時の穿刺による痛みを軽減します\n必ずシャントの穿刺部に貼付して下さい\n（透析入室時間の1～2時間前）\nシャント確認方法\n・自己血管\n軽く駆血を行うとシャントが浮き出してわかりやすいです\n・人工血管\nシャント肢を触れば位置がわかります\n閉塞している旧人工血管がある場合もあるので注意が必要です\n貼付箇所が不明の場合透析室に連絡してください\nマーキングを行います\n参考：針のサイズ\n透析用16G\n採血用22G\n7\nなぜ局所麻酔剤を貼るの？いつ、どこに貼ればいいの？\n\n＜対応＞\n①滅菌ガーゼを出血部に当てて、用手圧迫を行う（5～10分）\n②止血バンドを巻く（強め）\n③止血完了後、絆創膏（インジェクションパッドor ブラッドバン）を貼る\n④止血バンドを巻き（弱め）、1～2時間経過後止血バンドを外す\n＜お願い＞\n上記の対応①～④を行った患者については\n次回の透析前までに透析室に連絡してください\n※参考＜出血の原因として考えられる可能性＞\n①シャントの狭窄によって、再出血しやすくなっている\n②肘を曲げたことにより、止血バンドに緩みが生じた\n③穿刺部に触れたことにより、かさぶたが剥がれた\n④抗凝固剤の過剰投与\n8\n透析後、穿刺部から出血してきた場合の対応は？\n参考：狭窄による出血のイメージ\nシャントの流れ\n(出血しやすい)\n\n止血バンド実践練習\n用手止血後の強さ（強め）\nバンドを巻いた後、シャント下流側のスリルを感じることができる程度\n止血完了後の強さ（弱め）\n圧迫痕が出ない程度\n手を動かしてもバンドがずり落ちてこない程度\n9"}, {"title": "シャント病棟資料 ", "filename": "シャント病棟資料 .pptx", "category": "血管アクセス・穿刺技術", "pdf": "pdf/血管アクセス・穿刺技術/シャント病棟資料 __pptx.pdf", "thumbnail": "thumbnails/血管アクセス・穿刺技術/シャント病棟資料 __pptx.png", "fulltext": "病棟勉強会\n～透析のシャントについて知ろう～\n透析室教育チーム\n透析とは腎不全になった患者の治療で\n人工腎臓を用いて血液中の余分な水分や\n老廃物を除去しています\n\n血液を体外循環させるために\n一分間で200ml～300mlの血液を\n確保し体外循環をしますが\n静脈は血流量が少なく、\n動脈は穿刺や止血が困難です\n動脈と静脈を吻合し\n動脈血を流れ込ませた静脈を作成します\n→シャントと呼びます\n脱血用の針と返血用の針の\n二か所の穿刺が必要です\n1\nシャントなし\n自己血管シャント\n人工血管シャント\n\nみる\n　シャント肢全体の観察をしてください\n　\n　具体的には\n　・感染はないか（発赤、疼痛、熱感）\n　・瘤の状態はどうか\n　・傷や内出血はないか\n　・浮腫んでいないか 　など\nシャント管理の合言葉\nみる・きく・さわる\n\n2\nきく\n　シャントに聴診器を当てると「ザーザー」といった音が聞こえます\n　穿刺部（局所麻酔剤を貼る位置）の音を聞いてください\n　無音の場合、シャント閉塞の可能性があります\n　※注意点\n　　・吻合部（上流）が最も大きな音で中枢（下流）に向かうほど音が小さく\n　　　なります\n      ・穿刺部が無音の場合、吻合部から中枢に向かって順に音を聞いてください\nさわる\n　シャント肢の熱感→感染の可能性があります\n　“スリル(振動)”を確認→スリルが無い場合、閉塞の可能性があります\n\n・AVF（Arteriovenous fistula）\n　　動脈・静脈の瘻　→　自己血管シャント\n・AVG（Arteriovenous graft ）\n　　動脈・静脈のグラフト　→　人工血管シャント\n3\nシャントに関するカルテの略語の意味は？\n\n4\nシャント肢から血管内に細菌が入ると全身感染を起こします\n穿刺前に消毒を行っていますが、消毒薬は皮膚に皮脂や汚れが\n付着していると十分な消毒効果が得られません\n透析直前に穿刺部を手洗いする理由は？\n\n5\n止血バンドと絆創膏を外すタイミングは？\nAM透析\nPM透析\n止血バンド\n夕食後\n眠前\n絆創膏\n眠前\n翌朝\n抜針後、出血しやすい患者さまは\nややきつめに止血バンドを\n巻いておくこともあります。\nシャント肢にチアノーゼが出たら\nすぐにバンドを緩め、\n再度軽めに巻き直してください。\n\nリストバンド・腕時計\n血圧測定\n腕枕、荷物をかける\n採血\n6\nシャント肢での禁止事項は？\nシャント肢の圧迫\n　シャント閉塞リスクの増加\nシャント肢の採血\n　穿刺による血管損傷・止血困難\n　感染リスクの増加など\n\n局所麻酔剤\n・リドカインテープ\n・ペンレス\n・エムラクリーム\n透析時の穿刺による痛みを軽減します\n必ずシャントの穿刺部に貼付して下さい\n（透析入室時間の1～2時間前）\nシャント確認方法\n　・自己血管\n　　　軽く駆血を行うとシャントが浮き出してわかりやすいです\n　・人工血管\n　　　シャント肢を触れば位置がわかります\n　　　閉塞している旧人工血管がある場合もあるので注意が必要です\n貼付箇所が不明の場合透析室に連絡してください\nマーキングを行います\n参考：針のサイズ\n透析用16G　採血用22G　\n7\nなぜ局所麻酔剤を貼るの？いつ、どこに貼ればいいの？\n\n＜対応＞\n　①滅菌ガーゼを出血部に当てて、用手圧迫を行う（5～10分）\n　②止血バンドを巻く（強め）\n　③止血完了後、絆創膏（インジェクションパッド or ブラッドバン）を貼る\n　④止血バンドを巻き（弱め）、1～2時間経過後止血バンドを外す\n＜お願い＞\n　上記の対応①～④を行った患者については\n　次回の透析前までに透析室に連絡してください\n※参考＜出血の原因として考えられる可能性＞\n　　　　　①シャントの狭窄によって、再出血しやすくなっている\n　　　　　②肘を曲げたことにより、止血バンドに緩みが生じた\n　　　　　③穿刺部に触れたことにより、かさぶたが剥がれた\n　　　　　④抗凝固剤の過剰投与\n8\n透析後、穿刺部から出血してきた場合の対応は？\n参考：狭窄による出血のイメージ\nシャントの流れ\n(出血しやすい)\n\n止血バンド 実践練習\n用手止血後の強さ（強め）\n　バンドを巻いた後、シャント下流側のスリルを感じることができる程度\n止血完了後の強さ（弱め）\n　圧迫痕が出ない程度\n　手を動かしてもバンドがずり落ちてこない程度\n9"}, {"title": "問題③VA", "filename": "問題③VA.docx", "category": "血管アクセス・穿刺技術", "pdf": "pdf/血管アクセス・穿刺技術/問題③VA__docx.pdf", "thumbnail": "thumbnails/血管アクセス・穿刺技術/問題③VA__docx.png", "fulltext": "＜バスキュラーアクセス＞ 　　　　　　　　　　　　氏名 \n \n➀シャント（AVF）とは（　A　）と（　B　）を吻合（短絡）したもの。\nAVF の特徴はAVG に比べて開存期間が長いことと（　➁　）が少ないこと。\nシャント閉塞時、閉塞部より中枢側に作り直す（吻合し直す）ことを（　➂　）と呼ぶ。\n➃シャントの確認ポイント３つは（　A　）、（　B　）、（　C　）。\nシャントが狭窄（吻合部付近の狭窄）し、脱血不良がある場合は（　➄　）を行う。\nシャント瘤形成を起こしにくくするため、穿刺の際に重要なことは（　➅　）。\nシャント肢全体が腫脹し、鎖骨下静脈に狭窄がある場合、（　➆　）を疑う。\n血液再循環が起こる原因として、静脈側穿刺部より中枢側の狭窄、シャント血流量が少ない、（　➇　）など。\nカテーテル挿入の際、第一選択の血管は（　➈　）である。\n➉長期カテーテルと短期カテーテルの違い\n\n　　長期カテーテルには（　A　）がついている。また、カテーテル部が（　Ｂ　）内を通っている。\n解答欄\n➀ A　　　　　　　　Ｂ\n➅\n➁\n➆\n➂\n➇\n➃Ａ　　　　　　Ｂ　　　　　　Ｃ\n➈\n➄\n➉Ａ　　　　　　　　　Ｂ"}, {"title": "教育チーム穿刺", "filename": "教育チーム穿刺.pptx", "category": "血管アクセス・穿刺技術", "pdf": "pdf/血管アクセス・穿刺技術/教育チーム穿刺__pptx.pdf", "thumbnail": "thumbnails/血管アクセス・穿刺技術/教育チーム穿刺__pptx.png", "fulltext": "シャント穿刺について\n教育チーム\n血管をよく知ろう・エコーを活用しよう\n\nとうこつ\nしゃっこつ\nとうそく\nしゃくそく\n動脈と静脈（シャント）の解剖\n医師への報告は解剖学的な言い方での報告が必須\n（医師とスタッフの情報伝達の差異がないように）\n\n大事なこと\nみて\n　　　　きいて\n　　　　　　　　　さわって\n\nみて\n\nきいて\n聴診器を用いてシャント音を聞く\n　●正常音「ゴーゴーorザーザー」\n　　　　　連続した強い音と弱い音が交互に繰り返す\n　　　　　吻合部が一番音が大きく上腕にいくほど小さく\n　　　　　吻合部から順に聞く\n　●注意すべき音\n　　　・狭窄音「ヒューヒュー」（高音）  →窓の隙間風のイメージ\n　　　・断続音「ザッザッ」→拍動音（もしかして閉塞しかけ？）\n　　　・無音　→シャント血が流れていない\n5\n\nさわって\n●スリル\n　→日本語での意味は振動\n　　透析患者のシャントに手を触れるとザーザーと血液が流れる\n　　振動を触れる。手で触れてスリル確認or聴診器で音をスリル音\n　　を聞いてからの穿刺が必須\n　　\n●拍動\n　→流れている感覚が少なく拍動している感覚\n　   シャントに張りがあることが多い\n　\n\n瘤？血腫（偽腔）？\n穿刺ミスの次の透析日は\n血腫によって偽腔（偽の血管）が\n出現することがある\n前回の穿刺ミスによる血腫（偽腔）\nシャント瘤\n内出血があったり最近の\n穿刺ミス情報がある場合要注意…\n\n血腫への穿刺に注意\n\n拡大ver\n\n穿刺ミスのあとは\n造影画像やエコーを活用しよう\n●血管の走行確認のために造影画像を見る\n   　放射線画像参照→XA\n●次回穿刺時にエコーを用いて血管の走行を確認する\n\n吻合部が近い\n吻合部直上（〇部分）に逆刺しすると\n針先が吻合部（動脈）に\n触れてしまうかもしれない\n動脈を穿刺してしまうと\n内出血を起こし止血が困難\n刺すのであれば中枢向き穿刺の方がよい\n\nこういうことです\n\n動脈あり➀\n触ってシャントかな？と思ったら\n実は動脈そのもののパターン\n拍動が強いが触っただけでは\nシャントと見分けがつかないことも\nシャント造影画像やエコーで確認する\n肘部にあることが多い\n\n動脈　エコーでの確認\n●末梢側（吻合部）に向かってエコーで追いかける\n　前腕で吻合しているところを探す\n●中枢側に向かって伴走静脈がないかを探す\n●吻合部が閉塞している場合、シャント全体の流れがないため\n　カラーが見えるのは動脈である可能性が高い\n●エコーで押してつぶれるのはシャント　つぶれないのは動脈\n　（表在にある動脈はつぶれてしまうこともある）\n\n伴走静脈とは\n\nシャントは押すと潰れます\nシャント\n動脈\n穿刺部の下に動脈が並走している深く刺すと\n動脈に達するため、針の進めすぎに注意\n動脈あり➁\n\n旧シャントに注意：自己血管\nジャンプアップ後\n旧シャントは音が聞こえない\n（新しい吻合部が近いと\n　聞こえてしまうこともある）\n閉塞しているため\nさわるとかたい！\n旧\nシ\nャ\nン\nト\n\n血栓閉塞\nシャントOPE（ジャンプアップ）\n\n旧シャント\n流れているシャント\n閉塞している旧シャント\n流体は黒く映り、非流体は白く映る\n\n旧シャントに注意：人工血管\n旧グラフトへ穿刺は注意！！\n音が聞こえない\nエコーが通らないため音で判断するしかない…\n\n穿刺ミスで腫れた時のフォロー\n• 血腫ができてしまった場合、上から抑え、皮膚内に分散させる\n　→血腫のままかたまってしまうと偽血管になってしまい\n       次回穿刺が困難になることも\n• 次回の穿刺場所の相談（リドカインテープ貼付場所）までは\n  してほしいです（余分に一枚はってもらう等）\n\nおまけ\n血管はいろいろありますが\nエコーで見ると新たな発見があることも…\nときどき失敗が起こる血管をエコーで見たら原因がわかりました\n穿刺ミスを減らすためには血管をよく知ることが大事だと思います\n\n？？？\nOK！"}, {"title": "穿刺セミナー切り抜き", "filename": "穿刺セミナー切り抜き.pptx", "category": "血管アクセス・穿刺技術", "pdf": "pdf/血管アクセス・穿刺技術/穿刺セミナー切り抜き__pptx.pdf", "thumbnail": "thumbnails/血管アクセス・穿刺技術/穿刺セミナー切り抜き__pptx.png", "fulltext": "穿刺セミナー　切り抜き\n【穿刺ビギナーとエキスパートの統計】\n針の持つときの力の入れ方\nExpert\nExpert\nBeginnerに多い\nExpertに多い\n早すぎると\n刺してからの\n針移動距離が長いと\n後壁穿刺の恐れ"}, {"title": "穿刺前の知識", "filename": "穿刺前の知識.pdf", "category": "血管アクセス・穿刺技術", "pdf": "pdf/血管アクセス・穿刺技術/穿刺前の知識__pdf.pdf", "thumbnail": "thumbnails/血管アクセス・穿刺技術/穿刺前の知識__pdf.png", "fulltext": "シャント穿刺について\n1\n\nシャントで使用される血管の解剖\n医師への報告は解剖学的な言い方での報告が必須\n（医師とスタッフの情報伝達の差異がないように）\n2\n左手\n左手\n親指側\n小指側\n\nシャント穿刺の流れ\n①準備\n↓\n②血管の診察\n↓\n③穿刺前の環境づくり\n↓\n④駆血\n↓\n⑤消毒\n↓\n⑥穿刺\n3\n\n血管の診察\nみる、きく、さわる\n教育チーム別紙参照\n4\n\n穿刺前の環境づくり\n・患者の体制\n仰臥位\n半座位\n・穿刺者の体制\n前かがみ\nしゃがむ\n・腕の向き\n内転\n外転\n回内\n回外\n・血管の固定\n5\n\n消毒\n消毒薬\nエタノール綿\nCHG綿（クロルヘキシジン）\nヒビテン（クロルヘキシジン）\n穿刺には細菌感染のリスクが伴う\nシャント感染は患者にとって大きな問題\n感染リスクはAVFに比べてAVGの方が五倍高い\n患者の手洗い(もしくはスキナによる洗浄)+穿刺前の消毒\n6\n\n消毒方法\n穿刺部を中心に\nシャント肢を\n広範囲に消毒する\nAVF\nAVG\n①エタノール\n②ヒビテン(一本目) ③ヒビテン(ニ本目)\n①エタノール\n7\n\n駆血\n駆血帯を用いた駆血もしくは用手駆血を行う\n(作りたてのシャントや内出血で駆血帯が用いにくい場合などは用手駆血)\n駆血時間が長いとシャント閉塞のリスクが高まるためできるだけ手早く行う\n強いと\n動脈まで遮断してしまい、シャントの張りが出ない\n皮下出血を起こす\n弱いと\nシャントに張りが出ない\n※AVGの駆血は不要\n不適切な駆血は穿刺時に血管が押しつぶされ後壁を貫く\n8\n\n穿刺針\n内針と外筒の二層構造\n9\n\n穿刺の手技\n模擬キットを用いて指導者より実践指導\n10\n\n穿刺を行うときに注意したいこと\n11\n\n再循環しない穿刺\nA側とV側の針先は５ｃｍ開けるのが望ましい\n（指三本or指の第二関節）\n同じ穿刺部であってもAV側ともに中枢向き穿刺より\nA側を末梢向き穿刺のほうが距離があく\nA\nV\nV\nA\n12\n\n穿刺部をずらす\n・瘤にならないようおおきく(1cm)ずらす\n・針穴が裂けないよう前回の穿刺部を避けてすこしずらす\n13\n\n同一穿刺部に注意\nAVG、３～５年経過\n曜日によって穿刺部を固定し\n穿刺部をずらしている患者もいる\n14\n\n瘤？血腫（偽腔）？\n穿刺ミスの次の透析日は\n血腫によって偽腔（偽の血管）が\n出現することがある\n前回の穿刺ミスによる血腫（偽腔）\nシャント瘤\n内出血がある場合や\n直近で穿刺ミスの情報がある場合要注意\n15\n\n血腫への穿刺に注意\n血腫\n16\n\n穿刺ミスのあとは\n造影画像やエコーを活用しよう\n・血管の走行確認のために造影画像を確認する\n電子カルテ→放射線画像参照\n・次回穿刺時にエコーを用いて血管の走行を確認する\n17\n\n吻合部付近への穿刺は危険\n吻合部直上（〇部分）に逆刺しすると\n針先が吻合部（動脈）に\n触れてしまう可能性がある\n動脈を穿刺してしまうと\n内出血を起こし止血が困難\n穿刺は中枢向き穿刺の方がよい\n18\n\n19\n\n動脈あり\n触ってシャントのように感じる場合もあるが\n実際は動脈\n拍動が強いが触っただけでは\nシャントと見分けがつかないことも\nシャント造影画像やエコーで確認する\n肘部にあることが多い\n20\n\n旧シャントに注意：AVF\nジャンプアップ後\n旧シャントは音が聞こえない\n（新しい吻合部が近いと\n聞こえてしまうこともある）\n閉塞しているためさわるとかたく\nスリルが感じられない\n旧\nシ\nャ\nン\nト\n21\n\n22\n\n旧シャント\n流れているシャント\n閉塞している旧シャント\nエコーで流体は黒く映り、非流体は白く映る\nカラーモードでは流体は色が映るが、非流体は映らない\n23\n\n旧シャントに注意：AVG\n旧シャントのAVGが残存している場合もある\nエコーが通らないためシャント音の有無で判断する\n24\n\n作りたてのシャント\n• 血管がやわらかく（ほぼ静脈）腫れやすいため穿刺に注意\n• 止血時は血管をつぶす可能性があるため適度な圧で用手止血\n（温泉卵がつぶれない圧・スリルを感じる程度の圧）\n25\n\n穿刺ミスで血腫ができた場合のフォロー\n• 血腫ができてしまった場合、上から抑え皮膚内に分散させる\n→血腫のままかたまってしまうと偽血管になってしまい\n次回穿刺が困難になることも\n• 次回の穿刺場所の相談（リドカインテープ貼付場所）まで行う\n（余分に一枚貼付してもらう等）\n26"}, {"title": "穿刺前の知識", "filename": "穿刺前の知識.pptx", "category": "血管アクセス・穿刺技術", "pdf": "pdf/血管アクセス・穿刺技術/穿刺前の知識__pptx.pdf", "thumbnail": "thumbnails/血管アクセス・穿刺技術/穿刺前の知識__pptx.png", "fulltext": "シャント穿刺について\n1\n\nシャントで使用される血管の解剖\n医師への報告は解剖学的な言い方での報告が必須\n（医師とスタッフの情報伝達の差異がないように）\n2\n左手\n左手\n親指側\n小指側\n\nシャント穿刺の流れ\n①準備\n↓\n②血管の診察\n↓\n③穿刺前の環境づくり\n↓\n④駆血\n↓\n⑤消毒\n↓\n⑥穿刺\n3\n\n血管の診察\nみる、きく、さわる\n　教育チーム別紙参照\n4\n\n穿刺前の環境づくり\n・患者の体制\n　　仰臥位　半座位\n・穿刺者の体制\n　　前かがみ　しゃがむ\n・腕の向き\n　　内転　外転　回内　回外\n・血管の固定\n5\n\n消毒\n消毒薬\n　エタノール綿\n　CHG綿（クロルヘキシジン）\n　ヒビテン（クロルヘキシジン）\n穿刺には細菌感染のリスクが伴う\nシャント感染は患者にとって大きな問題\n感染リスクはAVFに比べてAVGの方が五倍高い\n患者の手洗い メーカーごとに異なるものの、カテーテル内で\n脱血側ルートと返血側ルートに分かれている\n（トリプルルーメンならさらに薬液ルートあり）\n断面図\n\n種類\n☆長期使用（3週間以上）を想定した長期カテーテル\n☆短期使用（1週間～3週間）を想定した短期カテーテル\n\n適応\n長期カテーテル\n・シャントが造設不可能な時\n（シャントを作れる血管がない、作ってもすぐに使用不可になる等）\n・高度の心不全→シャントを造設すると心臓の仕事量が増え、心負荷が増大するため\n・四肢拘縮や認知症があり、穿刺困難や抜針のリスクがある時\n短期カテーテル\n・緊急透析の導入時\n・シャントが使用不可になったときの緊急用のVA（シャント再建までのつなぎ)\n\n挿入部位\n優先順位\n➀右内頸静脈（右心房にたどり着くまでに屈曲がない）\n②大腿静脈（感染のリスクあり）\n③左内頸静脈（右心房にたどり着くまでに屈曲2回あり）\n④右・左鎖骨下静脈（狭窄による静脈高血圧症や\n誤穿刺による気胸のリスクあり）\n内頸の場合、先端は右心房または中心静脈へ留置\n\n短期と長期の違い\n血管内\n皮下トンネル内\n\n短期と長期の違い\n短期（非カフ型）\n長期（カフ型）\n\n長期カテーテル\n\nカフの役割\n・感染を防ぐ\n・組織に癒着しカテーテルを抜けにくくする\n\n実際の長期カテーテル\n皮下トンネル\n皮下トンネルでカテーテルと\n組織が癒着していて\n簡単には抜けないため\n縫合は必須ではない\n(縫合する場合もあり)\n\n長期カテーテルレントゲン画像\n右内頚静脈\n左内頚静脈\n\n短期カテーテル\n\n実際の短期カテーテル\n\n短期カテーテルレントゲン写真\n右内頚静脈\n左大腿静脈\n\n返血後のカテーテル充填\n長期カテーテル\n※カテーテル内に血栓ができやすい場合\nヘパリンNa注5000単位\nウロナーゼを充填するケースもある。\n短期カテーテル\n生理食塩水\n\n短期と長期の違いまとめ\nカテ室or透析室\nOPE室\n\n注意点\n感染を起こしやすい\n理由\n・人工物であるから\n・体内と体外を交通しているから\n感染リスク\n短期（シャントの25倍）＞長期（シャントの15倍）\n\nキャップ\nセーフタッチプラグ透析用\n長期・短期どちらもカテーテルに取り付けて透析回路と接続するために使用\n→感染予防（クローズドシステムを形成）\n\n略語・表記\nTLC（Triple-Lumen Catheter）\nトリプルルーメンカテーテル\nDLC（Double-Lumen Catheter ）\nダブルルーメンカテーテル\nTCC（Tunneled Cuffed Catheter）\n(トンネル) カフ付きカテーテル\nダブルルーメンをWルーメンと書く人もいるみたいですが\n和製英語らしいので望ましくないかも？（伊藤調べ）\n一般的に短期留置カテーテルのこと\n一般的に長期留置カテーテルのこと\nNCC（Non Cuffed Catheter）\n\n透析用留置カテーテルを\n挿入する患者の看護\n\n挿入前\n短期留置カテーテル\n緊急透析に対する受容が難しい\n長期留置カテーテル\n自己管理に対する困難感を抱く\n傾聴・説明と同意\n\n挿入中\n・留置部位の皮膚の状態\n・局所麻酔薬による急性中毒\n・意識状態とバイタルサイン\n観察・処置\n\n挿入直後\n・挿入部位の出血・皮下血種\n・呼吸音の左右差\n・留置カテーテル挿入側肢の浮腫\n異常の早期発見\n\n挿入後①カテーテル関連血流感染症（CRBSI）\n・挿入部の発赤・腫脹・疼痛\n・浸出液\n・採血データ\n\n挿入後①カテーテル関連血流感染症（CRBSI）\n・カテーテル外部と内部から\n・二次的な血流感染\n予防対策\nHP;３Mより抜粋\n\nCRBSI予防対策\n種類\nルーメン数を最小限にする\n挿入部位\n感染リスクは鎖骨下＜内頚＜大腿\n挿入時の処置\n手指衛生\nマキシマルバリアプリコーション\n皮膚消毒はクロルヘキシジンを用いる\n剃毛は行わない\n管理\nドレッシング材の適切な時期での交換\n輸液\n操作はサージカルマスクを着用\n手指衛生後に非滅菌手袋を着用\n指導\n医療従事者にCRBSI予防対策を指導する\nマニュアルの作成\n\n挿入後②脱血不良\n【原因】\nカテーテル先端が血管壁に吸い付く一過性のもの\n・血流量を落とす\n・VとAの接続をかえる\n・体位変換を試みる\n医師に報告\n処置・指示の変更\n\n挿入後③再循環\n【原因】\n脱血側と送血側の距離が近いため\n・採血データ\n医師に報告\n処置・指示の もいるみたいですが\n　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　和製英語らしいので望ましく\nないかも？（伊藤調べ）\n一般的に短期留置カテーテルのこ\nと\n一般的に長期留置カテーテルのこと\nNCC（Non Cuffed Catheter）\n\n透析用留置カテーテルを　　\n挿入する患者の看護\n\n挿入前\n 短期留置カテーテル\n　緊急透析に対する受容が難しい\n 長期留置カテーテル\n　自己管理に対する困難感を抱く\n傾聴・説明と同\n意\n\n挿入中\n ・留置部位の皮膚の状態\n ・局所麻酔薬による急性中毒\n ・意識状態とバイタルサイン　\n観察・処置\n\n挿入直後\n ・挿入部位の出血・皮下血種\n ・呼吸音の左右差\n ・留置カテーテル挿入側肢の浮腫　\n異常の早期発見\n\n挿入後①カテーテル関連血流感染症（CRBSI）\n ・挿入部の発赤・腫脹・疼痛\n ・浸出液\n ・採血データ\n\n挿入後①カテーテル関連血流感染症（CRBSI）\n ・カテーテル外部と内部から\n ・二次的な血流感染\n予防対策\nHP;３Mより抜粋\n\nCRBSI予防対策\n種類\nルーメン数を最小限にする\n挿入部位\n感染リスクは鎖骨下＜内頚＜大腿\n挿入時の処置\n手指衛生\nマキシマルバリアプリコーション\n皮膚消毒はクロルヘキシジンを用いる\n剃毛は行わない\n管理\nドレッシング材の適切な時期での交換\n輸液\n操作はサージカルマスクを着用\n手指衛生後に非滅菌手袋を着用\n指導\n医療従事者にCRBSI予防対策を指導する　\nマニュアルの作成\n\n挿入後②脱血不良\n【原因】\nカテーテル先端が血管壁に吸い付く一過性のもの\n ・血流量を落とす\n ・VとAの接続をかえる\n ・体位変換を試みる\n医師に報告\n処置・指示の変\n更\n\n挿入後③再循環\n 【原因】\n 脱血側と送血側の距離が近いため\n・採血データ\n医師に報告\n処置・指示の変\n更\n\nまとめ\n・長期と短期のカテーテルの仕組みと特徴を知る\n・適応を理解したうえで患者に説明を行う\n・異常の早期発見と医師への報告を行う\n・感染を起こさないための清潔操作と患者教育が\n　大切である\nひとりで対応せず\nみんなに相談しま\nしょう\n\n参考文献\nExpert Nurse：2018.8　p68－72\nINFECTION CONTROL : 2016.5 p23－28\nバスキュラーアクセスマスターガイド：p240－266：赤松眞：メディカ出版"}, {"title": "CKD-MBD", "filename": "CKD-MBD.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/CKD-MBD__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/CKD-MBD__pptx.png", "fulltext": "腎不全\nPTH↑\n（副甲状腺ホルモン）\nリン↑\nカルシウム↓\n透析患者の血液\nビタミンD活性化↓\n・食事指導\n・リン吸着薬（内服）\n・透析\n・ビタミンD製剤投与\n　（カルシトリオール）\n・透析\n・PTH低下薬投与\n　（パーサビブ・ウパシタ）\nCKD-MBD（の省略版）\nPTHは骨を溶かして\nカルシウムを血中に補うホルモン\n・骨がスカスカに→骨折\n・血中のリンとカルシウムが結合し\n　血管に沈着→血管石灰化\n治療優先順位\nリン>カルシウム>PTH\n活性化ビタミンDは腸から血中に\nカルシウムを吸収してくれる役割"}, {"title": "DW（ドライウエイト）", "filename": "DW（ドライウエイト）.pdf", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/DW（ドライウエイト）__pdf.pdf", "thumbnail": "thumbnails/体重管理・患者指導/DW（ドライウエイト）__pdf.png", "fulltext": "DW（ドライウェイト）\n1\n\nDWとは？と聞かれたら\n透析患者の体重、というイメージ\n基礎体重、適正体重、\n透析後の余分な水が体に残っていない体重、\nなど、DWの表現は複数ある\n2\n\n腎臓が正常のひと\n➀飲食後、一日も経てば尿、便、汗などで体外に出る\n→飲食後は一時的に体重が増えるが、出れば体重は元に戻る\n➁毎日食べ続けたら→数か月後にはふとっている\n毎日筋トレし続けたら→数か月後には筋肉がついている\n▽\nどちらも数か月後には体重は増えている\n3\n\n透析（腎不全）のひと\n➀腎臓が悪いので尿が作られない\n尿（主に水分）が体外に出ないので、体に入った水分は増え続ける\n例：お茶1L飲んだら体重が+1L(1kg)、次の日1L飲んだらさらに+１L(1kg)\n体内に入る水分は腸から吸収され血液となるため、\n血液がどんどん増えていく\n・心臓に返る血液が増える（溢水・心不全）\n・肺にいく血液が増える（肺水腫）\n増えた分だけ血液から水を引いてしまえばよい\nこれが透析による除水\n4\n\n透析（腎不全）のひと\n➁医師からあなたの体重は何ｋｇです！\nと、決められる（これがDW）\n毎日食べ続けても筋トレし続けても\n医師が決めた体重がそのひとの体重なので、\n医師が変えない限り体重は一定\nそれってなにかおかしくないでしょうか\nふつうの人ならふとったり筋肉ついたりして\nどんどん体重が増えていくはず\n5\n\nそもそも、なぜDWを決める必要があるのか？\n6\n\n透析においては、増えた分だけ水を引けば良い\nDW（体重の基準値）を決めないと\nどれだけ増えたか判断できない\n体重を測定すれば、DWから増えた分がわかる\n例：DW50kg 体重計乗ったら51kg\n→透析で1kg除水を行えば透析後には50kgに戻ったためOK\n透析で除水をする▷自宅で飲み食いして増える▷除水▷飲み食い\nの、無限ループ\n7\n\n不変\n短期間で容易に変化\nひとの体重とは\n8\n\n体の体重のバランスは常に一定に保つ必要がある\n水分を1kg増やす\n（体の中に水分を残す）\nDWを上げる\n新DW12kg\nDＷ10kg\n水分を1kg減らす\n（体の中から水分を抜く）\nDWを下げる\n水分\n5kg\n脂肪\n5kg\n脂肪\n6kg\n水分\n5kg\n新DW8kg\n脂肪\n4㎏\n水分\n4㎏\n脂肪\n6kg\n水分\n6kg\n脂肪\n4㎏\n水分\n5kg\n例：水分が5kg、脂肪が5kgで\nDWが10kgの人\n9\nふとった\nやせた\n\n透析患者がふとって脂肪が増えた場合\nDW 50kg \nDW 50kg\nDWを変えないと\n水分の割合が減っているため\n血管内が脱水状態\nDW 50kg                   \nDW 51kg\nDWを上げて正常DWに\n10\n脂肪の割合がup\n正常DW\n正常DW\n\n透析前\nどれだけ除水するかが決まる\n測り間違えると、その日の除水量が変わってしまう\n透析後\n除水が予定通りに問題なく行えたかを確認している\n※必ず体重測定は事前に重さを登録した服装で行う\n体重の測定間違いは重大なインシデント\n体重測定の重要性\n※体重測定用紙の見方は別紙参照\n11\n\nDWはぴたりと決めることができない\n様々な情報を元に医師が決定\n患者から聞き取った情報と、検査データ等を確認し\nそれらを踏まえたうえでDWを常に適正に保つことができるよう\n医師に相談・報告をするのが私たちの役目！！\n※DWの詳細については教育チーム別紙参照\n12"}, {"title": "DW（ドライウエイト）", "filename": "DW（ドライウエイト）.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/DW（ドライウエイト）__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/DW（ドライウエイト）__pptx.png", "fulltext": "DW（ドライウェイト）\n1\n\nDWとは？と聞かれたら\n透析患者の体重、というイメージ\n基礎体重、適正体重、\n透析後の余分な水が体に残っていない体重、\nなど、DWの表現は複数ある\n2\n\n腎臓が正常のひと\n　➀飲食後、一日も経てば尿、便、汗などで体外に出る\n　　→飲食後は一時的に体重が増えるが、出れば体重は元に戻る\n　➁毎日食べ続けたら→数か月後にはふとっている\n　　毎日筋トレし続けたら→数か月後には筋肉がついている\n　　　　　　　　　　▽\n　　どちらも数か月後には体重は増えている\n3\n\n透析（腎不全）のひと\n➀腎臓が悪いので尿が作られない\n　　　　尿（主に水分）が体外に出ないので、体に入った水分は増え続ける\n　例：お茶1L飲んだら体重が+1L(1kg)、次の日1L飲んだらさらに+１L(1kg)\n体内に入る水分は腸から吸収され血液となるため、\n血液がどんどん増えていく\n　\n・心臓に返る血液が増える（溢水・心不全）\n・肺にいく血液が増える（肺水腫）\n増えた分だけ .70\n73.5\n\n除水量制限\n一回の透析にて血圧低下を防ぐため除水量制限（当日除水量の最大\n値）を設定している\n除水量制限は医師指示で患者によって異なる\n除水量制限＜今日の除水量 の場合、引き残しとして表示される\nリンス\nリンスとは透析中に体に入る余分な水のこと\nリンス=0.2kg（200ml）\n同時脱血はA側・V側両方合わせて約100mlの除水（脱血）を行う\n返血はA側・V側両方合わせて約300ml体内に入る\n　→返血時のほうが200ml多い（=体内へ200ml入る）\nそのため200ml余分にリンス分として除水を行う\nみたきのルール\n\n【前】体重＜DW のため除水目標値0.0kg\nリンス(0.2kg)は加算されていない\n測定用紙の一例\nコンソールの設定上の注意点\n増加量にリンス分(0.2kg)を足した除水目標値が\n0.1㎏以上の場合は0.2kgが自動で加算\n除水目標値が0.0kg以下の場合は0.2kg加算されない\nDWからの増加量＋リンス=除水目標値＋引き残し\n　　　　【前】体重－DW\n全て除水量制限3.2kg\n72.5kg－70.0kg＝2.5kg\n2.5kg＋0.2kg＝2.7kg＋0.0kg\n【前】体重\nDW\nDWからの増加量\nDWからの増加量\nリンス\n除水目標値\n引き残し\n読み方\n除水量制限＞除水目標値 のため引き残し0.0kg\n73.3kg－70.0kg＝3.3kg\n3.3kg＋0.2kg＝3.2kg＋0.3kg\n【前】体重\nDW\nDWからの増加量\nDWからの増加量\nリンス\n除水目標値\n引き残し\n除水量制限＜除水目標値 のため引き残し0.3kg\n※この患者は3.5kg除水すればDWまで達する\n69.5kg－70.0kg＝−0.5kg\n【前】体重\nDW\nDWからの増加量"}, {"title": "体重測定用紙解答", "filename": "体重測定用紙解答.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/体重測定用紙解答__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/体重測定用紙解答__pptx.png", "fulltext": "➀医師「今日からDW0.5kg上げます（70.5kg）」\n➁コンソール医師指示\n　「DW可能なら下げてください（下限69.5kg）」\n　血圧良さそうなので今日は余分に除水できそう\n③透析開始後、\n　患者「今日いつもの服に加えて余分に一枚着てきたん\n　やけど言うの忘れてた！！余分な服の重さ200gなんやわ」\n　※後体重測定時は余分な服を着て測定するものとする\n④トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑤トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑥DWよりマイナスでの入室\n　医師「今日は除水なしでリンス分も引かなく\n　ていいよ」\n除水目標値と引き残しを\n正しく書き換えてください\n3.0\n0.5\n3.2\n-0.5\n2.5\n0.2\n-0.3\n3.2\n0.3\n2.5\n0.2\n\n⑦医師「今日からDW69.0㎏にしたいので\n　そのように除水してください」\n⑧トイレ離脱後、車いすごと(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.5kg\n　看護助手「間に合わんくてズボンとおむつ変えました！\n　ズボンが200g→100gへ、おむつの重さはかわりないです」\n除水目標値と引き残しを\n正しく書き換えてください\n➈医師「前体重より－1.0kgで終わるように除水設定し\n　てください」\n0.7\n-1.0\n2.3\n0.1\n1.2\n68.5"}, {"title": "体重測定用紙計算問題", "filename": "体重測定用紙計算問題.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/体重測定用紙計算問題__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/体重測定用紙計算問題__pptx.png", "fulltext": "➀医師「今日からDW0.5kg上げます（70.5kg）」\n➁コンソール医師指示\n　「DW可能なら下げてください（下限69.5kg）」\n　血圧良さそうなので今日は余分に除水できそう\n③透析開始後、\n　患者「今日いつもの服に加えて余分に一枚着てきたん\n　やけど言うの忘れてた！！余分な服の重さ200gなんやわ」\n④トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑤トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑥DWよりマイナスでの入室\n　医師「今日は除水なしでリンス分も引かなく\n　ていいよ」\n除水目標値と引き残しを\n正しく書き換えてください\n\n⑦医師「今日からDW69.0にしたいので\n　そのように除水してください」\n⑧トイレ離脱後、車いすごと体重測定\n　トイレ前85.0kgトイレ後84.5kg\n　看護助手「間に合わんくてズボンとおむつ変えました！\n　ズボンが200g→100gへ、おむつの重さはかわりないです」\n除水目標値と引き残しを\n正しく書き換えてください\n➈医師「前体重より－1.0kgで終わるように除水設定し\n　てください」"}, {"title": "問題④DW", "filename": "問題④DW.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/問題④DW__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/問題④DW__docx.png", "fulltext": "＜DW＞　　　　 　　　　　　　          　   　　　　　　　　　　　氏名 \n \nDW とは透析後の（　➀　）のこと。\n体重増加の目安　中１日でDW の（　➁-A　）％　中２日でDW の（　➁-B　）％。\nDW がきつい場合、透析後の倦怠感、透析後半の血圧低下・声のかすれ・（　➂　）等が起きやすい。\nＤＷがゆるい場合、息苦しさ、血圧の上昇、顔や手足の（　➃　）等が起きやすい。\n透析時の最大の除水速度の目安は、ＤＷ×（　➄　） (ml/hr)。\n血圧に関して、透析中の血圧と、（　➅　）を確認することが重要。\n心臓に水が溜まっているかどうか、（　➆　）を測定し判断に用いる。\nDW 判断のため、（　➇　）を採血することがある　心房細動や弁膜症がある場合は数値に注意。\nMLT では細胞外液比（血管内水分量）や（　➈　）を測定している。\nBV 計の基準値は（　➉　）％以内である。\n\n解答欄\n➀\n➅\n➁A                   B\n➆\n➂\n➇\n➃\n➈\n➄\n➉"}, {"title": "問題⑨採血　後半", "filename": "問題⑨採血　後半.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/問題⑨採血　後半__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/問題⑨採血　後半__docx.png", "fulltext": "＜採血　後編＞　　　　 　　　　　　　        　　氏名　　　　　　　　　　　　　　\nAlb（アルブミン）\n基準値：3.5 以上(g/dL)　（　➀　）の指標として使う。\nP（リン）\n基準値：（　➁　）(mg/dL)\n高P 血症が続くと　・（　➂　）　・異所性石灰化（動脈硬化）　の原因となる。\nCa（カルシウム）\n基準値：補正Ca （　➃　）(mg/dL)\nintact-PTH（インタクトPTH）\n基準値：60～300(pg/mL)　高P 血症と（　➄　）血症によりPTH が上昇する。\nK（カリウム）\n基準値：（　➅　）(mEq/L)\n高カリウムの症状\n・四肢、口唇の（　➆　）　・筋脱力感　・悪心、嘔吐などの胃腸症状\nβ2-MG（ベータ２-ミクログロブリン）\n\n基準値：30（ｍg/dL）以下　高値の場合（　➇　）に切り替えるとβ2-MG が除去される。\nGA（グリコアルブミン）\n基準値：24.0（%）未満\n過去２～４週間の平均（　➈　）状態を表す。\n透析患者は（　➈　）管理に（　➈　）値とGA を用いる。（　➉　）は参考程度。\n解答欄\n➀\n➅\n➁\n➆\n➂\n➇\n➃\n➈\n➄\n➉"}, {"title": "問題⑪患者指導➁（カリウム）", "filename": "問題⑪患者指導➁（カリウム）.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/問題⑪患者指導➁（カリウム）__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/問題⑪患者指導➁（カリウム）__docx.png", "fulltext": "＜患者指導➁　カリウム＞　　　　　          　　　氏名　　　　　　　　　　　　\n食事摂取ガイドライン\nカリウム（　➀　）mg/day 未満。\nカリウムが上昇する原因\n食事からのカリウム過剰摂取。\n（　➁　）が続いたとき。\nカリウムが多い食材\n（　➂　）類、豆・種実類、果実類、野菜類、海藻類、肉・魚類\n日本人のカリウム摂取量に影響するものは（　➃　）類が最も多く、次いで（　➄　）類。\n→摂取量が多いため高カリウムになりやすい食材。\nカリウムを減らす工夫\n・細かく切る→（　➅　）\n・（　➆　）\n大変な場合は冷凍野菜や水煮保存の食材、（　➇　）の食材を使用。\n\n野菜ジュースや（　➈　）は特にカリウムが濃縮されて含有されている。\n食事以外の原因として（　➉　）や透析量不足による高カリウムになっていないかを探る。\n解答欄\n➀\n➅\n➁\n➆\n➂\n➇\n➃\n➈\n➄\n➉"}, {"title": "問題⑫患者指導③（リン）", "filename": "問題⑫患者指導③（リン）.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/問題⑫患者指導③（リン）__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/問題⑫患者指導③（リン）__docx.png", "fulltext": "＜患者指導③　リン＞　　　　　        　　　 　　氏名　　　　　　　　　　　　　\nリンが上昇すると、血中の（　➀　）と結合し体のいろいろなところに沈着する。\n・血管に沈着すると（　➁　）がおき、心筋梗塞や脳梗塞などの合併症を引き起こす。\n・皮膚の痒み、関節の腫脹や変形、痛みなど運動障害が起こる。\n食事摂取ガイドライン\nリン（　➂　）×15mg/day 以下。\nリン上昇に対する対応\n・食事指導　・（　➃　）　・透析\nリンには無機リンと有機リンがあり、無機リンのほうが体内に吸収されやすい。\n吸収率は無機リン（　➄　）％以上\n有機リン　動物性（　➅　）％　植物性20～40％\nリンを多く含む食品\n無機リン\n・（　➆　）　・加工食品　・練り物\n有機リン\n・（　➇　）　・豆類　・卵　・肉　・魚\n\n無機リンは炭酸飲料水、清涼飲料水、缶コーヒー、（　➈　）、発泡酒にも多く含まれる。\n（　➉　）入りの加工食品はなるべく控えるように指導。\n解答欄\n➀\n➅\n➁\n➆\n➂\n➇\n➃\n➈\n➄\n➉"}, {"title": "問題➇採血　前半", "filename": "問題➇採血　前半.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/問題➇採血　前半__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/問題➇採血　前半__docx.png", "fulltext": "＜採血　前編＞　　　　 　　　　　　　     　   　　　　　　　　　氏名 \n \nHb　基準値：（　➀　）g/dL。\n貧血の指標。\n主に腎性貧血〔（　➁　）産生低下〕の影響でHb は低値になる。\n腎性貧血以外のHb 低下の原因\n・出血による貧血（急なHb の低下は（　➂　）を疑う）\n・（　➃　）欠乏性貧血\n・その他\n白血球　基準値：9000 個/μL\n主に（　➄　）や炎症で上昇。\n血小板　基準値：15～40 万個/μL\n（　➅　）では急激に低下するため注意。\nフェリチン　基準値：（　➆　）～300（ng/mL）\n体内の（　➇　）の指標。\nTSAT　基準値：20％以上\n\n（　➇　）がどの程度、体内に運ばれているかを示す指標。\nESA 投与下で目標Hb 値が維持できない患者において、 \n推奨：血清フェリチン値が（　➆　）ng/mL 未満かつTSAT が20%未満の場合、（　➈　）投与を検討。\nhanp　基準値：（　➉　）pg/dL\n解答欄\n➀\n➅\n➁\n➆\n➂\n➇\n➃\n➈\n➄\n➉"}, {"title": "問題➉患者指導➀（水分塩分）", "filename": "問題➉患者指導➀（水分塩分）.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/問題➉患者指導➀（水分塩分）__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/問題➉患者指導➀（水分塩分）__docx.png", "fulltext": "＜患者指導➀　水分・塩分＞　　　　　          　　氏名　　　　　　　　　　　　\n体重増加が多いと循環血漿量が増えるため、（　➀　）、血圧の上昇の原因となる。\n食事摂取ガイドライン\n塩分（　➁　）g/day 未満\n水分（　➂　）\n水分を減らす工夫\n・（　➃　）で口をうるおす　・ストローを使う　・温かい飲みものにする\n調理方法のコツ\n・（　➄-A　）よりも（　➄-B　）ほうが水分は減る\n無尿患者の場合\n（　➅　）≒増加量とイメージできる\n塩分を減らす工夫\n・香辛料、香味野菜、酸味を使う　・しょうゆやソースは（　➆-C　）よりも（　➆-D　）\n・減塩調味料を使う　・味に(  ➇  )をつける\n\n中食（惣菜や弁当を購入して食べる場合）を購入する際は（　➈　）の表示を確認する\n外食では（　➉-E　）よりも（　➉-F　）を頼み、塩分の多いものは残す\n解答欄\n➀\n➅\n➁\n➆　C　　　　　　　　　D\n➂\n➇\n➃\n➈\n➄　A　　　　　　　　　 B\n➉　E　　　　　　　　  F"}, {"title": "最新版除水量書き換え", "filename": "最新版除水量書き換え.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/最新版除水量書き換え__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/最新版除水量書き換え__pptx.png", "fulltext": "除水量制限\n一回の透析にて血圧低下を防ぐため\n除水量制限（当日除水量の最大値）を設定してい\nる\n除水量制限は医師指示で患者によって異なる\n除水量制限＜今日の除水量 の場合、引き残しとし\nて\n表示される\nリンス\n透析中に体に入る余分な水のこと\nリンス=0.2kg（200ml）\n同時脱血はA側・V側両方合わせて約100mlの除水（脱血）を\n行う\n返血はA側・V側両方合わせて約300ml体内に入る\n　→返血時のほうが200ml多い（=体内へ約200ml入る）\nそのため０.２㎏余分にリンス分として除水を行う\nリンス分を足し除水量が０.１㎏以上になる場合は\n「除水計算の疑問解決！書き換え事例\n集」\n透析室教育チー\nム\n\n➀医師「今日からDW0.5kg上げます\n（70.5kg）」\n➁コンソール医師指示\n　「DW可能なら下げてください（下限69.5kg）」\n　血圧良さそうなので今日は余分に除水できそう\n③透析開始後、\n　患者「今日いつもの服に加えて余分に一枚着てきたん\n　やけど言うの忘れてた！！余分な服の重さ200gなんや\nわ」\n除水目標値と引き残しを正しく書き換えてく\nださい\n\n④トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑤トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑥DWよりマイナスでの入室\n　医師「今日は除水なしでリンス分も引かなく\n　ていいよ」\n除水目標値と引き残しを正しく書き換えてく\nださい\n\n⑦医師「今日からDW69.0にしたいので\n　そのように除水してください」\n⑧トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.5kg\n　看護助手「間に合わんくてトイレ中にズボンとお\nむつを\n　変えました！ズボンが200g→100gへ、おむつの重\nさは\n　同じです」\n➈医師「前体重より－1.0kgで終わるように除水設\n定し\n　てください」\n除水目標値と引き残しを正しく書き換えてく\nださい"}, {"title": "除水量書き換え", "filename": "除水量書き換え.pptx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/除水量書き換え__pptx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/除水量書き換え__pptx.png", "fulltext": "除水量制限\n一回の透析にて血圧低下を防ぐため\n除水量制限（当日除水量の最大値）を設定してい\nる\n除水量制限は医師指示で患者によって異なる\n除水量制限＜今日の除水量 の場合、引き残しとし\nて\n表示される\nリンス\n透析中に体に入る余分な水のこと\nリンス=0.2kg（200ml）\n同時脱血はA側・V側両方合わせて約100mlの除水（脱血）を\n行う\n返血はA側・V側両方合わせて約300ml体内に入る\n　→返血時のほうが200ml多い（=体内へ約200ml入る）\nそのため0.2kg余分にリンス分として除水を行う\nリンス分を足し除水量が0.1kg以上になる場合は自動設定で\n0.2kg除水量に上乗せされる\n「除水計算の疑問解決！書き換え事例\n集」\n透析室教育チー\nム\n\n➀医師「今日からDW0.5kg上げます\n（70.5kg）」\n➁コンソール医師指示\n　「DW可能なら下げてください（下限69.5kg）」\n　血圧良さそうなので今日は余分に除水できそう\n③透析開始後、\n　患者「今日いつもの服に加えて余分に一枚着てきたん\n　やけど言うの忘れてた！！余分な服の重さ200gなんや\nわ」\n除水目標値と引き残しを正しく書き換えてく\nださい\n\n④トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑤トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.8kg\n⑥DWよりマイナスでの入室\n　医師「今日は除水なしでリンス分も引かなく\n　ていいよ」\n除水目標値と引き残しを正しく書き換えてく\nださい\n\n⑦医師「今日からDW69.0にしたいので\n　そのように除水してください」\n⑧トイレ離脱後、車いす(重さ10.0㎏)ごと体重測定\n　トイレ前85.0kgトイレ後84.5kg\n　看護助手「間に合わんくてトイレ中にズボンとお\nむつを\n　変えました！ズボンが200g→100gへ、おむつの重\nさは\n　同じです」\n➈医師「前体重より－1.0kgで終わるように除水設\n定し\n　てください」\n除水目標値と引き残しを正しく書き換えてく\nださい"}, {"title": "風袋について", "filename": "風袋について.docx", "category": "体重管理・患者指導", "pdf": "pdf/体重管理・患者指導/風袋について__docx.pdf", "thumbnail": "thumbnails/体重管理・患者指導/風袋について__docx.png", "fulltext": "風袋について\n体重測って透析が始まった後、実は今日の服、登録してある服より重かったんやわ、\nもしくは軽かったんやわ、って言われた時の考え方の一例。\n登録より重い服を着てきた（＝重く測った）パターン\n服が重い→本来より重たく測ってしまった\n→重く測ったのでその分除水量が多く表示される\n→除水量が多くなってしまったため減らす必要あり\n→除水量を重い分だけ減らす(引き残す)\n登録より軽い服を着てきた（＝軽く測った）パターン\n服が軽い→本来より軽く測ってしまった\n→軽く測ったのでその分除水量が少なく表示される\n→除水量が少なくなってしまったため増やす必要あり\n→除水量を軽い分だけ増やす（加算する）\n例\n衣服400 ｇで登録してあり、500 ｇの服を着て測った（いつもの服より100 ｇ重いんやわこの服）って\n言われた場合、その日の除水量が2.4kg だとすると2.3kg に変更すればよい。\n軽かったときのパターンはその逆。\n重く測ったパターンでよくあるケース\n・上着を着ていた\n・車イス測定時にクッションが乗っていた\n・携帯や財布を持ったままだった\n軽く測ったパターンでよくあるケース\n・脱がなくていい上着を脱いでしまった\n・車イス測定時に乗せるべきクッションが乗っていなかった\n・車イス測定時につけるべきフットレストがついていなかった\n・スケールベッド測定でバスタオルが敷かれていなかった\nまとめ\n登録風袋より重く測ったパターン→除水量を減らす（重い分残す）\n登録風袋より軽く測ったパターン→除水量を増やす（軽い分加算する）\n余談：語呂で覚えてみたり…　「風袋って思い残す（重いと→残す）ことあるよね…」\n表示される除水量\nDW（登録済）\n透析前体重\n通常\n風袋（登録済）"}, {"title": "2023ICLSおすすめ教材動画", "filename": "2023ICLSおすすめ教材動画.pdf", "category": "機器操作・急変対応", "pdf": "pdf/機器操作・急変対応/2023ICLSおすすめ教材動画__pdf.pdf", "thumbnail": "thumbnails/機器操作・急変対応/2023ICLSおすすめ教材動画__pdf.png", "fulltext": "おすすめ動画\nみたき総合病院\n透析室\n\n急変時対応\nその１\nICLSデモストレーション\n（これが最終⽬標）\nBLSデモンストレーション\n（これはみなさんできてほしい）\n\n急変時対応\nその２\nVF/pulselessVT\nプロトコール\n（電気ショック必要なやつ）\nPEA/Asystole\nプロトコール\n（電気ショックいらないやつ）\n\nマスク換気について\n気管挿管について\n急変時対応\nその３\n（当院ではごくごくまれだと思いますが…）"}, {"title": "2023下肢挙上", "filename": "2023下肢挙上.pdf", "category": "機器操作・急変対応", "pdf": "pdf/機器操作・急変対応/2023下肢挙上__pdf.pdf", "thumbnail": "thumbnails/機器操作・急変対応/2023下肢挙上__pdf.png", "fulltext": "下肢挙上は⾎圧低下に対して\nどこまで意味があるのか\n\nPassive leg raising does not produce \na significant or sustained autotransfusion effect\n受動的な脚上げは有意なまたは持続的な⾃⼰輸⾎効果をもたらさない\nJ Trauma. 1982 Mar;22(3):190-3.\n3min\n7min\n⼼拍数\n⾎圧\n⼼拍出量\n25-35 歳\n健康なボランティア\n10 名\n１回拍出量と⼼拍出量が⼀時的に増加\n（８から１０％）\n７分後には左記の増加は消失\n平均⾎圧の有意な上昇は認めない\n健常者対象のデータにて末梢⾎管抵抗や⼼拍数が代償されて⾎圧が上がらない\n健常な⼈に対して下肢挙上\nその１\n(Passive Leg Raising:PLR)\n\n健常な⼈に対して下肢挙上\nその２\n(Passive Leg Raising:PLR)\n国⼠舘⼤学⼤学院救急システム研究科(Graduate School of Emergency Medical Systems, Kokushikan University) \n国⼠舘⼤学⼤学院スポーツシステム研究科(Graduate School of Sport Systems, Kokushikan University)\n被験者\n健常な男性8名(平均年齢32±4.6 歳・平均⾝⻑173.5±6.1cm・平均体重76.8±13.9kg) \n事実\n・１回拍出量（Stroke volume:SV）はしっかり増加（前負荷増加によるところと推察）\n・PLRの⾓度はSV増加の程度に影響はなし（20°30°40°で検討）\n・平均⾎圧の有意な上昇は認めない\n私⾒\n・その他の因⼦はFeedback機構に応じて恒常性を保つよう動いているように⾒える\n\n健常な⼈に対して下肢挙上\nその２\n(Passive Leg Raising:PLR)\n国⼠舘⼤学⼤学院救急システム研究科(Graduate School of Emergency Medical Systems, Kokushikan University) \n国⼠舘⼤学⼤学院スポーツシステム研究科(Graduate School of Sport Systems, Kokushikan University)\n被験者\n健常な男性8名(平均年齢32±4.6 歳・平均⾝⻑173.5±6.1cm・平均体重76.8±13.9kg) \n⼼拍数\n平均⾎圧\n\n健常な⼈に対して下肢挙上\nその２\n(Passive Leg Raising:PLR)\n国⼠舘⼤学⼤学院救急システム研究科(Graduate School of Emergency Medical Systems, Kokushikan University) \n国⼠舘⼤学⼤学院スポーツシステム研究科(Graduate School of Sport Systems, Kokushikan University)\n被験者\n健常な男性8名(平均年齢32±4.6 歳・平均⾝⻑173.5±6.1cm・平均体重76.8±13.9kg) \n⼼拍出量\nCardiac output\n１回拍出量\nStroke volume\n\nAnaesthesia. 2018 Mar;73(3):313-322\nVolume responsiveness assessed by passive leg raising and a fluid challenge: \na critical review focused on mean systemic filling pressure\n受動的な脚上げと⽔分補給によって評価される容積反応性: 平均全⾝充満圧に焦点を当てた批判的レビュー\nResponder\n下肢挙上で⾎圧が上がるグループ\nNon-Responder\n下肢挙上で⾎圧が上がらないグループ\n中⼼静脈圧・平均動脈圧・⼼拍出量を評価しても\nこの２群を事前に⾒分けることは⾮常に難しい\n↓\n集中治療室のモニタリングを持ってしても事前に予想する事はできない\n健常ではない⼈に対して下肢挙上\n(Passive Leg Raising:PLR)\n\nみたき総合病院透析室にて\n下肢挙上は⾎圧低下に対して\nどこまで意味があるのか\n\n透析中に⾎圧低下\n背景\n・透析患者は除⽔をしている（前負荷↓ 「輸液する」の逆）\n・よって前負荷↑は効果的であることが多い\nはず\n・よって下肢挙上にて⾎圧upする症例が多い\nはず\n前負荷↑の⽅法\n効果\n⽅法\nコメント\n⼩\n下肢挙上５分で効果が切れる（次の⼿をうつまでの時間稼ぎ）\n緊急補液まず200mLで挑戦\n⼤\n緊急返⾎約300mLのRBC輸⾎に相当（2単位強）\n\n下肢挙上で⾎圧が上がらない時\n病態\n前負荷↑\n#1\nすごく\n⾎管内脱⽔\n⾮常に有効\n#2\n⼼原性ショック\n（不整脈・⼼筋梗塞）有害な時もある\n＃\n⾎圧の戻りがいまいち\n＃\n⾎圧戻ったのに愁訴が遷延\nこのような時にはモニター観察必須です\n\n結語\nみたき総合病院透析室にて\n下肢挙上は⾎圧低下に対して「ある程度」意味はあります\n下肢挙上はあくまで応急処置\n⾎圧低下に対する次の処置につなぐための\n時間稼ぎと捉えましょう\nいつか下肢挙上を解除するかはCase by caseです"}, {"title": "DCS-200Siの取り扱い", "filename": "DCS-200Siの取り扱い.pdf", "category": "機器操作・急変対応", "pdf": "pdf/機器操作・急変対応/DCS-200Siの取り扱い__pdf.pdf", "thumbnail": "thumbnails/機器操作・急変対応/DCS-200Siの取り扱い__pdf.png", "fulltext": "透析用コンソール（DCS-200Si）\n操作方法\n～コンソールの機能・警報対応について～\n1\n\n各部の名称\n血液ポンプ\n補液ポンプ\n排液ポート\n排液カップ\nチャンバー\nホルダー\n静脈圧ポート\n電源ON・OFFボタン\n気泡検知器\n透析液吐出口\nBVPlus\nカプラ\n\nコンソール基本画面\n運転\n透析液が流れている\n停止\n透析液が流れていない\n※停止の時はコンソールから報知音が鳴る\n3\n\n選択できる治療モード\n①HD：血液透析\n②ECUM:体外式限外濾過法→透析液は流れず、限外濾過のみで水分を除去\n③OHDF：オンライン血液透析濾過\n➃I-HDF：間欠補充型血液透析濾過\n➄OHF：オンライン血液濾過→当院では使用しない\n4\n\n各種治療モードからECUMへの切り替え\nHDとOHDF\nそのままECUMへ\n除水プログラム入の場合\n除水プログラムをOFFにしECUMへ\nIHDF\n停止→IHDF長押し→HD→ECUMへ\n5\nMEに声をかけてください\n\n脱血方法の切替え\n同時脱血、片側脱血（除水あり）、非脱血（片側脱血除水なし）の3種類\n穿刺後に回路を接続し\n「脱血」を押す\n初期設定は「同時脱血」のため\n問題なければ、「開始」を押す\n切替えたいモードがある場合は\n選択し「開始」を押す\n同時脱血\n     ：脱血側と返血側から同時に脱血を行い、除水ポンプで合計100mlを廃棄後に透析モードへ切替わる\n片側脱血除水あり：脱血側より除水ポンプで100mlを廃棄後に透析モードへ切替わる\n片側脱血除水なし：脱血側より血液を100ml脱血し、返血側より100mlを体内へ投与後に透析モードに切替わる\n6\n同時脱血時\n脱血側と返血側両方から\n脱血が出来ているか目視で確認！！\n\n除水速度の変更方法（HD）\n➀青枠の「計算」を\n  押す\n➁透析時間を設定値\nに▲▼で変更する\n③赤枠の「計算」を\n長押しする\n➃透析残り時間と透析\n経過時間が目標の時\n間であることを確認す\nる。\n※時間の確認は緑枠\nを押していくと表示され\nる\n\n透析液温度の変更\n➀青枠の透析液温度を押す\n※初期設定値36.0℃\n➁温度の▲▼で温度を設定する\n上昇\n低下\n\nコンソールに体温・血圧の入力方法\n➀青枠の血圧を選択\n➁赤枠の体温を選択\n③▲▼キーで値を入力する\n➃送信を長押しする\n③緑枠の血圧を選択する\n➃最高血圧・最低血圧・脈\n拍を▲▼キーで入力する\n➄送信を長押しする\n※自動測定間隔がONになっ\nていると手動での入力ができ\nない為、OFFにする。\n\n血圧計の設定変更方法\n➀青枠の血圧を選択する\n➁赤枠の設定を選択する\n③6.1～6.4で変更項目を選\n択する\n血圧自動測定間隔の変更\n➃6.1 赤枠の「〇分」を選択する\n➄変更する値を入力しSETを押す\n最高血圧上限\n➅6.3 黄枠の「〇mmHg」を選択する\n➆➄同様に値を入力する\n➇緑枠の上限・下限を選択する\n➈➄同様に値を入力する\n脈の上限・下限\n\nタイマー設定\n➀青枠のタイマーを\n押す\n➁赤枠の空白バーを\n押す\n③タイマ選択の内容を\n 選択する\n➃タイマの時間を\n▲▼で設定し開始を\n押す\n※時間は残り時間・\n 完了時刻どちらでも\n 設定可能\n➄タイマが正しく動き、\n時間が正しいことを\n確認する\n\nVチャンバーの液面のレベル調整\n①左下の「メニュー」\n②「レベル調整」\n③液面を上げる時は「▲」を長押し\n液面を下げる時は「▼」を長押し\n12\n\nコンソールへの患者情報取り込み・解除\n➀青枠を押す\n➁赤枠の確認を押す\n③透析条件が表示される\nか確認する\n➀緑枠の通信設定を押す\n➁黄枠の確認を長押しする\n③「確認」がグレーになった\nこと確認する\n患\n者\n情\n報\n取\nり\n込\nみ\n患\n者\n情\n報\n解\n除\n\nオンラインHDF\n原理\n清浄された透析液をAチャンバーから12L/hの速度で補液し、その分をヘモダイアフィルターで除水する。\n補液した分を除水する際、HDよりも圧をかけるため、そのときにHDでは抜けない大分子物質も抜ける。\n◇HDFのメリット\n・かゆみの減少\n→原因とされる大分子の老廃物「α１-MG」の除去による\n・合併症の予防\n→「α１-MG」「β２-MG」など大分子物質の除去\n・食欲改善\n→食欲抑制物質レプチンの除去\n・血圧の安定化\n・貧血の改善\n・レストレスレッグス症候群の改善\n◇HDFのデメリット\n・大分子物質を除去するため、体内に必要な大分子のアルブミンが漏出してしまう。\n前希釈について\n・前希釈（Aチャンバーから補液）\n大量に補液してから除水を行う。\nみたきは前希釈。全国で約90％。\nみたきでは補液量12L/hr。\n教育チーム資料＜透析のモードより引用＞\n14\n\nオンラインHDFの画面説明\n透析時間で入る補液量の合計\n１時間あたりの補液速度\n（医師指示）\n現在の補液量\n15\n\nオンラインHDFの除水速度変更（時間短縮時）\n例）透析時間が4時間\nから3時間への変更\n①透析時間を3時間へ\n変更し計算をすると\n「補液速度の計算結\n果が最高補液速度を\nこえています」と表示さ\nれ、除水量変更不可\n②「補液量設定」を\n補液速度×透析時間の\n値に変更する\n例）4時間から3時間\n補液速度12L\n×透析時間3h＝36L\n③除水速度と補液速\n度・補液量設定を再\n度確認する\n16\n注意点\nHDFの除水変更時、補液速度も変更されてしまう\n→除水速度変更後、正しい補液速度であるか確認する\n\nI-HDF\n間歇的に補液を計画的に繰り返すことで、末梢循環改善効果や血圧低下予防が期待される治療法。\nHDFでは4時間補液し続けるのに対して、I-HDFでは30分に一度100ml～150mlだけを補液する。\nその後、30分かけて補液した分の除水を行う。みたきではDW40㎏以上は150ml、以下は100mlを\n目安。\n効果\n・末梢循環障害の改善\n間歇的に補液をすると、細くなった血管が開いて末梢循環の改善につながる。\n・血圧低下予防\n定期的な補液で一時的に体内の循環血液量を増加させ血圧を維持させる。\n教育チーム資料＜透析のモードより引用＞\n17\n\nI-HDFの画面説明\n補液分を含んだ目標除水量\n体重測定時の目標除水量\n補液速度（この例は150ml/minで補液）\n右下の時間は次に補液するまでの時間\n次の補液までに除水を行う量（残りの補液量）\n一回当たりの補液量の見方\n「補液速度」→「補液量」\n18\n\nBV計の機能（BVｐlus ）\n19\n\nΔBV測定\n「メニュー」→「グラフ・表」\n→「BV計」\n20\n\nV側より中枢の狭窄部疑いや、A側より\n末梢の狭窄でシャント血流が少ない疑\nいのときなどに再循環測定を行う\n→再循環率は15％以内を目標\n「メニュー」→「グラフ・表」→「BV計」→ 「再循環率測定」 →「再循環率測定開始」\n21\n\n22\n\nLDQb不足率警報\n目標血流量よりＬＤＱｂが下回る（血流量不足率30％以下）場合に警報発生\n原因\nシャント狭窄のリスクやA側穿刺針が血管内に挿入できていない可能性あり\n対応\n「メニュー」→「モニタ」→「モニタ」→2ページ目の推定血流量・LDQbを確認\n設定血流量に対し、LDQｂが著しく低い場合は、Ａ側の針先の確認、針先洗浄、A側穿刺部より末梢側シャント\n狭窄の有無を確認\n23\n\n24\n\nHtの確認方法\n急激なＨｔ値の低下は出血のリスク\nがあり、消化管出血、骨折等を疑う\n血液回路凝固に伴う、血液損失時\nの評価にも利用可能\n「メニュー」→「モニタ」\n→4ページ目のHt\n25\n\n静的静脈圧の確認方法\n①「設定」→「スイッチ」\n②「その他」→\n「静的静脈圧」\n③静的静脈圧が表示\nされる\n静的静脈圧は毎回脱血時に自動測定\n静脈圧に比べて針の太さや回路やQbの影響を受けないため本来の静脈圧が測定可能\n26\n\n静的静脈圧の基準値\n項目\nAVF\nAVG\nN数（人）\n62\n9\n静的静脈圧（mmHg）\n0.85\n32.1\nAVF\nAVG\nVAIVT歴\nVAIVT無\nVAIVT有\nVAIVT無\nVAIVT有\nN数（人）\n62\n4\n9\n6\n平均値（mmHg）\n0.85\n34.5\n32.1\n56\n明確な基準値はない\n患者によっても様々なため患者ごとの推移を追う\nみたき患者での平均値を算出した結果、AVFは0.85 AVGは32.1\n基準値の目安：AVF→0mmHg付近？AVG→30mmHg前後？\n27\n\n除水プログラムについて\n3hHD\n1hECUM\n28\n30分に一度\n除水速度や\nモードの変更が入る\n段階除水プログラム\n3hHD+1hECUM除水プログラム\n\n29\nここを押して\nプログラムをOFFにする\nプログラム入の患者\n除水速度を0.0L/hrにしたときの注意点\nプログラムが自動変更される時間がくると\n除水が再開される→プログラムをOFFにする\nプログラムをOFFにすると透析中はONにできない\n3時間透析+1時間ECUMなどのECUMが入る\n除水プログラムはECUM切り替えタイマーを入れて\n手動でECUM切り替えを\n\n30\n一度押してみる\nプライミングが開始できない場合の対処法\n\n透析量モニタについて\n新しくDCS-200Siに搭載された機能で透析量モニタを確認するだけで再循環の有無を確認することができ\nます。確認方法は以下の手順になります\n青枠をタッチし「グラフ・表」から\n透析量モニタを選択\n正常の波形\n再循環の可能性\nありの波形\nギザギザの波形は再循環を疑う\n\n32\n原因\n対応\nA針先の凝血付着\n針先洗浄\n脱血不良\n・穿刺場所のフローが少ない\n・A針が血管壁に当たっている \n・A針が血管まで到達していない\n・血圧低下\n・脱血針の折れ曲がり\nQBを下げる・再穿刺・駆血\nエコーで確認・針先調整\nエコーで確認・押し込んで血管を切る・再穿刺\n除水停止・補液\n針固定の調整\nA側回路（Vチャンバーまで）の折れ曲がり\n・患者が腕を曲げたとき\n・回路固定での回路のねじれ\n原因の解除\nダイアライザー・Aチャンバーの凝血\n凝血確認・ダイアライザー及び回路交換（ME対応）\nA針の抜針\n再穿刺・V針でシングルニードルモードへの切り替え\nV針の抜針\n再穿刺・A針でシングルニードルモードへの切り替え\nA側穿刺部より上流の閉塞・狭窄\n穿刺部の変更VAIVTを行う\n原因\n対応\nV針先の凝血付着\n針先洗浄\nV針・V側回路の折れ曲がり\n・患者が腕を曲げたとき\n・回路固定での回路のねじれ\n原因の解除\nV針が血管壁に当たっている・挿入不足\nエコーで針先の確認・針先修正\nVチャンバーの凝血\n抗凝固薬の注入忘れ・持続量の不足\nVチャンバーの濃縮\n再循環の所見がないか確認\nV側穿刺部より下流の閉塞・狭窄\n穿刺部の変更VAIVTを行う\n①静脈圧上限警報\n➁静脈圧下限警報\n\n③透析液圧上限警報\n33\n原因\n対応\n静脈圧上限に伴うもの\n静脈圧上限と同じ対応を行う\nダイアライザー出口～Ｖチャンバーまでの回路の折\nれ曲がり\n折れ曲がりを解除\n原因\n対応\n静脈圧下限に伴うもの\n静脈圧下限と同じ対応を行う\nダイアライザーの目詰まり\nダイアライザー交換（ME対応）\nオンラインHDFの場合\n補液速度を下げる（ME対応）\n➃透析液圧下限警報\nオンラインHDFにおける透析液圧下限\n除水速度が速い場合、透析後半に膜の目詰まりが起こり\n陰圧が強くかかる で変更する\n③赤枠の「計算」を\n    長押しする\n➃透析残り時間と透\n析経過時間が目標の\n時間であることを確\n認する。\n※時間の確認は緑枠\nを押していくと表示\nされる\n\n透析液温度の変更\n➀青枠の透析液温度を押す\n　　※初期設定値36.0℃\n➁温度の▲▼で温度を設定する\n上昇\n低下\n上昇\n低下\n\nコンソールに体温・血圧の入力方法\n体温\n血圧\n➀青枠の血圧を選択\n➁赤枠の体温を選択\n③▲▼キーで値を入力する\n➃送信を長押しする\n③緑枠の血圧を選択する\n➃最高血圧・最低血圧・\n脈拍を▲▼キーで入力す\nる\n➄送信を長押しする\n※自動測定間隔がONに\nなっていると手動での入力\nができない為、OFFにする。\n\n血圧計の設定変更方法\n➀青枠の血圧を選択する\n➁赤枠の設定を選択する\n③6.1～6.4で変更項目を\n選\n　択する\n血圧自動測定間隔の変更\n➃6.1　赤枠の「〇分」を選択\nする　\n➄変更する値を入力しSETを押\nす\n最高血圧　上限\n➅6.3　黄枠の「〇mmHg」を選択\nする\n➆➄同様に値を入力する\n➇緑枠の上限・下限を選択す\nる\n➈➄同様に値を入力する\n脈の上限・下限\n\nタイマー設定\n➀青枠のタイマーを\n　　押す\n➁赤枠の空白バーを\n　　押す\n③タイマ選択の内容\nを\n　 選択する\n➃タイマの時間を\n　▲▼で設定し開始\nを\n　押す\n※時間は残り時間・\n　 完了時刻どちらで\nも\n　 設定可能\n➄タイマが正しく動\nき、\n　時間が正しいこと\nを\n　確認する\n\nVチャンバーの液面のレベル調整\n➀左下の「メ\nニュー」\n　\n➁「レベル調\n整」\n　\n③液面を上げる時は「▲」を長押し\n     液面を下げる時は「▼」を長押し\n　\n12\n\nコンソールへの患者情報取り込み・解除\n➀青枠を押す\n➁赤枠の確認を押す\n③透析条件が表示される\nか確認する\n➀緑枠の通信設定を押す\n➁黄枠の確認を長押しす\nる\n③「確認」がグレーに\nなったこと確認する\n患\n者\n情\n報\n取\nり\n込\nみ\n患\n者\n情\n報\n解\n除\n\nオンラインHDF\n \n原理\n清浄された透析液をAチャンバーから12L/hの速度で補液し、その分をヘモダイアフィルターで除水する。\n補液した分を除水する際、HDよりも圧をかけるため、そのときにHDでは抜けない大分子物質も抜ける。\n \n◇HDFのメリット\n・かゆみの減少\n→原因とされる大分子の老廃物「α１-MG」の除去による\n・合併症の予防\n→「α１-MG」「β２-MG」など大分子物質の除去\n・食欲改善\n→食欲抑制物質レプチンの除去\n・血圧の安定化\n・貧血の改善\n・レストレスレッグス症候群の改善\n◇HDFのデメリット\n・大分子物質を除去するため、体内に必要な大分子のアルブミンが漏出してしまう。\n \n前希釈について\n・前希釈（Aチャンバーから補液）\n大量に補液してから除水を行う。\nみたきは前希釈。全国で約90％。\nみたきでは補液量12L/hr。\n教育チーム資料＜透析のモードより引用\n＞\n14\n\nオンラインHDFの画面説明\n透析時間で入る補液量の合\n計\n１時間あたりの補液速\n度\n（医師指示）\n現在の補液量\n15\n\nオンラインHDFの除水速度変更（時間短縮\n時）\n例）透析時間が4時\n間から3時間への変\n更\n➀透析時間を3時間\nへ変更し計算をする\nと「補液速度の計算\n結果が最高補液速度\nをこえています」と\n表示され、除水量変\n更不可\n➁「補液量設定」を\n補液速度×透析時間の\n値に変更する\n例）4時間から3時間\n　　補液速度12L\n　　×透析時間3h＝36L\n③除水速度と補液速\n度・補液量設定を再\n度確認する\n16\n注意点\nHDFの除水変更時、補液速度も変更されてしまう\n→除水速度変更後、正しい補液速度であるか確認す\nる\n\nI-HDF\n \n間歇的に補液を計画的に繰り返すことで、末梢循環改善効果や血圧低下予防が期待される治療法。\nHDFでは4時間補液し続けるのに対して、I-HDFでは30分に一度100ml～150mlだけを補液する。\nその後、30分かけて補液した分の除水を行う。みたきではDW40㎏以上は150ml、以下は100mlを\n目安。\n \n効果\n・末梢循環障害の改善\n間歇的に補液をすると、細くなった血管が開いて末梢循環の改善につながる。\n \n・血圧低下予防\n定期的な補液で一時的に体内の循環血液量

れる波です。\n④ST部分：QRS波の終わりからT波の始まりまでの時間で、心筋虚血\nの判定はこの部分の基線から偏位の度合いを指標にします。\n⑤PQ間隔：P波の始まりからQRS波の始まりまでの時間で、心房から\n心室へ興奮が伝わる時間を表す。\n\n波形の正常値及び計測法\n講義では便利上\n0.2秒のマスを1コ\nマといいます\n\n波形の計測法\n300  150  100  75 60 50   43\n\n正常洞調律（NSRとは）\n• NSR（Normal Sinus Rhythm）の定義\n①P波、QRS波、T波の順でワンセットで認められる。\n②心拍数（HR）60（50）回/分≦HR ≦100回/分\nRR間隔整\n15mm（0.6秒）≦RR ≦25（30）mm（1.0秒）\n③QRS幅≦2.5mm（0.1秒）\n④PQ（PR）間隔≦5mm（0.2秒）\n⑤その他異常な波形はみとめられないか\n\n判読手順\nリズムも一定\n半コマ\n1コマ\nNSRの基本\n洞房結節から出した刺激が心房に伝わり興奮\nします。同時に、刺激伝導系を伝って心室に\n刺激が伝えられ心室が興奮します。この状態\nを記録した心電図が洞調律と呼ばれる心電図\nです。\n洞調律を正しく把握するには、洞房結節が出\nした刺激によって心房が興奮したP波をきちん\nと鑑別しなければ、なりません。\n\n回答\nP波の次の波形\nはなし\n半コマ\n1コマ以内\nA.P、QRS、T波がワンセットでないため正常な心電図ではない\nP、QRS、T波は\nワンセット\n半コマ\n1コマ以内\nHRは60\n異常な波形\nA.その他異常な波形があるため、正常な心電図ではない\n①\n②\n\n回答\nHR100以上リズムは一定\nP、QRS、T波は\nワンセット\n1コマ以内\n半コマ以内\n異常な波形はなし\nA.Hrが100を超えているため正常ではない\n洞頻脈（sinus tachycardia）\nHR50台リズムは一定\n半コマ以内\n1コマ\nP、QRS、T波は\nワンセット\n異常な波形はなし\nA.NSRの基準を全て満たしており、正解は④\n③\n④\n\n不整脈の判読レベルアップへ！！\n• 不整脈とは「NSR」ではないものです。つまりは、不整脈の判読とは\nNSRがどうかのチェック作業であること。\n\n正常な心電図はどれでしょうか？\nA\nB\nC\nD\n\nA・Bの心電図\nB\nA\n\nC・Dの心電図\nC\nD\n\nA・Bの心電図\nB\nA\nHR75前後リズムも一定\n半コマ\n以内\nP、QRS、T波\nがワンセット\nPQ波は1コマ以内\nA.NSRの心電図\nHR50以下のため徐脈リズムは一定\nA.洞徐脈（sinus bradycardia）の心電図\nP、QRS、T波\nがワンセット\n半コマ以内\n異常な波形もなし\n異常な波形もなし\n\nC・Dの心電図\nC\nD\nHR60 リズムは一定\nP、QRS、T波は\nワンセット\nPQは1コマ\n以上\nA.PQ延長あり一度房室ブロック\nHR50～60台で間隔がバラバラ\nP、QRS、T波はワンセット\nPQは1コマ以内\n異常な波形もなし\n異常な波形もなし\nA.洞不整脈"}, {"title": "心電図1", "filename": "心電図1.pptx", "category": "機器操作・急変対応", "pdf": "pdf/機器操作・急変対応/心電図1__pptx.pdf", "thumbnail": "thumbnails/機器操作・急変対応/心電図1__pptx.png", "fulltext": "心電図\n正常な心電図の判読を目標に\n\n正常な心電図はどれでしょう\n①\n②\n③\n④\n\n心臓の生理\n• 興奮性\n心筋は外部から電気的または機械的な刺激を受けると興奮します\n• 自動性\n心臓の刺激伝導系には、自分でリズムを作れるところが3か所あります。\n①洞（房）結節　S\n　洞調律　　：　　60（50）　～　100　回/分\n②房室接合部　J\n　房室接合部調律　：　40　～　60　回/分\n③心室（脚・プルキンエ線維）　V\n心室調律　　：　　～　40回/分　\n\n波形の成り立ち\n①P波：心房筋に興奮が伝わる時に表れる波です。\n②QRS波：心室筋に興奮が伝わる時に表れる波です。\n③T波：心室筋の興奮が回復していく時に表れる波です。\n④ST部分：QRS波の終わりからT波の始まりまでの時間で、心筋\n虚血の判定はこの部分の基線から偏位の度合いを指標にします。\n⑤PQ間隔：P波の始まりからQRS波の始まりまでの時間で、心房\nから心室へ興奮が伝わる時間を表す。\n\n波形の正常値及び計測法\n講義では便利上\n0.2秒のマスを1コ\nマといいます\n\n波形の計測法\n　300  150  100  75　60　50   43\n　\n\n正常洞調律（NSRとは）\n• NSR（Normal　Sinus　Rhythm）の定義\n①P波、QRS波、T波の順でワンセットで認められる。\n②心拍数（HR）　60（50）回/分　≦　HR　≦　100回/分\n　RR間隔　整　　15mm（0.6秒）　≦　RR　≦　25（30）mm\n（1.0秒）\n③QRS幅　≦　2.5mm（0.1秒）\n④PQ（PR）間隔　≦　5mm（0.2秒）\n⑤その他異常な波形はみとめられないか\n\n判読手順\nリズムも一定\n半コマ\n1コマ\nNSRの基本\n洞房結節から出した刺激が心房に伝わり興\n奮します。同時に、刺激伝導系を伝って心\n室に刺激が伝えられ心室が興奮します。こ\nの状態を記録した心電図が洞調律と呼ばれ\nる心電図です。\n洞調律を正しく把握するには、洞房結節が\n出した刺激によって心房が興奮したP波を\nきちんと鑑別しなければ、なりません。\n\n回答\nP波の次の波形\nはなし\n半コマ\n1コマ以\n内\nA.P、QRS、T波がワンセットでないため正常な心電図ではな\nい\nP、QRS、T波\nはワンセット\n半コマ\n1コマ以\n内\nHRは60　\n異常な波形\nA.その他異常な波形があるため、正常な心電図ではない\n①\n②\n\n回答\nHR100以上　リズムは一\n定\nP、QRS、T波\nはワンセット\n1コマ以内\n半コマ以内\n異常な波形はなし\nA.Hrが100を超えているため正常ではな\nい　　　　　　　　　\n　洞頻脈（sinus tachycardia）\nHR50台　リズムは一定\n半コマ以内\n1コマ\nP、QRS、T波\nはワンセット\n異常な波形はなし\nA.NSRの基準を全て満たしており、正解は④\n③\n④\n\n不整脈の判読　レベルアップへ！！\n• 不整脈とは「NSR」ではないものです。つまりは、不整脈の判\n読とはNSRがどうかのチェック作業であること。\n\n正常な心電図はどれでしょうか？\nA\nB\nC\nD\n\nA・Bの心電図\nB\nA\n\nC・Dの心電図\nC\nD\n\nA・Bの心電図\nB\nA\nHR75前後　リズムも一\n定\n半コマ\n以内\nP、QRS、T波\nがワンセッ\nト\nPQ波は1コマ以内\nA.NSRの心電図\nHR50以下のため徐脈　リズムは一\n定\nA.洞徐脈（sinus bradycardia）の心電図\nP、QRS、T波\nがワンセッ\nト\n半コマ以内\n異常な波形もなし\n異常な波形もなし\n\nC・Dの心電図\nC\nD\nHR60　リズムは一\n定\nP、QRS、T波\nはワンセット\nPQは1コ\nマ以上\nA.PQ延長あり　一度房室ブロック\nHR50～60台で間隔がバラバラ　\nP、QRS、T波はワンセッ\nト\nPQは1コマ以内\n異常な波形もなし\n異常な波形もなし\nA.洞不整脈"}, {"title": "心電図1案内", "filename": "心電図1案内.pptm", "category": "機器操作・急変対応", "pdf": "pdf/機器操作・急変対応/心電図1案内__pptm.pdf", "thumbnail": "thumbnails/機器操作・急変対応/心電図1案内__pptm.png", "fulltext": "心電図モニター\n内容：心電図モニターについて➀\n　　　～正常な心電図の判読を目標に～\n　　　（続編を今後作成予定です）\nスライド作成・声：ME奥村\nモニターをつける患者様が増えています\n波形印刷してDr報告で終わるのではなく\nこれはこういう波形かなー？って\n近くのスタッフと喋れるようになれば\nモニターを読むことに\n少し興味がわいてくるかなーと思います\n動画を作成しましたので\nぜひご覧ください！！！"}, {"title": "静的静脈圧とＬＤＱｂ説明", "filename": "静的静脈圧とＬＤＱｂ説明.pdf", "category": "機器操作・急変対応", "pdf": "pdf/機器操作・急変対応/静的静脈圧とＬＤＱｂ説明__pdf.pdf", "thumbnail": "thumbnails/機器操作・急変対応/静的静脈圧とＬＤＱｂ説明__pdf.png", "fulltext": "静的静脈圧とは？\nスマホ閲覧用リンク\n\n\n静的静脈圧の確認方法\n①「設定」→「スイッチ」\n②「その他」→\n「静的静脈圧」\n③静的静脈圧が\n表示される\n\n静的静脈圧の設定\n静的静脈圧の基準値は患者ごとに設定可能。\n基準値を超えた場合、インフォメーションに表示され報知音が鳴る。\n警報のリセットは臨床工学技士が\n行うため、声をかける\n基準値を超えた場合は\n赤字で表示される\nインフォメーションをタッチ\n\n脱血時のみV側を接続\nシャントの流れ\n狭窄部\nA穿刺部\nV穿刺部\n逆接続での静的静脈圧測定\n使用例：医師指示時、A側止血不良時、\nA側瘤の拡大時などA-V間の\n狭窄が疑われる場合\n静的静脈圧確認時のA側穿刺\n狭窄部より吻合部側から、\n狭窄部に向かって穿刺を行う\n\n静的静脈圧逆接続測定手順\n➀A側とV側を逆に接続し、「脱血」→「開始」を押す。\n②脱血開始後、「開始」を再度押す。（「開始」の文字が緑色から灰色に変わり、\n  脱血が停止する）\n③回路と穿刺針をクランプして正しい接続に戻し、「d-fas」→「開始」を押す。\n （脱血が再開される）\n\nLDQbとは？\nLD（レーザードップラー）で計測したQb（血流量）\n≒実際に回路内を流れている血流量\n設定した血流量に対して実際にどのくらい\n流れているか確認する際に使用する。\n→脱血不良があればLDQbが低下する。\n原理\n\nLDQb確認方法\n「メニュー」→「モニタ」→「モニタ」→2ページ目\n\nLDQb不足率警報\n血流量よりＬＤＱｂが下回る（血流量不足率30％以下）場合に警報発生。\n原因\nシャント狭窄やA側穿刺針が血管内に挿入できていない可能性あり。\n対応\n設定血流量に対し、LDQｂが著しく低い場合はA側の針先の確認、針先洗浄、\nA側穿刺部より末梢側シャント狭窄の有無を確認。"}, {"title": "静的静脈圧とＬＤＱｂ説明", "filename": "静的静脈圧とＬＤＱｂ説明.pptx", "category": "機器操作・急変対応", "pdf": "pdf/機器操作・急変対応/静的静脈圧とＬＤＱｂ説明__pptx.pdf", "thumbnail": "thumbnails/機器操作・急変対応/静的静脈圧とＬＤＱｂ説明__pptx.png", "fulltext": "静的静脈圧とは？\nスマホ閲覧用リン\nク\n\n\n静的静脈圧の確認方法\n①「設定」→「ス\nイッチ」\n②「その他」→\n「静的静脈圧」\n③静的静脈圧が\n　　表示される\n\n静的静脈圧の設定\n静的静脈圧の基準値は患者ごとに設定可能。\n基準値を超えた場合、インフォメーションに表示され報知音が鳴\nる。\n警報のリセットは臨床工学技士\nが\n行うため、声をかける\n基準値を超えた場合\nは\n赤字で表示される\nインフォメーションを\nタッチ\n\n脱血時のみV側を接\n続\nシャントの流れ\n狭窄部\nA穿刺部\nV穿刺部\n逆接続での静的静脈圧測定\n使用例：医師指示時、A側止血不良時、\n　　　　　A側瘤の拡大時などA-V間\nの\n狭窄が疑われる場合\n静的静脈圧確認時のA側穿刺\n狭窄部より吻合部側から、\n狭窄部に向かって穿刺を行う\n\n静的静脈圧　逆接続　測定手順\n➀A側とV側を逆に接続し、「脱血」→「開始」を押す。\n②脱血開始後、「開始」を再度押す。（「開始」の文字が緑色から灰色に変わ\nり、\n　  脱血が停止する）\n③回路と穿刺針をクランプして正しい接続に戻し、「d-fas」→「開始」を押す。\n 　（脱血が再開される）\n\nLDQbとは？\nLD（レーザードップラー）で計測したQb（血流量）\n実際に回路内を流れている血流量\n≒\n設定した血流量に対して実際にどのくらい\n流れているか確認する際に使用する。\n→脱血不良があればLDQbが低下する。\n原理\n\nLDQb確認方法\n「メニュー」→「モニタ」→「モニタ」→2ペー\nジ目\n\nLDQb不足率警報\n血流量よりＬＤＱｂが下回る（血流量不足率30％以下）場合に警報発生。\n原因\n　　シャント狭窄やA側穿刺針が血管内に挿入できていない可能性あり。\n対応\n　　設定血流量に対し、LDQｂが著しく低い場合はA側の針先の確認、針先\n洗浄、\n側穿刺部より末梢側シ\nト狭窄\n有無を確認"}, {"title": "2023CART当院事情", "filename": "2023CART当院事情.pdf", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/2023CART当院事情__pdf.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/2023CART当院事情__pdf.png", "fulltext": "CARTについて\n従来法と当院独特の治療⽅法について\n\nCART = 腹⽔濾過濃縮再静注法\n「腹⽔」「濾過」「濃縮」「再静注」法\n患者から取り出した腹⽔（⼜は胸⽔）を腹⽔濾過器で濾過することにより、\n腹⽔（⼜は胸⽔）中の細菌及びがん細胞等を除去し末梢⾎中に拡散するのを防⽌します。\n次に腹⽔濃縮器でアルブミンなどの蛋⽩質を濃縮し患者に再静注する治療法をいいます。\n\n「濾過」：細菌・がん細胞・⾎球を除去\n「濃縮」：⽔分を取り除き腹⽔を濃くする\n\n「濾過」：細菌・がん細胞・⾎球を除去\n「濃縮」：⽔分を取り除き腹⽔を濃くする\nCARTの利点\n・アルブミンなどのタンパク質を\n⾎中へ戻す事ができる\n・⾎管内ボリュームupを望む事ができる\n（⾃前のアルブミンでアルブミン輸注するようなもの）\n繰り返しになりますが\n\n⼀般的なCARTはすごく時間かかります\n\n2−3時間\n2−3時間\n2−3時間\n\n時間がかかってもメリットたくさん\nQOLの改善（全⾝・栄養状態の改善による）\n• ⾃覚的苦痛の軽減\n• 循環⾎漿量の増加\n• 腹圧の軽減\n• ⾎漿浸透圧の上昇\n• 貯留間隔の延⻑\nアルブミン製剤の節減\n• ⾃⼰蛋⽩の使⽤により、アルブミン製剤の節約が可能です。\n• ⾃⼰蛋⽩の使⽤により、未知の病原因⼦による感染症の危険性がありません。\n\n週３回⾎液透析と\n⽉２回のCART療法の両⽴\n（拘束時間短縮を⽬指す）\n\n添付⽂書通りの従来の⽅法\n⽉\n⽕\n⽔\n⽊\n⾦\n⼟\n⽇\n所要時間\n４時間\n２時間\n４時間\n４時間\n治療内容\nHD\n腹⽔採取\nのみ\nHD\n腹⽔輸注\nHD\n前医での⽅法\n⽉\n⽕\n⽔\n⽊\n⾦\n⼟\n⽇\n所要時間\n6-7時間\n４時間\n４時間\n４時間\n治療内容\nCART\nHD\nHD\nHD\n腹⽔処理して\n翌朝に輸注することに疑問あり\n(安全性に問題あり？)\n\n当院での当初の⽅法\n⽉\n⽕\n⽔\n⽊\n⾦\n⼟\n⽇\n所要時間\n４時間\n４時間\n6-7時間\n治療内容\nHD\nHD\nHD\nCART\n透析中から腹⽔採取を開始\n採取した腹⽔を順次濾過濃縮処理\n濃縮完了してから投与\n利点：腹⽔処理した当⽇に再静注できること\n⽋点：CART療法終了時刻が不定にて治療終了時刻が不定（帰宅時刻が不定）\n\n機器の特性\n「濾過」\n「濃縮」\nできる\nできない\nできる\nすごく迅速にできる\n\n当院での現在の⽅法\n「濾過」\n「濃縮」\nできる\nできない\nしない\n透析⽤ダイアライザーにて\n⼀挙に実施\n（迅速に濃縮が可能）\n⽉\n⽕\n⽔\n⽊\n⾦\n⼟\n⽇\n所要時間\n４時間\n4時間\n４時間\n４時間\n治療内容\nHD\nHD+CART\nHD\nHD\n例えるならば\n腹⽔より⽣成したAlb溶液にて前希釈しているHDF\n\nなぜ本症例にてこんなことができたか\n• 腹⽔の流出がとてもスムーズで早い\n（巨⼤肝にて腹腔内圧もそれ相応に⾼い事が予想される）\n• それにもかかわらず「⽐較的」⾎⾏動態が安定している\n• 実施した事がない治療⽅法であったが、技師さんと看護師さん\n付きっきりで診てくれているので条件振りができた\n\nご清聴ありがとうございました\n献肝腎移植がまわってくるまではずっと実施すると思います\nお付き合い、よろしくお願いします"}, {"title": "2023CART説明スライド", "filename": "2023CART説明スライド.pdf", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/2023CART説明スライド__pdf.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/2023CART説明スライド__pdf.png", "fulltext": "CART\nCARTについて\n（旭化成HP）\n端的に表現するならば、\n「腹⽔を濾過して液体成分だけを濃縮し\nてから⾎中へ」という治療。\n（濾して⾎球成分は取り除かれます）\nAlbなんかを再度⾎中に戻せる事が売りです\n当院では左記のHPで挙げるような⼀般的な\n⽅法ではなく、濾過のみ実施してから⾎中\nへ戻す⽅法を選択しています\n・濾過：専⽤の機械を使⽤\n・濃縮：透析の機械を代⽤\nその他、不明な点があればMEさんへ"}, {"title": "ナファモスタット改変", "filename": "ナファモスタット改変.pptx", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/ナファモスタット改変__pptx.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/ナファモスタット改変__pptx.png", "fulltext": "ナファモスタット\n1\n\n2\n医師からは、\n「ヘパリン初回〇〇単位、持続〇〇単位、カット無し」\n「ナファモスタット〇〇mg/hr」という指示が出る。\nしかし、コンソールでは〇〇ml/hrという設定。\nIP\n※\n：infusion pump→薬液注入ポンプ\n\n3\nみたきのヘパリン　青:250単位/1ml\n→初回1000単位の指示であれば4ml入れればよい。\n　ヘパリンは液体のため、\n　そのままコンソールのIPにシリンジをセットできる。\n対して、ナファモスタットは粉末。\n→自分で溶かして液体にしなければ\n　コンソールにセットできない。\n　\n　溶かすバイアル数により濃度が変わる。\n\n4\nみたきでは\nナファモスタットの\nバイアル数に関わらず\n20mlブドウ糖液で溶解する。\n\n5\n透析時間に応じたバイアル数の準備が必要\n１バイアルは50mg\n例　医師指示「ナファモスタット40mg/hr」\n3時間透析→3×40=120mg　→３V(150mg)\n4時間透析→4×40=160mg　→４V(200mg)\n\n計算\n４V(200mg)を20mlで溶解\n200mg÷20ml=10mg/ml\n1mlあたり10mg溶解\n医師指示\n「ナファモスタット40mg/hr」\n一時間に4ml投与の設定にすればよい\n6\n\n7\n　ポイント！！！\n　　まず1mlあたり何mgなのか？を計算。\n　　　　　　　　　↓\n　　医師指示の〇〇mgを入れるためには\n　　何ml/hrでIP設定すればよいか？を計算。\n\n単位の計算で考える\n3V(150mg)を20mlで溶解\n150mg÷20ml=7.5mg/ml　1mlあたり7.5mg溶解\n40mg/hr÷7.5mg/ml=5.333333≒5.3ml/hr\n8\n\n比で考える\n150(mg)：20(ml)＝X(mg)：1(ml)\n20X＝150\nX＝7.5\n1mlに7.5mg！\nX(ml)：40(mg)＝１(ml)：7.5(mg)\n7.5X＝40\nX＝5.3\n5.3mlに40mg！\n9\n内×内=外×外\n\n150mg　→　20ml\n？mg　  →　 1ml\n÷20\n÷20\n1mlあたり7.5mg\n7.5mg　→　1ml\n40mg　 →　？ml\n×5.3\n÷5.3\n×5.3\n40mgあたり5.3ml\n絵(比の図示)で考える\n\n11\nml/hrで指示受けすると、\n緑ヘパリン（500単位/ml）と青ヘパリン（青250単位/ml）\nどちらを使うかによって体内に入る量が変わったり\nナファモスタットであれば溶解する液量によって濃度が変わる。\n→ミスの少ない指示は、単位もしくはmg。\nコンソールを操作するのは看護師とME。\n医師の指示通りにIP設定を行わなければならない。"}, {"title": "ナファモスタット溶解　問題　解答", "filename": "ナファモスタット溶解　問題　解答.docx", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/ナファモスタット溶解　問題　解答__docx.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/ナファモスタット溶解　問題　解答__docx.png", "fulltext": "ナファモスタット　溶解　計算\n1V（バイアル）=50mg のナファモスタットを使用。\n3V→15ml　4V→20ml の5％ブドウ糖液（TZ）で溶解。\n「　　　」内は医師指示とし、ワンショット無しカット無しとする。\n問１「ナファモスタット40mg/hr」\nIP\n  速度（持続速度）の設定は？\n \n \n問2「ナファモスタット50mg/hr」\nIP\n  速度（持続速度）の設定は？\n \n \n問３「ナファモスタット40mg/hr」\n毎回4 時間透析の人が次回のみ3.5 時間透析と医師指示。\n　　次回のナファモスタットは何\n  V  用意すればよい？理由も述べよ。\n \n \nただし必要最低限のバイアルを使用すること。\n\n問４「ナファモスタット40mg/hr」\n間違えて3V を20ml で溶解してしまった。\n　　どう対処すればよい？\n（キーワード “IP 速度” を使用し、具体的な数値も解答すること。）\n問５「ナファモスタット40mg/hr」\n　　3 時間透析の人が透析開始後、その日のみ1 時間延長でECUM と医師指示。\n　　3V で溶解していた場合、ナファモスタットは足りる？足りない？\n　　足りない場合、どれだけ足りないか、\nもし追加が必要であれば、何\n  V  を何\n \n m\n  l の５％\n \n TZ\n \n で追加溶解すればよいか\n \n 。\nただし必要最低限のバイアルを使用すること。\n氏名　　　　　　　　　　　　　\n\n問１\nml/hr\n問２\nml/hr\n問３\n         　　　     　 V\n理由\n問４　　（キーワード     “IP 速度”）\n\n問５\n足る　　・　　足らない\n足らないを選んだ場合\n●どれだけ足らないか　●何V を何ml の５％TZ で追加溶解すればよいか"}, {"title": "ナファモスタット溶解　問題　解答　答え", "filename": "ナファモスタット溶解　問題　解答　答え.docx", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/ナファモスタット溶解　問題　解答　答え__docx.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/ナファモスタット溶解　問題　解答　答え__docx.png", "fulltext": "ナファモスタット　溶解　計算\n1V（バイアル）=50mg のナファモスタットを使用。\n3V→15ml　4V→20ml の5％ブドウ糖液（TZ）で溶解。\n「　　　」内は医師指示とし、ワンショット無しカット無しとする。\n問１「ナファモスタット40mg/hr」\nIP\n  速度（持続速度）の設定は？\n \n \n問2「ナファモスタット50mg/hr」\nIP\n  速度（持続速度）の設定は？\n \n \n問３「ナファモスタット40mg/hr」\n毎回4 時間透析の人が次回のみ3.5 時間透析と医師指示。\n　　次回のナファモスタットは何\n  V  用意すればよい？理由も述べよ。\n \n \nただし必要最低限のバイアルを使用すること。\n\n問４「ナファモスタット40mg/hr」\n間違えて3V を20ml で溶解してしまった。\n　　どう対処すればよい？\n（キーワード “IP 速度” を使用し、具体的な数値も解答すること。）\n問５「ナファモスタット40mg/hr」\n　　3 時間透析の人が透析開始後、その日のみ1 時間延長でECUM と医師指示。\n　　3V で溶解していた場合、ナファモスタットは足りる？足りない？\n　　足りない場合、どれだけ足りないか、\nもし追加が必要であれば、何\n  V  を何\n \n m\n  l の５％\n \n TZ\n \n で追加溶解すればよいか\n \n 。\nただし必要最低限のバイアルを使用すること。\n氏名　　　　　　　　　　　　　\n\n問１\nml/hr\n問２\nml/hr\n問３\n         　　　     　 V\n理由\n問４　　（キーワード     “IP 速度”）\n\n問５\n足る　　・　　足らない\n足らないを選んだ場合\n●どれだけ足らないか　●何V を何ml の５％TZ で追加溶解すればよいか\n問１\n\n4.0 ml/hr \n4V（200mg）を20ml で溶解しているため、1ml あたり10mg 溶解している。\n「ナファモスタット40mg/hr」→4ml/hr で投与すれば医師指示通り。\n問２\n5.0 ml/hr\n4V（200mg）を20ml で溶解しているため、1ml あたり10mg 溶解している。\n「ナファモスタット50mg/hr」→5ml/hr で投与すれば医師指示通り。\n問３\n  　３V\n理由\n合計140mg 必要だから。\n4 時間透析であれば4V 必要。\n（40mg×4 時間=計160mg 必要であり、1V は50mg なので4V〔200mg〕必要。）\n3.5 時間透析の場合、40mg×3.5 時間=140mg 必要。\n1V は50mg なので3V（150mg）で足りる。\n問４\n今日のみIP 速度を5.3ml/hr に設定して治療を行う。\n3V（150mg）を20ml で溶解した。まずは1ml あたりの溶解量を求める。\n150mg ： 20ml  =  Xmg ： 1ml\n\n20X=150\nX=7.5\n→1ml あたり7.5mg 溶解していることになる。医師指示は40mg/hr\n1ml ： 7.5mg  =  Yml ： 40mg\n7.5Y=40\nY=5.3\n問５\n足る　　・　　足らない\n合計160mg 必要なので10mg 足らない。1V を5ml で追加溶解。\n3 時間透析の場合、40mg×3 時間=120mg 必要なので３V（150mg）で溶解。\n1 時間延長した場合、追加で40mg 必要。120mg+40mg=160mg なので10mg 足りない。\n1V（50mg）を5％TZ 5ml で追加溶解して、延長時につなぎかえる。"}, {"title": "問題⑥抗凝固剤", "filename": "問題⑥抗凝固剤.docx", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/問題⑥抗凝固剤__docx.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/問題⑥抗凝固剤__docx.png", "fulltext": "＜抗凝固剤＞　　　　 　　　　　　　        　　　氏名　　　　　　　　　　　　　\nヘパリンの半減期は（　➀　）。\n低分子ヘパリンの半減期は（　➁　）。\n低分子ヘパリンの特徴としてヘパリンより抗凝固作用が（　➂　）。\n低分子ヘパリンを使用する患者は、軽症の出血性病変がある場合、（　➃　）が続く場合、内視鏡生検の後等。\nナファモスタットの半減期は（　➄　）。\nナファモスタットは（　➅　）や（　➆　）の患者に用いる。\nナファモスタットは粉末状のため（　➇　）で溶解する。\nナファモスタットは（　➈　）ダイアライザーとは併用禁忌。（膜にナファモスタットが吸着されるため。）\nナファモスタット投与時（　➉　）を起こす場合がある。そのためワンショットは行わない。\n\n解答欄\n➀\n➅\n➁\n➆\n➂\n➇\n➃\n➈\n➄\n➉"}, {"title": "抗凝固剤", "filename": "抗凝固剤.pdf", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/抗凝固剤__pdf.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/抗凝固剤__pdf.png", "fulltext": "抗凝固剤\n1\n\nみたきで使用している抗凝固剤\nヘパリン（ニプロ）\n低分子テパリン（ダルテパリンニプロ）\nナファモスタット(AY)\n2\n\nヘパリン\n一般的に抗凝固剤はヘパリンが用いられる\n半減期：１時間\n3\n\n作用機序\nトロンビン（Ⅱa)とXa因子を阻害\nⅡa因子を阻害→生体内における凝固時間の延長\n Xa因子を阻害→体外循環（回路）における凝固時間の延長\n4\n\nヘパリン5000単位20ｍｌ（青）\nヘパリン10000単位20ｍｌ（緑）\n２０ｍｌ→５０００単位\n１ｍｌ→２５０単位\n２０ｍｌ→１００００単位\n１ｍｌ→５００単位\n濃いか薄いかの違い\n5000単位で足らない人は\n10000単位ヘパリンを使う\n5\n\n投与量とコンソールでの設定\n医師指示の例「初回１０００単位持続５００単位カット無し」\n５０００単位ヘパリン（１ｍｌあたり２５０単位）の場合\n初回１０００単位→ 透析開始時ワンショットで１０００単位（４ml）注入\n持続５００単位\n→ １時間当たり５００単位（２ｍｌ）注入\nカット=ヘパリン投与を中止する時間\nカット無し\n→ 最後まで（透析が終わるまで）入れ続ける\n～分前カット\n→ 透析終了の～分前にヘパリン持続注入を中止\n6\n\nACT\n止血不良・ダイアライザーやチャンバー内に\n残血がある場合、ACT測定を行うことがある\nヘパリン投与前のACT測定値に対して\n投与後に1.3～1.5倍の値となっていれば\n適正と判断\n7\n\n低分子ヘパリン（ダルテパリン）\nヘパリンより抗凝固作用が弱い\n→比較的軽症の出血性病変がある場合\n止血不良が続く場合\n内視鏡生検のあとや抜歯後のあと\nヘパリンより半減期が長く、体内で抗凝固作用が長持ちするため\nワンショットのみを行い、持続注入なしでも透析ができる\n半減期：２～３時間\n8\n\n作用機序\nXa因子のみを阻害\nXa因子を阻害→体外循環（回路）における凝固時間の延長\n凝固カスケードにおいて\nヘパリンは２つの因子を阻害するのに対して\n低分子ヘパリンは１つの因子を阻害する\nこのためヘパリンの方が抗凝固作用が強い\n9\n\nダルテパリン5000単位20ｍｌ（黄）\n１２ｍｌ\n１ｍｌあたり２５０単位\n10\n\nメシル酸ナファモスタット\n出血性病変やHIT（ヘパリン起因性血小板減少症）の患者に\n用いられる\n抗凝固作用はほぼ循環回路内のみ(半減期が短いため)\n初回投与・・・なし\n持続投与量（１時間当たり）・・・３０ｍｇ～５０ｍｇ\n商品名のフサンと呼ばれることも\n半減期：５～８分\n11\n\n使用時の注意点\n・粉末状のため、５％ブドウ糖２０ｍｌで溶解\n→生理食塩液で溶解すると結晶析出や白濁するため禁忌\n・積層型ダイアライザー（H12-4000）の患者では併用禁忌\n→積層膜は陰性（－）荷電、ナファモスタットは陽性（＋）荷電なので\n \n膜に吸着される\n・アレルギー反応を起こす場合がある\n→投与量に関わらずアレルギーを起こす場合があるので使用患者に\n対しては要観察\n12\n\n注意喚起\n13\n\nその他\n回路内残血が起こりやすいため、\nヘパリンライン+ Vチャンバー（シリンジポンプ）で\n分割投与することも可能\n14\n\nナファモスタットの溶解\nみたきでは・・・\nナファモスタットはバイアル数に関わらず\n５％TZ ２０ｍｌで溶解すると決めている\n溶解するバイアル数（３V=150mgや４V=200mgなど）によって、\n溶解濃度が変わるため抗凝固剤の持続速度の変更が必要\n別紙「ナファモスタット」参照\n15\n\n抗凝固剤の検討\n患者や治療状態によって投与量の増減や変更を医師に相談\n• 投与量を増やす時→回路内残血が見られる\n• 投与量を減らす時→止血が長時間かかる\n16\n\n※参考凝固カスケード\n17\n\n※参考薬価\nヘパリン\n255円\nダルテパリン\n566円\nナファモスタット\n650円×4=2600円\n18"}, {"title": "抗凝固剤", "filename": "抗凝固剤.pptx", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/抗凝固剤__pptx.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/抗凝固剤__pptx.png", "fulltext": "抗凝固剤\n1\n\nみたきで使用している抗凝固剤\nヘパリン（ニプ\nロ）\n低分子テパリン（ダルテパリン ニ\nプロ）\nナファモスタット(AY)\n2\n\nヘパリン\n一般的に抗凝固剤はヘパリンが用いられる\n半減期：１時間\n3\n\n作用機序\nトロンビン（Ⅱa)とXa因子を阻害\n　　　　　　　　　　　　　\na\nⅡ因子を阻害→生体内における凝固時間の延長\n Xa因子を阻害→体外循環（回路）における凝固時間の延長\n　　　　\n4\n\nヘパリン　5000単位　20ｍｌ\n　（青）\nヘパリン　10000単位　20ｍｌ　\n（緑）\n２０ｍｌ→５００\n０単位\n１ｍｌ→２５０単\n位\n２０ｍｌ→１００００単\n位\n１ｍｌ→５００単位\n濃いか薄いかの違い\n5000単位で足らない人\nは\n10000単位ヘパリンを使\nう\n5\n\n投与量とコンソールでの設定\n医師指示の例　「初回１０００単位 持続５００単位 カット無し」\n５０００単位ヘパリン（１ｍｌあたり２５０単位）の場合\n初回１０００単位 → 透析開始時ワンショットで１０００単位（４\nml）注入\n持続５００単位 　→ １時間当たり５００単位（２ｍｌ）注入\nカット=ヘパリン投与を中止する時間\nカット無し　　 　　→ 最後まで（透析が終わるまで）入れ続ける\n～分前カット 　　→ 透析終了の～分前にヘパリン持続注入を中止\n6\n\nACT\n止血不良・ダイアライザーやチャンバー内\nに\n残血がある場合、ACT測定を行うことがあ\nる\nヘパリン投与前のACT測定値に対して\n投与後に1.3～1.5倍の値となっていれば\n適正と判断\n7\n\n低分子ヘパリン（ダルテパリン）\nヘパリンより抗凝固作用が弱い\n→比較的軽症の出血性病変がある場合\n　 止血不良が続く場合\n　 内視鏡生検のあとや抜歯後のあと\nヘパリンより半減期が長く、体内で抗凝固作用が長持ちするため\nワンショットのみを行い、持続注入なしでも透析ができる\n半減期：２～３時間\n8\n\n作用機序\nXa因子のみを阻害\nXa因子を阻害→体外循環（回路）における凝固時間の延長\n凝固カスケードにおいて\nヘパリンは２つの因子を阻害するのに対し\nて\n低分子ヘパリンは１つの因子を阻害する\nこのためヘパリンの方が抗凝固作用が強い\n9\n\nダルテパリン　5000単位　20ｍｌ　\n（黄）\n１２\nｍｌ\n１ｍｌあたり２５\n０単位\n10\n\nメシル酸ナファモスタット\n出血性病変やHIT（ヘパリン起因性血小板減少症）の患者に\n用いられる\n抗凝固作用はほぼ循環回路内のみ (半減期が短いため)\n初回投与・・・なし\n持続投与量（１時間当たり）・・・３０ｍｇ～５０ｍｇ\n商品名のフサンと呼ばれることも\n半減期：５～８分\n11\n\n使用時の注意点\n・粉末状のため、５％ブドウ糖２０ｍｌで溶解\n　　→生理食塩液で溶解すると結晶析出や白濁するため禁忌\n・積層型ダイアライザー（H12-4000）の患者では併用禁忌\n　　→積層膜は陰性（－）荷電、ナファモスタットは陽性（＋）荷電\nなので\n        膜に吸着される\n・アレルギー反応を起こす場合がある\n　　→投与量に関わらずアレルギーを起こす場合があるので使用患者に\n　　　 対しては要観察\n12\n\n注意喚起\n13\n\nその他\n回路内残血が起こりやすいため、\nヘパリンライン + Vチャンバー（シリンジポンプ）で\n分割投与することも可能\n14\n\nナファモスタットの溶解\nみたきでは・・・\nナファモスタットはバイアル数に関わらず\n５％TZ　２０ｍｌで溶解すると決めている\n溶解するバイアル数（３V=150mgや４V=200mgなど）に\nよって、\n溶解濃度が変わるため抗凝固剤の持続速度の変更が必要\n別紙「ナファモスタット」参照\n15\n\n抗凝固剤の検討\n患者や治療状態によって投与量の増減や変更を医師に相談\n• 投与量を増やす時→回路内残血が見られる\n• 投与量を減らす時→止血が長時間かかる\n16\n\n※参考　凝固カスケード\n17\n\n※参考　薬価\nヘパリン\n255円\nダルテパリン\n566円\nナファモスタット\n650円×4=2600円\n18"}, {"title": "看護師さんにお願い　HIF-PH阻害薬.pages", "filename": "看護師さんにお願い　HIF-PH阻害薬.pages.pdf", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/看護師さんにお願い　HIF-PH阻害薬.pages__pdf.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/看護師さんにお願い　HIF-PH阻害薬.pages__pdf.png", "fulltext": "【院内処方と院外処方】 \n平時より透析センター業務でお世話になっています。処方checkでいつも助けてもらっています。\nあらためて約束事の確認をお願いしたく下記お目通しを。 \n【原則】 \n・「外来院外処方」と「外来院内処方」は同日入力不可 \n・下記院内処方は例外扱いとして同日入力OK \n＃　インスリン及び自己血糖測定関連材料 \n \n・マイクロファインプラス、ランセット、センサー \n＃　HIF-PH阻害薬（腎性貧血のおくすり） \n \n・エベレンゾ、ダーブロック、バフセオ、エナロイ \n【おまけ：HIF-PH阻害薬の使い分け（私見です）】 \n長所\n短所\nこれから使用方針\nエベレンゾ\n週３だけの内服 \n一番強力にHbを改善\n副作用多い \n（中枢性甲状腺機能低下症） \n（血栓/塞栓症） \n透析室業務負担↑\n処方機会減ります \n（重症症例だけに絞ります）\nダーブロック\nのみあわせ自由 \n（併用禁忌なし）\n特になし\n相対的に減ります\nバフセオ\nよく効くという前評判\nあまり効かない \nその割に高価\n絶滅に向かいます\nエナロイ\n意外と良く効く\n眠前内服縛り\n眠前薬内服患者に使用開始"}, {"title": "積層", "filename": "積層.pptx", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/積層__pptx.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/積層__pptx.png", "fulltext": "積層型の膜は陰性荷電（⊖になっている）\n積層型（AN69膜）の図\nサイトカインなどの\n不要物質は⊕のため\n膜(⊖)が吸着してくれる\nAlbは体内に必要な物質\nAlbは⊖のため、\n膜(⊖)と反発\n→Albが血液から\n　抜けにくいため\n　Alb低値の患者に\n　積層型を使用する\nリンやカリウムは\n問題なく膜を通過し\n除去される\n膜\n\n積層型と禁忌（ナファモスタットとACE阻害薬）\nナファモスタットは⊕！！！\n積層型の患者に使うと\n膜(⊖)に吸着され\nダイアライザー内に\nナファモスタットが残り\n膜がつまる\n→いずれダイアライザー内が\n　凝固し透析継続不能\n積層を使用すると\nブラジキニンが産生\n→本来体内で分解\n降圧剤のACE阻害薬には\n（エースコール等）\nブラジキニン分解を抑制効果あり\n積層+ACE阻害薬だと\nブラジキニンが分解されない\n→ブラジキニンの\n　血管拡張効果により血圧低下"}, {"title": "透析室における薬剤について", "filename": "透析室における薬剤について.docx", "category": "薬剤・専門治療法", "pdf": "pdf/薬剤・専門治療法/透析室における薬剤について__docx.pdf", "thumbnail": "thumbnails/薬剤・専門治療法/透析室における薬剤について__docx.png", "fulltext": "＜みたき透析室で使用する薬剤（静注・内服）について＞\n静注薬\n●抗凝固薬\n・ヘパリン\n半減期：1.0～1.5 時間\n・ダルテパリン（低分子ヘパリン）\n半減期：2.0～3.0 時間\n適応：軽度出血性病変、止血不良\n・ナファモスタット\n半減期：5～8 分\n適応：出血性病変\n注意点：積層型ダイアライザーとの併用は禁忌\n　　　　ワンショットを行うとショックが起こることがあるため禁忌\n●二次性副甲状腺機能亢進症　治療製剤\n◇活性型ビタミンD3 製剤\n・カルシトリオール\n\n　　　　腎不全ではビタミンD3 の活性化ができず低Ca 血症になるため薬で補う。\n　　　　小腸からのCa 吸収を促進し血中Ca を増やす。\n　　　　注意点：開始後高Ca が起こりやすい。\n◇カルシウム受容体作動薬\n・パーサビブ\n・ウパシタ\nPTH を低下させる薬。\n血中のCa 濃度が低下するとCa 受容体が感知して、PTH の分泌を促進させる。\n→Ca 受容体作動薬がCa 受容体を刺激しPTH の分泌を抑制。\n簡単にいうと、Ca の濃度が低下していてもCa がいっぱいある、と勘違いさせてPTH を抑制する薬。\n注意点：開始後低Ca が起こりやすい。\n●腎性貧血改善薬\n◇エリスロポエチン製剤\n・エポエチンアルファ\n・ダルベポエチンアルファ\n・ミルセラ\n　　　　半減期：エポエチンアルファ…7 時間（週１～３回投与）\n　　　　　　　　ダルべポエチンアルファ…25 時間（週1 回投与）\n　　　　　　　　ミルセラ…200 時間（月１～２回投与）\n\n◇鉄製剤\n・フェジン\n　　　　注意点：５％ブドウ糖液で希釈し投与。\n　　　　　　　　生食で希釈すると沈殿が生じるため禁忌。\n●その他\n・生理食塩液（0.9％）\n・ブドウ糖液（5％）\n血漿浸透圧とほぼ等しい等張液\n・強力ミノファーゲンシー\n抗アレルギー効果（皮膚搔痒症）\n・グリセオール\n　　　主に透析導入期に不均衡症候群を防ぐために使用。\n　　　浸透圧物質。\n・ノルアドレナリン\n　　　昇圧剤（作用は後述）\n・ニカルジピン(ペルジピン)\n\n　　　降圧剤（Ca 拮抗薬）\n血管にあるCa チャネルに結合し細胞内へのCa イオンの流入を減らす。\n→末梢血管が弛緩（拡張）し降圧効果。\n　・コルスバ\n　　　皮膚搔痒症に使用\n　・アミノレバン\n　　　慢性肝障害 改善薬\n・セファゾリン\n　　　抗生剤\n\n内服薬\n●昇圧薬\nα1 刺激作用→血管収縮力増加\nβ1 刺激作用→心収縮増加\n・リズミック（アメジニウム）\n作用：α1 とβ1\nノルアドレナリンを増やせって命令をだす。\n血中濃度が最高になるのは内服2～3 時間後。\n・ドプス\n作用：α1 とβ1\nノルアドレナリンの進化前。\n血中濃度が最高になるのは内服5 時間後。\n・メトリジン（ミドドリン）\n作用：α1 のみ\n血中濃度が最高になるのは1～2 時間後。\n●その他\n\n・エベレンゾ\n貧血改善薬。\n血中に酸素があっても低酸素状態と勘違いさせる薬。低酸素状態と勘違いし赤血球を産生する。\n注意点：内服開始後、副作用で胃部不快感が起こりやすい。\n・芍薬甘草湯（68）\n　　　透析中の筋けいれん対策に使用。内服後5 分ほどで効果発現。効果は4～6 時間持続。\n・カリメート\n　　　カリウム抑制薬。\n災害時に患者に飲んでもらうよう指導。カリウムと結合し糞便中にカリウムを排泄。"}, {"title": "E09-51", "filename": "E09-51.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/E09-51__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/E09-51__pptx.png", "fulltext": "みたき透析室\n重要指名手配\nこの警報にピンときたら対応！\n特徴\n・体動などにより血圧が測定できなかった時、\n　自動測定タイマーが勝手にOFFになります\n・高頻度でインシデントを起こす原因に\n　なっている凶悪犯です\n警報を見つけた方\nは\n血圧を再測定後、\n自動測定タイマー\nを\nいれてください\n留意事項\n　忙しい時の警報はすぐその場を離れたくなりますが\n　警報を止めた場合必ず、自分で最後まで対応するか\n　他スタッフに依頼してから離れてください\n　タイマーOFFにより血圧測定されず\n　血圧低下に気づかなかった場合、最悪の事態を招き\nます\n皆さんの協力が必要で\nす！！！！\n【血圧計警報】E09-\n51"}, {"title": "インシデント", "filename": "インシデント.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/インシデント__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/インシデント__pptx.png", "fulltext": "透析室で起きやすい\nインシデント\n～改めて意識しよう～\n教育チーム\n1\n\nCase1　逆接続\n正しい接\n続\n返血（V）側\n血液回路へ接続\n脱血（A）側\n血液回路へ接続\n脱血（A）側\n血液回路へ接続\n返血（V）側\n血液回路へ接続\n逆接続\n2\n\n逆接続による再循環\n正しい接続\n逆接続\n3\n\n再循環がなぜだめ？\n• 透析効率の低下\n　　→きれいになった同じ血液を再度きれいにしているため\n　　　透析効率の低下\n• 濃縮による回路凝固\n　　→除水して濃くなった血液を再度脱血して\n　　　除水しているので、血液が濃縮され回路内凝固\n4\n\n透析効率の低下\n同じ血液を何度もきれいにしている\n　→透析しているのに透析できていない！！\n　　・カリウムが抜けなかったら心停止が起こりうる\n　　・毒素が抜けなかったら尿毒症が起こりうる\n　　\n意味のない治療になってしまいます\n5\n\n濃縮で回路内凝固に伴う回路破棄\n血液回路内は約200ml\n透析患者で瀉血300mlでHb0.9g/dlの低下があったとの報告あり\n腎性貧血が進行している透析患者の回路破棄は大きな問題\n6\n\n濃縮\n普段注意するポイント！！！\nVチャンバーが黒くなっていないか（カテーテルの人は除く）\n再循環を疑った場合、再循環測定を推奨します\n7\n\nルールを順守しましょう\n　☆声だし指さしで接続確認を行う\n　☆シャントチェックのリストを用いて行う\n独り立ちして慣れたとき、無意識で接続したとき、\n焦って接続したとき、など起きやすい状況が多いです\n8\n\nCase２　除水プログラムの切り忘れ\n除水プログラムについて\n3hHD\n1hECUM\n9\n\n30分に一度\n除水速度や\nモードの変更が入る\n10\n\nプログラム入\nプログラム切\n11\n\n除水速度を0.0L/hrにしたときの注意点\n除水速度を0.0L/hrにする（除水をとめる）タイミング\n　→血圧低下や体調不良時が多い\n　プログラムが自動変更される時間がきてしまうと\n　除水が再開されてしまう\n　　\n　除水をとめるべき状況のときに除水が再開されると大事故\n　　→プログラムをOFFにする\nプログラム入の患者\n12\n\n除水プログラムをOFFにする\nコンソールのプログラム→「入/切」でOFFにしてください\nOFFにすると除水が再開してしまうので\n再度、除水速度を0.0L/hrにしてください\nプログラムを一度OFFにすると\nその透析中はONにすることができません！\n３時間透析+１時間ECUMなどのECUMが入る除水プログラムは\nECUM切り替えタイマーを入れて手動でECUM切り替え、\nその他プログラムの場合は医師に相談をしてください\n13\n\nここを押して\nプログラムをOFFに\nしてください\n14\n\n除水をとめたときは\n・愁訴処置入力\n・終了タイマーをかける\n・次の血圧測定タイマーかける\n・医師報告\n・コンソール画面を確認する！！\nやることが多く、焦るタイミングではありますが、\n一連の流れの中に除水プログラムを確認する、\nというのを忘れないでほしいです\n15\n\nCase３　自己抜針\n自己抜針を見つけたら\n・応援スタッフを呼ぶ\n・抜針部を探しておさえる（止血をする）\n・血液ポンプをとめA側とV側の回路のクランプをする\n・患者バイタル確認（意識・血圧）\n・医師報告\nその間にMEが機械側につき体外循環を行います\nその後は医師の指示に従います\n16\n\n自己抜針を起こさないために\n針先の挿入\n・２分の１以上外筒挿入\nテープ固定\n・Ω固定\n・一度はがしたテープは使わない\nテープ\nチューブ\n△\n◎\n17\n\nCase４　ナファモスタットの禁忌\nナファモスタットは陽性（⊕）荷電\n積層型ダイアライザー（H12-4000）の膜は陰性（⊖）荷電\nナファモスタットが\nダイアライザー内に吸着され\nダイアライザーが凝固する\n透析膜\n18\n\nナファモスタットに変えて！と医師指示\n必ずその患者さんが\n積層型ダイアライザーではないことを\n確認してください！！！！\n19\n\nナファモスタット注意書き\n20\n\n積層型ダイアライザー禁忌に関連して\n積層型ダイアライザーとACE阻害薬も禁忌です\n（血圧が低下してしまう恐れがあるため）\n処方箋を患者さんに渡すときに確認してもらうと良いと思います\n21\n\nCase５　血圧計警報　E09-51\n血圧測定中に手が動いた、などの体動があったときに\n血圧測定がストップし、自動測定タイマーがOFFになります\nこの警報が鳴った時は必ずスタッフが\n警報を解除する必要があります\n血圧を再測定し\n自動タイマーをいれてください\n22\n\n最後に\n忙しい環境ではありますが\nひとりひとりが事故を起こさない意識を持ち\n協力し合って業務を行っていきましょう！！！\n23\n\n間隔おいて続編やりたいです\nぜひみんなに意識してもらいたいことを\n教育チームまでご意見ください！！\n次回以降の内容に組み込むことを検討します！\n24"}, {"title": "オンライン折れ曲がり", "filename": "オンライン折れ曲がり.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/オンライン折れ曲がり__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/オンライン折れ曲がり__pptx.png", "fulltext": "回路折れ曲がりで返血不良が発生しました！\nO\nK\n折れ曲が\nり\nN\nG\nオンラインHDFの\nプライミング時注意してください\n不明な点はME伊藤まで\n左回りでプライミングポートに\n接続してください！！！\n右回りだと\n折れ曲がりが発生します"}, {"title": "オンライン漏れ", "filename": "オンライン漏れ.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/オンライン漏れ__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/オンライン漏れ__pptx.png", "fulltext": "回路から透析液が漏れ\n過除水が発生しました！\nしっかり押しねじこむ！\nしっかり締める！！\nインシデント　\nオンラインHDFの患者\n補液回路の接続部から透析液が少しずつ漏れていた\nロックは締まっていたが押し込みが弱かったためと考えられる\n漏れた分が過除水となった\n回路からの漏れは\n過除水や失血の\n大きなリスクです"}, {"title": "スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました", "filename": "スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました.docx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました__docx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました__docx.png", "fulltext": "スタッフが血圧計のチューブに足が引っ掛かり転倒した事故がありました。\n使用しない場合は〇のように設置しておきましょう。\n使用中もチューブが床につかないよう、ベッドの柱やレールに引っ掛けてください。\n　　　　　　　　　　　　\n✕\n〇"}, {"title": "医療安全　お知らせ　鉗子操作", "filename": "医療安全　お知らせ　鉗子操作.docx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/医療安全　お知らせ　鉗子操作__docx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/医療安全　お知らせ　鉗子操作__docx.png", "fulltext": "血液回路をベッドに掛ける際、誤った箇所で鉗子を咬んでしまい、血液回路に亀裂が生じ\nて血液が漏れた事例が発生しました。\n鉗子の操作についての説明と注意喚起させていただきます。\n当センターで使用している鉗子は最大3 段階はさみ\n幅を調節できるようになっています。チューブを鉗\n子で咬む場合は、2 段階にするようにお願いします。\n鉗子でチューブを咬む際は、咬む場所の真ん中で咬\nむようにしてください。"}, {"title": "指差呼称、ダブルチェック注意喚起", "filename": "指差呼称、ダブルチェック注意喚起.pdf", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/指差呼称、ダブルチェック注意喚起__pdf.pdf", "thumbnail": "thumbnails/医療安全・インシデント/指差呼称、ダブルチェック注意喚起__pdf.png", "fulltext": "「指差し呼称で守る！！いのちと信頼」\n☆指差し呼称は自分の確認のためだけではない\nもちろん思い込みや見間違いを防ぐという目的が第一です\n☆患者さんにも安心を届ける行為\n「しっかり確認してくれている」という安心につながります\n安全な治療を形で示すことができます\n☆仲間にも安全文化を広げる行動\n声に出すことで「自分もしっかりやらなきゃ」という意識が広がります\n逆接続で治療を開始し、シャントチェックの一回目を行った\nスタッフも見落とすインシデントが発生しました\n\n今回のインシデントの患者さんご本人からお声をいただきました。\n「声出しをしっかりしているスタッフもいるけど、していないスタッフもいるよ」\nみんなで改めて指差呼称、ダブルチェックの大切さを考え、安心安全な\n治療を提供していきましょう！！\n☆相手を信じすぎない\n「間違っているかもしれない」と思って確認しましょう\n☆独立して確認する\n相手と一緒に見るのではなく自分の目で確かめましょう\n☆責任を相手任せにしない\nダブルチェックの人も責任者です\n「相手のミスを探す目が患者さんを守る！！」"}, {"title": "指差呼称、ダブルチェック注意喚起", "filename": "指差呼称、ダブルチェック注意喚起.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/指差呼称、ダブルチェック注意喚起__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/指差呼称、ダブルチェック注意喚起__pptx.png", "fulltext": "「指差し呼称で守る！！いのちと信頼」\n☆指差し呼称は自分の確認のためだけではない\n　　もちろん思い込みや見間違いを防ぐという目的が第一です\n☆患者さんにも安心を届ける行為\n　　「しっかり確認してくれている」という安心につながります\n　　安全な治療を形で示すことができます\n☆仲間にも安全文化を広げる行動\n　　声に出すことで「自分もしっかりやらなきゃ」という意識が広がります\n逆接続で治療を開始し、シャントチェックの一回目を行った\nスタッフも見落とすインシデントが発生しました\n\n今回のインシデントの患者さんご本人からお声をいただきました。\n「声出しをしっかりしているスタッフもいるけど、していないスタッフもいるよ」\nみんなで改めて指差呼称、ダブルチェックの大切さを考え、安心安全な\n治療を提供していきましょう！！\n☆相手を信じすぎない\n　　「間違っているかもしれない」と思って確認しましょう\n☆独立して確認する　　\n　　相手と一緒に見るのではなく自分の目で確かめましょう\n☆責任を相手任せにしない\n　　ダブルチェックの人も責任者です\n「相手のミスを探す目が患者さんを守る！！」"}, {"title": "接続チェック", "filename": "接続チェック.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/接続チェック__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/接続チェック__pptx.png", "fulltext": "接続意識付け（接続チェック）\n接続の押し込みがゆるいor締めが弱いと\n治療中に留置針と回路が抜けてしまい\n大出血となる（過去抜けた事例あり）\n接続がゆるみなく行えるよう\n毎朝意識付けのためのチェックを必ず行う\n手順\n➀２種類接続を行ったらその場で\n　他スタッフに声かけし、ゆるみ\n　がないか確認してもらう\n➁自分の名前にチェックを入れる\n実際の患者接続部\nシャントとは\n穿刺後、留置針に回路を\n接続し透析治療を行う\nかご（メインステーション）\n（鉗子は接続が\n　硬く外れない\n　場合に使用）\n２種類（左から）\n・穿刺針+三方活栓+回路\n・穿刺針+回路\n（三方活栓はシングルニードルモード時使用）"}, {"title": "警報注意喚起", "filename": "警報注意喚起.pptx", "category": "医療安全・インシデント", "pdf": "pdf/医療安全・インシデント/警報注意喚起__pptx.pdf", "thumbnail": "thumbnails/医療安全・インシデント/警報注意喚起__pptx.png", "fulltext": "インシデント多発中\n体動で血圧が測れないことが時々ありますが、\nもし、心停止・ショックバイタル・不整脈な\nどで、\n血圧が測れていなかった場合、\n再測定を忘れてその場を離れても良いと思います\nか？\n注意\n血圧計警報（E09-51）\nカフホース点検\n測定時間オーバー\n脈検出不能\n必ず立ち止まって\n手順\n血圧の再測定忘れ‼\n血圧が再測定できるまで\nその場を離れないようにしてください\n警報確認\n患者状態確認\n►\n►\n警報解除\n警報に対する対\n►\n応\n再測定（体動・不整脈）\n上記以外もあ\nり"}, {"title": "プリセプターへの説明書(2)", "filename": "プリセプターへの説明書(2).docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/プリセプターへの説明書(2)__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/プリセプターへの説明書(2)__docx.png", "fulltext": "新入職員の指導について\n教育チームより以下の資料を配布します。\n・透析基礎知識資料５種類\n・フローチャート\n・マニュアル（プライミング、穿刺、返血）\n・業務チェックリスト(共通、職種別、その他、計3 種類)\n・コンソールの取り扱い\n透析基礎知識資料について\n5 種類配布します。プリセプターより資料も用いて解説を行ってください。解説が難しい箇所は教育チームま\nでご相談ください。透析経験があるスタッフに関しては資料の配布のみでも可能です。\nマニュアルについて\n3 種類のみ配布します。その他のマニュアルは指導時期に合わせてファイルから各自印刷して使用してくださ\nい。（ファイルの保管場所が不明であれば教育チームまで）\n業務チェックリストについて\n新スタッフ入職日より“期間”の時期を経過後、説明を始めてください。（上長からの指示がある場合はこの\n限りではありません）説明時期は新スタッフの業務進行具合により遅らせることも可能です。“見学”は“期間”\nの前より開始してもかまいません。チェックリストに行った日付を記入してください。\nコンソールの取り扱いの資料について\n\n　資料を参考に指導を行ってください。不明点は教育チーム臨床工学技士の伊藤・本多までお尋ねください。\n教育チームのテストについて\n　教育チームより資料配布とテストを行います。（開始時期目安：透析経験者→入職後２週間経過後から　未経\n験者→入職１ヶ月経過後から）\nその他\n　指導に使用したい勉強資料が必要な場合は教育チームまでご相談ください。"}, {"title": "プリセプターへの説明書", "filename": "プリセプターへの説明書.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/プリセプターへの説明書__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/プリセプターへの説明書__docx.png", "fulltext": "新入職員の指導について\n教育チームより以下の資料を配布します。\n・透析基礎知識資料５種類\n・フローチャート\n・マニュアル（プライミング、穿刺、返血）\n・業務チェックリスト(共通、職種別、その他、計3 種類)\n・コンソールの取り扱い\n透析基礎知識資料\n5 種類配布します。プリセプターより資料を用いて解説を行ってください。解説が難しい箇所は教育チームま\nでご相談ください。透析経験があるスタッフに関しては資料の配布のみでも可能です。\nマニュアル\n3 種類のみ配布します。その他のマニュアルは指導時期に合わせてファイルから各自印刷して使用してくださ\nい。（ファイルの保管場所が不明であれば教育チームまで）\n業務チェックリスト\n新スタッフ入職日より“期間”の時期を経過後、説明を始めてください。（上長からの指示がある場合はこの\n限りではありません）説明時期は新スタッフの業務進行具合により遅らせることも可能です。“見学”は“期間”\nの前より開始してもかまいません。チェックリストに行った日付を記入してください。\nコンソールの取り扱いの資料\n\n基礎資料　　　　　　　　　　　　　　テスト用資料\n　資料を参考に指導を行ってください。不明点は教育チーム臨床工学技士の伊藤・本多までお尋ねください。\n教育チームのテスト\n　教育チームより資料配布とテストを行います。（開始時期目安：透析経験者→入職後２週間経過後から　未経\n験者→入職１ヶ月経過後）\nその他\n　指導に使用したい勉強資料が必要な場合は教育チームまでご相談ください。"}, {"title": "問題②透析の種類", "filename": "問題②透析の種類.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/問題②透析の種類__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/問題②透析の種類__docx.png", "fulltext": "＜透析の種類＞ 　　　　　　　　　　　　　　　　　　　  氏名 \n \n➀HD は（ A ）分子物質、HDF は（ B ）分子物質の除去に優れる。\nHD ではダイアライザーを使用し、HDF では（　➁　）を使用する。\nHDF のメリットについて\n　・（　➂　）の減少　・合併症の予防　・食欲改善　・血圧の安定化　・貧血の改善\nHDF のデメリットについて\n　　大分子の（　➃　）が漏出してしまう。\nみたきでのHDF の希釈方法は（　➄　）希釈で行っている。\nI-HDF の効果は、末梢循環障害の改善と、（　➅　）の予防。\nI-HDF とは30 分に一度、（　➆　）を行う治療法。\nECUM の特徴は、透析液を流さず、（　➇　）のみを行うモード。\nECUM は透析液が流れていないため、（　➈　）が起こらず、浸透圧を保てる。\n\nECUM は浸透圧を保てるため（　➉　）が起こりにくい。\n解答欄\n➀A         　         B \n➅\n➁\n➆　　　　　　　　　　\n➂\n➇\n➃\n➈\n➄\n➉"}, {"title": "問題➀腎臓透析", "filename": "問題➀腎臓透析.docx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/問題➀腎臓透析__docx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/問題➀腎臓透析__docx.png", "fulltext": "＜腎臓　透析　基礎＞ 　　　　　　　　　　　　　　　　  氏名 \n \n尿毒症の代表的な症状について\n（　➀　）　むくみ　息苦しさ　不眠　頭痛　食欲低下　吐き気　かゆみ　等など。\n➁2021 年現在、透析患者の導入原疾患で最も多い疾患は？\n➂2021 年現在、透析患者の死亡原因で最も多い原因は？\n➃透析の原理は（　A　）と（　B　）であり、A は（　C　）の除去。B は（　D　）の除去を行う。\n腎臓の働きについて\n　・水分の調整　・老廃物除去　・(   ➄   )の調整　\n・血圧の調整　・pH の調整　・エリスロポエチン産生　・活性型ビタミンD 産生\n腎不全では活性型ビタミンD が産生できないため、みたき透析室では（　➅　）を投与。\nみたき透析室で使用している副甲状腺ホルモン抑制薬（静注薬）は（　➆-A　）と（　➆-Ｂ　）。\n腎不全により血中のH イオンが排泄できず、血中で増加してpH が低下した状態を（　➇　）。\n\nエリスロポエチンとは（　➈　）ホルモンのこと。\n血液の膠質浸透圧は（　➉　）によって維持されている。\n解答欄\n➀\n➅\n➁\n➆Ａ　　　　　　　　　　Ｂ\n➂\n➇\n➃A         B         C         D\n➈\n➄\n➉"}, {"title": "透析とは", "filename": "透析とは.pdf", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/透析とは__pdf.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/透析とは__pdf.png", "fulltext": "透析とは？\n透析とは、腎臓が悪くなった患者様の治療\n腎臓の代わりに人工の腎臓で治療を行う\n1\n\n人が食べて飲んだら\n食べたものや飲んだものは腸の血管で吸収され\n血液となり体内の様々なところで作用する\n食べて飲むといずれ、血液の中の水分が増えて血管が膨らみ\nさらに作用後の物質は不要物となり血中にたまっていく\n2\n\n人の体食べたもののゆくえ\n③小腸\n血\n管\n➃大腸\n栄養\n水分\n水分\n血管へ吸収\n3\n\n腎臓の役割\n腎臓はお腹の背中側にあり、血液が流れている\n腎臓はフィルターみたいなもので、\n血液中の余分な水分や不要物をこしだして\n尿として体外に排出する\n4\n\n血液中の余分な水分や不要物\n腎臓\n尿\n余分な水分や\n尿毒素を含む血液\n腎臓のイメージ\n余分な水分や\n尿毒素を除去した血液\n腎\n臓\n血管\n血管の途中に\n腎臓がある\n5\n\n腎臓が悪くなると\n食べたものや飲んだものが\n血中にどんどんたまっていくので体の調子が悪くなる\nそのため・・・\n血液を一度体外に出して、\n水分や不要物を除去してから体内に返せばよい\nこれが透析治療\n食べて飲む以上、一生治療は続く（週３回通院１日４時間の治療が一般的）\n6\n\n血液中の余分な水分や不要物\nダイアライザー\n破棄\n余分な水分や\n不要物を含む血液\n透析のイメージ\n余分な水分や\n不要物を除去した血液\nダイアライザー\n人工の腎臓\n7\n\nダイアライザーで\n余分な水分や不要物を除去\n針を血管に２本刺す\n・血液を体外に出す用\n・血液を体内に返す用\n体内へ\n体外へ\nきれいな透析液\n不要物を含んだ透析液\n実際の透析のイメージ\nこのポンプが回転することで、\n血液を体外にひっぱり、体内に返している\n8"}, {"title": "透析とは", "filename": "透析とは.pptx", "category": "透析基礎・新人教育", "pdf": "pdf/透析基礎・新人教育/透析とは__pptx.pdf", "thumbnail": "thumbnails/透析基礎・新人教育/透析とは__pptx.png", "fulltext": "透析とは？\n透析とは、腎臓が悪くなった患者様の治療\n腎臓の代わりに人工の腎臓で治療を行う\n1\n\n人が食べて飲んだら\n食べたものや飲んだものは腸の血管で吸収され\n血液となり体内の様々なところで作用する\n食べて飲むといずれ、血液の中の水分が増えて血管が膨らみ\nさらに作用後の物質は不要物となり血中にたまっていく\n2\n\n人の体　食べたもののゆく\nえ\n③小腸\n血\n管\n➃大腸\n栄養\n水分\n水分\n血管へ吸収\n3\n\n腎臓の役割\n腎臓はお腹の背中側にあり、血液が流れている\n腎臓はフィルターみたいなもので、\n血液中の余分な水分や不要物をこしだして\n尿として体外に排出する\n4\n\n血液中の余分な水分や不要物\n腎臓\n尿\n余分な水分や\n尿毒素を含む血\n液\n腎臓のイメージ\n余分な水分や\n尿毒素を除去した血液\n腎\n臓\n血\n管\n血管の途中に\n腎臓がある\n5\n\n腎臓が悪くなると\n食べたものや飲んだものが\n血中にどんどんたまっていくので体の調子が悪くなる\nそのため・・・\n血液を一度体外に出して、\n水分や不要物を除去してから体内に返せばよい\nこれが透析治療\n食べて飲む以上、一生治療は続く（週３回通院　１日４時間の治療が一般的）\n6\n\n血液中の余分な水分や不要物\nダイアライザー\n破棄\n余分な水分や\n不要物を含む血\n液\n透析のイメージ\n余分な水分や\n不要物を除去した血液\nダイアライ\nザー\n人工の腎臓\n7\n\nダイアライザーで\n余分な水分や不要物を除去\n針を血管に２本刺す\n・血液を体外に出す用\n・血液を体内に返す用\n体内へ\n体外へ\nきれいな透析\n液\n不要物を含んだ透析\n液\n実際の透析のイメージ\nこのポンプが回転することで、\n血液を体外にひっぱり、体内に返して\nいる\n8"}, {"title": "オーバーテーブル・ネームホルダー写真", "filename": "オーバーテーブル・ネームホルダー写真.pptx", "category": "設備・環境管理業務", "pdf": "pdf/設備・環境管理業務/オーバーテーブル・ネームホルダー写真__pptx.pdf", "thumbnail": "thumbnails/設備・環境管理業務/オーバーテーブル・ネームホルダー写真__pptx.png", "fulltext": "オーバーテーブル・ローテーブル　物品準備\n\n患者名\nダイアライザーor\nヘモダイアフィルター\n抗凝固剤\nヘパリン→ 青　5000単位\nヘパリン→ 緑　10000単位\n低分子　→ 黄　3000単位\n低分子　→ 橙　5000単位\nナファモ→ 桃　\n抗凝固剤\n初回　→ ワンショット量\n残量　→ ワンショット後（透析開始直後）の\n　　　　 抗凝固剤の残量\n持続　→ １時間あたりの持続注入量\n～分前→ 抗凝固剤のカット（止め）時間\n　　　　 透析終了～分前に抗凝固剤注入ストップ\n消毒薬　エタノール\n　　　　ヒビテン\n　　　　 CHG消毒綿\n穿刺針　クランプキャス16G・17G\n　　　　 AVF16G・17G\nネームプレート\nUF　→ 除水プログラム入\n空欄→ プログラム無し\n患者名の背景が青色\n→感染症患者"}, {"title": "医療ガス", "filename": "医療ガス.pptx", "category": "設備・環境管理業務", "pdf": "pdf/設備・環境管理業務/医療ガス__pptx.pdf", "thumbnail": "thumbnails/設備・環境管理業務/医療ガス__pptx.png", "fulltext": "医療ガス\n臨床工学技士\n1\n\n医療ガスとは\n2\n\n医療ガス供給システム\n3\n\nアウトレット\n4\n\nピン方式\n医療ガスアウトレット側の穴と\nアダプター側のピンが合うことで\n接続でき、異なる種類のガスは\n接続できないようになっています。\n5\n\n使用前の確認\n・ガス名と配管の色は一致しているか\n・ピンの破損や抜けはないか\n・ホースに破損がないか\n・接続後、確実にロックされているか\n・ガス漏れの音がしないか\n×ピンの抜け\n×ピンの破損\n確実なロック\n6\n\n注意点\n　アウトレットに医療機器を接続したままにすると機器内に高圧がかかり続けます。\n　機器内のガスの弁が破損し、治療時に濃度異常を起こす事故が報告されています。\n　そのため治療時以外は必ず機器をアウトレットから外してください。\n使用後の取り外し\n押して外す\nねじって外す\n7\n\n酸素は支燃性です。\n火気を近づけると発火します。\nアウトレットの中にはフィルタがあり、\nほこり等のゴミが入るとガス漏れの原因になります。\n使用していないときは必ずカバーをしてください。\n注意点\n8\n\nシャットオフバルブ\n病院の各病棟など診療エリアごとに医療ガスの供給を止めることができ\nる区域遮断弁です。\n災害時には閉める必要があるため、前には棚など障害物を設置しないこ\nとと、誰が閉めるかを事前に確認しておいてください。\n酸素使用者がいる場合は供給が停止されてしまうため注意してください。\n医療ガス\n各病棟・手術室\n9\n\n酸素ボンベ\n10\n\nボンベの持ち方\n11\n\n圧力調整器\n12\n酸素ボンベ交換の目安\n　圧力計のメモリ\n　　緑ゾーンは安全域です。\n　　黄ゾーンでボンベの交換を推奨します。\n　　赤ゾーンは交換を行ってください。\n\n注意点\n・接続時にハンドクリームなど油脂類のついて手で行うと酸素と接触して発火するこ\n　とがあります。\n・急にバルブを開けるとショックで熱が生じ発火や圧力計のガラスが破損する可能性\n　があります。\n・使用中、流量と残圧を頻繁に確認してください。\n酸素ボンベの接続と使用方法　手順\n①ボンベに圧力調整器を接続する。\n②ボンベのバルブをゆっくり左回りに開ける。\n③バルブを全開にする。\n④接続部から漏れがないことと、圧力計で残量を確認する。\n⑤酸素流量を設定、投与する。\n13\n\n酸素残量の計算方法\n酸素残量\n　酸素ボンベの内容積( )×\nℓ\n圧力計表示値(MPaの場合×10)＝酸素残量( )\nℓ\n残り使用時間\n　残量( )÷\nℓ\n酸素投与流量( /\nℓ分)＝残り使用時間(分)\n14\n\n酸素ボンベ早見表\n酸素ボンベ(3.4ℓボンベ)には約500ℓが高圧充填されています。\n酸素があとどのくらい使用できるか、\n圧力計の圧の数値と現在の酸素流量を確認し、早見表に当てはめてください。\n15\n\n流量計の読み方\nダイアル式\nフロート式\n水平にメモリを見ます。\nボール型はボールの\n中心をあわせてください。\n16\n\n流量設定時の注意点\nフロート式\n流量計が斜めの場合、設定量通りの流量が流れないため\n必ず立てて設定してください。\n×流量計を斜めにして流量設定しない\n17\n\n流量設定の注意点\nダイアル式\n数値の真ん中で設定してしまうと流量は０になります。\n必ず数値が窓から見えるよう設定してください。\n×数値の真ん中に設定しない\n18\n\n酸素使用後手順　\n①流量計を閉じる（酸素チューブを取り外す）\n②酸素ボンベのバルブを閉じる\n③流量計を開ける\n④流量計を閉じる\n必ず最後に流量計のバルブを開閉し圧力計内の圧を解放してください。\n圧がかかったまま放置すると圧力計が破損する場合があります。\nまた、次に使用する人が圧力計に数値が表示されているのを見て、\n「バルブが開いている」と誤解し、酸素が供給されずに事故に\nつながった事例も報告されています。\n19\n\n酸素ボンベの保管方法、注意点\n・風通しが良い\n・直射日光が当たらない\n・暖房器具が近くにない\n・周囲２ｍに火気、引火性のものを置かない\n・ラックに入れたり、チェーンで固定して倒れないようにする\n20\n\n酸素ボンベの医療事故\n・ボンベが倒れた\n・接続部で漏れを生じた\n・使用中、空になった\n・圧力計が故障した\n・圧力調整器の取り付けを間違えた\n・他のボンベと間違えた\n・発火、爆発を起こした\n多数報告されているため正しい取り扱いが必要です。\n21\n\n22\n酸素残量の確認不足　事例\n\n23\n酸素ボンベの開栓の未確認　事例"}, {"title": "医療ガス研修会レポート", "filename": "医療ガス研修会レポート.xlsx", "category": "設備・環境管理業務", "pdf": null, "thumbnail": null, "fulltext": ""}, {"title": "早０業務", "filename": "早０業務.docx", "category": "設備・環境管理業務", "pdf": "pdf/設備・環境管理業務/早０業務__docx.pdf", "thumbnail": "thumbnails/設備・環境管理業務/早０業務__docx.png", "fulltext": "早０業務\n外来棟の医事課の鍵ボックスから透析室の鍵を取る\n透析棟一階を開錠する\n一階のブラインドと窓を開ける（窓は外気温による）\n一階入り口の上部のスイッチオン（オレンジに点灯）\n二階、渡り廊下側の入口を開錠する\n休憩室とストックルームを開錠する\n待合と男子トイレの窓を開ける（外気温による）\n透析室フロアに入る\nメインステーションとサブステーションの電気をオン\n鍵を副センター長の机の鍵スタンドにかける\nME 日報を引き出しから出し、今日の日付の箇所を開く\n医療ガス点検表を記入する\n冷蔵庫点検表を記入する\n体重計二つの電源オン\n個人機を使用予定の場合は水洗（洗浄）を入れる\n\n救急カート、物品カート、冷蔵庫を開錠する\nエアコンの電源をオン（外気温による）\nメインステーションの換気扇スイッチ７つをオフ\nフロアの窓を開ける（外気温による）\nメインステーションとサブステーションの電気をオン\nメインステーション電子カルテ3 つとプリンター、ME パソコン３つの電源をオン（PASS:mitakime/\ntouseki17）\nME パソコン（南西）のファイルメーカーを立ち上げる\nME パソコン（東）のoutlook メールを立ち上げる\nサブステーションの電子カルテ2 つ、プリンター電源オン\nRO　DAD　DAB の点検を行う\nDAB の浸透圧を測定する\n残留塩素計測後の試薬はメインステーションのスマートフォンで写真を撮る\n個人機の洗浄終了後、液置換を入れる\n液置換終了後、浸透圧を測定する（浸透圧測定結果は早０ME 全員に報告）\n\n各ブロック1 番穿刺の人から入室が早い順に最低3 人処置セットを開封\n6 時55 分のアラームで渡り廊下の自動スイッチオン\n一階の自動スイッチオン\nフロアの電気を全てオン\n7 時プライミング開始\n7 時15 分透析室入り口開錠\n7 時30 分穿刺開始"}, {"title": "配管洗浄剤について", "filename": "配管洗浄剤について.pptx", "category": "設備・環境管理業務", "pdf": "pdf/設備・環境管理業務/配管洗浄剤について__pptx.pdf", "thumbnail": "thumbnails/設備・環境管理業務/配管洗浄剤について__pptx.png", "fulltext": "配管洗浄剤について\nみたき透析室\n臨床工学技士\n1\n\n配管洗浄の必要性\n透析液の配管の洗浄不足で菌や有機物で汚染された透析液が\n体内に入ると、生体反応が起こる\n2\n\n塩素系除菌洗浄剤（ECO200）\nみたき透析室では\n次亜と呼んでいる\n除菌→生菌、エンドトキシン\n洗浄→タンパク質、脂質、\n　　　バイオフィルムなどの有機物\n3\n\n炭酸カルシウム溶解剤（サンフリーSN）\nみたき透析室では\n酢酸と呼んでいる\n4\n\n炭酸カルシウム\n炭酸カルシウムは水に溶けにくく結晶化し透析液の配管に蓄積する\nバイオフィルムの生成につながったり、コンソールの故障につながる\n5\n\n次亜塩素酸ナトリウム、酢酸との違い\n過去、 “次亜塩素酸ナトリウム” や“酢酸”を使用していた\n現在は“塩素系洗浄剤”や “炭酸カルシウム溶解剤”\n次亜塩素酸ナトリウム\n　→配管の金属腐食、有機物残存下で洗浄効果減少\n酢酸\n　→排液時の環境負荷あり、刺激臭あり\nこれらのデメリットを改善した薬剤を現在は使用している\n6\n\n塩素ガス\nアルカリ性＋酸性の液体を混ぜると塩素ガスが発生する\n※次亜のpHが5～7付近以下になると塩素が分離する\n例　次亜と酢酸を混ぜた時の化学反応式\n　　2NaOCl+2CH3COOH→2CH3COONa+2OH-+ Cl2 \n7\n\n参考画像\n8\n\n事例１\n2024/9\n9\n\n事例２\n2025/3\n10\n\n誤混合時の危険性\n実験にてECO200 10ml とサンフリーL 10mlを混合したとき、\n瞬時に激しく発泡し噴出、液の発熱が起こり塩素ガスが90ppm発生\n混合後のｐHは1.90\nECO200、サンフリーは\nボトルひとつ約10L（10000ml）\nタンクには常に10L以上の洗浄剤\n混合してしまったら…\n11\n\nマニュアルの確認\n別紙参照\nPoint\n　★薬剤補充の正しい手順と注意点\n　★万が一混合してしまったときの対応\n12"}, {"title": "院内案内", "filename": "院内案内.pptx", "category": "設備・環境管理業務", "pdf": "pdf/設備・環境管理業務/院内案内__pptx.pdf", "thumbnail": "thumbnails/設備・環境管理業務/院内案内__pptx.png", "fulltext": "院内案内\n\n本館二階\n本館一階\n外来棟一階"}, {"title": "教育チーム動画作成パンフレット", "filename": "教育チーム動画作成パンフレット.pdf", "category": "委員会運営・院内連携", "pdf": "pdf/委員会運営・院内連携/教育チーム動画作成パンフレット__pdf.pdf", "thumbnail": "thumbnails/委員会運営・院内連携/教育チーム動画作成パンフレット__pdf.png", "fulltext": "透析室\n教育チーム"}, {"title": "教育チーム動画作成パンフレット", "filename": "教育チーム動画作成パンフレット.pptx", "category": "委員会運営・院内連携", "pdf": "pdf/委員会運営・院内連携/教育チーム動画作成パンフレット__pptx.pdf", "thumbnail": "thumbnails/委員会運営・院内連携/教育チーム動画作成パンフレット__pptx.png", "fulltext": "透析室　教育チーム"}, {"title": "血糖勉強会動画", "filename": "血糖勉強会動画.pptx", "category": "委員会運営・院内連携", "pdf": "pdf/委員会運営・院内連携/血糖勉強会動画__pptx.pdf", "thumbnail": "thumbnails/委員会運営・院内連携/血糖勉強会動画__pptx.png", "fulltext": "教育チーム　 勉強会\n教育チームよりご案内です。\n \n業務が多忙を極めているため、時間が拘束される対面式での勉強会ではなく、\n動画配信にしました。視聴して頂けると幸甚です。\n不慣れなため、お聞き苦しい点もあるかと思いますが御了承ください。\n尚、個人情報が含まれるため拡散は禁止の旨、お約束ください。\n透析室で使用する\n糖尿病治療注射薬・血糖測定について\n 　　　　　　　　　　担当：中野\nQRコードを読み取りご視聴ください"}, {"title": "透析患者様受け入れ病棟師長 各位", "filename": "透析患者様受け入れ病棟師長 各位.docx", "category": "委員会運営・院内連携", "pdf": "pdf/委員会運営・院内連携/透析患者様受け入れ病棟師長 各位__docx.pdf", "thumbnail": "thumbnails/委員会運営・院内連携/透析患者様受け入れ病棟師長 各位__docx.png", "fulltext": "透析患者様受け入れ病棟　師長 各位\n透析室教育チーム\n勉強会のご案内\n日頃より、患者様の安心・安全な透析治療にご協力いただきありがとうございます。\nこのたび、透析患者様が入院されている病棟を対象にシャント管理に関する勉強会を\n開催いたします。\n患者様の安全確保のため、シャント管理の知識と技術を病棟全体で共有し、統一したケ\nアの提供につなげたいと考えております。\n短時間で要点を整理できる内容となっておりますので、お忙しいとは存じますがぜひ\nご参加くださいますようお願い申し上げます。\n記\n対象　　　　病棟看護師\n内容　　　　シャント管理に関する知識・技術\n期間　　　　2025 年10 月より順次\n所要時間　20 分程度\n場所　　　　各病棟\n開催時間　14:30〜16:00 の間で調整\n回数　　　　各病棟2〜3 回\n日程　　　　各病棟と相談のうえ決定\n以上"}]}</script>

<script>
(function () {
  // ===== パスワード保護ゲート =====
  // 簡易的な保護（URLを知らない人の誤アクセス防止が目的で、強固な認証は想定していない）
  var AUTH_STORAGE_KEY = "eduCatalogAuthOk";
  var AUTH_PASSWORD = "26002600";

  var authGate = document.getElementById("authGate");
  var siteContent = document.getElementById("siteContent");
  var authForm = document.getElementById("authForm");
  var authPassword = document.getElementById("authPassword");
  var authError = document.getElementById("authError");

  function isAuthed() {
    try {
      return localStorage.getItem(AUTH_STORAGE_KEY) === "1";
    } catch (e) {
      return false;
    }
  }

  function unlock() {
    try {
      localStorage.setItem(AUTH_STORAGE_KEY, "1");
    } catch (e) {
      // localStorage が使えない環境（プライベートモード等）でも、
      // 今回のセッション中は表示だけは継続させる
    }
    authGate.style.display = "none";
    siteContent.style.display = "";
  }

  if (isAuthed()) {
    unlock();
  }

  authForm.addEventListener("submit", function (e) {
    e.preventDefault();
    if (authPassword.value === AUTH_PASSWORD) {
      authError.style.display = "none";
      unlock();
    } else {
      authError.style.display = "block";
      authPassword.value = "";
      authPassword.focus();
    }
  });
  // ===== ここまでパスワード保護ゲート =====

  var state = {
    items: [],
    categories: [],
    route: { view: "home" },   // {view:"home"} | {view:"category", name:"..."}
    keyword: "",
  };

  var appEl = document.getElementById("app");
  var searchInput = document.getElementById("searchInput");
  var clearBtn = document.getElementById("clearBtn");

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function encodePath(p) {
    // 相対パスの各セグメントを個別にエンコードする（日本語ファイル名対応）
    return p.split("/").map(encodeURIComponent).join("/");
  }

  function countByCategory(category) {
    return state.items.filter(function (i) { return i.category === category; }).length;
  }

  function buildSnippet(item, keyword) {
    var text = item.fulltext || "";
    if (!keyword) {
      return escapeHtml(text.slice(0, 70)) + (text.length > 70 ? "…" : "");
    }
    var idx = text.toLowerCase().indexOf(keyword.toLowerCase());
    if (idx === -1) {
      return escapeHtml(text.slice(0, 70)) + (text.length > 70 ? "…" : "");
    }
    var start = Math.max(0, idx - 25);
    var end = Math.min(text.length, idx + keyword.length + 45);
    var snippet = text.slice(start, end);
    var escaped = escapeHtml(snippet);
    var re = new RegExp(escapeHtml(keyword).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
    escaped = escaped.replace(re, function (m) { return "<mark>" + m + "</mark>"; });
    return (start > 0 ? "…" : "") + escaped + (end < text.length ? "…" : "");
  }

  function matchesKeyword(item, keyword) {
    if (!keyword) return true;
    var k = keyword.toLowerCase();
    var title = (item.title || "").toLowerCase();
    var text = (item.fulltext || "").toLowerCase();
    return title.indexOf(k) !== -1 || text.indexOf(k) !== -1;
  }

  function makeCard(item, keyword, opts) {
    opts = opts || {};
    var card = document.createElement("div");
    card.className = "card";

    var thumbWrap = document.createElement("div");
    thumbWrap.className = "thumb-wrap";
    if (item.thumbnail) {
      var img = document.createElement("img");
      img.src = encodePath(item.thumbnail);
      img.alt = item.title;
      img.loading = "lazy";
      thumbWrap.appendChild(img);
    } else {
      var ph = document.createElement("div");
      ph.className = "thumb-placeholder";
      ph.textContent = "プレビューなし\n(" + item.filename + ")";
      thumbWrap.appendChild(ph);
    }
    card.appendChild(thumbWrap);

    var body = document.createElement("div");
    body.className = "card-body";

    if (opts.showCategory) {
      var catEl = document.createElement("div");
      catEl.className = "card-category";
      catEl.textContent = item.category;
      body.appendChild(catEl);
    }

    var titleEl = document.createElement("div");
    titleEl.className = "card-title";
    titleEl.textContent = item.title;
    body.appendChild(titleEl);

    var snippetEl = document.createElement("div");
    snippetEl.className = "card-snippet";
    snippetEl.innerHTML = buildSnippet(item, keyword);
    body.appendChild(snippetEl);

    var linksEl = document.createElement("div");
    linksEl.className = "card-links";
    if (item.pdf) {
      var pdfA = document.createElement("a");
      pdfA.href = encodePath(item.pdf);
      pdfA.target = "_blank";
      pdfA.rel = "noopener";
      pdfA.textContent = "PDFを見る";
      linksEl.appendChild(pdfA);
    }
    body.appendChild(linksEl);

    card.appendChild(body);
    return card;
  }

  function renderItemGrid(items, keyword, opts) {
    var wrap = document.createElement("div");
    if (items.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "該当する資料が見つかりませんでした。";
      wrap.appendChild(empty);
      return wrap;
    }
    var grid = document.createElement("div");
    grid.className = "grid";
    items.forEach(function (item) {
      grid.appendChild(makeCard(item, keyword, opts));
    });
    wrap.appendChild(grid);
    return wrap;
  }

  function renderHome() {
    appEl.innerHTML = "";
    var title = document.createElement("div");
    title.className = "page-title";
    title.textContent = "カテゴリから資料をさがす";
    appEl.appendChild(title);

    var grid = document.createElement("div");
    grid.className = "category-grid";
    state.categories.forEach(function (cat) {
      var count = countByCategory(cat);
      var card = document.createElement("div");
      card.className = "category-card";
      card.tabIndex = 0;
      card.setAttribute("role", "button");

      var badge = document.createElement("div");
      badge.className = "icon-badge";
      badge.textContent = cat.charAt(0);
      card.appendChild(badge);

      var nameEl = document.createElement("div");
      nameEl.className = "cat-name";
      nameEl.textContent = cat;
      card.appendChild(nameEl);

      var countEl = document.createElement("div");
      countEl.className = "cat-count";
      countEl.innerHTML = '<span class="num">' + count + '</span>件の資料';
      card.appendChild(countEl);

      function go() { navigateTo({ view: "category", name: cat }); }
      card.addEventListener("click", go);
      card.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); }
      });

      grid.appendChild(card);
    });
    appEl.appendChild(grid);
  }

  function renderCategory(catName) {
    appEl.innerHTML = "";

    var back = document.createElement("button");
    back.className = "back-link";
    back.textContent = "← カテゴリ一覧に戻る";
    back.addEventListener("click", function () { navigateTo({ view: "home" }); });
    appEl.appendChild(back);

    var items = state.items.filter(function (i) { return i.category === catName; });

    var heading = document.createElement("div");
    heading.className = "section-heading";
    var h2 = document.createElement("h2");
    h2.textContent = catName;
    var countSpan = document.createElement("span");
    countSpan.className = "count";
    countSpan.textContent = items.length + " 件";
    heading.appendChild(h2);
    heading.appendChild(countSpan);
    appEl.appendChild(heading);

    appEl.appendChild(renderItemGrid(items, "", { showCategory: false }));
  }

  function renderSearchResults(keyword) {
    appEl.innerHTML = "";

    var back = document.createElement("button");
    back.className = "back-link";
    back.textContent = "← カテゴリ一覧に戻る";
    back.addEventListener("click", function () {
      searchInput.value = "";
      state.keyword = "";
      navigateTo({ view: "home" });
    });
    appEl.appendChild(back);

    var items = state.items.filter(function (i) { return matchesKeyword(i, keyword); });

    var heading = document.createElement("div");
    heading.className = "section-heading";
    var h2 = document.createElement("h2");
    h2.textContent = "検索結果: 「" + keyword + "」";
    var countSpan = document.createElement("span");
    countSpan.className = "count";
    countSpan.textContent = items.length + " 件";
    heading.appendChild(h2);
    heading.appendChild(countSpan);
    appEl.appendChild(heading);

    appEl.appendChild(renderItemGrid(items, keyword, { showCategory: true }));
  }

  function render() {
    var keyword = state.keyword.trim();
    if (keyword) {
      renderSearchResults(keyword);
      return;
    }
    if (state.route.view === "category") {
      renderCategory(state.route.name);
    } else {
      renderHome();
    }
  }

  function navigateTo(route) {
    state.route = route;
    if (route.view === "category") {
      location.hash = "#category/" + encodeURIComponent(route.name);
    } else {
      location.hash = "#home";
    }
    render();
    window.scrollTo(0, 0);
  }

  function routeFromHash() {
    var hash = location.hash.replace(/^#/, "");
    if (hash.indexOf("category/") === 0) {
      var name = decodeURIComponent(hash.slice("category/".length));
      if (state.categories.indexOf(name) !== -1) {
        return { view: "category", name: name };
      }
    }
    return { view: "home" };
  }

  window.addEventListener("hashchange", function () {
    state.route = routeFromHash();
    render();
  });

  searchInput.addEventListener("input", function () {
    state.keyword = searchInput.value;
    render();
  });
  clearBtn.addEventListener("click", function () {
    searchInput.value = "";
    state.keyword = "";
    render();
  });

  function boot(data) {
    state.items = data.items || [];
    state.categories = data.categories || [];
    state.route = routeFromHash();
    render();
  }

  // data.json を fetch せず、ビルド時に埋め込まれた JSON をそのまま読む。
  // （file:// で直接開いた場合に fetch が CORS で失敗し、一覧・検索が
  //   常に 0 件になる問題を避けるため）
  var dataEl = document.getElementById("catalog-data");
  var raw = dataEl ? dataEl.textContent.trim() : "";
  // ビルド時に埋め込まれていれば先頭は必ず "{" になる（プレースホルダー未置換の場合は "_" で始まる）
  if (raw && raw.charAt(0) === "{") {
    try {
      boot(JSON.parse(raw));
    } catch (e) {
      appEl.textContent = "カタログデータの読み込みに失敗しました: " + e;
    }
  } else {
    // 埋め込みデータが無い場合（build.py 未実行のテンプレートを直接開いた場合など）は
    // 従来どおり data.json を fetch する形にフォールバックする。
    fetch("data.json")
      .then(function (res) {
        if (!res.ok) { throw new Error("HTTPステータス " + res.status); }
        return res.json();
      })
      .then(boot)
      .catch(function (err) {
        appEl.textContent =
          "カタログデータの読み込みに失敗しました。" +
          "build.py 未実行の index.html を直接開いていないか、" +
          "catalog/index.html を開いているかご確認ください。（詳細: " + err + "）";
      });
  }
})();
</script>

</body>
</html>
